<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<title>Wizard Trees &#8212; Distro Hours</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --text:#e7eaf0; --muted:#9aa3b2; --accent:#7c5cff; --accent2:#9d86ff;
    --green:#2fbf71; --yellow:#e7b416; --orange:#f08a24; --red:#ef4d56;
    --shadow:0 6px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--accent2);text-decoration:none}
  .muted{color:var(--muted)} .small{font-size:12px} .center{text-align:center}
  .row{display:flex;gap:10px;align-items:center} .row.wrap{flex-wrap:wrap}
  .grow{flex:1} .right{margin-left:auto} .hide{display:none!important}
  .num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}

  #app{max-width:1180px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:12px 18px;
    background:rgba(15,17,21,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
  .brand b{font-size:15px;display:block} .brand .sub{color:var(--muted);font-size:11px}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:650;
    border:1px solid var(--line);background:var(--panel2);color:var(--muted)}
  main{flex:1;padding:18px;display:flex;flex-direction:column;gap:14px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 12px;font-size:14px}
  label.fl{display:block;font-size:12px;color:var(--muted);margin:10px 0 5px;font-weight:600}
  input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:9px;padding:9px 11px;font:inherit;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  input.needs{border-color:var(--red);box-shadow:0 0 0 2px rgba(239,77,86,.22)}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;
    padding:9px 14px;cursor:pointer;font:inherit;font-weight:650;display:inline-flex;align-items:center;
    justify-content:center;gap:8px;min-height:40px;white-space:nowrap}
  .btn:hover{border-color:var(--accent)} .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.ghost{background:transparent}
  .btn.danger{color:#fff;background:var(--red);border-color:var(--red)}
  .btn.ok{color:#fff;background:var(--green);border-color:var(--green)}
  .btn.sm{min-height:32px;padding:5px 11px;border-radius:8px;font-size:13px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* drop zone */
  .drop{border:2px dashed var(--line);border-radius:14px;padding:26px;text-align:center;
    background:var(--panel);transition:.15s;cursor:pointer}
  .drop.hot{border-color:var(--accent);background:#1b1830}
  .drop .big{font-size:16px;font-weight:650} .drop .small{color:var(--muted);margin-top:5px}

  /* filters */
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .filters .f{display:flex;flex-direction:column;gap:4px}
  .filters .f label{font-size:11px;color:var(--muted);font-weight:650}
  .filters .f input,.filters .f select{min-width:130px;height:38px}
  .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}
  .seg button{border:0;background:transparent;color:var(--muted);font:inherit;font-weight:650;font-size:12.5px;
    padding:7px 12px;border-radius:7px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}

  /* totals strip */
  .totbar{display:flex;gap:10px;flex-wrap:wrap}
  .tot{flex:1;min-width:120px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .tot .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);font-weight:700}
  .tot .v{font-size:21px;font-weight:750;margin-top:3px} .tot.sum .v{color:var(--accent2)}

  /* log table */
  .tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  table.log{border-collapse:collapse;width:100%;min-width:900px;font-size:13px}
  table.log th{position:sticky;top:0;background:var(--panel2);color:var(--muted);font-size:10.5px;text-transform:uppercase;
    letter-spacing:.4px;font-weight:700;padding:9px 8px;text-align:left;border-bottom:1px solid var(--line);z-index:1}
  table.log th.num{text-align:right}
  table.log td{padding:0;border-bottom:1px solid var(--line)}
  table.log tr.datehead td{padding:8px 10px;background:#12151c;font-weight:700;color:var(--accent2);border-top:1px solid var(--line)}
  .pbtn{border:1px solid var(--line);background:var(--panel2);border-radius:7px;padding:1px 8px;margin-left:8px;
    font-size:13px;cursor:pointer;vertical-align:middle;line-height:1.5}
  .pbtn:hover{border-color:var(--accent)}
  .pthumb{height:38px;width:54px;object-fit:cover;border:1px solid var(--line);border-radius:6px;
    background:var(--panel2);cursor:pointer;vertical-align:middle;margin-left:8px}
  .pthumb:hover{border-color:var(--accent)}
  table.log tr.colhead td{background:var(--panel2);color:var(--muted);font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;font-weight:700;padding:5px 8px;border-bottom:1px solid var(--line)}
  table.log tr.colhead td.num{text-align:right}
  /* "missed on last payroll" rows carried into another period: red outline */
  table.log tr.carried td{background:rgba(239,77,86,.10);border-top:1.5px solid var(--red);border-bottom:1.5px solid var(--red)}
  table.log tr.carried td:first-child{border-left:1.5px solid var(--red)}
  table.log tr.carried td:last-child{border-right:1.5px solid var(--red)}
  /* overlapping harvest hours for one worker on one day: amber outline + warning banner */
  table.log tr.overlap td{background:rgba(240,138,36,.13);border-top:1.5px solid var(--orange);border-bottom:1.5px solid var(--orange)}
  table.log tr.overlap td:first-child{border-left:1.5px solid var(--orange)}
  table.log tr.overlap td:last-child{border-right:1.5px solid var(--orange)}
  table.log tr.warnrow td{background:rgba(240,138,36,.16);color:var(--text);padding:9px 12px;font-size:12.5px;
    border-top:1px solid var(--line);border-bottom:1px solid rgba(240,138,36,.5)}
  tr.warnrow .warndismiss{margin-left:12px;border:1px solid var(--orange);background:transparent;color:var(--orange);
    border-radius:7px;padding:2px 12px;font-size:11.5px;font-weight:700;cursor:pointer;vertical-align:middle}
  tr.warnrow .warndismiss:hover{background:var(--orange);color:#1a1205}
  table.log tr.sub td{padding:7px 10px;background:#12151c;color:var(--muted);font-weight:650}
  table.log input,table.log select{border:0;border-radius:0;background:transparent;padding:8px 8px;font:inherit;
    font-size:13px;min-height:36px;width:100%}
  table.log input:focus,table.log select:focus{background:var(--panel2);box-shadow:inset 0 0 0 1.5px var(--accent)}
  table.log input.t{width:128px} table.log input.n{width:74px;text-align:right}
  table.log input.nm{width:150px}                                   /* full first/last names */
  table.log select.pp,table.log select.tm{width:52px;text-align:center;padding-left:4px;padding-right:4px}
  table.log td.calc{padding:8px 8px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text)}
  table.log td.calc.money{color:var(--green);font-weight:650}
  table.log td.del{width:78px;text-align:center;white-space:nowrap}
  .gx{border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:14px;padding:6px}
  .gx:hover{color:var(--red)}
  .gmove{border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:9px;padding:3px 2px;line-height:1}
  .gmove:hover{color:var(--accent2)}
  .pbtn.gadd{color:var(--accent2)}
  .emptyrow td{padding:26px;text-align:center;color:var(--muted)}

  /* modal */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:50;display:flex;align-items:center;justify-content:center;padding:18px}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:100%;max-width:960px;
    max-height:92vh;overflow:auto;padding:18px;box-shadow:var(--shadow)}
  .sheet.narrow{max-width:520px}
  .sheetx{float:right;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);
    color:var(--muted);font-size:15px;cursor:pointer}
  .sheetx:hover{color:var(--text)}
  .sheet h3{margin:2px 0 12px}

  /* review grid */
  table.grid{border-collapse:collapse;width:100%;font-size:13px}
  table.grid th{background:var(--panel2);color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.3px;
    font-weight:700;padding:6px 7px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  table.grid th.num{text-align:right}
  table.grid td{padding:0;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
  table.grid td:last-child{border-right:0}
  table.grid input,table.grid select{border:0;background:transparent;color:var(--text);font:inherit;font-size:13px;padding:7px 7px;min-height:34px;width:100%}
  table.grid input:focus,table.grid select:focus{background:var(--panel2);box-shadow:inset 0 0 0 1.5px var(--accent)}
  table.grid input.t{width:116px} table.grid input.n{width:62px;text-align:right}
  .empcell{display:flex;align-items:center;min-width:180px}
  .empcell .empinput{flex:1;min-width:0}
  .empcell .emppick{width:42px;flex:none;cursor:pointer;color:var(--accent2);border-left:1px solid var(--line)!important}
  table.grid td.calc{padding:7px;text-align:right;font-variant-numeric:tabular-nums}
  table.grid tr.off{opacity:.4}
  .mtag{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .mtag.ok{color:var(--green);border-color:var(--green)} .mtag.new{color:var(--yellow);border-color:var(--yellow)}
  .cbcell{text-align:center} .cbcell input{width:16px;height:16px;min-height:0;accent-color:var(--accent)}

  /* login */
  .auth{min-height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;gap:18px}
  .authcard{max-width:400px;width:100%;text-align:center}
  .authcard .logo{width:56px;height:56px;border-radius:15px;margin:0 auto 14px;font-size:28px}
  .gbtn{width:100%;background:#fff;color:#3c4043;border:1px solid #dadce0;border-radius:10px;padding:11px;
    font:inherit;font-weight:650;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;min-height:46px}
  .gbtn:hover{box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .banner{border:1px solid var(--red);background:rgba(239,77,86,.12);color:#ffd7da;border-radius:10px;padding:11px 13px;font-size:13px}

  /* toast + spinner */
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:80;background:#000;border:1px solid var(--line);
    color:#fff;padding:11px 16px;border-radius:11px;font-size:13px;box-shadow:var(--shadow);opacity:0;transition:.2s;pointer-events:none;max-width:90%}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  #toast.err{border-color:var(--red)} #toast.ok{border-color:var(--green)}
  .spin{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;
    animation:sp .7s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}
  .loading{display:flex;align-items:center;gap:10px;color:var(--muted);justify-content:center;padding:32px}
  .thumb{max-width:100%;border-radius:10px;border:1px solid var(--line)}
</style>
</head>
<body>
<div id="app"><div class="loading"><span class="spin"></span> Loading&#8230;</div></div>
<div id="toast"></div>

<script>
/* ---- config --------------------------------------------------------------- */
const DOMAIN = 'wizardtrees.com';
const COMPANIES = ['Filifera','Slane','Portal'];

// Local UI preview without a backend: open on localhost with ?demo=1
const LOCAL_HOSTS = ['localhost','127.0.0.1','0.0.0.0','::1','[::1]'];
const DEMO = /[?&]demo=1/.test(location.search) && LOCAL_HOSTS.includes(location.hostname||'');

/* ---- transport: this page is served BY Apps Script \u2192 google.script.run ----- */
function grun(fn,...args){
  return new Promise((resolve,reject)=>{
    if(!window.google?.script?.run) return reject(new Error('This page must be opened from the Apps Script web-app URL.'));
    google.script.run.withSuccessHandler(resolve).withFailureHandler(e=>reject(new Error((e&&e.message)||'server error')))[fn](...args);
  });
}
const api = {
  load(){ return grun('apiLoad'); },
  _write(fn,...a){ return grun(fn,...a).catch(()=>toast('Couldn\u2019t reach the server \u2014 change not saved','err')); },
  saveEntries(rows){ return api._write('apiSave', JSON.stringify(rows)); },
  deleteEntry(id){ return api._write('apiDelete', id); },
  rosterUpsert(rows){ return api._write('apiRoster', JSON.stringify(rows)); },
  rosterDelete(id){ return api._write('apiRosterDelete', id); },
  async ocr(base64,mime){ const r=await grun('apiOcr', base64, mime); return { ready:true, ok:r&&r.ok!==false, data:r&&r.data, error:r&&r.error }; },
  async parseNotes(text){ const r=await grun('apiParseNotes', text); return { ok:r&&r.ok!==false, data:r&&r.data, error:r&&r.error }; },
  async ocrNotes(base64,mime){ const r=await grun('apiOcrNotes', base64, mime); return { ok:r&&r.ok!==false, data:r&&r.data, error:r&&r.error }; },
  async importHistory(){ const r=await grun('apiImport'); return { ok:r&&r.ok!==false, count:r&&r.count, error:r&&r.error }; },
  async getPhoto(id){ const r=await grun('apiGetPhoto', id); return { ok:r&&r.ok!==false, mime:r&&r.mime, base64:r&&r.base64 }; },
  async savePhoto(base64,mime){ const r=await grun('apiSavePhoto', base64, mime); return { ok:r&&r.ok!==false, photoId:r&&r.photoId }; },
};

/* ---- state ---------------------------------------------------------------- */
const state = {
  session:null, profile:null, loadError:null,
  employees:[], entries:[],
  category:'distro',     // 'distro' | 'harvest' \u2014 which set of hours is shown/entered
  view:'log',            // distro view: 'log' | 'norma' | 'justin' | 'simplified'
  filter:{ company:'', employee:'', from:'', to:'', preset:'period' },
  review:null,           // {company, sheet_date, rows:[...], dataUrl}
  notesReview:null,      // {rows:[...]} for pasted harvest notes
  authError:null,
};
const CATEGORIES_HRS = [['distro','Distro Hours'],['harvest','Harvest / Deleaf Hours']];
// remember which tab + pay-period the user was on, across page refreshes
function saveView(){ try{ localStorage.setItem('hours.view', JSON.stringify({ category:state.category, preset:state.filter.preset })); }catch(e){} }
function restoreView(){ try{ const v=JSON.parse(localStorage.getItem('hours.view')||'{}');
  if(v.category==='harvest'||v.category==='distro') state.category=v.category;
  if(v.preset) state.filter.preset=v.preset; }catch(e){} }
// Pay periods: 14-day windows aligned so the current one is Jul 4\u201317 2026.
const PERIOD_ANCHOR = '2026-07-04', PERIOD_LEN = 14;
function periodWindow(offset){
  const anchor=new Date(PERIOD_ANCHOR+'T00:00'), now=new Date(); now.setHours(0,0,0,0);
  const idx=Math.floor((now-anchor)/(PERIOD_LEN*86400000))+offset;
  const s=new Date(anchor.getTime()+idx*PERIOD_LEN*86400000);
  const e=new Date(s.getTime()+(PERIOD_LEN-1)*86400000);
  const iso=d=>d.toISOString().slice(0,10);
  return [iso(s),iso(e)];
}
// the pay-period START date that a given work date naturally falls in
function periodStartOf(dateISO){
  if(!dateISO) return null;
  const anchor=new Date(PERIOD_ANCHOR+'T00:00'), d=new Date(dateISO+'T00:00');
  const idx=Math.floor((d-anchor)/(PERIOD_LEN*86400000));
  return new Date(anchor.getTime()+idx*PERIOD_LEN*86400000).toISOString().slice(0,10);
}
// which period this entry is BILLED in: its override, else the one its work date falls in
const effPeriodStart = e => e.pay_period || periodStartOf(e.work_date);
function periodLabel(startISO){ if(!startISO) return '';
  const s=new Date(startISO+'T00:00'), e=new Date(s.getTime()+(PERIOD_LEN-1)*86400000);
  const f=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return f(s)+'-'+f(e); }
const APP_VERSION = '2026-07-06.1';
const app = document.getElementById('app');
const $ = (s,r=document)=>r.querySelector(s);
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---- small helpers -------------------------------------------------------- */
function toast(msg,kind=''){ const t=$('#toast'); t.textContent=msg; t.className='show '+kind;
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.className='',2600); }
function busy(btn,on){ if(!btn)return; btn.disabled=on;
  if(on){ btn.dataset.h=btn.innerHTML; btn.innerHTML='<span class="spin"></span>'; }
  else if(btn.dataset.h){ btn.innerHTML=btn.dataset.h; } }
const uuid = ()=> (crypto.randomUUID ? crypto.randomUUID()
  : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c==='x'?r:(r&0x3|0x8)).toString(16);}));

const fmtNum = n => (n==null||n===''||isNaN(n)) ? '' : (Math.round(n*100)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtMoney = n => (n==null||n===''||isNaN(n)) ? '' : '$'+fmtNum(n);
const fmtDate = d => { if(!d) return ''; const [y,m,day]=String(d).split('-'); return `${+m}/${+day}`; };
const todayISO = ()=> new Date().toISOString().slice(0,10);

// worked hours = (out-in, +24 if overnight) - break; mirrors the DB trigger
function computeHours(cin,cout,breakMin){
  if(!cin||!cout) return null;
  const [ih,im]=cin.split(':').map(Number), [oh,om]=cout.split(':').map(Number);
  if([ih,im,oh,om].some(x=>isNaN(x))) return null;
  let mins=(oh*60+om)-(ih*60+im); if(mins<0) mins+=24*60;
  let h=(mins-(Number(breakMin)||0))/60; if(h<0) h=0;
  return Math.round(h*100)/100;
}
const computeTotal = (hours,rate,people=1)=> (hours==null||rate==null||isNaN(rate)) ? null : Math.round(hours*rate*(Number(people)||1)*100)/100;

// "12-1" / "12\u20131" / "30" / "1:00-1:30" -> minutes
function parseBreak(s){
  if(s==null) return 0; s=String(s).trim(); if(!s) return 0;
  if(/^\d+$/.test(s)) return Math.min(+s,1440);
  const m=s.replace(/[\u2013\u2014]/g,'-').match(/^(\d{1,2})(?::(\d{2}))?\s*-\s*(\d{1,2})(?::(\d{2}))?$/);
  if(!m) return 0;
  let a=(+m[1])*60+(+(m[2]||0)), b=(+m[3])*60+(+(m[4]||0));
  // lunch is around noon: if end <= start, assume PM roll (e.g. 12-1 => 60)
  if(b<=a) b+=12*60;
  const diff=b-a; return (diff>0&&diff<=1440)?diff:0;
}

/* ---- fuzzy employee matching --------------------------------------------- */
function lev(a,b){ a=a||'';b=b||''; const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]); for(let j=0;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){ const c=a[i-1].toLowerCase()===b[j-1].toLowerCase()?0:1;
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+c); } return d[m][n]; }

// best roster match for a (last,first); returns {emp, score} or null
function matchEmployee(last,first){
  const L=(last||'').trim().toLowerCase(), F=(first||'').trim().toLowerCase();
  if(!L&&!F) return null;
  let best=null;
  for(const e of state.employees){
    if(e.active===false) continue;
    const el=(e.last||'').toLowerCase(), ef=(e.first||'').toLowerCase();
    const aliases=(e.aliases||[]).map(a=>a.toLowerCase());
    let s;
    if(L && (el===L || aliases.includes(L))) s = ef&&F ? (ef===F?0:0.5) : 0;      // last exact/alias
    else{
      const dl = L&&el ? lev(L,el)/Math.max(L.length,el.length) : (L?1:0);
      const df = F&&ef ? lev(F,ef)/Math.max(F.length,ef.length) : 0;
      s = dl*0.7 + df*0.3;
    }
    if(best===null || s<best.score) best={emp:e,score:s};
  }
  if(best && best.score<=0.34) return best;   // threshold
  return null;
}

/* ---- data load ------------------------------------------------------------ */
async function loadAll(){
  state.loadError=null;
  let r;
  try{ r=await api.load(); }
  catch(e){ state.loadError=e.message||'Could not reach the server \u2014 reopen from the web-app link.'; return; }
  if(!r || r.ok===false){ state.loadError=(r&&r.error)||'Load failed'; return; }
  state.employees=r.employees||[]; state.entries=r.entries||[];
  if(r.me){ state.profile=r.me; state.session=r.me; }
}

// When embedded in the Labor/Unit Tracker, hand it the timesheet entries so its
// Tasks page can show clock-in/out spans and hour budgets. Delivery is locked to
// the tracker's origin, so the data can't leak to any other embedder.
function broadcastHours(){
  try{
    if (window.top === window) return;   // not embedded anywhere
    const slim = state.entries.map(function(e){ return {
      category:e.category||'distro', company:e.company||'', work_date:e.work_date||'',
      clock_in:e.clock_in||'', clock_out:e.clock_out||'', hours:+e.hours||0,
      rate:+e.rate||0, total:+e.total||0, team:e.team||'', last:e.last||'', first:e.first||'' }; });
    // Apps Script nests user code in Google wrapper frames, so the embedding
    // tracker is window.top, not window.parent. targetOrigin still locks delivery
    // to the tracker; opened standalone, the message is silently dropped.
    window.top.postMessage({type:'wt-hours', entries:slim}, 'https://claude759.github.io');
  }catch(_){}
}

const fullName = e => [e.last,e.first].filter(Boolean).join(' ').trim() || (e.first||e.last||'');

function presetRange(p){
  const now=new Date(); const iso=d=>d.toISOString().slice(0,10);
  if(p==='period') return periodWindow(0);
  if(p==='lastperiod') return periodWindow(-1);
  if(p==='30d'){ const s=new Date(now); s.setDate(now.getDate()-29); return [iso(s),iso(now)]; }
  return ['',''];
}

function filteredEntries(){
  const f=state.filter; let [from,to]=[f.from,f.to];
  // pay-period presets bucket by BILLED period (respecting overrides); others use work date
  const byPeriod=(f.preset==='period'||f.preset==='lastperiod') && !f.from && !f.to;
  if(f.preset && !from && !to) [from,to]=presetRange(f.preset);
  return state.entries.filter(e=>{
    if((e.category||'distro')!==state.category) return false;
    if(f.company && e.company!==f.company) return false;
    if(f.employee && fullName(e)!==f.employee) return false;
    if(byPeriod){ if(effPeriodStart(e)!==from) return false; }
    else { if(from && e.work_date<from) return false; if(to && e.work_date>to) return false; }
    return true;
  });
}

// ---- overlap detection (harvest): same worker + same day, times that overlap ----
function timeToMin(t){ if(!t) return null; const p=String(t).slice(0,5).split(':'); if(p.length<2) return null;
  const h=+p[0], m=+p[1]; return isFinite(h)&&isFinite(m)?h*60+m:null; }
function fmt12(t){ const mm=timeToMin(t); if(mm==null) return '?';
  let h=Math.floor(mm/60)%24, m=mm%60, ap=h<12?'AM':'PM', hh=h%12; if(hh===0) hh=12;
  return hh+':'+String(m).padStart(2,'0')+' '+ap; }
function harvestOverlaps(rows){
  const flagged=new Set(), warnings=[]; const byWorker=new Map();
  for(const e of rows){
    const name=(e.first||'').trim(); if(!name || e.overlap_ok) continue;
    let a=timeToMin(e.clock_in), b=timeToMin(e.clock_out); if(a==null||b==null) continue;
    if(b<=a) b+=1440;   // overnight
    const key=name.toLowerCase()+'|'+(e.work_date||'');
    if(!byWorker.has(key)) byWorker.set(key,[]);
    byWorker.get(key).push({e,a,b});
  }
  for(const list of byWorker.values()){
    if(list.length<2) continue;
    const involved=new Set();
    for(let i=0;i<list.length;i++) for(let j=i+1;j<list.length;j++){
      if(list[i].a<list[j].b && list[j].a<list[i].b){ involved.add(list[i].e); involved.add(list[j].e); }
    }
    if(involved.size){
      const arr=[...involved]; arr.forEach(e=>flagged.add(e.id));
      const ivs=arr.slice().sort((x,y)=>timeToMin(x.clock_in)-timeToMin(y.clock_in))
        .map(e=>fmt12(e.clock_in)+'\u2013'+fmt12(e.clock_out));
      warnings.push({ worker:arr[0].first, date:arr[0].work_date, ids:arr.map(e=>e.id), ivs });
    }
  }
  return { flagged, warnings };
}
async function dismissOverlap(ids){
  const set=new Set(ids), now=new Date().toISOString();
  const changed=state.entries.filter(x=>set.has(x.id));
  changed.forEach(x=>{ x.overlap_ok=true; x.updated_at=now; });
  if(changed.length) api.saveEntries(changed);
  renderLog();
  toast('Overlap flag dismissed','ok');
}
function renderLog(){

  const rows=filteredEntries().slice().sort((a,b)=>{ const x=a.work_date||'', y=b.work_date||'';
    if(x!==y) return x<y?1:-1;
    const s=(+a.seq||0)-(+b.seq||0); if(s) return s;
    const ca=a.created_at||'', cb=b.created_at||''; return ca<cb?-1:ca>cb?1:0; });

      const ppTd=showPP?`<td>${ppSelect(e)}</td>`:'';

        <td><input data-f="clock_in" type="time" value="${esc(e.clock_in?e.clock_in.slice(0,5):'')}" class="t"></td>

// fill the mini photo previews next to the dates (fetched once, then cached)
const THUMB_PLACEHOLDER='data:image/gif;base64,R0lGODlhAQABAIAAAB4iKwAAACH5BAAAAAAALAAAAAABAAEAAAICRAEAOw==';
let THUMBS_LOADING=false;
async function hydrateThumbs(){
  const imgs=[...document.querySelectorAll('img.pthumb[data-pid]')];
  // apply anything already cached right away
  imgs.forEach(i=>{ const s=PHOTO_CACHE[i.dataset.pid]; if(s) i.src=s; });
  if(THUMBS_LOADING) return;
  const pids=[...new Set(imgs.map(i=>i.dataset.pid))].filter(p=>!PHOTO_CACHE[p]);
  if(!pids.length) return;
  THUMBS_LOADING=true;
  try{
    for(const pid of pids){
      if(PHOTO_CACHE[pid]) continue;
      const r=await api.getPhoto(pid).catch(()=>null);
      if(!r || r.ok===false || !r.base64) continue;
      PHOTO_CACHE[pid]='data:'+(r.mime||'image/jpeg')+';base64,'+r.base64;
      document.querySelectorAll('img.pthumb[data-pid="'+pid+'"]').forEach(i=>{ i.src=PHOTO_CACHE[pid]; });
    }
  } finally { THUMBS_LOADING=false; }
}

function wireLog(tbl){
  if(tbl.__wired) return;   // #logtbl persists across renders; bind delegated listeners once
  tbl.__wired=true;
  const rowEl=el=>el.closest('tr[data-id]');
  const entryOf=id=>state.entries.find(x=>x.id===id);
  // live recompute on input
  tbl.addEventListener('input',e=>{
    const cell=e.target.closest('[data-f]'); if(!cell) return;
    const tr=rowEl(cell); const ent=entryOf(tr.dataset.id); if(!ent) return;
    applyField(ent,cell.dataset.f,cell.value);
    const h=computeHours(ent.clock_in,ent.clock_out,ent.break_minutes);
    ent.hours=h; ent.total=computeTotal(h,ent.rate!=null?+ent.rate:null,ent.people);
    tr.querySelector('.c-h').textContent=fmtNum(ent.hours);
    tr.querySelector('.c-t').textContent=fmtMoney(ent.total);
  });
  // commit on change (blur / enter) \u2192 persist the full row (server recomputes hours/total)
  tbl.addEventListener('change',e=>{
    const cell=e.target.closest('[data-f]'); if(!cell) return;
    const tr=rowEl(cell); const id=tr.dataset.id; const f=cell.dataset.f;
    const ent=entryOf(id); if(!ent) return;
    applyField(ent,f,cell.value);
    if((f==='last'||f==='first') && !ent.team){   // auto-team a fresh name (Norma's unless Thanh/Suong)
      const m2=matchEmployee(ent.last,ent.first);
      ent.team=teamForName(m2?m2.emp:null,ent.last,ent.first);
      const tcell=tr.querySelector('[data-f="team"]'); if(tcell) tcell.value=ent.team;
    }
    const h=computeHours(ent.clock_in,ent.clock_out,ent.break_minutes);
    ent.hours=h; ent.total=computeTotal(h,ent.rate!=null?+ent.rate:null,ent.people); ent.updated_at=new Date().toISOString();
    api.saveEntries([ent]);
    if(f==='work_date'||f==='company'||f==='pay_period'){ renderFilters(); renderLog(); } // may move groups/periods
    else{ tr.querySelector('.c-h').textContent=fmtNum(ent.hours); tr.querySelector('.c-t').textContent=fmtMoney(ent.total); refreshTotals(); }
  });

function groupKey(e,isH){ return isH ? ((e.work_date||'')+'|'+(e.company||'')) : (e.work_date||''); }
function moveRow(id,dir){
  const e=state.entries.find(x=>x.id===id); if(!e) return;
  const isH=state.category==='harvest'; const gk=groupKey(e,isH);
  const sibs=state.entries.filter(x=>(x.category||'distro')===state.category && groupKey(x,isH)===gk)
    .sort((a,b)=>((+a.seq||0)-(+b.seq||0)) || ((a.created_at||'')<(b.created_at||'')?-1:(a.created_at||'')>(b.created_at||'')?1:0));
  const i=sibs.findIndex(x=>x.id===id), j=dir==='up'?i-1:i+1;
  if(i<0||j<0||j>=sibs.length) return;                 // already at the edge of its group
  sibs.forEach((x,k)=>{ x.seq=k; });                   // normalize to positions
  const t=sibs[i].seq; sibs[i].seq=sibs[j].seq; sibs[j].seq=t;   // swap the pair
  const now=new Date().toISOString(); sibs.forEach(x=>x.updated_at=now);
  api.saveEntries(sibs);
  renderLog();
}

function wireDrop(){

// Camera photos are often 3-6MB; the vision API caps images around 5MB base64.
// Downscale in the browser (2000px is plenty for handwriting) before sending.
async function shrinkPhoto(file){
  const dataUrl=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
  try{
    const img=await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=dataUrl; });
    const w0=img.naturalWidth||img.width, h0=img.naturalHeight||img.height;
    if(!w0||!h0) return { dataUrl, mime:file.type||'image/jpeg' };
    const scale=Math.min(1, 2000/Math.max(w0,h0));
    if(scale>=1 && file.size<1500000) return { dataUrl, mime:file.type||'image/jpeg' };   // already small
    const c=document.createElement('canvas');
    c.width=Math.round(w0*scale); c.height=Math.round(h0*scale);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    let q=0.88, out=c.toDataURL('image/jpeg',q);
    while(out.length>4500000 && q>0.4){ q-=0.15; out=c.toDataURL('image/jpeg',q); }      // stay well under the cap
    return { dataUrl:out, mime:'image/jpeg' };
  }catch(e){ return { dataUrl, mime:file.type||'image/jpeg' }; }   // undecodable -> send as-is
}
async function handlePhoto(file){
  const drop=$('#drop'); const isH=state.category==='harvest';
  drop.innerHTML=`<div class="loading"><span class="spin"></span> Reading \u201c${esc(file.name)}\u201d with Claude\u2026</div>`;
  try{
    const p=await shrinkPhoto(file);
    const base64=String(p.dataUrl).split(',')[1]||'';
    if(isH){
      const r=await api.ocrNotes(base64, p.mime);
      if(!r || r.ok===false) throw new Error((r&&r.error)==='parse_failed'
        ? 'Couldn\u2019t read that photo \u2014 try a clearer one.' : (r&&r.error)||'Could not read the photo');
      const rows=(r.data&&r.data.rows)||[];
      if(!rows.length){ toast('No harvest entries found in that photo','err'); return; }
      openNotesReview(rows, r.photoId||null, p.dataUrl);
    } else {
      const r=await api.ocr(base64, p.mime);
      if(!r || r.ok===false) throw new Error((r&&r.error)==='extraction_failed'
        ? 'Couldn\u2019t read the sheet \u2014 try a clearer photo or add the rows manually.' : (r&&r.error)||'Could not read the sheet');
      const rows=(r.data&&r.data.rows)||[];
      if(!rows.length){ toast('No rows found on that sheet \u2014 try a clearer photo or add them manually','err'); return; }
      openReview(r.data||{}, p.dataUrl, r.photoId||null);
    }
  }catch(err){ toast(err.message||'Failed to read photo','err'); }
  finally{ resetDrop(); }
}

function openReview(res,dataUrl,photoId){
  const company=res.company||state.filter.company||'';
  // one sheet = one day: use the majority date across rows (a lone miswritten date loses)
  const counts={}; (res.rows||[]).forEach(r=>{ if(r.date) counts[r.date]=(counts[r.date]||0)+1; });
  let sheetDate=res.sheet_date||todayISO(), best=0;
  Object.keys(counts).forEach(d=>{ if(counts[d]>best){ best=counts[d]; sheetDate=d; } });
  const rows=(res.rows||[]).map(r=>{
    const m=matchEmployee(r.last,r.first);
    const e=m?m.emp:null;
    return {
      include:true,
      company: company || (e?.default_company)||'',
      work_date: sheetDate,
      last: e?e.last:(r.last||''), first: e?e.first:(r.first||''),
      team: teamForName(e, r.last, r.first),
      clock_in: r.time_in||'', clock_out: r.time_out||'',
      break_minutes: r.break_minutes??0,
      rate: rateForName(e, r.last, r.first),
      employee_id: e?e.id:null,
      matched: !!e, ocr:{last:r.last,first:r.first},
    };
  });
  state.review={ company, sheet_date:sheetDate, rows, dataUrl, photoId:photoId||null };
  drawReview();
}

function wireReview(){
  const tbl=$('#rvtbl'); const rv=state.review;
  const rowIdx=el=>+el.closest('tr[data-i]').dataset.i;
  // roster dropdown: copy the picked name into the text field and re-run matching
  tbl.addEventListener('change',e=>{
    const pick=e.target.closest('[data-f="emppick"]'); if(!pick) return;
    const name=pick.value; pick.selectedIndex=0;
    if(!name) return;
    const inp=pick.closest('tr').querySelector('[data-f="empname"]');
    inp.value=name; inp.dispatchEvent(new Event('input',{bubbles:true}));
  });
  tbl.addEventListener('input',e=>{
    const cell=e.target.closest('[data-f]'); if(!cell) return;
    const i=rowIdx(cell); const r=rv.rows[i]; const f=cell.dataset.f;
    if(f==='emppick') return;   // handled by the change listener above
    if(f==='include'){ r.include=cell.checked; cell.closest('tr').classList.toggle('off',!r.include); updateSaveBtn(); return; }
    if(f==='empname'){ // re-split + re-match + re-apply the rate + team rules
      const {last,first}=splitName(cell.value); r.last=last; r.first=first;
      const m=matchEmployee(last,first); r.matched=!!m; r.employee_id=m?m.emp.id:null;
      r.team=teamForName(m?m.emp:null,last,first);
      r.rate=rateForName(m?m.emp:null,last,first);
      const rateCell=cell.closest('tr').querySelector('[data-f="rate"]'); if(rateCell) rateCell.value=r.rate;
      const tag=cell.closest('tr').children[2]; tag.innerHTML=r.matched?'<span class="mtag ok">match</span>':'<span class="mtag new">new</span>';
    }
    else if(f==='break_minutes') r.break_minutes=+cell.value||0;
    else if(f==='rate') r.rate=cell.value===''?null:+cell.value;
    else r[f]=cell.value;
    const tr=cell.closest('tr');
    const h=computeHours(r.clock_in,r.clock_out,r.break_minutes);
    tr.querySelector('.c-h').textContent=fmtNum(h);
    tr.querySelector('.c-t').textContent=fmtMoney(computeTotal(h,r.rate!=null?+r.rate:null));
  });

function splitName(s){ s=(s||'').trim(); if(!s) return {last:'',first:''};
  const p=s.split(/\s+/); if(p.length===1) return {last:p[0],first:''}; return {last:p[0],first:p.slice(1).join(' ')}; }

// Guarantee the sheet photo is stored before rows save: the upload normally
// happens at OCR time, but if it failed (e.g. Drive permission), retry now
// from the image the browser still holds.
async function ensureReviewPhoto(rv){
  if(rv.photoId || !rv.dataUrl) return;
  const b64=String(rv.dataUrl).split(',')[1]||'';
  if(!b64) return;
  const mm=String(rv.dataUrl).slice(5).split(';')[0]||'image/jpeg';
  const r=await api.savePhoto(b64,mm).catch(()=>null);
  if(r && r.ok!==false && r.photoId) rv.photoId=r.photoId;
  else toast(r&&r.error==='drive_permission'
    ? 'Rows saved, but the photo couldn\u2019t be stored \u2014 run authorizePhotos once, then use +\ud83d\udcf7'
    : 'Rows saved, but the photo couldn\u2019t be stored','err');
}

async function handleParseNotes(btn){
  const ta=$('#notes'); const text=((ta&&ta.value)||'').trim();
  if(!text){ toast('Paste some notes first','err'); return; }
  busy(btn,true);
  try{
    const r=await api.parseNotes(text);
    if(!r||r.ok===false) throw new Error((r&&r.error)==='parse_failed'?'Couldn\u2019t read those notes \u2014 try trimming them down.':((r&&r.error)||'Parse failed'));
    const rows=(r.data&&r.data.rows)||[];
    if(!rows.length){ toast('No work entries found in those notes','err'); return; }
    openNotesReview(rows);
  }catch(err){ toast(err.message||'Parse failed','err'); }

const COLS=['Company','Date','Last','First','Team','Clock In','Clock Out','Break','Hours','Rate','Total'];
function exportRows(){
  return filteredEntries().map(e=>[e.company||'',e.work_date||'',e.last||'',e.first||'',e.team||'',
    e.clock_in?e.clock_in.slice(0,5):'', e.clock_out?e.clock_out.slice(0,5):'',
    e.break_minutes??0, e.hours??'', e.rate??'', e.total??'']);
}
async function exportData(kind){
  const rows=exportRows();
  if(!rows.length){ toast('Nothing to export','err'); return; }
  const fname=`distro-hours-${todayISO()}`;
  if(kind==='csv'){
    const csv=[COLS,...rows].map(r=>r.map(csvCell).join(',')).join('\r\n');
    dl(new Blob([csv],{type:'text/csv'}),fname+'.csv');
  } else {
    try{
      const XLSX=await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs');
      const safe=[COLS,...rows].map(r=>r.map(sheetCell));
      const ws=XLSX.utils.aoa_to_sheet(safe);
      const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Distro Hours');
      XLSX.writeFile(wb,fname+'.xlsx');
    }catch(err){ toast('Excel export failed \u2014 use CSV','err'); }
  }
}
// neutralize spreadsheet formula injection: a leading =,+,-,@ (or control char) in a text cell
function sheetCell(v){ if(typeof v!=='string') return v; return /^[=+\-@\t\r]/.test(v) ? "'"+v : v; }
function csvCell(v){ v=String(v??''); if(/^[=+\-@\t\r]/.test(v)) v="'"+v; return /[",\r\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function dl(blob,name){ const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000); }
