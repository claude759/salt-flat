<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<title>Wizard Trees NY — Labor Tracker</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --text:#e7eaf0; --muted:#9aa3b2; --faint:#6b7382;
    --accent:#7c5cff; --accent2:#9d86ff;
    --green:#2fbf71; --red:#ef4d56;
    --shadow:0 6px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);
    font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}.faint{color:var(--faint)}

  header{position:sticky;top:0;z-index:30;background:rgba(15,17,21,.94);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;gap:12px;padding:10px 16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;margin-right:4px}
  .logo{width:32px;height:32px;border-radius:9px;flex:none;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:17px}
  .brand b{font-size:15px;display:block;line-height:1.1}
  .brand .sub{color:var(--muted);font-size:11px}
  .spacer{flex:1 1 auto}

  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;
    padding:7px 12px;font:inherit;font-weight:600;cursor:pointer;white-space:nowrap}
  .btn:hover{border-color:var(--accent)} .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.sm{padding:5px 10px;font-size:12.5px;border-radius:9px}
  input[type=date]{background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:6px 10px;font:inherit;outline:none;color-scheme:dark}
  input[type=date]:focus{border-color:var(--accent)}
  select{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;
    padding:6px 10px;font:inherit;font-size:12.5px;outline:none;max-width:300px;color-scheme:dark}
  select:focus{border-color:var(--accent)}
  main{flex:1;width:100%;max-width:1180px;margin:0 auto;padding:18px 16px 48px}

  section{margin-bottom:26px}
  h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    margin:0 0 10px 2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{padding:9px 14px;text-align:right;white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  thead th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:650;
    border-bottom:1px solid var(--line);background:var(--panel2)}
  tbody td{border-bottom:1px solid rgba(42,47,58,.55);font-variant-numeric:tabular-nums}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:rgba(124,92,255,.05)}
  .empty{padding:22px;text-align:center;color:var(--faint)}
  #rosterTable{width:100%;border-collapse:collapse;font-size:13px}
  #rosterTable th{position:sticky;top:0;background:var(--panel);color:var(--muted);font-weight:600;text-align:left;
    padding:8px 6px;border-bottom:1px solid var(--line);font-size:12px;z-index:1}
  #rosterTable td{padding:4px 4px;border-bottom:1px solid var(--line)}
  #rosterTable td input,#rosterTable td select{width:100%;box-sizing:border-box;background:var(--panel2);
    border:1px solid var(--line);border-radius:8px;color:var(--text);font:inherit;font-size:13px;padding:6px 8px;color-scheme:dark}
  #rosterTable td input:focus,#rosterTable td select:focus{outline:1px solid var(--accent)}
  #rosterTable td input[type=checkbox]{width:auto;accent-color:var(--accent)}
  #rosterTable tr.inactive td input:not([type=checkbox]),#rosterTable tr.inactive td select{opacity:.45}
  #rosterTable button.rowdel{background:none;border:0;color:var(--muted);cursor:pointer;font-size:14px;padding:4px 6px}
  #rosterTable button.rowdel:hover{color:rgb(239,77,86)}
  .cmp-filters{display:flex;flex-wrap:wrap;align-items:center;gap:10px 18px;margin-bottom:12px}
  .cmp-cos{display:flex;align-items:center;gap:8px}
  .cmp-coslabel{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
  #cmp-cos button::before{content:"✓ ";opacity:.9}
  #cmp-cos button:not(.on){text-decoration:line-through;opacity:.7}
  #cmp-cos button:not(.on)::before{content:"";opacity:0}
  .cmp-copyall,.cmp-copysum{background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--muted);font:inherit;font-size:12px;padding:6px 12px;cursor:pointer;white-space:nowrap}
  .cmp-copyall:hover,.cmp-copysum:hover{border-color:var(--accent);color:var(--text)}
  .cmp-copysum{background:var(--accent);border-color:var(--accent);color:#fff}
  .cmp-copysum:hover{color:#fff;opacity:.92}
  .cmp-emp{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:12px}
  .cmp-emp.warn{border-color:rgba(239,166,77,.5)}
  .cmp-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;font-size:13.5px}
  .cmp-flag{color:#efa64d;font-size:12.5px}
  .cmp-tot{margin-left:auto;color:var(--muted);font-size:12.5px}
  .cmp-pair{background:rgba(239,166,77,.08);border-radius:8px;padding:7px 10px;margin:4px 0;font-size:12.5px}
  .cmp-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}
  .cmp-table th{color:var(--muted);font-weight:600;text-align:left;padding:5px 8px;border-bottom:1px solid var(--line);font-size:11.5px}
  .cmp-table td{padding:5px 8px;border-bottom:1px solid var(--line);text-align:left}
  .cmp-table th.num,.cmp-table td.num{text-align:right}
  .cmp-table tr.overlap td{background:rgba(239,166,77,.07)}
  .cmp-table td.money{font-variant-numeric:tabular-nums}
  .cmp-table th.ctr,.cmp-table td.ctr{text-align:center;white-space:nowrap}
  .cmp-grandtot{margin-left:auto;color:var(--muted);font-size:12.5px;white-space:nowrap}
  .cmp-grandtot b{color:var(--text);font-weight:700}
  .cmp-table tr.sub td{font-weight:700;color:var(--text);border-top:1px solid var(--line);background:var(--panel2)}
  .cmp-simplebar{margin:2px 0 12px}
  .cmp-simple td,.cmp-simple th{padding:6px 10px}
  .cmp-table .pbtn,.cmp-pair .pbtn,.cmp-head .pbtn{background:var(--panel2);border:1px solid var(--line);border-radius:7px;color:var(--muted);font:inherit;font-size:11.5px;padding:3px 9px;cursor:pointer}
  .cmp-pair .pbtn:hover,.cmp-head .pbtn:hover{border-color:var(--accent);color:var(--text)}
  .cmp-table button.rowdel{background:none;border:0;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 5px}
  .cmp-table button.rowdel:hover{color:rgb(239,77,86)}

  footer{padding:14px 16px 26px;text-align:center;color:var(--faint);font-size:11.5px}

  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:120;display:none;
    background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 16px;
    box-shadow:var(--shadow);font-size:13px;max-width:90vw}
  #toast.err{border-color:var(--red)}
  #toast.act{cursor:pointer;border-color:var(--accent);color:var(--text)}
  #toast.act:hover{background:var(--panel)}
  #toast.on{display:block}

  @media (max-width:640px){
    th,td{padding:8px 10px}
  }

  /* Google sign-in gate */
  #login-gate{position:fixed;inset:0;z-index:9999;background:var(--bg);
    display:flex;align-items:center;justify-content:center;padding:20px}
  #login-gate.hidden{display:none}
  .login-box{width:340px;max-width:100%;text-align:center;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:34px 30px 28px;box-shadow:var(--shadow)}
  .login-logo{font-size:19px;font-weight:700;letter-spacing:-.01em}
  .login-sub{font-size:11px;color:var(--faint);letter-spacing:.14em;margin-top:3px;margin-bottom:24px}
  #gsi-button{display:flex;justify-content:center;min-height:44px}
  .login-spin{color:var(--faint);font-size:13px;padding:11px}
  .login-err{color:var(--red);font-size:12.5px;margin-top:14px;min-height:16px;line-height:1.4}
  .login-note{color:var(--faint);font-size:12px;margin-top:22px;line-height:1.5}
  .login-note b{color:var(--muted)}

  /* Hours pages */
  #ts-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
  .ts-toolbar{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .ts-filters{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;flex:1}
  .ts-actions{display:flex;gap:8px}
  .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
  .seg button{background:none;border:0;color:var(--muted);font:inherit;font-size:12.5px;padding:6px 12px;
    border-radius:8px;cursor:pointer;white-space:nowrap}
  .seg button.on{background:var(--accent);color:#fff}
  #ts-viewseg{margin-bottom:12px;flex-wrap:wrap}
  .ts-filters .f{display:flex;flex-direction:column;gap:3px}
  .ts-filters .f label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
  .ts-filters select,.ts-filters input{background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    color:var(--text);font:inherit;font-size:12.5px;padding:5px 8px;color-scheme:dark}
  .ts-totbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .ts-totbar .tot{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 16px;min-width:110px}
  .ts-totbar .tot .k{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
  .ts-totbar .tot .v{font-size:17px;font-weight:650;font-variant-numeric:tabular-nums}
  .ts-totbar .tot.sum .v{color:var(--green)}
  #ts-viewbar{margin-bottom:10px}
  #tsTable{width:100%;border-collapse:collapse;font-size:12.5px;min-width:940px}
  #tsTable td,#tsTable th{padding:4px 8px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:left}
  #tsTable th{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);background:var(--panel2)}
  #tsTable tr.datehead td{background:var(--panel2);padding:9px 12px;font-weight:600}
  #tsTable tr.colhead td{background:var(--panel2);color:var(--faint);font-size:10px;text-transform:uppercase;
    letter-spacing:.05em;padding:4px 8px}
  #tsTable tr.sub td{background:var(--panel2);font-weight:600;font-variant-numeric:tabular-nums;padding:6px 8px}
  #tsTable td.num,#tsTable th.num,#tsTable tr.sub td.num{text-align:right}
  #tsTable .calc{font-variant-numeric:tabular-nums}
  #tsTable .money{color:var(--green)}
  #tsTable input,#tsTable select{background:var(--panel2);border:1px solid var(--line);border-radius:7px;color:var(--text);
    font:inherit;font-size:12.5px;padding:4px 7px;color-scheme:dark}
  #tsTable input:focus,#tsTable select:focus{outline:1px solid var(--accent);background:var(--panel)}
  #tsTable input.nm{width:92px} #tsTable input.n{width:56px} #tsTable input.t{width:104px}
  #tsTable select.pp,#tsTable select.tm{width:52px}
  #tsTable tr.carried td{background:rgba(214,164,65,.07)}
  #tsTable tr.overlap td{background:rgba(239,77,86,.06)}
  #tsTable .gx{background:none;border:0;color:var(--faint);cursor:pointer;font-size:13px;padding:2px 5px}
  #tsTable .gx:hover{color:var(--red)}
  #tsTable .pbtn{background:var(--panel2);border:1px solid var(--line);border-radius:7px;color:var(--muted);
    font:inherit;font-size:11px;padding:2px 8px;cursor:pointer;margin-left:10px}
  #tsTable .pbtn:hover{border-color:var(--accent);color:var(--text)}
  #tsTable .emptyrow td{color:var(--faint);text-align:center;padding:34px}
  #tsTable tr.spacer td{border-bottom:none}
  </style>
</head>
<body>

<!-- Google sign-in gate \u2014 only @wizardtrees.com accounts get past this -->
<div id="login-gate">
  <div class="login-box">
    <div class="login-logo">🗽 Wizard Trees NY — Labor Tracker</div>
    <div class="login-sub">WIZARD TREES</div>
    <div id="gsi-button"></div>
    <div class="login-spin" id="login-spin">Loading sign-in…</div>
    <div class="login-err" id="login-err"></div>
    <div class="login-note">Sign in with your <b>@wizardtrees.com</b> Google account.</div>
  </div>
</div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<header>
  <div class="bar">
    <div class="brand">
      <div class="logo">🗽</div>
      <div><b>NY Labor Tracker</b><span class="sub">Wizard Trees NY</span></div>
    </div>
    <div class="spacer"></div>
    <button class="btn" id="signOutBtn" title="Sign out of this device" onclick="signOut()">Sign out</button>
  </div>
</header>

<main>
  <div id="view-timesheets">
    <div class="seg" id="ts-catseg" style="margin-bottom:12px"></div>
    <div id="ts-roster" hidden></div>
    <div id="ts-compare" hidden></div>
    <div class="card" id="ts-card">
      <div class="ts-toolbar">
        <div id="ts-filters" class="ts-filters"></div>
        <div class="ts-actions">
          <button class="btn sm" id="ts-addrow-top">+ Add row</button>
          <button class="btn sm" id="ts-csv">⬇ CSV</button>
          <button class="btn sm" id="ts-xlsx">⬇ Excel</button>
        </div>
      </div>
      <div class="seg" id="ts-viewseg"></div>
      <div id="ts-viewbar"></div>
      <div class="ts-totbar" id="ts-totbar"></div>
      <div class="scroll"><table id="tsTable"><tbody></tbody></table></div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
/* ================= data =================
   Everything loads from Supabase (shared project dhiqhgtmelxwelyoowle)
   as the signed-in @wizardtrees user: ny_shifts (hours — Gusto sync +
   manual rows) and ny_roster (the NY crew). Strictly additive next to
   the BA app's and the CA tracker's tables. */
const SB_URL = 'https://dhiqhgtmelxwelyoowle.supabase.co';
const SB_KEY = 'sb_publishable_FtScmtn1C0tE1bwUsavJFg_koiVEu14';   // publishable anon key (RLS does the guarding)
const sb = supabase.createClient(SB_URL, SB_KEY, {
  auth: { persistSession: true, autoRefreshToken: true },
  // keepalive lets a last-moment save (tab closing) survive unload. Browsers
  // REJECT keepalive requests with bodies over ~64KB, so ONLY small string
  // bodies (the JSON row saves that need flush-on-close) get it. Anything
  // else — Blob/FormData bodies especially — goes through plain fetch.
  global: { fetch: (u, o) => {
    const b = o && o.body;
    const small = b == null || (typeof b === 'string' && b.length <= 50000);
    return fetch(u, small ? { ...o, keepalive: true } : o);
  } },
});

/* ================= NY CONFIG =================================
   Every site-specific fact lives HERE and nowhere else — the rest of
   the file reads SITE. (This file is the NY fork of the CA tracker;
   hours arrive from a Gusto sync job as source='import' rows, manual
   corrections are typed in the app.) */
const SITE = {
  title: 'Wizard Trees NY — Labor Tracker',
  companies: ['Wizard Trees NY'],
  defaultCompany: 'Wizard Trees NY',
  periodAnchor: '2026-07-04', periodLen: 14,   // same pay-period calendar as CA
  defaultRate: 22,                             // fallback only — roster default_rate wins
  tables: { shifts: 'ny_shifts', roster: 'ny_roster' },
  lsKey: 'ny.tsview',                          // same origin as the CA app: keys MUST differ
};


/* ================= formatting ================= */
const esc    = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fDayMDY(iso){          // sheet style m/d/yy
  const [y,m,d] = iso.split('-').map(Number);
  return `${m}/${d}/${String(y).slice(2)}`;
}
function fClock(hm){            // 'HH:MM' -> 'h:mm AM/PM' (sheet style)
  if (!hm) return '';
  const [h,m] = hm.split(':').map(Number);
  if (isNaN(h) || isNaN(m)) return '';
  const ap = h < 12 ? 'AM' : 'PM';
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${h12}:${String(m).padStart(2,'0')} ${ap}`;
}
function addDaysISO(iso, n){
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d + n);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function todayISO(){
  const t = new Date();
  return t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0');
}


/* ================= Timesheets ===============================================
   The NY hours log: Log / By Employee Simplified views, pay-period presets and
   CSV/Excel export, reading and writing SITE.tables.shifts (ny_shifts) in
   Postgres directly. Gusto-synced rows land here as source='import'. */
const TS_COMPANIES = SITE.companies;
const PERIOD_ANCHOR = SITE.periodAnchor, PERIOD_LEN = SITE.periodLen;
function periodWindow(offset){
  const anchor = new Date(PERIOD_ANCHOR+'T00:00'), now = new Date(); now.setHours(0,0,0,0);
  const idx = Math.floor((now - anchor)/(PERIOD_LEN*86400000)) + offset;
  const s = new Date(anchor.getTime() + idx*PERIOD_LEN*86400000);
  const e = new Date(s.getTime() + (PERIOD_LEN-1)*86400000);
  const iso = d => d.toISOString().slice(0,10);
  return [iso(s), iso(e)];
}
function periodStartOf(dateISO){
  if (!dateISO) return null;
  const anchor = new Date(PERIOD_ANCHOR+'T00:00'), d = new Date(dateISO+'T00:00');
  const idx = Math.floor((d - anchor)/(PERIOD_LEN*86400000));
  return new Date(anchor.getTime() + idx*PERIOD_LEN*86400000).toISOString().slice(0,10);
}
const effPeriodStart = s => s.pay_period || periodStartOf(s.work_date);   // billed period (override wins)

const tsState = {
  category: 'distro',   // page: 'distro' (Hours) | 'roster' | 'compare' (By Person)
  view: 'log',          // Hours page view: 'log' | 'simplified'
  compareView: 'cards', // By Person view: 'cards' | 'simplified'
  filter: { company:'', employee:'', from:'', to:'', preset:'period' },
  comparePreset: 'period',   // the By Person page's own date window
  compareCos: new Set(),     // companies EXCLUDED from the By Person page (empty = show all)
};
try{ const v = JSON.parse(localStorage.getItem(SITE.lsKey)||'{}');
  if (v.preset) tsState.filter.preset = v.preset;
  if (v.view) tsState.view = v.view;
  if (['cards','simplified'].includes(v.compareView)) tsState.compareView = v.compareView;
  if (['distro','roster','compare'].includes(v.category)) tsState.category = v.category; }catch(_){}
function saveTsView(){ try{ localStorage.setItem(SITE.lsKey, JSON.stringify({preset:tsState.filter.preset, view:tsState.view, compareView:tsState.compareView, category:tsState.category})); }catch(_){} }

const toMin = hm => { if(!hm) return null; const p=String(hm).split(':'); const h=+p[0], m=+p[1]; return isNaN(h)||isNaN(m)?null:h*60+m; };
const tsFullName = s => [s.last, s.first].filter(Boolean).join(' ').trim() || (s.first || s.last || '');
// match a name against the crew roster (exact last+first, then aliases, then
// first-only). Aliases catch alternate spellings of EITHER name part: for a full name
// an alias may match the last name ("Zuluaga" → Zuluago), the whole name, or
// the first name when the last name agrees ("Ortega Lucia" → Ortega Lucy —
// but never "Garcia Lucia").
function rosterMatch(last, first){
  const key = s => String(s || '').trim().toLowerCase();
  const l = key(last), f = key(first);
  if (!l && !f) return null;
  const aliasHit = p => (p.aliases || []).some(a => {
    const k = key(a);
    if (l && f) return k === l || k === l + ' ' + f || k === f + ' ' + l || (k === f && key(p.last) === l);
    return k === (f || l);
  });
  const live = roster.filter(p => p.active !== false);   // deactivated people stop autofilling
  return live.find(p => key(p.last) === l && key(p.first) === f)
      || live.find(aliasHit)
      || live.find(p => !l && key(p.first) === f) || null;
}
const tsNum = n => (n==null||n===''||isNaN(n)) ? '' : (Math.round(n*100)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const tsMoney = n => (n==null||n===''||isNaN(n)) ? '' : '$'+tsNum(n);
const hhmmss = dec => { const t=Math.round((+dec||0)*3600); const h=Math.floor(t/3600), m=Math.floor((t%3600)/60), s2=t%60;
  return h+':'+String(m).padStart(2,'0')+':'+String(s2).padStart(2,'0'); };
function tsCalcHours(ci, co, brk){
  if (!ci || !co) return null;
  const a = toMin(ci), b = toMin(co); if (a==null || b==null) return null;
  let mins = b - a; if (mins < 0) mins += 1440;
  let h = (mins - (Number(brk)||0)) / 60; if (h < 0) h = 0;
  return Math.round(h*100)/100;
}
const tsCalcTotal = (hours, rate, people=1) => (hours==null||rate==null||isNaN(rate)) ? null : Math.round(hours*rate*(Number(people)||1)*100)/100;

// NY pays per-person rates, so never invent one: a roster entry with no

function filteredShifts(){
  const f = tsState.filter; let [from, to] = [f.from, f.to];
  const byPeriod = (f.preset==='period' || f.preset==='lastperiod') && !f.from && !f.to;
  if (f.preset && !from && !to){
    if (f.preset==='period') [from,to] = periodWindow(0);
    else if (f.preset==='lastperiod') [from,to] = periodWindow(-1);
    else if (f.preset==='30d') [from,to] = [addDaysISO(todayISO(), -29), todayISO()];   // local days, same as the By Person page
  }
  return shifts.filter(s => {
    if ((s.category||'distro') !== tsState.category) return false;
    if (f.company && s.company !== f.company) return false;
    if (f.employee && tsFullName(s).toLowerCase() !== f.employee.toLowerCase()) return false;
    if (byPeriod){ if (effPeriodStart(s) !== from) return false; }
    else { if (from && s.work_date < from) return false; if (to && s.work_date > to) return false; }
    return true;
  });
}

/* ---- writes -------------------------------------------------------------- */
async function insertShift(rec){
  shiftSyncBusy++;
  try{
    const { data, error } = await sb.from(SITE.tables.shifts)
      .insert({ source:'manual', category:'distro', people:1, break_minutes:0, ...rec, updated_by: myId })
      .select('*').single();
    if (error){ toast('Couldn’t add the row — check your connection.', true); return null; }
    const s = shiftToTs(data);
    shifts.push(s);
    return s;
  } finally { shiftSyncBusy--; }
}
// writes for one row are SERIALIZED: concurrent full-row updates can commit out
// of order (an early snapshot landing last wipes newer fields) — chain them so
// the final state always wins.
const shiftSyncChain = {};
function syncShift(s){
  shiftSyncChain[s.id] = (shiftSyncChain[s.id] || Promise.resolve()).then(() => doSyncShift(s));
  return shiftSyncChain[s.id];
}
async function doSyncShift(s){
  shiftSyncBusy++;
  try{
    const { data, error } = await sb.from(SITE.tables.shifts).update({
      company: s.company || null, category: s.category || 'distro', work_date: s.work_date,
      pay_period: s.pay_period || null, team: s.team || null, last: s.last || null, first: s.first || null,
      clock_in: s.clock_in || null, clock_out: s.clock_out || null,
      break_minutes: Math.round(s.break_minutes || 0), people: Math.max(1, Math.round(s.people || 1)),
      rate: s.rate == null ? 0 : s.rate, roster_id: s.roster_id || null, updated_by: myId,
    }).eq('id', s.id).select('hours,total').single();
    if (error){ toast('Couldn’t save the timesheet change.', true); return; }
    s.hours = +data.hours || 0; s.total = +data.total || 0;
    const tr = document.querySelector('#tsTable tr[data-id="'+s.id+'"]');
    if (tr){ const h = tr.querySelector('.c-h'), t = tr.querySelector('.c-t');
      if (h) h.textContent = tsNum(s.hours); if (t) t.textContent = tsMoney(s.total); }
  } finally { shiftSyncBusy--; }
}
function queueShiftSave(s){
  clearTimeout(shiftTimers[s.id]);
  shiftTimers[s.id] = setTimeout(() => { delete shiftTimers[s.id]; syncShift(s); }, 700);
}

/* ---- By Person page: every row lined up under the person who worked it ----
   Flags rows whose clock times overlap on the same day (the same hours entered
   twice — likely once by hand and once from the Gusto import) and offers
   delete / keep-both to resolve them. Also carries the copy-as-image exports. */
function compareRange(){
  if (tsState.comparePreset === 'period') return periodWindow(0);
  if (tsState.comparePreset === 'lastperiod') return periodWindow(-1);
  if (tsState.comparePreset === '30d') return [addDaysISO(todayISO(), -29), todayISO()];
  return [null, null];
}
function shiftIval(s){
  const a = toMin(s.clock_in), b = toMin(s.clock_out);
  if (a == null || b == null || a === b) return null;   // in==out means no usable span, not 24h
  return [a, b < a ? b + 1440 : b];   // overnight-aware
}
/* ---- shareable per-person timesheet image (Copy image button) ----

function cardHeight(p){
  return 92 /*header*/ + 34 /*th*/ + p.rows.length * 34 + (p.overlapCount ? 92 : 66) /*foot*/;
}
function drawTimesheetCard(p){
  const W = 840, pad = 28, rowH = 34;

  x.fillStyle = '#6b7280'; x.font = '13px ' + FONT;
  x.fillText('Wizard Trees NY — hours worked · ' + p.rangeLabel, pad, 68);
  const cols = [
    { label: 'DATE',        w: 90,  get: r => fDayMDY(r.work_date) },
    { label: 'COMPANY',     w: 150, get: r => r.company || '' },

    { label: 'IN',          w: 82,  get: r => fClock(r.clock_in) },

    { label: 'TOTAL', num: true, w: 74, get: r => tsMoney(r.total) },

  let y = headerH;
  x.fillStyle = '#f3f4f6'; x.fillRect(pad - 8, y, W - 2 * pad + 16, thH);
  x.fillStyle = '#4b5563'; x.font = '700 10.5px ' + FONT;
  let cx = pad;
  for (const col of cols){
    x.textAlign = col.num ? 'right' : 'left';
    x.fillText(col.label, col.num ? cx + col.w - 8 : cx, y + 22);

    x.fillStyle = flagged ? '#fff7ed' : (i % 2 ? '#fafafa' : '#ffffff');
    x.fillRect(pad - 8, y, W - 2 * pad + 16, rowH);
    cx = pad;

      x.fillStyle = '#1f2937'; x.font = '12.5px ' + FONT;

      x.fillText(String(col.get(r) ?? ''), col.num ? cx + col.w - 8 : cx, y + 22);
      cx += col.w;

  x.fillStyle = '#111827'; x.font = '700 14px ' + FONT; x.textAlign = 'left';

    x.fillText('⚠ ' + p.overlapCount + ' flagged row' + (p.overlapCount > 1 ? 's' : '') + ' overlap other entries and are being double-checked.', pad, y + 58);
  }
  return c;
}
// copy a canvas to the clipboard as PNG, or download it if the clipboard image
// API isn't available (older browsers / non-secure context)
async function copyCanvas(canvas, filename, okMsg){
  const blobP = new Promise(res => canvas.toBlob(res, 'image/png'));
  const hasClipboardImg = navigator.clipboard && window.ClipboardItem;
  let clipboardTried = false;
  try{
    if (!hasClipboardImg) throw new Error('no clipboard');
    clipboardTried = true;
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blobP })]);
    toast(okMsg); return;
  }catch(_){ /* fall through to a download */ }
  const blob = await blobP;
  if (!blob){ toast('That image was too large for this browser to render — try a shorter date window or fewer companies.', true); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  // honest about which happened: a real copy failure vs. no clipboard-image support
  toast((clipboardTried ? 'Couldn’t copy to the clipboard — downloaded ' : 'Clipboard images aren’t supported here — downloaded ') + filename + ' instead.');
}

// stack every visible person's card onto one tall image (respects the current

function copyAllTimesheets(){

  const payloads = keys.map(k => CMP_CARDS[k]);
  const W = 840, gap = 16, titleH = 70, botPad = 10;
  // size the page from the card-height formula (no need to render first)
  const pageH = titleH + payloads.reduce((a, p) => a + cardHeight(p) + gap, 0) + botPad;
  // cap the composite's pixel area so a tall page still renders on Safari
  // (~16.7M px canvas-area limit) — drop the export scale before it overflows
  const S = Math.min(2, Math.sqrt(16000000 / (W * pageH)));
  const big = document.createElement('canvas');

    const p = CMP_CARDS[k]; if (!p) continue;
    lines.push([p.last || '', p.first || '', p.team || '',
      (Math.round((p.hrs) * 100) / 100).toFixed(2), (Math.round(p.gross * 100) / 100).toFixed(2)].join('\t'));
  }
  const ta = document.createElement('textarea'); ta.value = lines.join('\n');
  ta.style.position = 'fixed'; ta.style.top = '-1000px'; document.body.appendChild(ta); ta.focus(); ta.select();
  let ok = false; try{ ok = document.execCommand('copy'); }catch(_){}
  ta.remove();
  toast(ok ? 'Copied — paste into Google Sheets' : 'Select the table and press ⌘C', !ok);
}

function renderCompare(){
  const box = document.getElementById('ts-compare');
  const [c0, c1] = compareRange();
  const dateRows = shifts.filter(s => tsFullName(s) && (!c0 || (s.work_date >= c0 && s.work_date <= c1)));
  // company toggle chips: exclude a company and its rows drop out (people with
  // no rows left disappear; everyone else's totals recompute)
  const coLabel = s => s.company || '(no company)';
  const allCos = [...new Set(dateRows.map(coLabel))];
  for (const c of [...tsState.compareCos]) if (!allCos.includes(c)) tsState.compareCos.delete(c);   // forget stale exclusions
  const rows = dateRows.filter(s => !tsState.compareCos.has(coLabel(s)));
  // typed rows store "Last First"; an import may carry "First Last" — sort the
  // name's words so both spellings of the same person land in ONE group
  const empKey = s => tsFullName(s).toLowerCase().split(/\s+/).sort().join(' ');
  // Overlap detection runs on the FULL date window (NOT company-filtered), so
  // toggling a company off can't hide a genuine cross-company double-count —
  // a visible row still glows even when its overlapping partner is filtered out.
  const overlapIds = new Set(), pairsAll = new Map();
  const det = new Map();   // key -> work_date -> [[shift, interval]]
  for (const s of dateRows){
    if (s.overlap_ok) continue;
    const iv = shiftIval(s); if (!iv) continue;
    const k = empKey(s);
    if (!det.has(k)) det.set(k, new Map());
    const bd = det.get(k);
    if (!bd.has(s.work_date)) bd.set(s.work_date, []);
    bd.get(s.work_date).push([s, iv]);
  }
  for (const [k, bd] of det){
    const pairs = [];
    for (const arr of bd.values())
      for (let i = 0; i < arr.length; i++) for (let j = i + 1; j < arr.length; j++){
        const [a, ia] = arr[i], [b, ib] = arr[j];
        if (ia[0] < ib[1] && ib[0] < ia[1]){ pairs.push([a, b]); overlapIds.add(a.id); overlapIds.add(b.id); }
      }
    if (pairs.length) pairsAll.set(k, pairs);
  }
  // visible grouping = company-filtered rows (this is what gets displayed)
  const byEmp = new Map(), displayOf = new Map();
  for (const s of rows){
    const k = empKey(s);
    if (!byEmp.has(k)){ byEmp.set(k, []); displayOf.set(k, tsFullName(s)); }
    if (s.last && s.first) displayOf.set(k, tsFullName(s));   // prefer the roster-style casing
    byEmp.get(k).push(s);
  }
  // each person's team (roster wins via roster_id, else a name match)
  const teamOfKey = new Map();
  for (const [k, list] of byEmp){
    const rid = (list.find(s => s.roster_id) || {}).roster_id;
    const emp = rid ? roster.find(r => r.id === rid) : rosterMatch(list[0].last, list[0].first);
    teamOfKey.set(k, teamForName(emp));
  }
  let emps = [...byEmp.keys()].sort((a, b) =>
    ((pairsAll.has(b) ? 1 : 0) - (pairsAll.has(a) ? 1 : 0)) || a.localeCompare(b));
  // grand total for exactly what's shown below (view + team + company + date filters all applied)
  let dispH = 0, dispG = 0;
  for (const k of emps) for (const s of byEmp.get(k)){
    dispG += s.total || 0;
    dispH += s.hours || 0;
  }
  const grandTot = '<div class="cmp-grandtot">' + emps.length + ' ' + (emps.length === 1 ? 'person' : 'people')
    + ' · ' + tsNum(dispH) + ' h · <b>' + tsMoney(dispG) + '</b></div>';
  const CMP_PRESETS = [['period','This pay period'],['lastperiod','Last pay period'],['30d','Last 30 days'],['all','All']];
  const presetSeg = '<div class="seg" id="cmp-preset">'
    + CMP_PRESETS.map(([k, l]) => '<button data-k="' + k + '" class="' + (tsState.comparePreset === k ? 'on' : '') + '">' + l + '</button>').join('')
    + '</div>';
  const CMP_VIEWS = [['cards','By person'],['simplified','By Employee Simplified']];
  const viewSeg = '<div class="seg" id="cmp-view">'
    + CMP_VIEWS.map(([k, l]) => '<button data-v="' + k + '" class="' + (tsState.compareView === k ? 'on' : '') + '">' + l + '</button>').join('')
    + '</div>';
  // one toggle chip per company present in this window; on = included
  const cosSorted = allCos.slice().sort((a, b) => a.localeCompare(b));
  // show the chips whenever there's more than one company OR an exclusion is
  // active (so a filter that narrows to one company can still be undone)
  const cosSeg = (allCos.length > 1 || tsState.compareCos.size)
    ? '<div class="cmp-cos"><span class="cmp-coslabel">Companies</span><div class="seg" id="cmp-cos">'
      + cosSorted.map(c => '<button data-co="' + esc(c) + '" class="' + (tsState.compareCos.has(c) ? '' : 'on') + '">' + esc(c) + '</button>').join('')
      + '</div></div>'
    : '';
  // a company filter narrows every total, so the exported images say so
  const coNote = tsState.compareCos.size
    ? ' · ' + (cosSorted.filter(c => !tsState.compareCos.has(c)).join(', ') || 'no companies') + ' only'
    : '';
  const rangeLabel = (CMP_PRESETS.find(([k]) => k === tsState.comparePreset) || [,'All'])[1]
    + (c0 ? ' · ' + fDayMDY(c0) + ' – ' + fDayMDY(c1) : ' recorded dates') + coNote;
  CMP_CARDS = {}; CMP_ORDER = emps.slice(); CMP_RANGE = rangeLabel;
  let html = '<div class="card" style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px">'
    + '<div style="display:flex;align-items:flex-start;gap:10px">'
    + '<h3 style="margin:0 0 4px;font-size:15px;flex:1">Hours by person</h3>'
    + '<button class="pbtn cmp-copysum" title="Copy a compact one-line-per-person summary image — stays sharp when texted">📋 Copy summary</button>'
    + '<button class="pbtn cmp-copyall" title="Copy a detailed image of every timesheet below — best for AirDrop/email/print (texting blurs it)">📋 Full detail</button></div>'
    + '<div class="faint" style="font-size:12.5px;margin-bottom:10px">Every named row, lined up per person. '
    + 'Rows that overlap in time on the same day are flagged — usually the same hours entered twice. '
    + 'Delete the duplicate, or Keep both if it’s genuinely two shifts. '
    + 'The date window goes by the actual work date (pay-period overrides don’t move rows here).</div>'
    + '<div class="cmp-filters" style="margin-bottom:8px">' + viewSeg + '</div>'
    + '<div class="cmp-filters">' + presetSeg + cosSeg + grandTot + '</div>';
  // one pass builds every person's totals (drives the cards, the team views,
  // the simplified rollup, and the copy-image payloads)
  const people = emps.map(k => {
    const list = byEmp.get(k).slice().sort((a, b) =>
      ((a.work_date + '|' + (a.clock_in || '')) < (b.work_date + '|' + (b.clock_in || ''))) ? -1 : 1);
    const hrs = list.reduce((a, s) => a + (s.hours || 0), 0);
    const gross = list.reduce((a, s) => a + (s.total || 0), 0);
    // banners only for pairs whose BOTH rows are visible; a row overlapping a
    // now-hidden company still glows (via overlapIds) but shows no dangling banner
    const visIds = new Set(list.map(s => s.id));
    const pairs = (pairsAll.get(k) || []).filter(([a, b]) => visIds.has(a.id) && visIds.has(b.id));
    const empOverlaps = new Set(list.filter(s => overlapIds.has(s.id)).map(s => s.id));
    const rep = list.find(s => s.last && s.first) || list[0];
    const team = teamOfKey.get(k) || '';
    CMP_CARDS[k] = { name: displayOf.get(k), rows: list, hrs, gross, rangeLabel,
      overlapIds: empOverlaps, overlapCount: empOverlaps.size,
      last: rep.last || '', first: rep.first || '', team };
    return { k, list, hrs, gross, pairs, name: displayOf.get(k), team,
      last: rep.last || '', first: rep.first || '' };
  });
  if (!people.length){
    html += '<div class="empty" style="padding:20px">'
      + (tsState.compareCos.size ? 'No matching rows for these filters' : 'No named rows in this date range') + '</div>';
  } else if (tsState.compareView === 'simplified'){
    html += cmpSimplifiedHtml(people);
  } else {
    for (const p of people){
      const { list, pairs } = p;
      html += '<div class="cmp-emp' + (pairs.length ? ' warn' : '') + '">'
        + '<div class="cmp-head"><b>' + esc(p.name) + '</b>'
        + (pairs.length ? ' <span class="cmp-flag">⚠️ ' + pairs.length + ' overlap' + (pairs.length > 1 ? 's' : '') + '</span>' : '')
        + ' <button class="pbtn cmp-copy" data-k="' + esc(p.k) + '" title="Copy this person’s timesheet as an image — paste it straight into a chat">📋 Copy image</button>'
        + '<span class="cmp-tot">' + tsNum(p.hrs) + ' h · ' + tsMoney(p.gross) + '</span></div>';
      for (const [a, b] of pairs){
        const span = s => fClock(s.clock_in) + '–' + fClock(s.clock_out);
        html += '<div class="cmp-pair">⚠️ ' + esc(fDayMDY(a.work_date)) + ': '
          + esc(span(a)) + (a.company ? ' at ' + esc(a.company) : '') + ' overlaps '
          + esc(span(b)) + (b.company ? ' at ' + esc(b.company) : '')
          + ' — the same hours may be counted twice. '
          + '<button class="pbtn cmp-keep" data-ids="' + esc(a.id + ',' + b.id) + '">Keep both</button></div>';
      }
      html += '<table class="cmp-table"><thead><tr><th>Date</th><th>Company</th><th>Team</th>'
        + '<th class="ctr">In</th><th class="ctr">Out</th><th class="num">Break</th><th class="num">Hours</th><th class="num">Rate</th><th class="num">Total</th><th>Source</th><th></th></tr></thead><tbody>';
      for (const s of list){
        html += '<tr data-id="' + s.id + '"' + (overlapIds.has(s.id) ? ' class="overlap"' : '') + '>'
          + '<td>' + esc(fDayMDY(s.work_date)) + '</td>'
          + '<td>' + esc(s.company || '') + '</td><td>' + esc(s.team || '') + '</td>'
          + '<td class="ctr">' + esc(fClock(s.clock_in)) + '</td><td class="ctr">' + esc(fClock(s.clock_out)) + '</td>'
          + '<td class="num">' + (s.break_minutes ? s.break_minutes : '') + '</td>'
          + '<td class="num">' + tsNum(s.hours) + '</td>'
          + '<td class="num">' + tsMoney(s.rate) + '</td><td class="num">' + tsMoney(s.total) + '</td>'
          + '<td class="faint">' + esc(s.source || '')
          + (s.overlap_ok ? ' <button class="pbtn cmp-unkeep" title="This row was marked OK to overlap — click to put it back into overlap checking">kept · undo</button>' : '') + '</td>'
          + '<td><button class="rowdel cmp-del" title="Delete this row (both pages)">✕</button></td></tr>';
      }
      html += '</tbody></table></div>';
    }
  }
  html += '</div>';
  box.innerHTML = html;
  box.querySelectorAll('#cmp-view button').forEach(bn => bn.onclick = () => {
    tsState.compareView = bn.dataset.v; saveTsView(); renderCompare();
  });
  box.querySelectorAll('#cmp-preset button').forEach(bn => bn.onclick = () => {
    tsState.comparePreset = bn.dataset.k; renderCompare();
  });
  const copySimpBtn = box.querySelector('#cmp-copysimple');
  if (copySimpBtn) copySimpBtn.onclick = () => copyCmpSimplified();
  box.querySelectorAll('#cmp-cos button').forEach(bn => bn.onclick = () => {
    const c = bn.dataset.co;
    if (tsState.compareCos.has(c)) tsState.compareCos.delete(c); else tsState.compareCos.add(c);
    renderCompare();
  });
  const copyAllBtn = box.querySelector('button.cmp-copyall');
  if (copyAllBtn) copyAllBtn.onclick = () => copyAllTimesheets();
  const copySumBtn = box.querySelector('button.cmp-copysum');
  if (copySumBtn) copySumBtn.onclick = () => copySummary();
  box.querySelectorAll('button.cmp-copy').forEach(bn => bn.onclick = () => copyEmpTimesheet(bn.dataset.k));
  box.querySelectorAll('button.cmp-unkeep').forEach(bn => bn.onclick = async () => {
    const tr = bn.closest('tr[data-id]');
    const s = shifts.find(x => x.id === tr.dataset.id); if (!s) return;
    shiftSyncBusy++;
    const { error } = await sb.from(SITE.tables.shifts).update({ overlap_ok: false, updated_by: myId }).eq('id', s.id);
    shiftSyncBusy--;
    if (error){ toast('Couldn’t update — check your connection.', true); return; }
    s.overlap_ok = false;
    renderCompare(); toast('Row back in overlap checking');
  });
  box.querySelectorAll('button.cmp-keep').forEach(bn => bn.onclick = async () => {
    const ids = bn.dataset.ids.split(',').filter(Boolean);
    shiftSyncBusy++;
    const { error } = await sb.from(SITE.tables.shifts).update({ overlap_ok: true, updated_by: myId }).in('id', ids);
    shiftSyncBusy--;
    if (error){ toast('Couldn’t save — check your connection.', true); return; }
    shifts.forEach(s => { if (ids.includes(s.id)) s.overlap_ok = true; });
    renderCompare(); toast('Kept both rows');
  });
  box.querySelectorAll('button.cmp-del').forEach(bn => bn.onclick = async () => {
    const tr = bn.closest('tr[data-id]');
    const s = shifts.find(x => x.id === tr.dataset.id); if (!s) return;
    if (!confirm('Delete ' + tsFullName(s) + '’s row on ' + fDayMDY(s.work_date)
      + ' (' + fClock(s.clock_in) + '–' + fClock(s.clock_out) + ')? This removes it from the Hours page too.')) return;
    shiftSyncBusy++;
    const { error } = await sb.from(SITE.tables.shifts).delete().eq('id', s.id);
    shiftSyncBusy--;
    if (error){ toast('Couldn’t delete the row.', true); return; }
    shifts = shifts.filter(x => x.id !== s.id);
    renderCompare(); toast('Row deleted');
  });
}

/* ---- the four views -------------------------------------------------------- */
function renderTsLog(){
  const vb = document.getElementById('ts-viewbar'); if (vb) vb.innerHTML = '';
  if (tsState.view === 'simplified') return renderTsSimplified();
  const isH = false;   // NY has a single hours log (no harvest category)
  const rows = filteredShifts().slice().sort((a,b) => {
    const x=a.work_date||'', y=b.work_date||'';
    if (x!==y) return x<y?1:-1;
    return (a.id<b.id?-1:1);
  });
  let th=0, tt=0; for (const s of rows){ th += +s.hours||0; tt += +s.total||0; }
  tsTotbar([['Rows', rows.length], ['Total hours', tsNum(th)], ['Gross pay', tsMoney(tt), 'sum']]);
  const tbl = document.getElementById('tsTable');
  const NC = 13;
  const thisP = periodWindow(0)[0], lastP = periodWindow(-1)[0];
  function ppSelect(s){
    const eff = effPeriodStart(s), natural = periodStartOf(s.work_date), isC = eff === thisP;
    const pVal = (natural && natural !== thisP) ? natural : lastP;
    const o = (v,lab,on) => '<option value="'+v+'"'+(on?' selected':'')+'>'+lab+'</option>';
    return '<select data-f="pay_period" class="pp" title="Pay period — C: current, P: past">'+o(thisP,'C',isC)+o(pVal,'P',!isC)+'</select>';
  }
  function teamSelect(s){
    return '<input data-f="team" value="'+esc(s.team||'')+'" class="nm" placeholder="\u2014">';
  }
  const coOpts = c => TS_COMPANIES.concat([...new Set(shifts.map(x=>x.company).filter(x=>x && !TS_COMPANIES.includes(x)))])
    .map(o => '<option '+(c===o?'selected':'')+'>'+esc(o)+'</option>').join('');
  const colHead = isH
    ? '<tr class="colhead"><td>Location</td><td>Date</td><td>Last</td><td>Worker</td><td class="num">People</td><td>In</td><td>Out</td><td class="num">Break</td><td class="num">Hours</td><td class="num">Rate</td><td class="num">Total</td><td></td></tr>'
    : '<tr class="colhead"><td>Company</td><td>Date</td><td>PP</td><td>Last</td><td>First</td><td>Team</td><td>In</td><td>Out</td><td class="num">Break</td><td class="num">Hours</td><td class="num">Rate</td><td class="num">Total</td><td></td></tr>';
  if (!rows.length){
    tbl.innerHTML = '<tbody><tr class="emptyrow"><td colspan="'+NC+'">No entries for this filter. Use “+ Add row” — imported Gusto hours will appear here automatically.</td></tr></tbody>';
    return;
  }
  const groups = []; const byKey = new Map();
  for (const s of rows){ const k = s.work_date || '(no date)'; if (!byKey.has(k)){ byKey.set(k, []); groups.push(k); } byKey.get(k).push(s); }
  const groupHead = k => esc(new Date(k+'T00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}));
  let body = '';
  for (const d of groups){
    const es = byKey.get(d); let gh=0, gt=0;
    body += '<tr class="datehead"><td colspan="'+NC+'">'+groupHead(d)
      + ' <button class="pbtn gadd" data-key="'+esc(d)+'" title="Add a blank row to this day">+ row</button></td></tr>';
    body += colHead;
    for (const s of es){
      gh += (+s.hours||0)*(isH?(+s.people||1):1); gt += (+s.total||0);
      const carried = (!isH && s.pay_period && s.pay_period !== periodStartOf(s.work_date)) ? ' carried' : '';
      const rowTitle = carried ? 'Missed on last payroll — carried into this pay period' : '';
      const peopleTd = isH ? '<td><input data-f="people" type="number" min="1" value="'+(s.people??1)+'" class="n"></td>' : '';
      const ppTd = isH ? '' : '<td>'+ppSelect(s)+'</td>';
      const teamTd = isH ? '<td><input data-f="team" value="'+esc(s.team||'')+'" class="nm"></td>' : '<td>'+teamSelect(s)+'</td>';
      body += '<tr data-id="'+s.id+'" class="'+carried.trim()+'" title="'+rowTitle+'">'
        + '<td><select data-f="company">'+coOpts(s.company)+'</select></td>'
        + '<td><input data-f="work_date" type="date" value="'+esc(s.work_date||'')+'" class="t"></td>' + ppTd
        + '<td><input data-f="last" class="nm" value="'+esc(s.last||'')+'"></td>'
        + '<td><input data-f="first" class="nm" value="'+esc(s.first||'')+'"></td>'
        + teamTd + (isH ? peopleTd : '')
        + '<td><input data-f="clock_in" type="time" value="'+esc(s.clock_in||'')+'" class="t"></td>'
        + '<td><input data-f="clock_out" type="time" value="'+esc(s.clock_out||'')+'" class="t"></td>'
        + (isH ? '' : '<td><input data-f="break_minutes" type="number" min="0" value="'+(s.break_minutes??0)+'" class="n"></td>')
        + '<td class="calc c-h num">'+tsNum(s.hours)+'</td>'
        + '<td><input data-f="rate" type="number" min="0" step="0.01" value="'+(s.rate??'')+'" class="n"></td>'
        + '<td class="calc money c-t num">'+tsMoney(s.total)+'</td>'
        + '<td><button class="gx" title="Delete">✕</button></td></tr>';
    }
    body += '<tr class="sub"><td colspan="'+(NC-5)+'" class="num">'+groupHead(d)+' subtotal</td><td></td><td class="num">'+tsNum(gh)+'</td><td></td><td class="num">'+tsMoney(gt)+'</td><td></td></tr>';
  }
  tbl.innerHTML = '<tbody>'+body+'</tbody>';
}

function renderTsSimplified(){
  const map = new Map();
  for (const s of filteredShifts()){
    // key on the PERSON only — team is free text in NY, and two spellings of it
    // must never split one worker into two payroll lines
    const key = ((s.last||'').trim()+'|'+(s.first||'').trim()).toLowerCase();
    if (!map.has(key)) map.set(key, { last:s.last||'', first:s.first||'', teams:new Set(), hours:0, pay:0, notes:new Set() });
    const g = map.get(key); g.hours += +s.hours||0; g.pay += +s.total||0;
    if (s.team) g.teams.add(s.team); if (s.note) g.notes.add(s.note);
  }
  const list = [...map.values()].map(g => ({ ...g, team: [...g.teams].join(', ') }))
    .sort((a,b) => (a.last||'').localeCompare(b.last||'') || (a.first||'').localeCompare(b.first||''));
  let th=0, tt=0; list.forEach(g => { th += g.hours; tt += g.pay; });
  tsTotbar([['People', list.length], ['Total hours', tsNum(th)], ['Gross pay', tsMoney(tt), 'sum']]);
  const vb = document.getElementById('ts-viewbar');
  vb.innerHTML = '<button class="btn sm" id="ts-copysimple">📋 Copy for Google Sheets</button>'
    + ' <span class="faint" style="font-size:12px">select the table &amp; ⌘C, or use the button</span>';
  document.getElementById('ts-copysimple').onclick = () => copyTsSimplified(list);
  const cols = ['Last','First','Team','Gross Pay','Total Hours','Decimal','Full Name','Note'];
  const head = '<thead><tr>'+cols.map(c => '<th'+(/Pay|Hours|Decimal/.test(c)?' class="num"':'')+'>'+c+'</th>').join('')+'</tr></thead>';
  const body = list.map(g => {
    const full = [g.first, g.last].filter(Boolean).join(' ');
    return '<tr><td>'+esc(g.last)+'</td><td>'+esc(g.first)+'</td><td>'+esc(g.team)+'</td>'
      + '<td class="calc money num">'+tsMoney(g.pay)+'</td><td class="calc num">'+hhmmss(g.hours)+'</td><td class="calc num">'+tsNum(g.hours)+'</td>'
      + '<td>'+esc(full)+'</td><td>'+esc([...g.notes].join('; '))+'</td></tr>'
      + '<tr class="spacer"><td colspan="8" style="height:8px"></td></tr>';
  }).join('');
  document.getElementById('tsTable').innerHTML = head+'<tbody>'+(body||'<tr class="emptyrow"><td colspan="8">No entries for this filter.</td></tr>')+'</tbody>';
}
function copyTsSimplified(list){
  const head = ['Last','First','Team','Gross Pay','Total Hours','Decimal','Full Name','Note'];
  const lines = [head.join('\t')];
  list.forEach(g => { const full=[g.first,g.last].filter(Boolean).join(' ');
    lines.push([g.last,g.first,g.team,(Math.round(g.pay*100)/100).toFixed(2),hhmmss(g.hours),(Math.round(g.hours*100)/100),full,[...g.notes].join('; ')].join('\t'));
    lines.push(''); });
  const ta = document.createElement('textarea'); ta.value = lines.join('\n');
  ta.style.position='fixed'; ta.style.top='-1000px'; document.body.appendChild(ta); ta.focus(); ta.select();
  let ok=false; try{ ok=document.execCommand('copy'); }catch(_){}
  ta.remove();
  toast(ok ? 'Copied — paste into Google Sheets' : 'Select the table and press ⌘C', !ok);
}

function wireTsShell(){
  document.getElementById('ts-addrow-top').onclick = () => addShiftRow();
  document.getElementById('ts-csv').onclick = () => exportShifts('csv');
  document.getElementById('ts-xlsx').onclick = () => exportShifts('xlsx');

  const tbl = document.getElementById('tsTable');
  const shiftOf = el => { const tr = el.closest('tr[data-id]'); return tr ? shifts.find(s => s.id === tr.dataset.id) : null; };
  tbl.addEventListener('input', e => {
    const cell = e.target.closest('[data-f]'); if (!cell) return;
    const s = shiftOf(cell); if (!s) return;
    applyShiftField(s, cell.dataset.f, cell.value);
    // both categories honor the stored break — the server trigger always
    // deducts it, so the live preview must too (old harvest rows have 0)
    const h = tsCalcHours(s.clock_in, s.clock_out, s.break_minutes);
    s.hours = h==null?0:h; s.total = tsCalcTotal(h, s.rate!=null?+s.rate:null, s.people)||0;
    const tr = cell.closest('tr');
    const ch = tr.querySelector('.c-h'), ct = tr.querySelector('.c-t');
    if (ch) ch.textContent = tsNum(s.hours); if (ct) ct.textContent = tsMoney(s.total);
    queueShiftSave(s);
  });
  tbl.addEventListener('change', e => {
    const cell = e.target.closest('[data-f]'); if (!cell) return;
    const s = shiftOf(cell); if (!s) return;
    const f = cell.dataset.f;
    applyShiftField(s, f, cell.value);
    if ((f==='last' || f==='first')){   // roster autofill for a fresh name
      const m = rosterMatch(s.last, s.first);
      if (m){
        s.roster_id = m.id;
        // adopt the roster's canonical casing so "PHAM" never becomes a second person
        // adopt the roster's spelling, and fill in whichever part is still blank
        // (typing just "John" must become Todd John, not a second person named John)
        if (m.last && s.last !== m.last) s.last = m.last;
        if (m.first && s.first !== m.first) s.first = m.first;
        const tr2 = cell.closest('tr');
        const lin = tr2.querySelector('[data-f="last"]'), fin = tr2.querySelector('[data-f="first"]');
        if (lin && lin !== cell) lin.value = s.last || '';
        if (fin && fin !== cell) fin.value = s.first || '';
        if (cell.dataset.f === 'last' && s.last) cell.value = s.last;
        if (cell.dataset.f === 'first' && s.first) cell.value = s.first;
        if (!s.team) s.team = teamForName(m);
        if (!s.rate) s.rate = rateForName(m);
        if (!s.company && m.default_company){
          s.company = m.default_company;
          const cin = tr2.querySelector('[data-f="company"]'); if (cin) cin.value = s.company;
        }
        const rin = tr2.querySelector('[data-f="rate"]');
        if (rin && s.rate && rin.value !== String(s.rate)) rin.value = s.rate;
        const h2 = tsCalcHours(s.clock_in, s.clock_out, s.break_minutes);
        s.hours = h2==null?0:h2; s.total = tsCalcTotal(h2, s.rate!=null?+s.rate:null, s.people)||0;
        const ch2 = tr2.querySelector('.c-h'), ct2 = tr2.querySelector('.c-t');
        if (ch2) ch2.textContent = tsNum(s.hours); if (ct2) ct2.textContent = tsMoney(s.total);
      }
      const tsel = cell.closest('tr').querySelector('[data-f="team"]'); if (tsel) tsel.value = s.team || '';
    }
    clearTimeout(shiftTimers[s.id]); delete shiftTimers[s.id];
    syncShift(s).then(() => {
      if (f==='work_date' || f==='company' || f==='pay_period'){ renderTsFilters(); renderTsLog(); }
    });
  });
  tbl.addEventListener('click', async e => {
    const gadd = e.target.closest('.gadd');
    if (gadd){
      addShiftRow(gadd.dataset.key);
      return;
    }
    const gx = e.target.closest('.gx');
    if (gx){
      const s = shiftOf(gx); if (!s) return;
      shiftSyncBusy++;
      const { error } = await sb.from(SITE.tables.shifts).delete().eq('id', s.id);
      shiftSyncBusy--;
      if (error){ toast('Couldn’t delete the row.', true); return; }
      shifts = shifts.filter(x => x.id !== s.id);
      renderTsFilters(); renderTsLog();
    }
  });
}
function applyShiftField(s, f, v){
  if (f==='work_date'){ if (v) s[f] = v; return; }   // an emptied date keeps the stored one (column is NOT NULL)
  if (f==='break_minutes') s[f] = Math.max(0, Math.round(+v||0));   // a negative break would pay time nobody worked
  else if (f==='people') s[f] = Math.max(1, Math.round(+v||1));
  else if (f==='rate') s[f] = v==='' ? null : Math.max(0, +v||0);
  else if (f==='pay_period') s[f] = v||null;
  else s[f] = v;
}
// a row added while an older window is on screen must land IN that window —
// otherwise it saves to today, the filter hides it, and the manager clicks
// "+ Add row" again and again while blank rows pile up unseen
function newRowDate(){
  const f = tsState.filter, t = todayISO();
  let from = f.from, to = f.to;
  if (f.preset && !from && !to){
    if (f.preset==='period') [from,to] = periodWindow(0);
    else if (f.preset==='lastperiod') [from,to] = periodWindow(-1);
    else if (f.preset==='30d') [from,to] = [addDaysISO(t,-29), t];
  }
  if (from && t < from) return from;
  if (to && t > to) return to;
  return t;
}
async function addShiftRow(key){
  const d = key || newRowDate();
  const rec = { work_date: d, category: 'distro',
    company: tsState.filter.company || SITE.defaultCompany };   // rate stays 0 until a
    // name is typed — the roster's default_rate then fills it in (never a flat guess)
  const s = await insertShift(rec);
  if (!s) return;
  // last resort: if some other filter still hides it, drop that filter rather
  // than leave an invisible row behind
  let msg = d === todayISO() ? 'Row added' : 'Row added — dated ' + fDayMDY(d);
  if (!filteredShifts().some(x => x.id === s.id)){
    tsState.filter.employee = '';
    if (!filteredShifts().some(x => x.id === s.id)){ tsState.filter.preset = 'all'; tsState.filter.from = ''; tsState.filter.to = ''; }
    msg += ' — filters cleared so you can see it';
  }
  renderTsFilters(); renderTsLog(); toast(msg);
  const tr = document.querySelector('#tsTable tr[data-id="'+s.id+'"]');
  if (tr){ tr.scrollIntoView({block:'center'}); const inp = tr.querySelector('input,select'); if (inp) inp.focus(); }
}
let sheetJSPromise = null;
function ensureSheetJS(){
  if (window.XLSX) return Promise.resolve();
  if (!sheetJSPromise) sheetJSPromise = new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
    s.integrity = 'sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT';
    s.crossOrigin = 'anonymous';
    s.onload = res;
    s.onerror = () => { sheetJSPromise = null; rej(new Error('Could not load the spreadsheet parser (offline?) \u2014 export as CSV instead')); };
    document.head.appendChild(s);
  });
  return sheetJSPromise;
}
async function exportShifts(kind){
  const rows = filteredShifts().slice().sort((a,b) => (a.work_date||'')<(b.work_date||'')?-1:1);
  const head = ['Company','Date','Last','First','Team','Clock In','Clock Out','Break','People','Hours','Rate','Total'];
  const aoa = [head].concat(rows.map(s => [s.company, s.work_date, s.last, s.first, s.team,
    s.clock_in, s.clock_out, s.break_minutes, s.people, s.hours, s.rate, s.total]));
  if (kind === 'csv'){
    const csv = aoa.map(r => r.map(v => { const x=String(v??''); return /[",\n]/.test(x)?'"'+x.replace(/"/g,'""')+'"':x; }).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download = 'timesheets.csv';
    document.body.appendChild(a); a.click(); a.remove();
  } else {
    try{
      await ensureSheetJS();
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), 'Timesheets');
      XLSX.writeFile(wb, 'timesheets.xlsx');
    }catch(err){ toast(err.message || 'Excel export failed', true); }
  }
}

/* ================= Supabase data layer =================
   ny_shifts + ny_roster load straight from Postgres; Realtime pushes
   everyone's edits into every open tab. */
let shifts = [];           // same rows, full fidelity (the Timesheets tab)
let roster = [];           // NY crew (name autofill + default company/rate)
let myId = null;           // auth.users id, stamped on writes

const hhmm = v => v == null ? '' : String(v).slice(0, 5);
function shiftToTs(x){
  return { id:x.id, category:x.category||'distro', company:x.company||'', work_date:x.work_date,
    clock_in:hhmm(x.clock_in), clock_out:hhmm(x.clock_out), break_minutes:+x.break_minutes||0,
    people:+x.people||1, hours:+x.hours||0, rate:+x.rate||0, total:+x.total||0,
    team:x.team||'', last:x.last||'', first:x.first||'', roster_id:x.roster_id||null,
    pay_period:x.pay_period||null, note:x.note||null, photo_path:x.photo_path||null,
    source:x.source||'', source_id:x.source_id||null,
    overlap_ok:!!x.overlap_ok };
}
// paged fetch: no silent row ceiling (PostgREST caps single requests at ~1000)
async function fetchAll(table, orderCol){
  const out = [];
  for (let f = 0; ; f += 1000){
    let q = sb.from(table).select('*').range(f, f + 999);
    if (orderCol) q = q.order(orderCol);
    const { data, error } = await q;
    if (error) return { data: null, error };
    out.push(...data);
    if (data.length < 1000) return { data: out, error: null };
  }
}
async function loadAllData(){
  const [s, ro] = await Promise.all([
    fetchAll(SITE.tables.shifts, 'work_date'),
    fetchAll(SITE.tables.roster, 'last'),
  ]);
  if (s.error || ro.error) return false;
  shifts = (s.data || []).map(shiftToTs);
  roster = ro.data || [];
  return true;
}
/* live updates: any teammate's edit re-pulls just that table and re-renders.
   Waits out local typing + in-flight saves so nothing is yanked mid-edit. */
let refetchTimers = {};
function queueRefetch(kind){ clearTimeout(refetchTimers[kind]); refetchTimers[kind] = setTimeout(() => refetch(kind), 600); }
// A refetch may not clobber local state that changed while its select was in
// flight — every branch re-checks its guards AFTER the await and re-queues.
function shiftsDirtyNow(){
  const el = document.activeElement;
  return shiftSyncBusy || Object.keys(shiftTimers).length ||
         (el && el.closest && el.closest('#ts-card, #ts-roster, #ts-compare'));
}
function rosterDirtyNow(){
  // covers everything the roster refetch re-renders: the roster page AND the
  // timesheet card (renderTimesheets rebuilds its filters + log)
  const el = document.activeElement;
  return rosterSyncBusy || Object.keys(rosterTimers).length ||
         (el && el.closest && el.closest('#ts-roster, #ts-card'));
}
async function refetch(kind){
  if (kind === 'shifts'){
    if (shiftsDirtyNow()){ queueRefetch(kind); return; }
    const { data, error } = await fetchAll(SITE.tables.shifts, 'work_date');
    if (error || !data) return;
    if (shiftsDirtyNow()){ queueRefetch(kind); return; }
    shifts = data.map(shiftToTs);
    renderTimesheets();
  } else if (kind === 'roster'){
    if (rosterDirtyNow()){ queueRefetch(kind); return; }
    const { data, error } = await fetchAll(SITE.tables.roster, 'last');
    if (error || !data) return;
    if (rosterDirtyNow()){ queueRefetch(kind); return; }
    roster = data;
    renderTimesheets();
  }
}
let rtStarted = false;
function startRealtime(){
  if (rtStarted) return;      // openApp can run twice (retry toast / auth event);
  rtStarted = true;           // re-subscribing the same topic throws in supabase-js
  sb.channel('ny-tracker-live')
    .on('postgres_changes', { event:'*', schema:'public', table: SITE.tables.shifts }, () => queueRefetch('shifts'))
    .on('postgres_changes', { event:'*', schema:'public', table: SITE.tables.roster }, () => queueRefetch('roster'))
    .subscribe();
}

/* ---- writes: edits debounce per day, then persist straight to Postgres ----
   Rows carry ._id once stored; a row without one is inserted (and adopts the
   returned id), rows with one are updated.
   Realtime then carries the change to every other open tab. */
let shiftTimers = {};
let shiftSyncBusy = 0;   // counter: overlapping syncs stay guarded
// fire every pending debounced write NOW (tab closing / backgrounded) — the
// keepalive fetch lets these last-moment saves finish after unload
function flushPendingWrites(){
  for (const id of Object.keys(shiftTimers)){ clearTimeout(shiftTimers[id]); delete shiftTimers[id]; const s = shifts.find(x => x.id === id); if (s) syncShift(s); }
  for (const id of Object.keys(rosterTimers)){ clearTimeout(rosterTimers[id]); delete rosterTimers[id]; syncRoster(id); }
}
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') flushPendingWrites(); });
window.addEventListener('pagehide', flushPendingWrites);
/* ---- roster writes: debounced upsert per person; missing id = delete ---- */
let rosterTimers = {}, rosterSyncBusy = 0;
const rosterSyncChain = {};
function markDirtyRoster(id){
  clearTimeout(rosterTimers[id]);
  rosterTimers[id] = setTimeout(() => { delete rosterTimers[id]; syncRoster(id); }, 700);
}
function syncRoster(id){
  rosterSyncChain[id] = (rosterSyncChain[id] || Promise.resolve()).then(() => doSyncRoster(id));
  return rosterSyncChain[id];
}
async function doSyncRoster(id){
  rosterSyncBusy++;
  try{
    const p = roster.find(x => x.id === id);
    if (!p){
      const { error } = await sb.from(SITE.tables.roster).delete().eq('id', id);
      if (error){ toast('Couldn’t remove the person — check your connection.', true); return; }
      // the DB FK nulls roster_id on their shifts — mirror that locally so the
      // next full-row shift update doesn't re-send a dead reference (FK error)
      shifts.forEach(s => { if (s.roster_id === id) s.roster_id = null; });
      return;
    }
    // never persist an untouched "+ Add person" row — a blank person is noise
    // on every device (same principle as never inserting a blank row)
    const blank = !(p.last || '').trim() && !(p.first || '').trim() && !p.team &&
      !p.default_company && (p.default_rate == null || p.default_rate === '') && !(p.aliases || []).length;
    if (blank) return;
    const rec = { id: p.id, last: p.last || null, first: p.first || '',
      team: p.team || null, default_company: p.default_company || null,
      default_rate: p.default_rate == null || p.default_rate === '' ? null : +p.default_rate,
      aliases: (p.aliases && p.aliases.length) ? p.aliases : null,
      active: p.active !== false };
    const { error } = await sb.from(SITE.tables.roster).upsert(rec);
    if (error) toast('Couldn’t save the roster change — check your connection.', true);
  } finally { rosterSyncBusy--; }
}
/* ================= toast ================= */
let toastTimer;
function toast(msg, isErr, onClick){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'on' + (isErr ? ' err' : '') + (onClick ? ' act' : '');
  t.onclick = onClick ? () => { t.className = ''; t.onclick = null; onClick(); } : null;
  clearTimeout(toastTimer); toastTimer = setTimeout(() => { t.className = ''; t.onclick = null; }, onClick ? 12000 : 5200);
}

/* ================= boot ================= */
function boot(){}   // (the CA app cleans ITS legacy localStorage keys; NY has none)
function afterDataLoaded(){
  renderTimesheets();
}

/* ================= sign-in: Google → Supabase session =================
   The GIS button/One Tap yields a Google ID token; we exchange it for a
   Supabase session with signInWithIdToken. Nonce handshake done properly
   (SHA-256 of a random value goes to Google, the raw value to Supabase), so
   the shared provider's replay protection stays on. Authorization itself is
   server-side: is_staff() (confirmed @wizardtrees.com) gates every table. */
const GOOGLE_CLIENT_ID = '168134930971-2au6foq8njul8tjja6a2v306mt10r45i.apps.googleusercontent.com';   // OAuth Web client (Wizard Trees Tools)
const AUTH_DOMAIN = 'wizardtrees.com';
let gisRawNonce = null;

function loginErr(msg){ const e = document.getElementById('login-err'); if (e) e.textContent = msg || ''; }
async function sha256hex(s){
  const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(d)].map(b => b.toString(16).padStart(2,'0')).join('');
}
async function openApp(){
  const { data: staff, error } = await sb.rpc('is_staff');
  if (error){
    // transient (network/API) — keep the session, offer a retry instead of bouncing
    toast('Couldn’t reach the database — tap to retry.', true, openApp);
    return;
  }
  if (staff !== true){
    await sb.auth.signOut();
    const g = document.getElementById('login-gate'); if (g) g.classList.remove('hidden');
    loginErr('This account isn\'t authorized — sign in with your @' + AUTH_DOMAIN + ' Google account.');
    showGISButton();   // make sure the gate actually has a sign-in button on this path
    return;
  }
  const { data: { user } } = await sb.auth.getUser();
  myId = user ? user.id : null;
  const g = document.getElementById('login-gate'); if (g) g.classList.add('hidden');
  const ok = await loadAllData();
  if (!ok){ toast('Couldn’t load the data — tap to retry.', true, openApp); return; }
  afterDataLoaded();
  startRealtime();
}
async function onGoogleCredential(resp){
  loginErr('');
  const { error } = await sb.auth.signInWithIdToken({ provider: 'google', token: resp && resp.credential, nonce: gisRawNonce });
  if (error){ loginErr('Sign-in failed: ' + error.message); return; }
  openApp();
}
function signOut(){
  sb.auth.signOut().finally(() => {
    if (window.google && google.accounts && google.accounts.id) google.accounts.id.disableAutoSelect();
    location.reload();
  });
}
let gisShown = false;
async function showGISButton(){
  if (gisShown) return;
  gisShown = true;
  gisRawNonce = crypto.randomUUID() + crypto.randomUUID();
  const hashedNonce = await sha256hex(gisRawNonce);
  let tries = 0;
  (function ready(){
    if (window.google && google.accounts && google.accounts.id){
      const spin = document.getElementById('login-spin'); if (spin) spin.style.display = 'none';
      google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: onGoogleCredential,
        hd: AUTH_DOMAIN, nonce: hashedNonce, auto_select: true, cancel_on_tap_outside: false });
      google.accounts.id.renderButton(document.getElementById('gsi-button'),
        { theme:'filled_blue', size:'large', text:'signin_with', shape:'pill', width:260 });
      google.accounts.id.prompt();
    } else if (tries++ < 60){ setTimeout(ready, 150); }
    else { loginErr('Could not load Google sign-in — check your connection and refresh.'); }
  })();
}
async function initGate(){
  // if the session dies mid-use (revoked, refresh failure), fall back to the gate
  sb.auth.onAuthStateChange((event) => { if (event === 'SIGNED_OUT' && myId) location.reload(); });
  const { data: { session } } = await sb.auth.getSession();
  if (session){ openApp(); return; }
  showGISButton();
}

boot();
initGate();
</script>
