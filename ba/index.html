<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0f1115">
<title>Wizard Trees — Mileage & Expenses</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WT Field">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --text:#e7eaf0; --muted:#9aa3b2; --accent:#7c5cff; --accent2:#9d86ff;
    --green:#2fbf71; --yellow:#e7b416; --orange:#f08a24; --red:#ef4d56;
    --shadow:0 6px 24px rgba(0,0,0,.35);
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
  a{color:var(--accent2);text-decoration:none}
  .muted{color:var(--muted)} .small{font-size:12px} .center{text-align:center}
  .row{display:flex;gap:10px;align-items:center} .row.wrap{flex-wrap:wrap}
  .grow{flex:1} .right{margin-left:auto}
  .hide{display:none!important}

  /* layout */
  #app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;padding:12px 14px;
    background:rgba(15,17,21,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
  .brand b{font-size:15px} .brand .sub{color:var(--muted);font-size:11px}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;
    border:1px solid var(--line);background:var(--panel2);color:var(--muted)}
  .pill.admin{color:#fff;background:var(--accent);border-color:var(--accent)}
  main{flex:1;padding:14px 14px calc(96px + var(--safe-b));display:flex;flex-direction:column;gap:14px}

  /* cards & controls */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 10px;font-size:14px}
  label.fl{display:block;font-size:12px;color:var(--muted);margin:10px 0 5px;font-weight:600}
  input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:11px 12px;font:inherit;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  textarea{min-height:60px;resize:vertical}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:11px;
    padding:12px 15px;cursor:pointer;font:inherit;font-weight:650;display:inline-flex;align-items:center;
    justify-content:center;gap:8px;min-height:46px}
  .btn:hover{border-color:var(--accent)} .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.ghost{background:transparent}
  .btn.danger{color:#fff;background:var(--red);border-color:var(--red)}
  .btn.ok{color:#fff;background:var(--green);border-color:var(--green)}
  .btn.sm{min-height:34px;padding:6px 11px;border-radius:9px;font-size:13px}
  .btn.block{width:100%} .btn:disabled{opacity:.5;cursor:not-allowed}
  .seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px;gap:4px}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font:inherit;font-weight:650;
    padding:9px;border-radius:8px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}

  /* big action buttons (BA home) */
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .bigbtn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:22px 10px;border-radius:16px;
    background:var(--panel);border:1px solid var(--line);cursor:pointer;font:inherit;color:var(--text);box-shadow:var(--shadow)}
  .bigbtn:hover{border-color:var(--accent)} .bigbtn .ic{font-size:30px}
  .bigbtn b{font-size:15px}

  /* totals */
  .totbar{display:flex;gap:10px}
  .tot{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .tot .k{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
  .tot .v{font-size:20px;font-weight:750;margin-top:2px}
  .tot.sum .v{color:var(--accent2)}

  /* list items */
  .item{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--line)}
  .item:first-child{border-top:0}
  .item .ic{width:34px;height:34px;border-radius:9px;background:var(--panel2);display:flex;align-items:center;
    justify-content:center;font-size:17px;flex:none}
  .item .t{font-weight:600} .item .s{font-size:12px;color:var(--muted)}
  .item .amt{margin-left:auto;font-weight:700;white-space:nowrap}
  .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .badge.draft{color:var(--muted)} .badge.submitted{color:var(--yellow);border-color:var(--yellow)}
  .badge.approved{color:var(--green);border-color:var(--green)}
  .badge.rejected{color:var(--red);border-color:var(--red)}
  .thumb{width:42px;height:42px;border-radius:8px;object-fit:cover;background:var(--panel2);flex:none;border:1px solid var(--line)}

  /* bottom tab bar (BA) */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;max-width:560px;margin:0 auto;
    display:flex;background:rgba(23,26,33,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);
    padding-bottom:var(--safe-b)}
  .tabbar button{flex:1;border:0;background:transparent;color:var(--muted);font:inherit;font-size:11px;
    font-weight:650;padding:9px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .tabbar button .ic{font-size:20px}
  .tabbar button.on{color:var(--accent2)}

  /* modal */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;align-items:flex-end;
    justify-content:center}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;
    max-width:560px;max-height:92vh;overflow:auto;padding:16px 16px calc(20px + var(--safe-b))}
  @media(min-width:560px){.backdrop{align-items:center}.sheet{border-radius:18px}}
  .sheet h3{margin:2px 0 4px}

  /* toast */
  #toast{position:fixed;left:50%;bottom:calc(86px + var(--safe-b));transform:translateX(-50%);z-index:80;
    background:#000;border:1px solid var(--line);color:#fff;padding:10px 15px;border-radius:11px;font-size:13px;
    box-shadow:var(--shadow);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:90%}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  #toast.err{border-color:var(--red)} #toast.ok{border-color:var(--green)}

  /* spinner */
  .spin{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;
    animation:sp .7s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}
  .loading{display:flex;align-items:center;gap:10px;color:var(--muted);justify-content:center;padding:24px}

  /* admin table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  td.num,th.num{text-align:right;white-space:nowrap}

  /* collapsible dispensary groups */
  .dghead{display:flex;align-items:center;gap:8px;padding:11px 2px;cursor:pointer;border-top:1px solid var(--line);user-select:none}
  .dghead .caret{color:var(--muted);width:12px;text-align:center;flex:none}
  .dghead b{font-size:14px} .dghead:hover b{color:var(--accent2)}
  .dgbody{border-top:1px solid var(--line)}

  /* admin view switcher */
  .vswitch{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:9px 14px;border-bottom:1px solid var(--line)}

  /* spreadsheet-style quick-entry grid */
  .gridwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:10px}
  table.grid{border-collapse:collapse;min-width:560px;width:100%}
  table.grid th{background:var(--panel2);color:var(--muted);font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;
    font-weight:700;padding:6px 7px;white-space:nowrap;text-align:left;border-bottom:1px solid var(--line)}
  table.grid td{padding:0;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
  table.grid td:last-child{border-right:0}
  table.grid input{border:0;border-radius:0;background:transparent;padding:8px 7px;font:inherit;font-size:13px;min-height:38px}
  table.grid input:focus{background:var(--panel2);box-shadow:inset 0 0 0 1.5px var(--accent)}
  table.grid input.gnum{width:78px;text-align:right} table.grid input.gdate{width:124px}
  table.grid select{border:0;background:transparent;color:var(--text);font:inherit;font-size:13px;padding:8px 6px;min-height:38px;width:100%;min-width:118px}
  table.grid select:focus{background:var(--panel2);box-shadow:inset 0 0 0 1.5px var(--accent)}
  .rcell{display:flex;align-items:center;gap:6px;padding:4px 7px;min-height:38px}
  .rchip{cursor:pointer;color:var(--accent2);font-size:12px;white-space:nowrap}
  .rthumb{width:30px;height:30px;border-radius:5px;object-fit:cover;border:1px solid var(--line);cursor:pointer;flex:none}
  .rrepl{cursor:pointer;color:var(--muted);font-size:14px}

  /* starting-location typeahead */
  .tsug{border:1px solid var(--line);border-radius:10px;margin-top:6px;overflow:hidden;background:var(--panel2);max-height:240px;overflow-y:auto}
  .tsug .sg{display:flex;flex-direction:column;gap:1px;padding:9px 12px;cursor:pointer;border-top:1px solid var(--line)}
  .tsug .sg:first-child{border-top:0}
  .tsug .sg:hover{background:var(--panel)}
  .tsug .sg b{font-size:13px;font-weight:600} .tsug .sg span{font-size:11px;color:var(--muted)}

  .auth-wrap{min-height:100%;display:flex;flex-direction:column;justify-content:center;padding:24px 18px;gap:16px;max-width:420px;margin:0 auto}
  .hero{text-align:center} .hero .logo{width:56px;height:56px;border-radius:15px;margin:0 auto 12px;font-size:28px}
  @media print{ body *{visibility:hidden} #printarea,#printarea *{visibility:visible}
    #printarea{position:absolute;inset:0;padding:24px;color:#000;background:#fff} }
  #printarea{display:none}
</style>
</head>
<body>
<div id="app"><div class="loading"><span class="spin"></span> Loading…</div></div>
<div id="toast"></div>
<div id="printarea"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

/* ─────────────────────────── config ─────────────────────────── */
// Paste your Supabase project URL + anon (public) key below, OR set them once at
// runtime via the gear on the sign-in screen (saved to this device's localStorage).
const CONFIG = {
  url:  localStorage.getItem('ba.url')  || 'https://dhiqhgtmelxwelyoowle.supabase.co',
  anon: localStorage.getItem('ba.anon') || 'sb_publishable_FtScmtn1C0tE1bwUsavJFg_koiVEu14',
};
const CONFIGURED = !/YOUR-PROJECT|YOUR-ANON-KEY/.test(CONFIG.url + CONFIG.anon);

let supabase = null;
if (CONFIGURED) {
  supabase = createClient(CONFIG.url, CONFIG.anon, {
    auth: { persistSession: true, autoRefreshToken: true, experimental: { passkey: true } },
  });
}

/* ─────────────────────────── state ─────────────────────────── */
const state = {
  session: null, profile: null, settings: null, loadError: null,
  period: null, periods: [], dispensaries: [],
  baTab: 'home', adminTab: 'dash', adminRegion: 'all', dispOpen: {}, preview: null, gridMode: 'miles', recentPlaces: [],
};
const REGIONS = ['CA','FL','NY'];
const EXPENSE_CATEGORIES = ['Travel','Tolls','Parking','Meals','Flights','Lodging','Fuel','Supplies','Other'];

/* ─────────────────────────── helpers ─────────────────────────── */
const $ = (s, r=document) => r.querySelector(s);
const app = $('#app');
const money = n => '$' + (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const todayISO = () => { const d=new Date(); return new Date(d.getTime()-d.getTimezoneOffset()*6e4).toISOString().slice(0,10); };
const fmtDate = s => s ? new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';

function toast(msg, kind='') {
  const t = $('#toast'); t.textContent = msg; t.className = 'show ' + kind;
  clearTimeout(toast._t); toast._t = setTimeout(()=>{ t.className=''; }, 2600);
}
function dispName(id){ const d = state.dispensaries.find(x=>x.id===id); return d? d.name : '—'; }
// dispensaries a BA can pick: only those in their region (admins/region-less see all)
function baDispensaries(){ const r = state.preview || state.profile?.region; return state.dispensaries.filter(d => !r || d.state === r); }
function busy(btn, on){ if(!btn) return; btn.disabled=on; btn.dataset._txt ??= btn.innerHTML;
  btn.innerHTML = on ? '<span class="spin"></span>' : btn.dataset._txt; }

async function compress(file, max=1600, q=0.7){
  try{
    const bmp = await createImageBitmap(file);
    let {width:w,height:h}=bmp;
    if(Math.max(w,h)>max){ const s=max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(bmp,0,0,w,h);
    return await new Promise(r=>c.toBlob(r,'image/jpeg',q));
  }catch(e){ return file; } // fall back to original if decode fails
}
async function uploadPhoto(bucket, file){
  const blob = await compress(file);
  const path = `${state.session.user.id}/${crypto.randomUUID()}.jpg`;
  const { error } = await supabase.storage.from(bucket).upload(path, blob, { contentType:'image/jpeg', upsert:false });
  if(error) throw error;
  return path;
}
async function signedUrl(bucket, path, secs=3600){
  if(!path) return null;
  const { data } = await supabase.storage.from(bucket).createSignedUrl(path, secs);
  return data?.signedUrl || null;
}
async function callFn(name, body){
  const { data, error } = await supabase.functions.invoke(name, { body });
  if(error){ // surface the function's JSON error message if present
    let msg = error.message;
    try{ const j = await error.context?.json?.(); if(j?.message||j?.error) msg = j.message||j.error; }catch{}
    throw new Error(msg);
  }
  return data;
}

/* ─────────────────────────── boot ─────────────────────────── */
async function boot(){
  if(!CONFIGURED) return renderConfig();
  const { data:{ session } } = await supabase.auth.getSession();
  state.session = session;
  supabase.auth.onAuthStateChange((_e, s)=>{ state.session = s; if(!s){ state.profile=null; render(); } });
  if(session) await loadMe();
  render();
}
async function loadMe(){
  try{
    const { data: prof, error } = await supabase.from('profiles').select('*').eq('id', state.session.user.id).single();
    if(error || !prof){ state.loadError = error?.message || 'Your profile could not be found.'; state.profile=null; return; }
    state.loadError = null; state.profile = prof;
    const { data: s } = await supabase.from('app_settings').select('*').eq('id',1).single();
    state.settings = s;
    // make sure today's period exists, then load periods + dispensaries
    await supabase.rpc('ensure_period');
    const { data: per } = await supabase.from('pay_periods').select('*').order('start_date',{ascending:false});
    state.periods = per||[];
    state.period = state.periods.find(p=>p.start_date<=todayISO() && p.end_date>=todayISO()) || state.periods[0] || null;
    const { data: disp } = await supabase.from('dispensaries').select('*').eq('active',true).order('name');
    state.dispensaries = disp||[];
    // recent start/destination labels for the trip autocomplete
    const { data: rt } = await supabase.from('trips').select('start_label,dest_label').eq('ba_id',state.session.user.id).order('created_at',{ascending:false}).limit(60);
    const places=new Set(); (rt||[]).forEach(t=>{ if(t.start_label)places.add(t.start_label); if(t.dest_label)places.add(t.dest_label); });
    state.recentPlaces=[...places].filter(p=>p&&p!=='📍 Current location').slice(0,30);
  }catch(e){ state.loadError = String(e?.message||e); state.profile=null; }
}
// after saving an item, make sure the selected period covers that item's date so
// it's actually visible (a back/forward-dated item lands in a different period).
async function ensurePeriodForDate(date){
  try{
    await supabase.rpc('ensure_period', { d: date });
    const { data } = await supabase.from('pay_periods').select('*').order('start_date',{ascending:false});
    state.periods = data || state.periods;
    const p = state.periods.find(x=>x.start_date<=date && x.end_date>=date);
    if(p) state.period = p;
  }catch{}
}

/* ─────────────────────────── render router ─────────────────────────── */
function render(){
  if(!CONFIGURED) return renderConfig();
  if(!state.session) return renderLogin();
  if(state.loadError) return renderLoadError();
  if(!state.profile) { app.innerHTML = '<div class="loading"><span class="spin"></span> Loading your profile…</div>'; return; }
  if(state.profile.must_change_password) return renderChangePw(true);
  if(state.profile.role === 'admin' && !state.preview) return renderAdmin();
  return renderBA();
}
function renderLoadError(){
  app.innerHTML = `<div class="auth-wrap">
    <div class="hero"><div class="logo">⚠️</div><h2>Couldn’t load your account</h2>
      <p class="muted small">${esc(state.loadError||'')}</p></div>
    <div class="card">
      <button class="btn primary block" id="retry">Retry</button>
      <button class="btn ghost block" id="so" style="margin-top:8px">Sign out</button>
    </div></div>`;
  $('#retry').onclick = async ()=>{ app.innerHTML='<div class="loading"><span class="spin"></span></div>'; await loadMe(); render(); };
  $('#so').onclick = async ()=>{ await supabase.auth.signOut(); state.profile=null; state.loadError=null; render(); };
}
// passkeys need: the browser API, AND the experimental supabase-js methods actually present
const hasPasskey = ()=> !!(window.PublicKeyCredential && supabase?.auth
  && typeof supabase.auth.signInWithPasskey === 'function'
  && typeof supabase.auth.registerPasskey === 'function');

/* ─────────────────────────── config screen ─────────────────────────── */
function renderConfig(){
  app.innerHTML = `<div class="auth-wrap">
    <div class="hero"><div class="logo">🌲</div><h2>Connect to Supabase</h2>
      <p class="muted small">One-time setup on this device. Paste your project URL and anon (public) key.</p></div>
    <div class="card">
      <label class="fl">Project URL</label><input id="cfgUrl" placeholder="https://abcd.supabase.co">
      <label class="fl">Anon public key</label><input id="cfgAnon" placeholder="eyJhbGci…">
      <button class="btn primary block" id="cfgSave" style="margin-top:14px">Save &amp; continue</button>
    </div></div>`;
  $('#cfgSave').onclick = ()=>{
    const u=$('#cfgUrl').value.trim(), a=$('#cfgAnon').value.trim();
    if(!u||!a) return toast('Both fields required','err');
    localStorage.setItem('ba.url',u); localStorage.setItem('ba.anon',a); location.reload();
  };
}

/* ─────────────────────────── auth screens ─────────────────────────── */
function renderLogin(){
  const canPasskey = hasPasskey();
  app.innerHTML = `<div class="auth-wrap">
    <div class="hero"><div class="logo">🌲</div><h2>Wizard Trees</h2>
      <p class="muted small">Mileage &amp; expense tracking for brand ambassadors</p></div>
    <div class="card">
      <label class="fl">Email</label><input id="email" type="email" autocomplete="username" inputmode="email">
      <label class="fl">Password</label><input id="pw" type="password" autocomplete="current-password">
      <button class="btn primary block" id="signin" style="margin-top:14px">Sign in</button>
      ${canPasskey ? `<button class="btn block ghost" id="passkey" style="margin-top:10px">🔓 Use Face ID / fingerprint</button>` : ``}
      <p class="small muted center" style="margin-top:12px">No account yet? Ask Gianni or Victoria to add you.</p>
    </div>
    <button class="btn ghost sm" id="gear" style="align-self:center">⚙︎ Connection settings</button>
  </div>`;
  $('#signin').onclick = doSignin;
  $('#pw').addEventListener('keydown',e=>{ if(e.key==='Enter') doSignin(); });
  $('#gear').onclick = ()=>{ if(!confirm('Reset the Supabase connection settings on this device? You’ll need to re-enter them.')) return;
    localStorage.removeItem('ba.url'); localStorage.removeItem('ba.anon'); location.reload(); };
  const pk = $('#passkey'); if(pk) pk.onclick = doPasskey;
}
async function doSignin(){
  const btn=$('#signin'); busy(btn,true);
  const email=$('#email').value.trim(), password=$('#pw').value;
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  busy(btn,false);
  if(error) return toast(error.message,'err');
  await loadMe(); render();
}
async function doPasskey(){
  const btn=$('#passkey'); busy(btn,true);
  try{
    const { error } = await supabase.auth.signInWithPasskey();
    if(error) throw error;
    await loadMe(); render();
  }catch(e){ console.warn('passkey signin', e); toast('Passkey sign-in failed — use your password','err'); }
  busy(btn,false);
}
function renderChangePw(forced){
  app.innerHTML = `<div class="auth-wrap">
    <div class="hero"><div class="logo">🔐</div><h2>Set a new password</h2>

async function saveGrid(mode){

      let miles=Number(tr.querySelector('.g-mi').value);
      if(!date) continue;
      if(!(miles>0)){ const s=Number(os),e=Number(oe); if(s&&e&&e>=s) miles=Math.round((e-s)*10)/10; }
      if(!(miles>0)) continue;
      const hasOdo=os!==''&&oe!=='';

      firstDate=firstDate||date;
      recs.push({ ba_id:state.session.user.id, trip_date:date, dispensary_id:disp?disp.id:null,

        miles, miles_source:hasOdo?'odometer':'manual', start_label:start||null, dest_label:dest||null,
        roundtrip:false, note:note||null, status:'draft' });
    }
    if(!recs.length) return toast('Add a date + miles (or odometer) to a row','err');
    const {error}=await supabase.from('trips').insert(recs); if(error) return toast(error.message,'err');
  } else {
    for(const tr of rows){

        amount:amt, category:cat||'Other', receipt_path:receipt, note:desc||null, status:'draft' });
    }

    const {error}=await supabase.from('expenses').insert(recs); if(error) return toast(error.message,'err');
  }
  toast(`Saved ${recs.length} row${recs.length===1?'':'s'}`,'ok');
  if(firstDate) await ensurePeriodForDate(firstDate);
  drawBA();
}

/* ── reusable place typeahead: Home + dispensaries + recent + live ORS address ── */
function placeItems(q){
  q=(q||'').trim().toLowerCase(); const out=[]; const base=state.profile.base_address;
  if(base && (q===''||'home'.includes(q)||'base'.includes(q)||base.toLowerCase().includes(q)))
    out.push({display:base, addr:base, dispId:null, label:'🏠 Home', sub:base});
  baDispensaries().filter(d=>d.name.toLowerCase().includes(q)||(d.address||'').toLowerCase().includes(q)).slice(0,6)
    .forEach(d=>out.push({display:d.name, addr:d.address||d.name, dispId:d.id, label:'🏬 '+d.name, sub:d.address||''}));
  (state.recentPlaces||[]).filter(p=>p.toLowerCase().includes(q)).slice(0,4)
    .forEach(p=>out.push({display:p, addr:p, dispId:null, label:'🕘 '+p, sub:'recent'}));
  const seen=new Set();
  return out.filter(o=>{const k=o.display.toLowerCase(); if(seen.has(k))return false; seen.add(k); return true;}).slice(0,8);
}
// onResolve({display,addr,dispId}) fires on pick AND on free typing, so the caller always has the current value
function attachPlaceTypeahead(input, box, onResolve){
  let local=[], timer=null;
  const paint=items=>{
    if(!items.length){ box.classList.add('hide'); box.innerHTML=''; return; }
    box.innerHTML=items.map((it,i)=>`<div class="sg" data-i="${i}"><b>${esc(it.label)}</b>${it.sub?`<span>${esc(it.sub)}</span>`:''}</div>`).join('');
    box.classList.remove('hide');
    box.querySelectorAll('.sg').forEach(el=>el.onmousedown=ev=>{ ev.preventDefault();
      const it=items[+el.dataset.i]; input.value=it.display; box.classList.add('hide');
      onResolve({display:it.display, addr:it.addr, dispId:it.dispId}); });
  };
  const render=()=>{
    const q=input.value; local=placeItems(q); paint(local); clearTimeout(timer);
    if(q && q.trim().length>=3) timer=setTimeout(async()=>{
      let r; try{ r=await callFn('geocode-suggest',{text:q}); }catch{ return; }
      if(!r?.ok||!r.suggestions?.length||input.value!==q) return;
      const have=new Set(local.map(x=>x.display.toLowerCase()));
      const addr=r.suggestions.filter(s=>!have.has(s.label.toLowerCase())).slice(0,5)
        .map(s=>({display:s.label, addr:s.label, dispId:null, label:'📍 '+s.label, sub:'address'}));
      if(addr.length) paint([...local, ...addr]);
    },250);
  };
  input.oninput=()=>{ onResolve({display:input.value, addr:input.value, dispId:null}); render(); };
  input.onfocus=render;
  input.onblur=()=>setTimeout(()=>box.classList.add('hide'),150);
}

function placeDatalist(){
  const set=new Set();
  if(state.profile?.base_address) set.add(state.profile.base_address);
  baDispensaries().forEach(d=>set.add(d.name));

  return `<datalist id="placeList">${[...set].map(p=>`<option value="${esc(p)}">`).join('')}</datalist>`;
}

        <div class="grow"><label class="fl">End odometer</label><input id="tEnd" type="number" inputmode="decimal" placeholder="photo / number">
          <label class="btn sm block ghost" style="margin-top:6px">📷 End photo<input id="tEndPhoto" type="file" accept="image/*" capture="environment" hidden></label></div>
      </div>
      <div class="small muted" id="tOdoMiles" style="margin-top:8px"></div>
    </div>
    <label class="fl">Note (optional)</label><input id="tNote" placeholder="e.g. dropped samples, met buyer">
    <div id="tCost" class="small muted" style="margin-top:10px"></div>
    <button class="btn primary block" id="tSave" style="margin-top:14px">Save trip</button>
    <button class="btn ghost block" id="tCancel" style="margin-top:8px">Cancel</button>
  `);
  const rate = Number(state.profile.rate_override ?? state.settings?.mileage_rate ?? 0.725);
  const showCost = ()=>{ $('#tCost').innerHTML = miles!=null ? `Reimbursement: <b style="color:var(--accent2)">${money(miles*rate)}</b> &nbsp;<span class="muted">(${miles} mi × ${money(rate)})</span>` : ''; };

  $('#tCancel').onclick=closeSheet;
  $('#tSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{
    $('#tSeg').querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    method=b.dataset.m; $('#tDistance').classList.toggle('hide',method!=='distance'); $('#tOdo').classList.toggle('hide',method!=='odometer');
  });
  $('#tMiles').oninput=e=>{ miles=e.target.value?Number(e.target.value):null; milesSrc='manual'; showCost(); };
  $('#tGps').onclick=()=>{
    if(!navigator.geolocation) return toast('GPS not available on this device','err');
    $('#tStartHint').textContent='Getting your location…';
    navigator.geolocation.getCurrentPosition(p=>{
      startCoords={lat:p.coords.latitude,lng:p.coords.longitude};
      $('#tStartLoc').value='📍 Current location'; startAddr='';
      $('#tSug').classList.add('hide');
      $('#tStartHint').textContent=`Using GPS (${startCoords.lat.toFixed(4)}, ${startCoords.lng.toFixed(4)})`;
    }, ()=>{ toast('Couldn’t get location — allow access or type an address','err'); $('#tStartHint').textContent=''; },
      {enableHighAccuracy:true,timeout:10000,maximumAge:60000});
  };
  attachPlaceTypeahead($('#tStartLoc'), $('#tSug'), r=>{ startAddr=r.addr; startCoords=null; $('#tStartHint').textContent=''; });
  attachPlaceTypeahead($('#tDest'), $('#tSugDest'), r=>{ destAddr=r.addr; destDispId=r.dispId; });
  $('#tCalc').onclick=async ()=>{
    const destText=$('#tDest').value.trim(); if(!destText) return toast('Enter a destination first','err');
    const body={ roundtrip:$('#tRound').checked };
    if(startCoords){ body.start_lat=startCoords.lat; body.start_lng=startCoords.lng; }
    else { const a=(startAddr||$('#tStartLoc').value).trim(); if(a && a!=='📍 Current location') body.start_address=a; }
    if(destDispId) body.dispensary_id=destDispId; else body.dest_address=(destAddr||destText);
    const btn=$('#tCalc'); busy(btn,true);
    try{
      const r=await callFn('calc-distance', body);
      if(r.ok){ miles=r.miles; milesSrc=r.source; $('#tMiles').value=miles; showCost(); toast('Distance computed','ok'); }
      else toast(r.message||'Enter miles manually','err');
    }catch(e){ toast(e.message,'err'); }
    busy(btn,false);
  };
  async function readOdo(file, which){
    const lbl = which==='start'?$('#tStart'):$('#tEnd');
    try{
      const path=await uploadPhoto('odometer',file);
      if(which==='start') startPath=path; else endPath=path;
      const r=await callFn('read-odometer',{path});
      if(r.ok && r.reading!=null){ lbl.value=r.reading; if(which==='start')startOdo=r.reading; else endOdo=r.reading; }
      else toast('Could not read odometer — type it in','err');
      recalcOdo();
    }catch(e){ toast(e.message,'err'); }
  }
  function recalcOdo(){
    const s=Number($('#tStart').value), e=Number($('#tEnd').value);
    if(s&&e&&e>=s){ miles=Math.round((e-s)*10)/10; milesSrc='odometer'; $('#tOdoMiles').innerHTML=`Distance: <b>${miles} mi</b>`; }
    else { $('#tOdoMiles').textContent=''; }
    showCost();
  }
  $('#tStart').oninput=()=>{startOdo=Number($('#tStart').value);recalcOdo();};
  $('#tEnd').oninput  =()=>{endOdo=Number($('#tEnd').value);recalcOdo();};
  $('#tStartPhoto').onchange=e=>{ if(e.target.files[0]){toast('Reading photo…');readOdo(e.target.files[0],'start');} };
  $('#tEndPhoto').onchange  =e=>{ if(e.target.files[0]){toast('Reading photo…');readOdo(e.target.files[0],'end');} };

  $('#tSave').onclick=async ()=>{
    const destText=$('#tDest').value.trim();
    if(!destText) return toast('Enter a destination','err');
    if(miles==null||!(miles>0)) return toast('Need the miles for this trip','err');
    const btn=$('#tSave'); busy(btn,true);
    const startLoc = startCoords ? '📍 Current location' : ($('#tStartLoc').value||null);
    const row={ ba_id:state.session.user.id, trip_date:$('#tDate').value, dispensary_id:destDispId||null, method,
      miles, miles_source:milesSrc, dest_label:destText, start_label:startLoc, note:$('#tNote').value||null, status:'draft' };
    if(method==='odometer'){ row.start_odo=startOdo; row.end_odo=endOdo; row.start_photo=startPath; row.end_photo=endPath; }
    if(method==='distance'){
      row.roundtrip=$('#tRound').checked;
      if(startCoords){ row.start_lat=startCoords.lat; row.start_lng=startCoords.lng; }
    }
    const { error }=await supabase.from('trips').insert(row);
    busy(btn,false);
    if(error) return toast(error.message,'err');
    toast('Trip saved','ok'); closeSheet(); state.baTab='home';
    await ensurePeriodForDate(row.trip_date); drawBA();
  };
}

async function adminDash(m){
  m.innerHTML=`<div class="loading"><span class="spin"></span></div>`;
  const per=state.period;
  const [{data:bas}, trips, exps, subs] = await Promise.all([
    supabase.from('profiles').select('*').eq('role','ba').order('full_name'),
    per?supabase.from('trips').select('ba_id,amount,status').eq('period_id',per.id):{data:[]},
    per?supabase.from('expenses').select('ba_id,amount,status').eq('period_id',per.id):{data:[]},
    per?supabase.from('submissions').select('*').eq('period_id',per.id):{data:[]},
  ]);
  const T=trips.data||[],E=exps.data||[],S=subs.data||[];
  const byBa={};
  (bas||[]).forEach(b=>byBa[b.id]={p:b,mile:0,exp:0,status:'open'});
  T.forEach(x=>{ if(byBa[x.ba_id]) byBa[x.ba_id].mile+=Number(x.amount||0); });
  E.forEach(x=>{ if(byBa[x.ba_id]) byBa[x.ba_id].exp +=Number(x.amount||0); });
  S.forEach(s=>{ if(byBa[s.ba_id]) byBa[s.ba_id].status=s.status; });
  let rows=Object.values(byBa);
  if(state.adminRegion!=='all') rows=rows.filter(r=>r.p.region===state.adminRegion);
  const grand=rows.reduce((a,r)=>a+r.mile+r.exp,0);
  m.innerHTML=`
    <div class="card">
      <div class="row"><div class="small muted grow">Pay period</div>${periodPicker(()=>adminDash(m))}</div>
      <div class="row" style="margin-top:8px"><div class="small muted grow">Region</div>
        <select id="regSel">
          <option value="all" ${state.adminRegion==='all'?'selected':''}>All states</option>
          ${REGIONS.map(r=>`<option value="${r}" ${state.adminRegion===r?'selected':''}>${r}</option>`).join('')}
        </select></div>
      <div class="totbar" style="margin-top:12px">
        <div class="tot"><div class="k">BAs</div><div class="v">${rows.length}</div></div>
        <div class="tot"><div class="k">Submitted</div><div class="v">${rows.filter(r=>r.status==='submitted').length}</div></div>
        <div class="tot sum"><div class="k">Period total</div><div class="v">${money(grand)}</div></div>
      </div>
    </div>
    <div class="card">
      <h3>Brand ambassadors</h3>
      ${rows.length?rows.map(r=>`
        <div class="item" data-ba="${r.p.id}" style="cursor:pointer">
          <div class="ic">${(r.p.full_name||'?').slice(0,1).toUpperCase()}</div>
          <div class="grow"><div class="t">${esc(r.p.full_name||r.p.email)}</div>
            <div class="s">${money(r.mile)} mileage · ${money(r.exp)} expenses</div></div>
          <div class="amt">${money(r.mile+r.exp)}</div>
          ${r.p.region?`<span class="pill">${r.p.region}</span>`:''}
          <span class="badge ${r.status}">${r.status}</span>
        </div>`).join(''):`<p class="muted small">No BAs${state.adminRegion!=='all'?' in '+state.adminRegion:''} yet — add them in Settings.</p>`}
    </div>`;
  m.querySelectorAll('[data-ba]').forEach(el=>el.onclick=()=>adminBaDetail(el.dataset.ba));
  const rs=$('#regSel'); if(rs) rs.onchange=()=>{ state.adminRegion=rs.value; adminDash(m); };
}

    ${E?.length?`<h3 style="margin-top:14px">Expenses</h3><table><tr><th>Date</th><th>Vendor</th><th>Cat</th><th>Receipt</th><th class="num">$</th><th>Status</th><th></th></tr>${expRows.join('')}</table>`:''}
    ${!T?.length&&!E?.length?'<p class="muted small">Nothing logged this period.</p>':''}
    <div class="row wrap" style="margin-top:16px">

      <button class="btn grow" id="pdfBtn">🖨 Print / PDF</button>

  `);
  $('#closeBtn').onclick=closeSheet;
  $('#csvBtn').onclick=()=>exportCSV(prof,per,T||[],E||[]);
  $('#pdfBtn').onclick=()=>exportPDF(prof,per,T||[],E||[],mile,exp);
  $('#approveBtn')&&($('#approveBtn').onclick=()=>approveSubmission(baId,per.id,T,E));
  document.querySelectorAll('[data-rej]').forEach(b=>b.onclick=()=>rejectItem(b.dataset.rej,b.dataset.id,baId));
}
async function approveSubmission(baId,periodId,T,E){
  if(!confirm('Approve all submitted items for this BA this period?')) return;
  // approve ONLY submitted items (never sweep in un-submitted drafts or rejected)
  const subMile=(T||[]).filter(x=>x.status==='submitted').reduce((a,x)=>a+ +x.amount,0);
  const subExp =(E||[]).filter(x=>x.status==='submitted').reduce((a,x)=>a+ +x.amount,0);
  const { error:e1 }=await supabase.from('trips').update({status:'approved'}).eq('ba_id',baId).eq('period_id',periodId).eq('status','submitted');
  if(e1) return toast('Approve failed: '+e1.message,'err');
  const { error:e2 }=await supabase.from('expenses').update({status:'approved'}).eq('ba_id',baId).eq('period_id',periodId).eq('status','submitted');
  if(e2) return toast('Approve failed: '+e2.message,'err');
  const { error:e3 }=await supabase.from('submissions').update({status:'approved',approved_by:state.session.user.id,approved_at:new Date().toISOString(),
    totals:{mileage:subMile,expenses:subExp,total:subMile+subExp}}).eq('ba_id',baId).eq('period_id',periodId);
  if(e3) return toast('Approve failed: '+e3.message,'err');
  toast('Approved','ok'); closeSheet(); drawAdmin();
}
async function rejectItem(kind,id,baId){
  const note=prompt('Reason for rejection (the BA will see this):'); if(note===null) return;
  await supabase.from(kind).update({status:'rejected',reject_note:note}).eq('id',id);
  toast('Item rejected'); adminBaDetail(baId);
}

/* ── exports ── */
function exportCSV(prof,per,T,E){
  const rows=[['Type','Date','Dispensary','Detail','Miles','Rate','Amount','Status','Note']];
  T.forEach(x=>rows.push(['Mileage',x.trip_date,dispName(x.dispensary_id),x.method,x.miles??'',x.rate??'',Number(x.amount||0).toFixed(2),x.status,x.note||'']));
  E.forEach(x=>rows.push(['Expense',x.expense_date,dispName(x.dispensary_id),`${x.vendor||''} (${x.category||''})`,'','',Number(x.amount||0).toFixed(2),x.status,x.note||'']));
  const mile=T.reduce((a,x)=>a+ +x.amount,0),exp=E.reduce((a,x)=>a+ +x.amount,0);
  rows.push([]); rows.push(['','','','','','Mileage',mile.toFixed(2)]);
  rows.push(['','','','','','Expenses',exp.toFixed(2)]); rows.push(['','','','','','TOTAL',(mile+exp).toFixed(2)]);
  const csv=rows.map(r=>r.map(c=>{let s=String(c??'');
    if(/^[=+\-@\t\r]/.test(s)) s="'"+s;                       // neutralize spreadsheet formula injection
    return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  const name=`reimbursement_${(prof.full_name||prof.email).replace(/\W+/g,'_')}_${per.start_date}.csv`;
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=name; a.click();
}
function exportPDF(prof,per,T,E,mile,exp){
  const tr=T.map(x=>`<tr><td>${fmtDate(x.trip_date)}</td><td>${esc(dispName(x.dispensary_id))}</td><td>${x.method}</td><td style="text-align:right">${x.miles??''}</td><td style="text-align:right">${money(x.amount)}</td></tr>`).join('');
  const er=E.map(x=>`<tr><td>${fmtDate(x.expense_date)}</td><td>${esc(x.vendor||'')} — ${esc(x.category||'')}</td><td>${esc(dispName(x.dispensary_id))}</td><td></td><td style="text-align:right">${money(x.amount)}</td></tr>`).join('');
  $('#printarea').innerHTML=`
    <h2 style="margin:0">Wizard Trees — Reimbursement</h2>
    <p style="margin:4px 0 0">${esc(prof.full_name||prof.email)} &nbsp;·&nbsp; ${esc(per.label)}</p>
    <h3>Mileage — ${money(mile)}</h3>
    <table style="width:100%;border-collapse:collapse" border="1" cellpadding="5"><tr><th>Date</th><th>Dispensary</th><th>Method</th><th>Miles</th><th>Amount</th></tr>${tr||'<tr><td colspan=5>none</td></tr>'}</table>
    <h3>Expenses — ${money(exp)}</h3>
    <table style="width:100%;border-collapse:collapse" border="1" cellpadding="5"><tr><th>Date</th><th>Vendor</th><th>Dispensary</th><th></th><th>Amount</th></tr>${er||'<tr><td colspan=5>none</td></tr>'}</table>
    <h2 style="text-align:right;margin-top:16px">Total: ${money(mile+exp)}</h2>
    <p style="color:#666;font-size:12px">Receipt images are stored in the app; open each expense to view.</p>`;
  window.print();
}

/* ── Admin: review queue ── */
async function adminReview(m){
  m.innerHTML=`<div class="loading"><span class="spin"></span></div>`;
  const {data:subs}=await supabase.from('submissions').select('*, profiles!submissions_ba_id_fkey(full_name,email), pay_periods(label,start_date)').eq('status','submitted').order('submitted_at');
  const list=subs||[];
  m.innerHTML=`<div class="card"><h3>Awaiting approval · ${list.length}</h3>
    ${list.length?list.map(s=>`<div class="item" data-ba="${s.ba_id}" data-per="${s.period_id}" style="cursor:pointer">
      <div class="ic">⏳</div>
      <div class="grow"><div class="t">${esc(s.profiles?.full_name||s.profiles?.email||'BA')}</div>
        <div class="s">${esc(s.pay_periods?.label||'')} · submitted ${s.submitted_at?new Date(s.submitted_at).toLocaleDateString():''}</div></div>
      <div class="amt">${money(s.totals?.total||0)}</div></div>`).join('')
      :'<p class="muted small">Nothing awaiting approval. 🎉</p>'}</div>`;
  m.querySelectorAll('[data-ba]').forEach(el=>el.onclick=()=>{
    state.period = state.periods.find(p=>p.id===el.dataset.per) || state.period;
    adminBaDetail(el.dataset.ba);
  });
}

/* ── Admin: settings ── */
async function adminSettings(m){
  m.innerHTML=`<div class="loading"><span class="spin"></span></div>`;
  const [{data:bas},{data:disp}]=await Promise.all([
    supabase.from('profiles').select('*').order('role',{ascending:false}).order('full_name'),
    supabase.from('dispensaries').select('*').order('name'),
  ]);
  const rate=Number(state.settings?.mileage_rate??0.725);
  m.innerHTML=`
    <div class="card">
      <h3>Mileage rate</h3>
      <div class="row"><span class="muted small">$ per mile</span>
        <input id="setRate" type="number" step="0.001" value="${rate}" style="max-width:120px">
        <button class="btn sm primary" id="setRateBtn">Save</button></div>
      <p class="small muted">2026 IRS business rate is $0.725/mi.</p>
    </div>
    <div class="card">
      <h3>Pay periods</h3>
      <div class="row wrap">${state.periods.slice(0,6).map(p=>`<span class="pill">${esc(p.label)}${p.status==='closed'?' ·closed':''}</span>`).join(' ')||'<span class="muted small">none</span>'}</div>
      <button class="btn sm block" id="genPer" style="margin-top:10px">Ensure current + next period exist</button>
    </div>
    <div class="card">
      <div class="row"><h3 class="grow">Brand ambassadors</h3><button class="btn sm primary" id="addBa">+ Add</button></div>
      ${(bas||[]).map(b=>`<div class="item">
        <div class="ic">${(b.full_name||'?').slice(0,1).toUpperCase()}</div>
        <div class="grow"><div class="t">${esc(b.full_name||b.email)} ${b.role==='admin'?'<span class="pill admin">admin</span>':(b.region?`<span class="pill">${esc(b.region)} BA</span>`:'')}${b.active?'':' <span class="muted small">· inactive</span>'}</div>
          <div class="s">${esc(b.email)}</div>
          <div class="s">🏠 ${b.base_address?esc(b.base_address):'<span class="muted">no home address</span>'}</div></div>
        <button class="btn sm ghost" data-edit="${b.id}">Edit</button>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="row"><h3 class="grow">Dispensaries</h3><button class="btn sm primary" id="addDisp">+ Add</button></div>
      ${(()=>{
        const by={}; (disp||[]).forEach(d=>{ const k=d.state||''; (by[k]=by[k]||[]).push(d); });
        const item=d=>`<div class="item">
          <div class="ic">🏬</div>
          <div class="grow"><div class="t">${esc(d.name)}${d.active?'':' <span class="muted small">· inactive</span>'}</div>
            <div class="s">${d.legal_name?esc(d.legal_name)+' · ':''}${esc(d.address||'no address')}</div></div>
          <button class="btn sm ghost" data-disp="${d.id}">Edit</button></div>`;
        const secs=[['CA','California'],['NY','New York'],['FL','Florida'],['','⚠ No state']]
          .filter(([k])=>by[k]&&by[k].length).map(([k,label])=>{
            const open=!!state.dispOpen[k];
            return `<div><div class="dghead" data-dg="${k}"><span class="caret">${open?'▾':'▸'}</span>
              <b>${label}</b><span class="muted small">· ${by[k].length}</span></div>
              ${open?`<div class="dgbody">${by[k].map(item).join('')}</div>`:''}</div>`;
          }).join('');
        return secs||'<p class="muted small">None yet.</p>';
      })()}
    </div>`;
  $('#setRateBtn').onclick=async ()=>{ const v=Number($('#setRate').value);
    const {error}=await supabase.from('app_settings').update({mileage_rate:v,updated_at:new Date().toISOString()}).eq('id',1);
    if(error)return toast(error.message,'err'); state.settings.mileage_rate=v; toast('Rate saved','ok'); };
  $('#genPer').onclick=async ()=>{ const len=state.settings?.period_length_days||14;
    await supabase.rpc('ensure_period',{d:todayISO()});
    const next=new Date(); next.setDate(next.getDate()+len);
    await supabase.rpc('ensure_period',{d:next.toISOString().slice(0,10)});
    await loadMe(); toast('Periods ready','ok'); drawAdmin(); };
  $('#addBa').onclick=addBaSheet;
  $('#addDisp').onclick=()=>dispSheet(null);
  m.querySelectorAll('[data-dg]').forEach(el=>el.onclick=()=>{ const k=el.dataset.dg; state.dispOpen[k]=!state.dispOpen[k]; adminSettings(m); });
  m.querySelectorAll('[data-disp]').forEach(b=>b.onclick=()=>dispSheet((disp||[]).find(d=>d.id===b.dataset.disp)));
  m.querySelectorAll('[data-edit]').forEach(el=>el.onclick=()=>editBaSheet((bas||[]).find(x=>x.id===el.dataset.edit)));
}
function addBaSheet(){
  openSheet(`<h3>Add a brand ambassador</h3>
    <label class="fl">Full name</label><input id="nName">
    <label class="fl">Email (their login)</label><input id="nEmail" type="email" inputmode="email">
    <label class="fl">Phone (optional)</label><input id="nPhone" inputmode="tel">
    <label class="fl">Home / base address (optional)</label><textarea id="nAddr"></textarea>
    <label class="fl">Temporary password (8+)</label><input id="nPw" value="${'wt-'+Math.random().toString(36).slice(2,8)}">
    <label class="fl">Role</label><select id="nRole">
      <option value="ba|CA">CA Brand Ambassador</option>
      <option value="ba|FL">FL Brand Ambassador</option>
      <option value="ba|NY">NY Brand Ambassador</option>
      <option value="admin|">Admin</option>
    </select>
    <button class="btn primary block" id="nSave" style="margin-top:14px">Create account</button>
    <button class="btn ghost block" id="nCancel" style="margin-top:8px">Cancel</button>`);
  $('#nCancel').onclick=closeSheet;
  $('#nSave').onclick=async ()=>{
    const email=$('#nEmail').value.trim(), password=$('#nPw').value;
    if(!email||password.length<8) return toast('Email + 8-char password required','err');
    const [role, region] = $('#nRole').value.split('|');
    const btn=$('#nSave'); busy(btn,true);
    try{
      const res=await callFn('admin-create-ba',{email,password,full_name:$('#nName').value,phone:$('#nPhone').value,base_address:$('#nAddr').value,role,region:region||null});
      if(region && res?.user_id){ await supabase.from('profiles').update({region}).eq('id',res.user_id); }
      toast('Account created','ok'); closeSheet();
      openSheet(`<h3>Account created ✓</h3><p class="small">Give them these credentials — they’ll set their own password on first sign-in:</p>
        <div class="card"><div class="small">Email</div><b>${esc(email)}</b><div class="small" style="margin-top:8px">Temp password</div><b>${esc(password)}</b></div>
        <button class="btn primary block" id="okBtn" style="margin-top:12px">Done</button>`);
      $('#okBtn').onclick=()=>{closeSheet();drawAdmin();};
    }catch(e){ toast(e.message,'err'); busy(btn,false); }
  };
}
function editBaSheet(b){
  if(!b) return;
  const isSelf = b.id===state.session.user.id;
  const roleVal = b.role==='admin' ? 'admin|' : 'ba|'+(b.region||'CA');
  openSheet(`<h3>Edit ${esc(b.full_name||b.email)}</h3>
    <div class="small muted">${esc(b.email)}</div>
    <label class="fl">Full name</label><input id="euName" value="${esc(b.full_name||'')}">
    <label class="fl">Home / base address <span class="muted">(private — only ${esc((b.full_name||'this user').split(' ')[0])} + admins can see it)</span></label>
    <textarea id="euAddr" placeholder="123 Main St, City, CA">${esc(b.base_address||'')}</textarea>
    <label class="fl">Role</label>
    <select id="euRole">
      <option value="ba|CA" ${roleVal==='ba|CA'?'selected':''}>CA Brand Ambassador</option>
      <option value="ba|FL" ${roleVal==='ba|FL'?'selected':''}>FL Brand Ambassador</option>
      <option value="ba|NY" ${roleVal==='ba|NY'?'selected':''}>NY Brand Ambassador</option>
      <option value="admin|" ${b.role==='admin'?'selected':''}>Admin</option>
    </select>
    <label class="fl">Status</label>
    <select id="euActive"><option value="true" ${b.active?'selected':''}>Active</option><option value="false" ${!b.active?'selected':''}>Inactive</option></select>
    ${isSelf?'<div class="small muted" style="margin-top:8px">This is your own account — you can’t remove your own admin access or deactivate yourself here.</div>':''}
    <button class="btn primary block" id="euSave" style="margin-top:14px">Save</button>
    <button class="btn ghost block" id="euCancel" style="margin-top:8px">Cancel</button>`);
  $('#euCancel').onclick=closeSheet;
  $('#euSave').onclick=async ()=>{
    const [role,region]=$('#euRole').value.split('|');
    if(isSelf && (role!=='admin' || $('#euActive').value!=='true')) return toast('You can’t demote or deactivate your own account','err');
    const addr=$('#euAddr').value;
    const patch={ full_name:$('#euName').value, base_address:addr||null, role, region:region||null, active:$('#euActive').value==='true' };
    if((addr||'')!==(b.base_address||'')){ patch.base_lat=null; patch.base_lng=null; } // re-geocode on next auto-distance
    const btn=$('#euSave'); busy(btn,true);
    const { error }=await supabase.from('profiles').update(patch).eq('id',b.id);
    busy(btn,false);
    if(error) return toast(error.message,'err');
    if(isSelf) Object.assign(state.profile,patch);
    toast('Saved','ok'); closeSheet(); adminSettings($('#main'));
  };
}
function dispSheet(d){
  const edit=!!d;
  openSheet(`<h3>${edit?'Edit':'Add'} dispensary</h3>
    <label class="fl">Name <span class="muted">(DBA / storefront)</span></label><input id="dName" value="${esc(d?.name||'')}">
    <label class="fl">Legal name <span class="muted">(optional)</span></label><input id="dLegal" value="${esc(d?.legal_name||'')}">
    <label class="fl">State <span class="muted">(only this state's BAs will see it)</span></label>
    <select id="dState"><option value="">Select state…</option>
      ${REGIONS.map(r=>`<option value="${r}" ${d?.state===r?'selected':''}>${r}</option>`).join('')}
    </select>
    <label class="fl">Address</label><textarea id="dAddr" placeholder="full street address for auto-mileage">${esc(d?.address||'')}</textarea>
    <label class="fl">License # (optional)</label><input id="dLic" value="${esc(d?.license||'')}">
    ${edit?`<label class="fl">Active</label><select id="dActive"><option value="true" ${d.active?'selected':''}>Active</option><option value="false" ${!d.active?'selected':''}>Inactive</option></select>`:''}
    <button class="btn primary block" id="dSave" style="margin-top:14px">${edit?'Save':'Add'}</button>
    <button class="btn ghost block" id="dCancel" style="margin-top:8px">Cancel</button>`);
  $('#dCancel').onclick=closeSheet;
  $('#dSave').onclick=async ()=>{
    const name=$('#dName').value.trim(); if(!name) return toast('Name required','err');
    const st=$('#dState').value; if(!st) return toast('Pick a state','err');
    const addrChanged = !edit || ($('#dAddr').value||'')!==(d.address||'');
    const patch={ name, legal_name:$('#dLegal').value||null, state:st, address:$('#dAddr').value||null, license:$('#dLic').value||null };
    if(edit) patch.active = $('#dActive').value==='true';
    if(addrChanged){ patch.lat=null; patch.lng=null; } // re-geocode on next distance calc
    let error;
    if(edit) ({error}=await supabase.from('dispensaries').update(patch).eq('id',d.id));
    else     ({error}=await supabase.from('dispensaries').insert({...patch,created_by:state.session.user.id}));
    if(error) return toast(error.message,'err');
    toast('Saved','ok'); closeSheet(); adminSettings($('#main'));
  };
}

boot();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
