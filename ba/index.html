<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0f1115">
<title>Wizard Trees — Mileage & Expenses</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WT Field">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --text:#e7eaf0; --muted:#9aa3b2; --accent:#7c5cff; --accent2:#9d86ff;
    --green:#2fbf71; --yellow:#e7b416; --orange:#f08a24; --red:#ef4d56;
    --shadow:0 6px 24px rgba(0,0,0,.35);
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
  a{color:var(--accent2);text-decoration:none}
  .muted{color:var(--muted)} .small{font-size:12px} .center{text-align:center}
  .row{display:flex;gap:10px;align-items:center} .row.wrap{flex-wrap:wrap}
  .grow{flex:1} .right{margin-left:auto}
  .hide{display:none!important}

  /* layout */
  #app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;padding:12px 14px;
    background:rgba(15,17,21,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
  .brand b{font-size:15px} .brand .sub{color:var(--muted);font-size:11px}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;
    border:1px solid var(--line);background:var(--panel2);color:var(--muted)}
  .pill.admin{color:#fff;background:var(--accent);border-color:var(--accent)}
  main{flex:1;padding:14px 14px calc(96px + var(--safe-b));display:flex;flex-direction:column;gap:14px}

  /* cards & controls */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 10px;font-size:14px}
  label.fl{display:block;font-size:12px;color:var(--muted);margin:10px 0 5px;font-weight:600}
  input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:11px 12px;font:inherit;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  input.needs,select.needs,textarea.needs{border-color:var(--red);box-shadow:0 0 0 2px rgba(239,77,86,.22)}
  textarea{min-height:60px;resize:vertical}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:11px;
    padding:12px 15px;cursor:pointer;font:inherit;font-weight:650;display:inline-flex;align-items:center;
    justify-content:center;gap:8px;min-height:46px}
  .btn:hover{border-color:var(--accent)} .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.ghost{background:transparent}
  .btn.danger{color:#fff;background:var(--red);border-color:var(--red)}
  .btn.ok{color:#fff;background:var(--green);border-color:var(--green)}
  .btn.sm{min-height:34px;padding:6px 11px;border-radius:9px;font-size:13px}
  .btn.block{width:100%} .btn:disabled{opacity:.5;cursor:not-allowed}
  .seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px;gap:4px}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font:inherit;font-weight:650;
    padding:9px;border-radius:8px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}

  /* big action buttons (BA home) */
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .bigbtn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:22px 10px;border-radius:16px;
    background:var(--panel);border:1px solid var(--line);cursor:pointer;font:inherit;color:var(--text);box-shadow:var(--shadow)}
  .bigbtn:hover{border-color:var(--accent)} .bigbtn .ic{font-size:30px}
  .bigbtn b{font-size:15px}

  /* totals */
  .totbar{display:flex;gap:8px}
  .tot{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px 9px}
  .tot .k{font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tot .v{font-size:clamp(13px,4vw,20px);font-weight:750;margin-top:2px;white-space:nowrap}
  .tot.sum .v{color:var(--accent2)}

  /* list items */
  .item{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--line)}
  .item:first-child{border-top:0}
  .item .ic{width:34px;height:34px;border-radius:9px;background:var(--panel2);display:flex;align-items:center;
    justify-content:center;font-size:17px;flex:none}
  .item .t{font-weight:600} .item .s{font-size:12px;color:var(--muted)}
  .item .amt{margin-left:auto;font-weight:700;white-space:nowrap}
  .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .badge.draft{color:var(--muted)} .badge.submitted{color:var(--yellow);border-color:var(--yellow)}
  .badge.approved{color:var(--green);border-color:var(--green)}
  .badge.rejected{color:var(--red);border-color:var(--red)}
  .thumb{width:42px;height:42px;border-radius:8px;object-fit:cover;background:var(--panel2);flex:none;border:1px solid var(--line)}

  /* bottom tab bar (BA) */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;max-width:560px;margin:0 auto;
    display:flex;background:rgba(23,26,33,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);
    padding-bottom:var(--safe-b)}
  .tabbar button{flex:1;border:0;background:transparent;color:var(--muted);font:inherit;font-size:11px;
    font-weight:650;padding:9px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .tabbar button .ic{font-size:20px}
  .tabbar button.on{color:var(--accent2)}

  /* modal */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;align-items:flex-end;
    justify-content:center}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;
    max-width:560px;max-height:92vh;overflow:auto;padding:16px 16px calc(20px + var(--safe-b))}
  @media(min-width:560px){.backdrop{align-items:center}.sheet{border-radius:18px}}
  .sheet h3{margin:2px 0 4px}

  /* toast */
  #toast{position:fixed;left:50%;bottom:calc(86px + var(--safe-b));transform:translateX(-50%);z-index:80;
    background:#000;border:1px solid var(--line);color:#fff;padding:10px 15px;border-radius:11px;font-size:13px;
    box-shadow:var(--shadow);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:90%}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  #toast.err{border-color:var(--red)} #toast.ok{border-color:var(--green)}

  /* spinner */
  .spin{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;
    animation:sp .7s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}
  .loading{display:flex;align-items:center;gap:10px;color:var(--muted);justify-content:center;padding:24px}

  /* admin table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  td.num,th.num{text-align:right;white-space:nowrap}

  /* collapsible dispensary groups */
  .dghead{display:flex;align-items:center;gap:8px;padding:11px 2px;cursor:pointer;border-top:1px solid var(--line);user-select:none}
  .dghead .caret{color:var(--muted);width:12px;text-align:center;flex:none}
  .dghead b{font-size:14px} .dghead:hover b{color:var(--accent2)}
  .dgbody{border-top:1px solid var(--line)}

  /* admin view switcher */
  .vswitch{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:9px 14px;border-bottom:1px solid var(--line)}

  /* spreadsheet-style quick-entry grid */
  .gridwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:10px}
  table.grid{border-collapse:collapse;min-width:560px;width:100%}
  table.grid th{background:var(--panel2);color:var(--muted);font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;
    font-weight:700;padding:6px 7px;white-space:nowrap;text-align:left;border-bottom:1px solid var(--line)}
  table.grid td{padding:0;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
  table.grid td:last-child{border-right:0}
  table.grid input{border:0;border-radius:0;background:transparent;padding:8px 7px;font:inherit;font-size:13px;min-height:38px}
  table.grid input:focus{background:var(--panel2);box-shadow:inset 0 0 0 1.5px var(--accent)}
  table.grid input.gnum{width:78px;text-align:right} table.grid input.gdate{width:124px}
  table.grid select{border:0;background:transparent;color:var(--text);font:inherit;font-size:13px;padding:8px 6px;min-height:38px;width:100%;min-width:118px}
  table.grid select:focus{background:var(--panel2);box-shadow:inset 0 0 0 1.5px var(--accent)}
  .rcell{display:flex;align-items:center;gap:6px;padding:4px 7px;min-height:38px}
  .rchip{cursor:pointer;color:var(--accent2);font-size:12px;white-space:nowrap}
  .rthumb{width:30px;height:30px;border-radius:5px;object-fit:cover;border:1px solid var(--line);cursor:pointer;flex:none}
  .rrepl{cursor:pointer;color:var(--muted);font-size:14px}
  .floatsug{position:fixed;z-index:120;box-shadow:var(--shadow);max-width:340px}
  table.grid th:first-child,table.grid td.gdel{width:26px;padding:0;text-align:center}
  .gx{border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;padding:8px 3px;line-height:1}
  .gx:hover{color:var(--red)}

  /* starting-location typeahead */
  .tsug{border:1px solid var(--line);border-radius:10px;margin-top:6px;overflow:hidden;background:var(--panel2);max-height:240px;overflow-y:auto}
  .tsug .sg{display:flex;flex-direction:column;gap:1px;padding:9px 12px;cursor:pointer;border-top:1px solid var(--line)}
  .tsug .sg:first-child{border-top:0}
  .tsug .sg:hover{background:var(--panel)}
  .tsug .sg b{font-size:13px;font-weight:600} .tsug .sg span{font-size:11px;color:var(--muted)}
  .tsug .sg.searching{flex-direction:row;align-items:center;gap:8px;color:var(--muted);cursor:default;font-size:12.5px}
  .tsug .sg.searching .spin{width:13px;height:13px}

  .auth-wrap{min-height:100%;display:flex;flex-direction:column;justify-content:center;padding:24px 18px;gap:16px;max-width:420px;margin:0 auto}
  .hero{text-align:center} .hero .logo{width:56px;height:56px;border-radius:15px;margin:0 auto 12px;font-size:28px}
  @media print{ body *{visibility:hidden} #printarea,#printarea *{visibility:visible}
    #printarea{position:absolute;inset:0;padding:24px;color:#000;background:#fff} }
  #printarea{display:none}
</style>
</head>
<body>
<div id="app"><div class="loading"><span class="spin"></span> Loading…</div></div>
<div id="toast"></div>
<div id="printarea"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

/* ─────────────────────────── config ─────────────────────────── */
// Paste your Supabase project URL + anon (public) key below, OR set them once at
// runtime via the gear on the sign-in screen (saved to this device's localStorage).
const CONFIG = {
  url:  localStorage.getItem('ba.url')  || 'https://dhiqhgtmelxwelyoowle.supabase.co',
  anon: localStorage.getItem('ba.anon') || 'sb_publishable_FtScmtn1C0tE1bwUsavJFg_koiVEu14',
};
const CONFIGURED = !/YOUR-PROJECT|YOUR-ANON-KEY/.test(CONFIG.url + CONFIG.anon);

let supabase = null;
if (CONFIGURED) {
  supabase = createClient(CONFIG.url, CONFIG.anon, {
    auth: { persistSession: true, autoRefreshToken: true, experimental: { passkey: true } },
  });
}

/* ─────────────────────────── state ─────────────────────────── */
const state = {
  session: null, profile: null, settings: null, loadError: null,
  period: null, periods: [], dispensaries: [],
  baTab: 'home', adminTab: 'dash', adminRegion: 'all', dispOpen: {}, preview: null, gridMode: 'miles', recentPlaces: [],
};
const REGIONS = ['CA','FL','NY'];
const EXPENSE_CATEGORIES = ['Travel','Tolls','Parking','Meals','Flights','Lodging','Displays','Supplies','Other'];
const PAYMENTS = [['reimbursement','💵 Reimburse me'],['company','💳 Company card']];
function expSplit(E){ let reimb=0, card=0; (E||[]).forEach(x=>{ if(x.payment==='company') card+=Number(x.amount||0); else reimb+=Number(x.amount||0); }); return {reimb, card}; }

/* ─────────────────────────── helpers ─────────────────────────── */
const $ = (s, r=document) => r.querySelector(s);
const app = $('#app');
const money = n => '$' + (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const todayISO = () => { const d=new Date(); return new Date(d.getTime()-d.getTimezoneOffset()*6e4).toISOString().slice(0,10); };
const fmtDate = s => s ? new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';

function toast(msg, kind='') {
  const t = $('#toast'); t.textContent = msg; t.className = 'show ' + kind;
  clearTimeout(toast._t); toast._t = setTimeout(()=>{ t.className=''; }, 2600);
}
function dispName(id){ const d = state.dispensaries.find(x=>x.id===id); return d? d.name : '—'; }
// dispensaries a BA can pick: only those in their region (admins/region-less see all)
function baDispensaries(){ const r = state.preview || state.profile?.region; return state.dispensaries.filter(d => !r || d.state === r); }
function busy(btn, on){ if(!btn) return; btn.disabled=on; btn.dataset._txt ??= btn.innerHTML;
  btn.innerHTML = on ? '<span class="spin"></span>' : btn.dataset._txt; }

async function compress(file, max=1600, q=0.7){
  try{
    const bmp = await createImageBitmap(file);
    let {width:w,height:h}=bmp;
    if(Math.max(w,h)>max){ const s=max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(bmp,0,0,w,h);
    return await new Promise(r=>c.toBlob(r,'image/jpeg',q));
  }catch(e){ return file; } // fall back to original if decode fails
}
async function uploadPhoto(bucket, file){
  const blob = await compress(file);
  const path = `${state.session.user.id}/${crypto.randomUUID()}.jpg`;
  const { error } = await supabase.storage.from(bucket).upload(path, blob, { contentType:'image/jpeg', upsert:false });
  if(error) throw error;
  return path;
}
async function signedUrl(bucket, path, secs=3600){
  if(!path) return null;
  const { data } = await supabase.storage.from(bucket).createSignedUrl(path, secs);
  return data?.signedUrl || null;
}
async function callFn(name, body){
  const { data, error } = await supabase.functions.invoke(name, { body });
  if(error){ // surface the function's JSON error message if present
    let msg = error.message;
    try{ const j = await error.context?.json?.(); if(j?.message||j?.error) msg = j.message||j.error; }catch{}
    throw new Error(msg);
  }
  return data;
}

/* ─────────────────────────── boot ─────────────────────────── */
async function boot(){
  if(!CONFIGURED) return renderConfig();
  const { data:{ session } } = await supabase.auth.getSession();
  state.session = session;
  supabase.auth.onAuthStateChange((_e, s)=>{ state.session = s; if(!s){ state.profile=null; render(); } });
  if(session) await loadMe();
  render();
}
async function loadMe(){
  try{
    const { data: prof, error } = await supabase.from('profiles').select('*').eq('id', state.session.user.id).single();
    if(error || !prof){ state.loadError = error?.message || 'Your profile could not be found.'; state.profile=null; return; }
    state.loadError = null; state.profile = prof;
    const { data: s } = await supabase.from('app_settings').select('*').eq('id',1).single();
    state.settings = s;
    // make sure today's period exists, then load periods + dispensaries
    await supabase.rpc('ensure_period');
    const { data: per } = await supabase.from('pay_periods').select('*').order('start_date',{ascending:false});
    state.periods = per||[];
    const _t = todayISO();
    state.period = state.periods.find(p=>p.start_date<=_t && p.end_date>=_t)   // current
      || state.periods.find(p=>p.end_date<_t)                                  // else most recent past (never default to a future period)
      || state.periods[0] || null;
    const { data: disp } = await supabase.from('dispensaries').select('*').eq('active',true).order('name');
    state.dispensaries = disp||[];
    // recent start/destination labels for the trip autocomplete
    const { data: rt } = await supabase.from('trips').select('start_label,dest_label').eq('ba_id',state.session.user.id).order('created_at',{ascending:false}).limit(60);
    const places=new Set(); (rt||[]).forEach(t=>{ if(t.start_label)places.add(t.start_label); if(t.dest_label)places.add(t.dest_label); });
    state.recentPlaces=[...places].filter(p=>p&&p!=='📍 Current location').slice(0,30);
  }catch(e){ state.loadError = String(e?.message||e); state.profile=null; }
}
// refresh the cached pay-period list (e.g. periods added since the app loaded)
async function reloadPeriods(){
  const { data } = await supabase.from('pay_periods').select('*').order('start_date',{ascending:false});
  if(data && data.length) state.periods=data;
}
// after saving an item, make sure the selected period covers that item's date so
// it's actually visible (a back/forward-dated item lands in a different period).
async function ensurePeriodForDate(date){
  try{
    await supabase.rpc('ensure_period', { d: date });
    const { data } = await supabase.from('pay_periods').select('*').order('start_date',{ascending:false});
    state.periods = data || state.periods;
    const p = state.periods.find(x=>x.start_date<=date && x.end_date>=date);
    if(p) state.period = p;
  }catch{}
}

/* ─────────────────────────── render router ─────────────────────────── */
function render(){
  if(!CONFIGURED) return renderConfig();
  if(!state.session) return renderLogin();
  if(state.loadError) return renderLoadError();
  if(!state.profile) { app.innerHTML = '<div class="loading"><span class="spin"></span> Loading your profile…</div>'; return; }
  if(state.profile.must_change_password) return renderChangePw(true);
  if(state.profile.role === 'admin' && !state.preview) return renderAdmin();
  return renderBA();
}
function renderLoadError(){
  app.innerHTML = `<div class="auth-wrap">
    <div class="hero"><div class="logo">⚠️</div><h2>Couldn’t load your account</h2>
      <p class="muted small">${esc(state.loadError||'')}</p></div>
    <div class="card">
      <button class="btn primary block" id="retry">Retry</button>
      <button class="btn ghost block" id="so" style="margin-top:8px">Sign out</button>
    </div></div>`;
  $('#retry').onclick = async ()=>{ app.innerHTML='<div class="loading"><span class="spin"></span></div>'; await loadMe(); render(); };
  $('#so').onclick = async ()=>{ await supabase.auth.signOut(); state.profile=null; state.loadError=null; render(); };
}
// passkeys need: the browser API, AND the experimental supabase-js methods actually present
const hasPasskey = ()=> !!(window.PublicKeyCredential && supabase?.auth
  && typeof supabase.auth.signInWithPasskey === 'function'
  && typeof supabase.auth.registerPasskey === 'function');

/* ─────────────────────────── config screen ─────────────────────────── */
function renderConfig(){
  app.innerHTML = `<div class="auth-wrap">
    <div class="hero"><div class="logo">🌲</div><h2>Connect to Supabase</h2>
      <p class="muted small">One-time setup on this device. Paste your project URL and anon (public) key.</p></div>
    <div class="card">
      <label class="fl">Project URL</label><input id="cfgUrl" placeholder="https://abcd.supabase.co">
      <label class="fl">Anon public key</label><input id="cfgAnon" placeholder="eyJhbGci…">
      <button class="btn primary block" id="cfgSave" style="margin-top:14px">Save &amp; continue</button>
    </div></div>`;
  $('#cfgSave').onclick = ()=>{
    const u=$('#cfgUrl').value.trim(), a=$('#cfgAnon').value.trim();
    if(!u||!a) return toast('Both fields required','err');
    localStorage.setItem('ba.url',u); localStorage.setItem('ba.anon',a); location.reload();
  };
}

/* ─────────────────────────── auth screens ─────────────────────────── */
function renderLogin(){
  const canPasskey = hasPasskey();
  app.innerHTML = `<div class="auth-wrap">
    <div class="hero"><div class="logo">🌲</div><h2>Wizard Trees</h2>
      <p class="muted small">Mileage &amp; expense tracking for brand ambassadors</p></div>
    <div class="card">
      <label class="fl">Email</label><input id="email" type="email" autocomplete="username" inputmode="email">
      <label class="fl">Password</label><input id="pw" type="password" autocomplete="current-password">
      <button class="btn primary block" id="signin" style="margin-top:14px">Sign in</button>
      ${canPasskey ? `<button class="btn block ghost" id="passkey" style="margin-top:10px">🔓 Use Face ID / fingerprint</button>` : ``}

}

// Pay-period phase relative to today, and who may edit it.
function actingAsBA(){ return !!state.preview || state.profile?.role!=='admin'; }
function periodPhase(p){ if(!p) return 'none'; const t=todayISO(); if(p.start_date>t) return 'future'; if(p.end_date<t) return 'past'; return 'current'; }
// In the BA surface only the current, open period is editable; upcoming/past are view-only
// (admins manage those from the admin tools). A real admin outside preview always passes.
function canEditPeriod(p){ if(!actingAsBA()) return true; return periodPhase(p)==='current' && p?.status!=='closed'; }

function periodPicker(onChange, opts={}){
  let list = state.periods;
  if(opts.hideFuture) list = list.filter(p=>periodPhase(p)!=='future');   // BAs can't pick a not-yet-started period
  if(!list.length) list = state.periods;                                  // never render an empty picker
  const html = list.map(p=>{
    const tag = p.status==='closed' ? ' (closed)' : (opts.hideFuture && periodPhase(p)==='past' ? ' (view only)' : '');
    return `<option value="${p.id}" ${state.period?.id===p.id?'selected':''}>${esc(p.label)}${tag}</option>`;
  }).join('');
  setTimeout(()=>{ const s=$('#perSel'); if(s) s.onchange=()=>{ state.period = state.periods.find(p=>p.id===s.value); onChange(); }; },0);
  return `<select id="perSel">${html||'<option>No periods</option>'}</select>`;
}

/* ═══════════════════════════ BA SURFACE ═══════════════════════════ */
function renderBA(){
  app.innerHTML = topbar() + viewSwitcher() + `<main id="main"></main>` + baTabs();

  $('#tab-home').onclick=()=>{state.baTab='home';drawBA();};
  $('#tab-trip').onclick=()=>tripSheet();
  $('#tab-exp').onclick =()=>expenseSheet();

  drawBA();
}
function baTabs(){
  const on=t=>state.baTab===t?'on':'';

    <button id="tab-home" class="${on('home')}"><span class="ic">🏠</span>Home</button>
    <button id="tab-trip"><span class="ic">🚗</span>Trip</button>

    <button id="tab-loc" class="${on('loc')}"><span class="ic">📍</span>Locations</button>

}
async function drawBA(){
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.remove('on'));
  $(`#tab-${state.baTab==='loc'?'loc':'home'}`)?.classList.add('on');
  const m=$('#main');
  if(state.baTab==='loc') return drawLocations(m);
  // The BA surface never operates on a not-yet-started period
  if(actingAsBA() && periodPhase(state.period)==='future'){
    const _t=todayISO();
    state.period = state.periods.find(p=>p.start_date<=_t&&p.end_date>=_t)
      || state.periods.find(p=>p.end_date<_t) || state.period;
  }
  await flushGrid();                                  // commit pending grid edits before reading
  const seq = state._drawSeq = (state._drawSeq||0)+1; // latest render wins
  m.innerHTML = `<div class="loading"><span class="spin"></span></div>`;
  const per = state.period;
  const [trips, exps, sub] = await Promise.all([
    per ? supabase.from('trips').select('*').eq('ba_id',state.session.user.id).eq('period_id',per.id).order('trip_date',{ascending:false}) : {data:[]},
    per ? supabase.from('expenses').select('*').eq('ba_id',state.session.user.id).eq('period_id',per.id).order('expense_date',{ascending:false}) : {data:[]},
    per ? supabase.from('submissions').select('*').eq('ba_id',state.session.user.id).eq('period_id',per.id).maybeSingle() : {data:null},
  ]);
  if(seq !== state._drawSeq) return;                  // a newer drawBA superseded this fetch — don't clobber
  const T=trips.data||[], E=exps.data||[], S=sub?.data||null;
  state._T=T; state._E=E;
  const submittedLock = S && (S.status==='submitted'||S.status==='approved');
  const canEdit = canEditPeriod(per) && !submittedLock;
  const readOnly = !canEdit, phase = periodPhase(per);
  const items=[...T.map(x=>({...x,_k:'trip'})),...E.map(x=>({...x,_k:'exp'}))]
    .sort((a,b)=>(b.trip_date||b.expense_date).localeCompare(a.trip_date||a.expense_date));

  m.innerHTML = `
    <div class="card">
      <div class="row"><div class="small muted grow">Pay period</div>${periodPicker(drawBA,{hideFuture:actingAsBA()})}</div>
      <div class="totbar" id="totbar" style="margin-top:12px">${totbarTiles()}</div>
      <div id="cardline">${cardLineHtml()}</div>
      ${S?`<div class="small ${S.status==='approved'?'':'muted'}" style="margin-top:10px">
        Status: <span class="badge ${S.status}">${S.status}</span></div>`:''}
    </div>
    <div class="actions">
      <button class="bigbtn" id="ab-trip" ${readOnly?'disabled':''}><span class="ic">🚗</span><b>Log trip</b><span class="small muted">mileage</span></button>
      <button class="bigbtn" id="ab-exp" ${readOnly?'disabled':''}><span class="ic">🧾</span><b>Add expense</b><span class="small muted">snap a receipt</span></button>
    </div>
    ${readOnly?'':'<div id="gridcard"></div>'}
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:2px 10px">
        <h3 id="itemsHead" style="margin:0">This period · ${items.length} item${items.length===1?'':'s'}</h3>
        <div style="font-weight:750;white-space:nowrap">Total Reimburse: <span style="color:var(--accent2)" id="itemsReimb">${money(reimburseTotal())}</span></div>
      </div>
      <div id="items">${items.length?items.map(baItemRow).join(''):'<p class="muted small">Nothing logged yet. Tap “Log trip” or “Add expense”.</p>'}</div>
    </div>
    ${canEdit ? `<button class="btn ok block" id="submitBtn">Submit period for reimbursement</button>`:''}
    ${submittedLock ? `<p class="small muted center">Submitted ${S.submitted_at?('· '+new Date(S.submitted_at).toLocaleDateString()):''}. Locked from edits.</p>`
      : (readOnly && phase==='past')   ? `<p class="small muted center">📅 Past pay period — view only. Ask an admin to make changes.</p>`
      : (readOnly && phase==='future') ? `<p class="small muted center">📅 This pay period hasn’t started yet.</p>`
      : ''}
  `;
  $('#ab-trip')&&($('#ab-trip').onclick=()=>tripSheet());
  $('#ab-exp') &&($('#ab-exp').onclick =()=>expenseSheet());
  $('#submitBtn')&&($('#submitBtn').onclick=()=>submitPeriod());
  m.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delItem(b.dataset.kind,b.dataset.del));
  renderGrid();
}
function periodItems(){
  return [...(state._T||[]).map(x=>({...x,_k:'trip'})),...(state._E||[]).map(x=>({...x,_k:'exp'}))]
    .sort((a,b)=>(b.trip_date||b.expense_date).localeCompare(a.trip_date||a.expense_date));
}
function refreshItems(){
  const el=$('#items'); if(!el) return;
  const items=periodItems();
  el.innerHTML=items.length?items.map(baItemRow).join(''):'<p class="muted small">Nothing logged yet. Tap “Log trip” or “Add expense”.</p>';
  el.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delItem(b.dataset.kind,b.dataset.del));
  const h=$('#itemsHead'); if(h) h.textContent=`This period · ${items.length} item${items.length===1?'':'s'}`;
  const ir=$('#itemsReimb'); if(ir) ir.textContent=money(reimburseTotal());
}
function totbarTiles(){
  const mileT=(state._T||[]).reduce((a,x)=>a+Number(x.amount||0),0);
  const {reimb}=expSplit(state._E);
  return `<div class="tot"><div class="k">Mileage</div><div class="v">${money(mileT)}</div></div>
    <div class="tot"><div class="k">Expenses</div><div class="v">${money(reimb)}</div></div>
    <div class="tot sum"><div class="k">Reimburse</div><div class="v">${money(mileT+reimb)}</div></div>`;
}
function cardLineHtml(){ const {card}=expSplit(state._E); return card>0?`<div class="small muted" style="margin-top:8px">💳 Company card (not reimbursed): <b>${money(card)}</b></div>`:''; }
function reimburseTotal(){ const mileT=(state._T||[]).reduce((a,x)=>a+Number(x.amount||0),0); return mileT+expSplit(state._E).reimb; }
function refreshTotals(){
  const t=$('#totbar'); if(t) t.innerHTML=totbarTiles();
  const c=$('#cardline'); if(c) c.innerHTML=cardLineHtml();
  const ir=$('#itemsReimb'); if(ir) ir.textContent=money(reimburseTotal());
}
function baItemRow(x){
  const trip = x._k==='trip';
  const date = trip?x.trip_date:x.expense_date;
  const title = trip ? (x.dest_label || dispName(x.dispensary_id)) : (x.vendor||'Expense');
  const sub = trip ? `${x.miles??'—'} mi · ${x.method}` : `${x.category||''}${x.payment==='company'?' · 💳 company card':''}`;
  const canDel = x.status==='draft' || x.status==='rejected';
  return `<div class="item">
    <div class="ic">${trip?'🚗':'🧾'}</div>
    <div class="grow"><div class="t">${esc(title)}</div><div class="s">${fmtDate(date)} · ${esc(sub)}</div>
      ${x.status==='rejected'&&x.reject_note?`<div class="s" style="color:var(--red)">Rejected: ${esc(x.reject_note)} — fix &amp; resubmit, or delete.</div>`:''}</div>
    <div class="amt">${money(x.amount)}</div>
    <span class="badge ${x.status}">${x.status}</span>
    ${canDel?`<button class="btn ghost sm" data-del="${x.id}" data-kind="${trip?'trips':'expenses'}" title="Delete">✕</button>`:''}
  </div>`;
}
async function delItem(kind,id){
  if(!confirm('Delete this item?')) return;
  const { error } = await supabase.from(kind).delete().eq('id',id);
  if(error) return toast(error.message,'err');
  const arr = kind==='trips'?state._T:state._E; const i=arr.findIndex(x=>x.id===id); if(i>=0) arr.splice(i,1);
  toast('Deleted'); refreshItems(); refreshTotals(); renderGrid();
}
async function submitPeriod(){
  if(!confirm('Submit all items in this period? You won’t be able to edit them after.')) return;
  await flushGrid();                          // commit any pending grid edits before snapshotting state
  const T=state._T||[], E=state._E||[];
  const submittable = x => x.status==='draft' || x.status==='rejected';
  const ids=T.filter(submittable).map(x=>x.id), eids=E.filter(submittable).map(x=>x.id);
  if(!ids.length && !eids.length) return toast('Nothing to submit','err');
  const mile=T.reduce((a,x)=>a+Number(x.amount||0),0); const {reimb,card}=expSplit(E);
  // record the submission FIRST so items are never locked without a workflow row
  const { error:se } = await supabase.from('submissions').upsert({
    ba_id:state.session.user.id, period_id:state.period.id, status:'submitted',
    submitted_at:new Date().toISOString(), totals:{mileage:mile, expenses:reimb, company_card:card, total:mile+reimb}
  },{onConflict:'ba_id,period_id'});
  if(se) return toast('Submit failed: '+se.message,'err');
  if(ids.length){ const {error}=await supabase.from('trips').update({status:'submitted',reject_note:null}).in('id',ids);
    if(error) return toast('Submit failed: '+error.message,'err'); }
  if(eids.length){ const {error}=await supabase.from('expenses').update({status:'submitted',reject_note:null}).in('id',eids);
    if(error) return toast('Submit failed: '+error.message,'err'); }
  toast('Submitted — thank you!','ok'); drawBA();
}

/* ── Quick-entry spreadsheet grid: live (autosaves), delete, $ total, autocomplete ── */
function gridDrafts(mode){ return ((mode==='miles'?state._T:state._E)||[]).filter(x=>x.status==='draft'); }
function gridRate(){ return Number(state.profile.rate_override ?? state.settings?.mileage_rate ?? 0.725); }
function gridRowHtml(mode, it, today, pay){
  const id = it ? it.id : '';
  const del = `<td class="gdel">${id?'<button class="gx" title="delete row">✕</button>':''}</td>`;
  if(mode==='miles'){

    const needMi = it && !(Number(it.miles)>0) ? ' needs' : '';   // incomplete trip — finish destination / miles later

      <td><input type="date" class="gdate g-date" value="${it?it.trip_date:today}"></td>
      <td><input class="g-start" placeholder="start" value="${it?esc(it.start_label||''):''}" autocomplete="off"></td>
      <td><input class="g-dest" placeholder="destination" value="${it?esc(it.dest_label||''):''}" autocomplete="off"></td>

      <td><input class="gnum g-oe" type="number" inputmode="decimal" placeholder="tap" value="${it&&it.end_odo!=null?it.end_odo:''}" readonly style="cursor:pointer"></td>

  }
  // expenses: payment is implied by which table the row lives in (no "Paid by" column)
  const rowPay = it ? (it.payment||'reimbursement') : (pay||'reimbursement');
  const cats=EXPENSE_CATEGORIES.map(c=>`<option ${it&&it.category===c?'selected':''}>${c}</option>`).join('');
  const rcell = it&&it.receipt_path
    ? `<div class="rcell"><span class="rchip" data-view="1">📄 view</span><label class="rrepl" title="replace">✎<input type="file" accept="image/*" capture="environment" class="g-receipt" hidden></label></div>`
    : `<div class="rcell"><label class="rchip">📎 add<input type="file" accept="image/*" capture="environment" class="g-receipt" hidden></label></div>`;
  const needDesc = it && !((it.vendor||'').trim()) ? ' needs' : '';   // incomplete capture-fast drafts get red cells
  const needAmt  = it && !(Number(it.amount)>0)     ? ' needs' : '';
  return `<tr data-id="${id}" data-pay="${rowPay}" data-rpath="${it&&it.receipt_path?esc(it.receipt_path):''}">${del}
    <td><input type="date" class="gdate g-date" value="${it?it.expense_date:today}"></td>
    <td>${rcell}</td>
    <td><input class="g-desc${needDesc}" placeholder="description" value="${it?esc(it.vendor||''):''}"></td>
    <td><select class="g-cat">${cats}</select></td>
    <td><input class="gnum g-amt${needAmt}" type="number" inputmode="decimal" step="0.01" placeholder="0.00" value="${it&&Number(it.amount)>0?it.amount:''}"></td></tr>`;
}
async function gridReceiptRow(e, tr, mode){
  const f=e.target.files[0]; if(!f) return;
  const cell=tr.querySelector('.rcell'), prev=cell.innerHTML;
  cell.innerHTML='<span class="spin"></span>';
  try{
    const path=await uploadPhoto('receipts', f); tr.dataset.rpath=path;
    const url=URL.createObjectURL(f);
    cell.innerHTML=`<img class="rthumb" title="view"><label class="rrepl" title="replace">✎<input type="file" accept="image/*" capture="environment" class="g-receipt" hidden></label>`;
    const img=cell.querySelector('.rthumb'); img.src=url; img.onclick=()=>window.open(url,'_blank');
    cell.querySelector('.g-receipt').onchange=ev=>gridReceiptRow(ev,tr,mode);
    scheduleAutosave(tr, mode);
  }catch(err){ toast('Receipt upload failed','err'); cell.innerHTML=prev;
    const ri=cell.querySelector('.g-receipt'); if(ri) ri.onchange=ev=>gridReceiptRow(ev,tr,mode); }
}
function renderGrid(){

  const seg=`<div class="seg" id="gMode" style="margin-bottom:10px">
    <button class="${mode==='miles'?'on':''}" data-g="miles">🚗 Mileage</button>

      return `<div class="gridwrap"><table class="grid"><thead>${head}</thead><tbody class="g-body" data-pay="${pay}">${body}</tbody></table></div>
        <button class="btn ghost sm g-add" data-pay="${pay}" style="margin-top:6px">＋ row</button>`;
    };
    inner=`

function savedIndicator(t){ const el=$('#gSaved'); if(el) el.textContent=t; }
function scheduleAutosave(tr, mode){ clearTimeout(tr._t); savedIndicator('Saving…'); tr._t=setTimeout(()=>gridAutosave(tr,mode),700); }
// Commit any debounced / in-flight grid edits before a full re-render or submit,
// so the incremental autosave can never race drawBA's fetch (which caused saved
// items to flicker / vanish). Bounded wait (~1s) for quiescence.
async function flushGrid(){
  const host=$('#gridcard'); if(!host) return;
  const mode=state.gridMode||'miles';
  const rows=()=>[...host.querySelectorAll('.g-body tr')];
  rows().forEach(tr=>{ if(tr._t){ clearTimeout(tr._t); tr._t=null; gridAutosave(tr,mode); } });
  for(let i=0;i<25 && rows().some(tr=>tr._saving||tr._t); i++) await new Promise(r=>setTimeout(r,40));
}
async function gridAutosave(tr, mode){
  if(tr._saving){ scheduleAutosave(tr,mode); return; }
  const isNew=!tr.dataset.id; let payload, table;
  if(mode==='miles'){
    const date=tr.querySelector('.g-date').value;
    const start=tr.querySelector('.g-start').value.trim(), dest=tr.querySelector('.g-dest').value.trim();
    const note=tr.querySelector('.g-note').value.trim();
    const os=tr.querySelector('.g-os').value, oe=tr.querySelector('.g-oe').value;
    let miles=Number(tr.querySelector('.g-mi').value);
    if(!(miles>0)){ const s=Number(os),e=Number(oe); if(s&&e&&e>=s) miles=Math.round((e-s)*10)/10; }
    if(isNew && !(date && (miles>0 || start || dest))){ savedIndicator('All changes saved'); return; }  // save in-progress trips; finish later
    const hasOdo=os!==''&&oe!=='';
    const dispId = tr.querySelector('.g-disp')?.value || null;   // tagged dispensary (auto-filled from a dispensary destination, or chosen)
    payload={ trip_date:date||todayISO(), dispensary_id:dispId, method:hasOdo?'odometer':'manual',
      start_odo:os?Number(os):null, end_odo:oe?Number(oe):null, miles:miles>0?miles:null, miles_source:hasOdo?'odometer':'manual',
      start_label:start||null, dest_label:dest||null, roundtrip:false, note:note||null };
    const sC=tr._startResolved?.coords; if(sC){ payload.start_lat=sC.lat; payload.start_lng=sC.lng; }   // GPS start
    if(tr._osPhoto) payload.start_photo=tr._osPhoto; if(tr._oePhoto) payload.end_photo=tr._oePhoto;     // odometer photos
    table='trips';
  } else {
    const date=tr.querySelector('.g-date').value, desc=tr.querySelector('.g-desc').value.trim();
    const cat=tr.querySelector('.g-cat').value, amt=Number(tr.querySelector('.g-amt').value);
    const pay=tr.dataset.pay||'reimbursement';
    if(isNew && !(date && amt>0)){ savedIndicator('All changes saved'); return; }
    payload={ expense_date:date||todayISO(), vendor:desc||'Expense', amount:amt>0?amt:0, category:cat||'Other',
      payment:pay, receipt_path:tr.dataset.rpath||null, note:desc||null };
    table='expenses';
  }
  tr._saving=true;
  try{
    if(isNew){
      const {data,error}=await supabase.from(table).insert({...payload, ba_id:state.session.user.id, status:'draft'}).select('*').single();
      if(error) throw error;
      tr.dataset.id=data.id;
      const dc=tr.querySelector('.gdel'); if(dc && !dc.querySelector('.gx')){ dc.innerHTML='<button class="gx" title="delete row">✕</button>'; dc.querySelector('.gx').onclick=()=>gridDelete(tr,mode); }
      if(!state.period || data.period_id===state.period.id){ const a=(mode==='miles'?state._T:state._E); if(!a.some(x=>x.id===data.id)) a.unshift(data); }
      const tb=tr.parentElement; const t=document.createElement('template'); t.innerHTML=gridRowHtml(mode,null,todayISO(),tb&&tb.dataset.pay); const ntr=t.content.firstElementChild; tb.appendChild(ntr); wireGridRow(ntr,mode);
    } else {
      const {data,error}=await supabase.from(table).update(payload).eq('id',tr.dataset.id).select('*').single();
      if(error) throw error;
      const arr=(mode==='miles'?state._T:state._E); const i=arr.findIndex(x=>x.id===tr.dataset.id); if(i>=0) arr[i]=data;
    }
    savedIndicator('All changes saved'); refreshTotals(); refreshItems(); gridTotal();
  }catch(e){ savedIndicator('Save failed — retry'); toast(e.message||'Save failed','err'); }
  finally{ tr._saving=false; }
}
async function gridDelete(tr, mode){

    if(error) return toast(error.message,'err');

}

// auto-compute grid mileage from start+destination (one-way) when no odometer entered
function maybeCalcDistance(tr){
  const os=tr.querySelector('.g-os')?.value, oe=tr.querySelector('.g-oe')?.value;
  if(os && oe) return;                                            // odometer wins
  const start=(tr.querySelector('.g-start')?.value||'').trim(), dest=(tr.querySelector('.g-dest')?.value||'').trim();
  if(!start || !dest) return;
  const mi=tr.querySelector('.g-mi'); if(mi.value!=='' && !tr._autoMi) return;  // never clobber a hand-entered value
  const key=start+'|'+dest; if(tr._distKey===key) return; tr._distKey=key;
  const body={ roundtrip:false }, sR=tr._startResolved, dR=tr._destResolved;
  if(sR&&sR.coords){ body.start_lat=sR.coords.lat; body.start_lng=sR.coords.lng; }   // GPS "Current location"
  else body.start_address=(sR&&sR.addr)||start;
  if(dR&&dR.dispId) body.dispensary_id=dR.dispId; else body.dest_address=(dR&&dR.addr)||dest;
  mi.placeholder='…';
  callFn('calc-distance', body).then(r=>{ mi.placeholder='mi'; if(r&&r.ok){ mi.value=r.miles; mi.classList.remove('needs'); tr._autoMi=true; gridTotal(); scheduleAutosave(tr,'miles'); } }).catch(()=>{ mi.placeholder='mi'; });
}

function getGridGps(input, onResolve){

  }, ()=>{ if(input.value==='📍 locating…') input.value=prev; toast('Couldn’t get location — allow access or type an address','err'); },
  {enableHighAccuracy:true,timeout:10000,maximumAge:60000});
}
function attachGridTypeahead(input, onResolve, opts={}){
  if(!input) return; let local=[], timer=null; const box=gridSug();
  const pos=()=>{ const r=input.getBoundingClientRect(); box.style.left=r.left+'px'; box.style.top=(r.bottom+2)+'px'; box.style.minWidth=Math.max(r.width,180)+'px'; };
  const paint=(items,searching)=>{
    if(box._owner!==input) return;
    if(!items.length&&!searching){ box.classList.add('hide'); box.innerHTML=''; return; }
    let html=items.map((it,i)=>`<div class="sg" data-i="${i}"><b>${esc(it.label)}</b>${it.sub?`<span>${esc(it.sub)}</span>`:''}</div>`).join('');

    box.innerHTML=html; pos(); box.classList.remove('hide');
    box.querySelectorAll('.sg[data-i]').forEach(el=>el.onmousedown=ev=>{ ev.preventDefault();
      const it=items[+el.dataset.i];
      if(it._gps){ box.classList.add('hide'); getGridGps(input,onResolve); return; }
      input.value=it.display; box.classList.add('hide'); onResolve({display:it.display,addr:it.addr,dispId:it.dispId}); });
  };
  const render=()=>{ box._owner=input; const q=input.value; local=placeItems(q);
    if(opts.gps) local=[{display:'📍 Current location', addr:'', dispId:null, label:'📍 Current location', sub:'use your GPS', _gps:true}, ...local];
    clearTimeout(timer);
    const wantRemote=!!(q&&q.trim().length>=3); paint(local,wantRemote);
    if(wantRemote) timer=setTimeout(async()=>{ let r; try{ r=await callFn('geocode-suggest',{text:q}); }catch{ if(input.value===q&&box._owner===input)paint(local,false); return; }
      if(input.value!==q||box._owner!==input) return; const have=new Set(local.map(x=>x.display.toLowerCase()));
      const addr=(r?.suggestions||[]).filter(s=>!have.has(s.label.toLowerCase())).slice(0,5).map(s=>({display:s.label,addr:s.label,dispId:null,label:'📍 '+s.label,sub:'address'}));
      paint([...local,...addr],false); },250);
  };

  input.addEventListener('input', ()=>{ onResolve({display:input.value,addr:input.value,dispId:null}); render(); });
  input.addEventListener('blur', ()=>setTimeout(()=>{ if(box._owner===input) box.classList.add('hide'); },150));
}

/* ── reusable place typeahead: Home + dispensaries + recent + live ORS address ── */
function placeItems(q){
  q=(q||'').trim().toLowerCase(); const out=[]; const base=state.profile.base_address;
  if(base && (q===''||'home'.includes(q)||'base'.includes(q)||base.toLowerCase().includes(q)))
    out.push({display:base, addr:base, dispId:null, label:'🏠 Home', sub:base});
  baDispensaries().filter(d=>d.name.toLowerCase().includes(q)||(d.address||'').toLowerCase().includes(q)).slice(0,6)
    .forEach(d=>out.push({display:d.name, addr:d.address||d.name, dispId:d.id, label:'🏬 '+d.name, sub:d.address||''}));
  (state.recentPlaces||[]).filter(p=>p.toLowerCase().includes(q)).slice(0,4)
    .forEach(p=>out.push({display:p, addr:p, dispId:null, label:'🕘 '+p, sub:'recent'}));
  const seen=new Set();
  return out.filter(o=>{const k=o.display.toLowerCase(); if(seen.has(k))return false; seen.add(k); return true;}).slice(0,8);
}
// onResolve({display,addr,dispId}) fires on pick AND on free typing, so the caller always has the current value
function attachPlaceTypeahead(input, box, onResolve, opts={}){
  let local=[], timer=null;
  const paint=(items, searching)=>{
    if(!items.length && !searching){ box.classList.add('hide'); box.innerHTML=''; return; }
    let html=items.map((it,i)=>`<div class="sg" data-i="${i}"><b>${esc(it.label)}</b>${it.sub?`<span>${esc(it.sub)}</span>`:''}</div>`).join('');
    if(searching) html+=`<div class="sg searching"><span class="spin"></span>Searching addresses…</div>`;
    box.innerHTML=html; box.classList.remove('hide');
    box.querySelectorAll('.sg[data-i]').forEach(el=>el.onmousedown=ev=>{ ev.preventDefault();
      const it=items[+el.dataset.i]; input.value=it.display; box.classList.add('hide');
      onResolve({display:it.display, addr:it.addr, dispId:it.dispId}); });
  };
  const render=()=>{
    const q=input.value; local=opts.addressOnly?[]:placeItems(q); clearTimeout(timer);
    const wantRemote = !!(q && q.trim().length>=3);
    paint(local, wantRemote);
    if(wantRemote) timer=setTimeout(async()=>{
      let r; try{ r=await callFn('geocode-suggest',{text:q}); }catch{ if(input.value===q) paint(local,false); return; }
      if(input.value!==q) return;
      const have=new Set(local.map(x=>x.display.toLowerCase()));
      const addr=(r?.suggestions||[]).filter(s=>!have.has(s.label.toLowerCase())).slice(0,5)
        .map(s=>({display:s.label, addr:s.label, dispId:null, label:'📍 '+s.label, sub:'address'}));
      paint([...local, ...addr], false);
    },250);
  };
  input.oninput=()=>{ onResolve({display:input.value, addr:input.value, dispId:null}); render(); };
  input.onfocus=render;
  input.onblur=()=>setTimeout(()=>box.classList.add('hide'),150);
}

    }catch(e){ toast(e.message,'err'); }
  }
  function recalcOdo(){
    const s=Number($('#tStart').value), e=Number($('#tEnd').value);
    if(s&&e&&e>=s){ miles=Math.round((e-s)*10)/10; milesSrc='odometer'; $('#tOdoMiles').innerHTML=`Distance: <b>${miles} mi</b>`; }
    else { $('#tOdoMiles').textContent=''; }
    showCost();
  }
  $('#tStart').oninput=()=>{startOdo=Number($('#tStart').value);recalcOdo();};
  $('#tEnd').oninput  =()=>{endOdo=Number($('#tEnd').value);recalcOdo();};
  $('#tStartPhoto').onchange=e=>{ if(e.target.files[0]){toast('Reading photo…');readOdo(e.target.files[0],'start');} };
  $('#tEndPhoto').onchange  =e=>{ if(e.target.files[0]){toast('Reading photo…');readOdo(e.target.files[0],'end');} };

  $('#tSave').onclick=async ()=>{
    const destText=$('#tDest').value.trim();
    if(!destText) return toast('Enter a destination','err');
    if(miles==null||!(miles>0)) return toast('Need the miles for this trip','err');
    const btn=$('#tSave'); busy(btn,true);
    const startLoc = startCoords ? '📍 Current location' : ($('#tStartLoc').value||null);
    const row={ ba_id:state.session.user.id, trip_date:$('#tDate').value, dispensary_id:destDispId||null, method,
      miles, miles_source:milesSrc, dest_label:destText, start_label:startLoc, note:$('#tNote').value||null, status:'draft' };
    if(method==='odometer'){ row.start_odo=startOdo; row.end_odo=endOdo; row.start_photo=startPath; row.end_photo=endPath; }
    if(method==='distance'){
      row.roundtrip=$('#tRound').checked;
      if(startCoords){ row.start_lat=startCoords.lat; row.start_lng=startCoords.lng; }
    }
    const { error }=await supabase.from('trips').insert(row);
    busy(btn,false);
    if(error) return toast(error.message,'err');
    toast('Trip saved','ok'); closeSheet(); state.baTab='home';
    await ensurePeriodForDate(row.trip_date); drawBA();
  };
}

// After a snapped receipt is saved instantly, the OCR runs here and fills the
// still-empty fields in place when it returns — the popup never waits on it.
async function ocrFillInBackground(path, id){
  try{
    const r=await callFn('extract-receipt',{path});
    if(!r) return;
    const row=(state._E||[]).find(x=>x.id===id)||{};
    const patch={ ocr_raw:r.raw||r };
    if(r.ok){
      if(r.total!=null && !(Number(row.amount)>0)) patch.amount=r.total;
      if(r.vendor && !((row.vendor||'').trim())) patch.vendor=r.vendor;
      if(r.category && (!row.category || row.category===EXPENSE_CATEGORIES[0])) patch.category=r.category;
    }
    const { data, error }=await supabase.from('expenses').update(patch).eq('id',id).eq('status','draft').select('*').single();
    if(error||!data) return;
    const i=(state._E||[]).findIndex(x=>x.id===id); if(i>=0) state._E[i]=data;
    refreshItems(); refreshTotals(); fillGridRowFromOcr(id, data); gridTotal();
  }catch{}
}
// fill a draft's grid cells without rebuilding the grid (won't clobber in-progress edits)
function fillGridRowFromOcr(id, data){
  const host=$('#gridcard'); if(!host) return;
  const tr=host.querySelector(`.g-body tr[data-id="${CSS.escape(id)}"]`); if(!tr) return;
  const amt=tr.querySelector('.g-amt'), desc=tr.querySelector('.g-desc'), cat=tr.querySelector('.g-cat');
  if(amt && document.activeElement!==amt && !amt.value && Number(data.amount)>0){ amt.value=data.amount; amt.classList.remove('needs'); }
  if(desc && document.activeElement!==desc && !desc.value && (data.vendor||'').trim()){ desc.value=data.vendor; desc.classList.remove('needs'); }
  if(cat && data.category) cat.value=data.category;
}

async function approveSubmission(baId,periodId,T,E){
  if(!confirm('Approve all submitted items for this BA this period?')) return;
  // approve ONLY submitted items (never sweep in un-submitted drafts or rejected)
  const subMile=(T||[]).filter(x=>x.status==='submitted').reduce((a,x)=>a+ +x.amount,0);
  const {reimb:subExp, card:subCard}=expSplit((E||[]).filter(x=>x.status==='submitted'));
  const { error:e1 }=await supabase.from('trips').update({status:'approved'}).eq('ba_id',baId).eq('period_id',periodId).eq('status','submitted');
  if(e1) return toast('Approve failed: '+e1.message,'err');
  const { error:e2 }=await supabase.from('expenses').update({status:'approved'}).eq('ba_id',baId).eq('period_id',periodId).eq('status','submitted');
  if(e2) return toast('Approve failed: '+e2.message,'err');
  const { error:e3 }=await supabase.from('submissions').update({status:'approved',approved_by:state.session.user.id,approved_at:new Date().toISOString(),
    totals:{mileage:subMile,expenses:subExp,company_card:subCard,total:subMile+subExp}}).eq('ba_id',baId).eq('period_id',periodId);
  if(e3) return toast('Approve failed: '+e3.message,'err');
  toast('Approved','ok'); closeSheet(); drawAdmin();
}
async function rejectItem(kind,id,baId){
  const note=prompt('Reason for rejection (the BA will see this):'); if(note===null) return;
  await supabase.from(kind).update({status:'rejected',reject_note:note}).eq('id',id);
  toast('Item rejected'); adminBaDetail(baId);
}

/* ── exports ── */
function exportCSV(prof,per,T,E){
  const rows=[['Type','Date','Dispensary','Detail','Paid','Miles','Rate','Amount','Status','Note']];
  T.forEach(x=>rows.push(['Mileage',x.trip_date,dispName(x.dispensary_id),x.method,'',x.miles??'',x.rate??'',Number(x.amount||0).toFixed(2),x.status,x.note||'']));
  E.forEach(x=>rows.push(['Expense',x.expense_date,dispName(x.dispensary_id),`${x.vendor||''} (${x.category||''})`,x.payment==='company'?'Company card':'Reimburse',' ','',Number(x.amount||0).toFixed(2),x.status,x.note||'']));
  const mile=T.reduce((a,x)=>a+ +x.amount,0); const {reimb,card}=expSplit(E);
  rows.push([]); rows.push(['','','','','','','','Mileage',mile.toFixed(2)]);
  rows.push(['','','','','','','','Expenses (reimburse)',reimb.toFixed(2)]);
  rows.push(['','','','','','','','REIMBURSE TOTAL',(mile+reimb).toFixed(2)]);
  if(card>0) rows.push(['','','','','','','','Company card (not reimbursed)',card.toFixed(2)]);
  const csv=rows.map(r=>r.map(c=>{let s=String(c??'');
    if(/^[=+\-@\t\r]/.test(s)) s="'"+s;                       // neutralize spreadsheet formula injection
    return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  const name=`reimbursement_${(prof.full_name||prof.email).replace(/\W+/g,'_')}_${per.start_date}.csv`;
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=name; a.click();
}

  const mile=T.reduce((a,x)=>a+ +x.amount,0); const {reimb,card}=expSplit(E);

    <h2 style="margin:0">Wizard Trees — Reimbursement</h2>

    <h3>Expenses (reimbursable) — ${money(reimb)}</h3>

}

/* ── Admin: review queue ── */
async function adminReview(m){
  m.innerHTML=`<div class="loading"><span class="spin"></span></div>`;
  await reloadPeriods();
  const per=state.period;
  const [{data:bas}, subs, trips, exps] = await Promise.all([
    supabase.from('profiles').select('*').eq('role','ba').order('full_name'),
    per?supabase.from('submissions').select('*').eq('period_id',per.id):{data:[]},
    per?supabase.from('trips').select('ba_id').eq('period_id',per.id):{data:[]},
    per?supabase.from('expenses').select('ba_id').eq('period_id',per.id):{data:[]},
  ]);
  const subBy={}; (subs.data||[]).forEach(s=>subBy[s.ba_id]=s);
  const cnt={}; (trips.data||[]).concat(exps.data||[]).forEach(x=>cnt[x.ba_id]=(cnt[x.ba_id]||0)+1);
  let rows=(bas||[]);
  if(state.adminRegion!=='all') rows=rows.filter(b=>b.region===state.adminRegion);
  const turnedIn=b=>['submitted','approved'].includes(subBy[b.id]?.status);
  // order: awaiting your approval → not submitted → approved
  const rank=b=>{ const s=subBy[b.id]?.status; return s==='submitted'?0 : s==='approved'?2 : 1; };
  rows=rows.slice().sort((a,b)=>rank(a)-rank(b)||(a.full_name||'').localeCompare(b.full_name||''));
  const inCount=rows.filter(turnedIn).length;
  const awaiting=rows.filter(b=>subBy[b.id]?.status==='submitted').length;
  m.innerHTML=`
    <div class="card">
      <div class="row"><div class="small muted grow">Pay period</div>${periodPicker(()=>adminReview(m))}</div>
      <div class="row" style="margin-top:8px"><div class="small muted grow">Region</div>
        <select id="regSelR"><option value="all" ${state.adminRegion==='all'?'selected':''}>All states</option>${REGIONS.map(r=>`<option value="${r}" ${state.adminRegion===r?'selected':''}>${r}</option>`).join('')}</select></div>
      <div class="totbar" style="margin-top:12px">
        <div class="tot"><div class="k">To review</div><div class="v">${awaiting}</div></div>
        <div class="tot"><div class="k">Not in yet</div><div class="v">${rows.length-inCount}</div></div>
        <div class="tot sum"><div class="k">Submitted</div><div class="v">${inCount}/${rows.length}</div></div>
      </div>
    </div>
    <div class="card">
      <h3>BA submissions ${per?`<span class="muted small">· ${esc(per.label)}</span>`:''}</h3>
      ${rows.length?rows.map(b=>{
        const st=subBy[b.id]?.status||'none', items=cnt[b.id]||0;
        let badge, cls, sub;
        if(st==='submitted'){ badge='✓ submitted'; cls='submitted'; sub=`Awaiting approval${subBy[b.id]?.submitted_at?' · '+new Date(subBy[b.id].submitted_at).toLocaleDateString():''}`; }
        else if(st==='approved'){ badge='✓ approved'; cls='approved'; sub='Approved & reimbursed'; }
        else if(st==='rejected'){ badge='rejected'; cls='rejected'; sub='Sent back — awaiting resubmit'; }
        else { badge='not submitted'; cls='draft'; sub=items?`${items} item${items===1?'':'s'} in progress`:'Nothing logged yet'; }
        return `<div class="item" data-ba="${b.id}" style="cursor:pointer">
          <div class="ic">${(b.full_name||'?').slice(0,1).toUpperCase()}</div>
          <div class="grow" style="min-width:0"><div class="t" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(b.full_name||b.email)}${b.region?` <span class="pill">${esc(b.region)}</span>`:''}</div>
            <div class="s">${sub}</div></div>
          <span class="badge ${cls}" style="flex:none;margin-left:8px">${badge}</span>
        </div>`;
      }).join(''):`<p class="muted small">No BAs${state.adminRegion!=='all'?' in '+state.adminRegion:''} yet — add them in Settings.</p>`}
    </div>`;
  m.querySelectorAll('[data-ba]').forEach(el=>el.onclick=()=>adminBaDetail(el.dataset.ba));
  const rs=$('#regSelR'); if(rs) rs.onchange=()=>{ state.adminRegion=rs.value; adminReview(m); };
}

/* ── Admin: settings ── */
async function adminSettings(m){
  m.innerHTML=`<div class="loading"><span class="spin"></span></div>`;
  const [{data:bas},{data:disp}]=await Promise.all([
    supabase.from('profiles').select('*').order('role',{ascending:false}).order('full_name'),

  ]);
  const rate=Number(state.settings?.mileage_rate??0.725);
  m.innerHTML=`
    <div class="card">
      <h3>Mileage rate</h3>
      <div class="row"><span class="muted small">$ per mile</span>
        <input id="setRate" type="number" step="0.001" value="${rate}" style="max-width:120px">
        <button class="btn sm primary" id="setRateBtn">Save</button></div>

    </div>
    <div class="card">
      <h3>Pay periods</h3>
      <div class="row wrap">${state.periods.slice(0,6).map(p=>`<span class="pill">${esc(p.label)}${p.status==='closed'?' ·closed':''}</span>`).join(' ')||'<span class="muted small">none</span>'}</div>
      <button class="btn sm block" id="genPer" style="margin-top:10px">Ensure current + next period exist</button>
    </div>
    <div class="card">
      <div class="row"><h3 class="grow">Brand ambassadors</h3><button class="btn sm primary" id="addBa">+ Add</button></div>
      ${(bas||[]).map(b=>`<div class="item">
        <div class="ic">${(b.full_name||'?').slice(0,1).toUpperCase()}</div>
        <div class="grow"><div class="t">${esc(b.full_name||b.email)} ${b.role==='admin'?'<span class="pill admin">admin</span>':(b.region?`<span class="pill">${esc(b.region)} BA</span>`:'')}${b.active?'':' <span class="muted small">· inactive</span>'}</div>
          <div class="s">${esc(b.email)}</div>
          <div class="s">🏠 ${b.base_address?esc(b.base_address):'<span class="muted">no home address</span>'}</div></div>

    </div>
    <div class="card">
      <div class="row"><h3 class="grow">Locations</h3><button class="btn sm primary" id="addDisp">+ Add</button></div>
      ${(()=>{
        const by={}; (disp||[]).forEach(d=>{ const k=d.state||''; (by[k]=by[k]||[]).push(d); });
        const item=d=>`<div class="item">
          <div class="ic">🏬</div>
          <div class="grow"><div class="t">${esc(d.name)}${d.active?'':' <span class="muted small">· inactive</span>'}</div>
            <div class="s">${d.legal_name?esc(d.legal_name)+' · ':''}${esc(d.address||'no address')}</div></div>
          <button class="btn sm ghost" data-disp="${d.id}">Edit</button></div>`;
        const secs=[['CA','California'],['NY','New York'],['FL','Florida'],['','⚠ No state']]
          .filter(([k])=>by[k]&&by[k].length).map(([k,label])=>{
            const open=!!state.dispOpen[k];
            return `<div><div class="dghead" data-dg="${k}"><span class="caret">${open?'▾':'▸'}</span>
              <b>${label}</b><span class="muted small">· ${by[k].length}</span></div>
              ${open?`<div class="dgbody">${by[k].map(item).join('')}</div>`:''}</div>`;
          }).join('');
        return secs||'<p class="muted small">None yet.</p>';
      })()}
    </div>`;
  $('#setRateBtn').onclick=async ()=>{ const v=Number($('#setRate').value);
    const {error}=await supabase.from('app_settings').update({mileage_rate:v,updated_at:new Date().toISOString()}).eq('id',1);
    if(error)return toast(error.message,'err'); state.settings.mileage_rate=v; toast('Rate saved','ok'); };
  $('#genPer').onclick=async ()=>{ const len=state.settings?.period_length_days||14;
    await supabase.rpc('ensure_period',{d:todayISO()});
    const next=new Date(); next.setDate(next.getDate()+len);
    await supabase.rpc('ensure_period',{d:next.toISOString().slice(0,10)});
    await loadMe(); toast('Periods ready','ok'); drawAdmin(); };
  $('#addBa').onclick=addBaSheet;
  $('#addDisp').onclick=()=>dispSheet(null);
  m.querySelectorAll('[data-dg]').forEach(el=>el.onclick=()=>{ const k=el.dataset.dg; state.dispOpen[k]=!state.dispOpen[k]; adminSettings(m); });
  m.querySelectorAll('[data-disp]').forEach(b=>b.onclick=()=>dispSheet((disp||[]).find(d=>d.id===b.dataset.disp)));
  m.querySelectorAll('[data-edit]').forEach(el=>el.onclick=()=>editBaSheet((bas||[]).find(x=>x.id===el.dataset.edit)));
}
function addBaSheet(){
  openSheet(`<h3>Add a brand ambassador</h3>
    <label class="fl">Full name</label><input id="nName">
    <label class="fl">Email (their login)</label><input id="nEmail" type="email" inputmode="email">
    <label class="fl">Phone (optional)</label><input id="nPhone" inputmode="tel">
    <label class="fl">Home / base address (optional)</label><textarea id="nAddr"></textarea>
    <label class="fl">Temporary password (8+)</label><input id="nPw" value="${'wt-'+Math.random().toString(36).slice(2,8)}">
    <label class="fl">Role</label><select id="nRole">
      <option value="ba|CA">CA Brand Ambassador</option>
      <option value="ba|FL">FL Brand Ambassador</option>
      <option value="ba|NY">NY Brand Ambassador</option>
      <option value="admin|">Admin</option>
    </select>
    <button class="btn primary block" id="nSave" style="margin-top:14px">Create account</button>
    <button class="btn ghost block" id="nCancel" style="margin-top:8px">Cancel</button>`);
  $('#nCancel').onclick=closeSheet;
  $('#nSave').onclick=async ()=>{
    const email=$('#nEmail').value.trim(), password=$('#nPw').value;
    if(!email||password.length<8) return toast('Email + 8-char password required','err');
    const [role, region] = $('#nRole').value.split('|');
    const btn=$('#nSave'); busy(btn,true);
    try{
      const res=await callFn('admin-create-ba',{email,password,full_name:$('#nName').value,phone:$('#nPhone').value,base_address:$('#nAddr').value,role,region:region||null});
      if(region && res?.user_id){ await supabase.from('profiles').update({region}).eq('id',res.user_id); }
      toast('Account created','ok'); closeSheet();
      openSheet(`<h3>Account created ✓</h3><p class="small">Give them these credentials — they’ll set their own password on first sign-in:</p>
        <div class="card"><div class="small">Email</div><b>${esc(email)}</b><div class="small" style="margin-top:8px">Temp password</div><b>${esc(password)}</b></div>
        <button class="btn primary block" id="okBtn" style="margin-top:12px">Done</button>`);
      $('#okBtn').onclick=()=>{closeSheet();drawAdmin();};
    }catch(e){ toast(e.message,'err'); busy(btn,false); }
  };
}
function editBaSheet(b){
  if(!b) return;
  const isSelf = b.id===state.session.user.id;
  const roleVal = b.role==='admin' ? 'admin|' : 'ba|'+(b.region||'CA');
  openSheet(`<h3>Edit ${esc(b.full_name||b.email)}</h3>
    <div class="small muted">${esc(b.email)}</div>
    <label class="fl">Full name</label><input id="euName" value="${esc(b.full_name||'')}">
    <label class="fl">Home / base address <span class="muted">(private — only ${esc((b.full_name||'this user').split(' ')[0])} + admins can see it)</span></label>
    <textarea id="euAddr" placeholder="123 Main St, City, CA">${esc(b.base_address||'')}</textarea>
    <label class="fl">Role</label>
    <select id="euRole">
      <option value="ba|CA" ${roleVal==='ba|CA'?'selected':''}>CA Brand Ambassador</option>
      <option value="ba|FL" ${roleVal==='ba|FL'?'selected':''}>FL Brand Ambassador</option>
      <option value="ba|NY" ${roleVal==='ba|NY'?'selected':''}>NY Brand Ambassador</option>
      <option value="admin|" ${b.role==='admin'?'selected':''}>Admin</option>
    </select>
    <label class="fl">Status</label>
    <select id="euActive"><option value="true" ${b.active?'selected':''}>Active</option><option value="false" ${!b.active?'selected':''}>Inactive</option></select>
    ${isSelf?'<div class="small muted" style="margin-top:8px">This is your own account — you can’t remove your own admin access or deactivate yourself here.</div>':''}
    <label class="fl" style="margin-top:14px">Password</label>
    <button class="btn block" id="euReset" type="button">🔑 Reset password</button>
    <div class="small muted" style="margin-top:5px">Passwords are encrypted and can’t be shown — not even to admins. Resetting gives you a new temporary password to hand off; ${esc((b.full_name||'they').split(' ')[0])} sets their own on next sign-in.</div>
    <button class="btn primary block" id="euSave" style="margin-top:14px">Save</button>
    <button class="btn ghost block" id="euCancel" style="margin-top:8px">Cancel</button>`);
  $('#euCancel').onclick=closeSheet;
  $('#euReset').onclick=async ()=>{
    if(!confirm(`Reset ${b.full_name||b.email}'s password? Their current password will stop working immediately.`)) return;
    const newPw='wt-'+Math.random().toString(36).slice(2,8);
    const btn=$('#euReset'); busy(btn,true);
    try{
      await callFn('admin-reset-ba-password',{user_id:b.id, password:newPw});
      busy(btn,false); closeSheet();
      openSheet(`<h3>Password reset ✓</h3><p class="small">Give ${esc(b.full_name||b.email)} this temporary password — they’ll set their own on next sign-in:</p>
        <div class="card"><div class="small">Email</div><b>${esc(b.email)}</b><div class="small" style="margin-top:8px">Temp password</div><b style="font-size:18px">${esc(newPw)}</b></div>
        <button class="btn primary block" id="okBtn2" style="margin-top:12px">Done</button>`);
      $('#okBtn2').onclick=()=>{closeSheet();adminSettings($('#main'));};
    }catch(e){ busy(btn,false); toast(e.message,'err'); }
  };
  $('#euSave').onclick=async ()=>{
    const [role,region]=$('#euRole').value.split('|');
    if(isSelf && (role!=='admin' || $('#euActive').value!=='true')) return toast('You can’t demote or deactivate your own account','err');
    const addr=$('#euAddr').value;
    const patch={ full_name:$('#euName').value, base_address:addr||null, role, region:region||null, active:$('#euActive').value==='true' };
    if((addr||'')!==(b.base_address||'')){ patch.base_lat=null; patch.base_lng=null; } // re-geocode on next auto-distance
    const btn=$('#euSave'); busy(btn,true);
    const { error }=await supabase.from('profiles').update(patch).eq('id',b.id);
    busy(btn,false);
    if(error) return toast(error.message,'err');
    if(isSelf) Object.assign(state.profile,patch);
    toast('Saved','ok'); closeSheet(); adminSettings($('#main'));
  };
}
function reloadDispensaries(){
  return supabase.from('dispensaries').select('*').eq('active',true).order('name').then(({data})=>{ state.dispensaries=data||[]; });
}
function dispSheet(d, opts={}){
  const edit=!!d, isAdmin=state.profile.role==='admin', myRegion=state.profile.region;
  const stateField = isAdmin
    ? `<label class="fl">State</label><select id="dState"><option value="">Select state…</option>${REGIONS.map(r=>`<option value="${r}" ${d?.state===r?'selected':''}>${r}</option>`).join('')}</select>`
    : `<input id="dState" type="hidden" value="${esc(d?.state||myRegion||'')}">`;
  openSheet(`<h3>${edit?'Edit':'Add'} location</h3>
    <label class="fl">Name</label><input id="dName" value="${esc(d?.name||'')}">
    <label class="fl">Address</label><textarea id="dAddr" placeholder="start typing a street address…" autocomplete="off">${esc(d?.address||'')}</textarea>
    <div id="dSug" class="tsug hide"></div>
    ${stateField}
    <label class="row" style="gap:8px;font-size:13px;margin-top:10px"><input type="checkbox" id="dPrivate" ${d?.private?'checked':''} style="width:auto;min-height:auto"> Private — my Home (only I can see it)</label>
    <label class="fl">Legal name <span class="muted">(optional)</span></label><input id="dLegal" value="${esc(d?.legal_name||'')}">
    <label class="fl">License # <span class="muted">(optional)</span></label><input id="dLic" value="${esc(d?.license||'')}">
    ${edit&&isAdmin?`<label class="fl">Active</label><select id="dActive"><option value="true" ${d.active?'selected':''}>Active</option><option value="false" ${!d.active?'selected':''}>Inactive</option></select>`:''}
    <button class="btn primary block" id="dSave" style="margin-top:14px">${edit?'Save':'Add'}</button>
    <button class="btn ghost block" id="dCancel" style="margin-top:8px">Cancel</button>`);
  $('#dCancel').onclick=closeSheet;
  attachPlaceTypeahead($('#dAddr'), $('#dSug'), ()=>{}, {addressOnly:true});  // ORS street-address autocomplete
  $('#dSave').onclick=async ()=>{
    const name=$('#dName').value.trim(); if(!name) return toast('Name required','err');
    const st=isAdmin?$('#dState').value:(myRegion||$('#dState').value);
    if(!st) return toast(isAdmin?'Pick a state':'Your profile has no state set — ask an admin','err');
    const addrChanged = !edit || ($('#dAddr').value||'')!==(d.address||'');
    const patch={ name, legal_name:$('#dLegal').value||null, state:st, private:$('#dPrivate').checked,
      address:$('#dAddr').value||null, license:$('#dLic').value||null };
    if(edit&&isAdmin) patch.active = $('#dActive').value==='true';
    if(addrChanged){ patch.lat=null; patch.lng=null; }
    let error;
    if(edit) ({error}=await supabase.from('dispensaries').update(patch).eq('id',d.id));
    else     ({error}=await supabase.from('dispensaries').insert({...patch,created_by:state.session.user.id}));
    if(error) return toast(error.message,'err');
    toast('Saved','ok'); closeSheet(); await reloadDispensaries(); (opts.onSaved||(()=>adminSettings($('#main'))))();
  };
}
