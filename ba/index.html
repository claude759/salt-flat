<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0f1115">
<title>Wizard Trees — Mileage & Expenses</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WT Field">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --text:#e7eaf0; --muted:#9aa3b2; --accent:#7c5cff; --accent2:#9d86ff;
    --green:#2fbf71; --yellow:#e7b416; --orange:#f08a24; --red:#ef4d56;
    --shadow:0 6px 24px rgba(0,0,0,.35);
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
  a{color:var(--accent2);text-decoration:none}
  .muted{color:var(--muted)} .small{font-size:12px} .center{text-align:center}
  .row{display:flex;gap:10px;align-items:center} .row.wrap{flex-wrap:wrap}
  .grow{flex:1} .right{margin-left:auto}
  .hide{display:none!important}

  /* layout */
  #app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;padding:12px 14px;
    background:rgba(15,17,21,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
  .brand b{font-size:15px} .brand .sub{color:var(--muted);font-size:11px}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;
    border:1px solid var(--line);background:var(--panel2);color:var(--muted)}
  .pill.admin{color:#fff;background:var(--accent);border-color:var(--accent)}
  main{flex:1;padding:14px 14px calc(96px + var(--safe-b));display:flex;flex-direction:column;gap:14px}

  /* cards & controls */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 10px;font-size:14px}
  label.fl{display:block;font-size:12px;color:var(--muted);margin:10px 0 5px;font-weight:600}
  input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:11px 12px;font:inherit;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  input.needs,select.needs,textarea.needs{border-color:var(--red);box-shadow:0 0 0 2px rgba(239,77,86,.22)}
  textarea{min-height:60px;resize:vertical}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:11px;
    padding:12px 15px;cursor:pointer;font:inherit;font-weight:650;display:inline-flex;align-items:center;
    justify-content:center;gap:8px;min-height:46px}
  .btn:hover{border-color:var(--accent)} .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.ghost{background:transparent}
  .btn.danger{color:#fff;background:var(--red);border-color:var(--red)}
  .btn.ok{color:#fff;background:var(--green);border-color:var(--green)}
  .btn.sm{min-height:34px;padding:6px 11px;border-radius:9px;font-size:13px}
  .btn.block{width:100%} .btn:disabled{opacity:.5;cursor:not-allowed}
  .seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px;gap:4px}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font:inherit;font-weight:650;
    padding:9px;border-radius:8px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}
  /* trip measuring-method tiles (icon + label + caption) */
  .mtiles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
  .mtiles button{border:1.5px solid var(--line);background:var(--panel2);color:var(--muted);font:inherit;
    border-radius:12px;padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .mtiles button .mi{font-size:22px;line-height:1.15}
  .mtiles button b{font-size:12.5px;color:var(--text);font-weight:650}
  .mtiles button small{font-size:10px;line-height:1.25;text-align:center;padding:0 2px}
  .mtiles button.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 16%,var(--panel2))}
  /* "new version available" refresh bar */
  #updbar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:200;max-width:92%;
    background:var(--accent);color:#fff;border:0;border-radius:999px;font:inherit;font-weight:650;
    padding:11px 18px;box-shadow:0 6px 24px rgba(0,0,0,.4);cursor:pointer;animation:updpop .25s ease}
  @keyframes updpop{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
  /* multi-select dispensary dropdown (checkbox list) */
  .msel{position:relative;margin-top:6px}
  .msel-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--text);
    font:inherit;padding:11px 12px;cursor:pointer;text-align:left}
  .msel-toggle .msel-sum{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .msel-caret{color:var(--muted);flex:none}
  .msel.open .msel-caret{transform:rotate(180deg)}
  .msel-menu{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:10;background:var(--panel2);
    border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);max-height:264px;overflow-y:auto;padding:4px}
  .msel-search{position:sticky;top:0;z-index:2;width:100%;margin:0 0 4px;padding:9px 10px;font:inherit;font-size:14px;
    color:var(--text);background:var(--panel);border:1px solid var(--line);border-radius:8px;outline:none}
  .msel-search:focus{border-color:var(--accent)}
  .msel-opt{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:14px}
  .msel-opt:hover{background:var(--panel)}
  .msel-opt input{width:17px;height:17px;flex:none;accent-color:var(--accent);margin:0}
  .g-rt{width:15px;height:15px;min-height:0;flex:none;accent-color:var(--muted);cursor:pointer;margin:0;opacity:.8}
  .g-rt:checked{accent-color:var(--accent);opacity:1}
  /* tap-to-search replacement for long native selects (searchifySelect) */
  .selpick{width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:11px 12px;font:inherit;font-size:15px;min-height:44px;cursor:pointer;
    display:flex;align-items:center;justify-content:space-between}
  .selpick::after{content:'▾';color:var(--muted);margin-left:8px;flex:none}
  .selpick.needs{border-color:var(--red)}
  .msel-toggle.needs{border-color:var(--red);box-shadow:0 0 0 2px rgba(239,77,86,.22)}

  /* big action buttons (BA home) */
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .bigbtn{--c:var(--accent);display:flex;flex-direction:column;align-items:center;gap:8px;padding:22px 10px;border-radius:16px;
    background:linear-gradient(165deg, color-mix(in srgb, var(--c) 20%, var(--panel)) 0%, color-mix(in srgb, var(--c) 6%, var(--panel)) 100%);
    border:1.5px solid color-mix(in srgb, var(--c) 45%, transparent);cursor:pointer;font:inherit;color:var(--text);
    box-shadow:0 4px 16px color-mix(in srgb, var(--c) 16%, transparent);transition:transform .12s cubic-bezier(.34,1.56,.64,1),filter .12s}
  .bigbtn:hover{filter:brightness(1.08)} .bigbtn:active{transform:scale(.97)}
  .bigbtn .ic{font-size:30px;filter:saturate(1.2)}
  .bigbtn b{font-size:15px;color:color-mix(in srgb, var(--c) 45%, var(--text))}
  .bigbtn.b-miles{--c:#3d9bff} .bigbtn.b-exp{--c:#2fbf71}
  /* segmented state filter (All / CA / FL / NY) */
  .segbtns{display:flex;gap:6px;flex-wrap:wrap}
  .segbtn{padding:6px 15px;border-radius:999px;border:1px solid var(--line);background:var(--panel2);
    color:var(--muted);font:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:background .12s,border-color .12s,color .12s}
  .segbtn:hover{border-color:var(--accent2);color:var(--text)}
  .segbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
  /* multi-leg trip logger */
  .legcard{border:1.5px solid color-mix(in srgb, var(--accent) 55%, transparent);border-radius:14px;padding:13px;margin-top:9px;
    background:linear-gradient(160deg, color-mix(in srgb, var(--accent) 12%, var(--panel)) 0%, var(--panel) 70%)}
  .leghd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .leghd b{font-size:15px}
  .legsum{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:10px 13px;margin-top:9px;cursor:pointer;background:var(--panel2);transition:border-color .12s}
  .legsum:hover{border-color:var(--accent2)}
  .legsum .t{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .legsum .lgn{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .legx{background:transparent;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:2px 4px;margin-left:4px;line-height:1}
  .legx:hover{color:var(--red)}

  /* totals */
  .totbar{display:flex;gap:8px}
  .tot{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px 9px}
  .tot .k{font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tot .v{font-size:clamp(13px,4vw,20px);font-weight:750;margin-top:2px;white-space:nowrap}
  .tot.sum .v{color:var(--accent2)}

  /* list items */
  .item{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--line)}
  .item:first-child{border-top:0}
  .item .ic{width:34px;height:34px;border-radius:9px;background:var(--panel2);display:flex;align-items:center;
    justify-content:center;font-size:17px;flex:none}
  .item .t{font-weight:600} .item .s{font-size:12px;color:var(--muted)}
  .item .amt{margin-left:auto;font-weight:700;white-space:nowrap}
  .item.todo-fix{cursor:pointer;border-radius:10px;margin:0 -6px;padding-left:6px;padding-right:6px}
  .item.todo-fix:active{background:var(--panel2)}
  .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .badge.draft{color:var(--muted)} .badge.submitted{color:var(--yellow);border-color:var(--yellow)}
  .badge.approved{color:var(--green);border-color:var(--green)}
  .badge.rejected{color:var(--red);border-color:var(--red)}
  .thumb{width:42px;height:42px;border-radius:8px;object-fit:cover;background:var(--panel2);flex:none;border:1px solid var(--line)}

  /* bottom tab bar (BA) */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;max-width:560px;margin:0 auto;
    display:flex;background:rgba(23,26,33,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);
    padding-bottom:var(--safe-b)}
  .tabbar button{flex:1;border:0;background:transparent;color:var(--muted);font:inherit;font-size:11px;
    font-weight:650;padding:9px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .tabbar button .ic{font-size:20px}
  .tabbar button.on{color:var(--accent2)}

  /* modal */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;align-items:flex-end;
    justify-content:center}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;
    max-width:560px;max-height:92vh;overflow:auto;padding:16px 16px calc(20px + var(--safe-b))}
  @media(min-width:560px){.backdrop{align-items:center}.sheet{border-radius:18px}}
  .sheetx{position:sticky;top:0;float:right;width:32px;height:32px;flex:none;border-radius:9px;
    border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-size:15px;line-height:1;
    cursor:pointer;display:flex;align-items:center;justify-content:center;margin:-4px -4px 4px 10px;z-index:3}
  .sheetx:hover{color:var(--text);border-color:var(--muted)}
  .sheet h3{margin:2px 0 4px}

  /* toast */
  #toast{position:fixed;left:50%;bottom:calc(86px + var(--safe-b));transform:translateX(-50%);z-index:80;
    background:#000;border:1px solid var(--line);color:#fff;padding:10px 15px;border-radius:11px;font-size:13px;
    box-shadow:var(--shadow);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:90%}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  #toast.err{border-color:var(--red)} #toast.ok{border-color:var(--green)}

  /* spinner */
  .spin{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;
    animation:sp .7s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}
  .loading{display:flex;align-items:center;gap:10px;color:var(--muted);justify-content:center;padding:24px}

  /* admin table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  td.num,th.num{text-align:right;white-space:nowrap}

  /* collapsible dispensary groups */
  .dghead{display:flex;align-items:center;gap:8px;padding:11px 2px;cursor:pointer;border-top:1px solid var(--line);user-select:none}
  .dghead .caret{color:var(--muted);width:12px;text-align:center;flex:none}
  .dghead b{font-size:14px} .dghead:hover b{color:var(--accent2)}
  .dgbody{border-top:1px solid var(--line)}

  /* admin view switcher */
  .vswitch{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:9px 14px;border-bottom:1px solid var(--line)}

  /* spreadsheet-style quick-entry grid */
  .gridwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:10px}
  table.grid{border-collapse:collapse;min-width:560px;width:100%}
  table.grid th{background:var(--panel2);color:var(--muted);font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;
    font-weight:700;padding:6px 7px;white-space:nowrap;text-align:left;border-bottom:1px solid var(--line)}
  table.grid td{padding:0;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
  table.grid td:last-child{border-right:0}
  table.grid input{border:0;border-radius:0;background:transparent;padding:8px 7px;font:inherit;font-size:13px;min-height:38px}
  table.grid input:focus{background:var(--panel2);box-shadow:inset 0 0 0 1.5px var(--accent)}
  table.grid input.gnum{width:78px;text-align:right} table.grid input.gdate{width:124px}
  table.grid select{border:0;background:transparent;color:var(--text);font:inherit;font-size:13px;padding:8px 6px;min-height:38px;width:100%;min-width:118px}
  table.grid select:focus{background:var(--panel2);box-shadow:inset 0 0 0 1.5px var(--accent)}
  .rcell{display:flex;align-items:center;gap:6px;padding:4px 7px;min-height:38px}
  .rchip{cursor:pointer;color:var(--accent2);font-size:12px;white-space:nowrap}
  .rthumb{width:30px;height:30px;border-radius:5px;object-fit:cover;border:1px solid var(--line);cursor:pointer;flex:none}
  .rrepl{cursor:pointer;color:var(--muted);font-size:14px}
  .floatsug{position:fixed;z-index:120;box-shadow:var(--shadow);max-width:340px}
  table.grid th:first-child,table.grid td.gdel{width:26px;padding:0;text-align:center}
  .gx{border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;padding:8px 3px;line-height:1}
  .gx:hover{color:var(--red)}
  table.grid td.gstat{width:70px;text-align:center;padding:0 4px} table.grid th.gstat{width:70px}
  table.grid tr[data-ro] input,table.grid tr[data-ro] select{color:var(--muted);opacity:.85}
  table.grid input:disabled,table.grid select:disabled,table.grid button.cellpick:disabled{background:transparent;cursor:default;color:var(--muted)}
  table.grid button.cellpick{width:100%;min-width:130px;text-align:left;border:0;background:transparent;color:var(--text);
    font:inherit;font-size:13px;padding:8px 6px;min-height:38px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  table.grid button.cellpick:hover{background:var(--panel2)}
  table.grid button.cellpick.needs{box-shadow:inset 0 0 0 1.5px var(--red)}
  table.grid button.cellpick .pkph{color:var(--muted)}
  .pklist{max-height:52vh;overflow-y:auto;margin-top:8px;border:1px solid var(--line);border-radius:10px;padding:4px}
  /* day-grouped review/edit grid */
  .dayblk{border:1px solid var(--line);border-radius:11px;margin-top:12px;overflow:hidden}
  .dayblk.empty{opacity:.55}
  .dayhd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;background:var(--panel2)}
  .dayhd .dw{color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.4px;margin-right:7px}
  .dayhd .dd{font-weight:750;font-size:14px}
  .dayhd .dsum{color:var(--muted);font-size:11.5px;white-space:nowrap;text-align:right}
  .daysec{padding:0} .daysec+.daysec{border-top:1px solid var(--line)}
  .daylbl{display:flex;align-items:center;justify-content:space-between;font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;padding:7px 12px 3px}
  .dayadd{display:flex;gap:6px;flex-wrap:wrap;padding:9px 12px}
  /* ── bubbly per-day view: wide stacked pills (hours → miles → expenses) ── */
  .daybub{display:flex;flex-direction:column;gap:8px;padding:11px 12px}
  .bub{--c:var(--accent);position:relative;width:100%;text-align:left;
    border:1.5px solid color-mix(in srgb, var(--c) 48%, transparent);border-radius:16px;padding:11px 16px;
    background:linear-gradient(100deg, color-mix(in srgb, var(--c) 22%, var(--panel)) 0%, color-mix(in srgb, var(--c) 7%, var(--panel)) 100%);
    color:var(--text);cursor:pointer;font:inherit;display:flex;align-items:center;gap:12px;
    box-shadow:0 3px 12px color-mix(in srgb, var(--c) 18%, transparent), inset 0 1px 0 rgba(255,255,255,.05);
    transition:transform .12s cubic-bezier(.34,1.56,.64,1), filter .12s}
  .bub:hover{filter:brightness(1.08)} .bub:active{transform:scale(.985)}
  .bub-miles{--c:#3d9bff} .bub-exp{--c:#2fbf71} .bub-hours{--c:#7c5cff}
  .bub-l{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
  .bub-ic{font-size:20px;line-height:1;filter:saturate(1.2);flex:none}
  .bub-lc{display:flex;flex-direction:column;gap:1px;min-width:0}
  .bub-top{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:color-mix(in srgb, var(--c) 58%, var(--text))}
  .bub-sub{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bub-val{font-size:21px;font-weight:850;line-height:1;color:color-mix(in srgb, var(--c) 42%, var(--text));letter-spacing:-.3px;flex:none;white-space:nowrap}
  .bub.warn{border-style:dashed;border-color:var(--yellow)}
  .bub .bub-flag{position:absolute;top:-7px;right:-7px;font-size:12px;background:var(--panel);border-radius:50%;
    width:21px;height:21px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,.4)}
  .bub.locked{cursor:default;opacity:.82;box-shadow:none}
  .bub-addrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:1px}
  .bub-add{flex:1 1 0;min-width:120px;background:transparent;border:1.5px dashed var(--line);color:var(--muted);
    font:inherit;font-size:13px;font-weight:650;padding:11px 14px;border-radius:14px;cursor:pointer;text-align:center;
    transition:border-color .12s,color .12s}
  .bub-add:hover{border-color:var(--accent2);color:var(--accent2)}
  .daybub.none{color:var(--muted);font-size:12px;padding:8px 12px 12px}

  /* starting-location typeahead */
  .tsug{border:1px solid var(--line);border-radius:10px;margin-top:6px;overflow:hidden;background:var(--panel2);max-height:240px;overflow-y:auto}

function dispSplit(x, value){

// dispensaries a BA can pick: only those in their region (admins/region-less see all)
function baDispensaries(){ const r = state.preview || state.profile?.region; return state.dispensaries.filter(d => !r || !d.state || d.state === r); }
// Best-effort: does a typed destination clearly name one known store? Returns its id ONLY
// on a confident, UNIQUE match (never guesses between two candidates), so a real store
// visit links itself even when the BA didn't tap the suggestion chip. Placeholder
// ('* ...') stores never auto-match — those are chosen deliberately.
function matchDispByText(text){
  const norm=s=>String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
  const tn=norm(text); if(tn.length<4) return null;
  const uniq=arr=>arr.length===1?arr[0].id:null;
  const named=baDispensaries().filter(d=>d.active!==false && !/^\*/.test(d.name||''));
  let c=named.filter(d=>norm(d.name)===tn); if(c.length) return uniq(c);          // exact name
  c=named.filter(d=>{ const n=norm(d.name); return n.length>=6 &&                 // dest contains the whole store name
    (tn===n || tn.startsWith(n+' ') || tn.endsWith(' '+n) || tn.includes(' '+n+' ')); }); if(c.length) return uniq(c);
  c=named.filter(d=>{ const n=norm(d.name); return tn.length>=5 && n.startsWith(tn+' '); }); if(c.length) return uniq(c);  // typed a strong prefix
  // Address match — covers the office ("18-33 42nd St") and any store where the BA typed
  // the street address. Match on the first 3 tokens (number + street) when the text looks
  // like an address; includes '* ' placeholders (the office) since it's matched by address.
  if(/\d/.test(tn)){
    const sig=s=>norm(s).replace(/^(\d+) (\d+) /,'$1$2 ').split(' ').slice(0,3).join(' ');   // "18-33 42nd" ≡ "1833 42nd" (Queens hyphenated numbers)
    const ds=sig(text);
    if(ds.split(' ').length>=2){
      c=baDispensaries().filter(d=>d.active!==false && d.address && sig(d.address)===ds);
      if(c.length) return uniq(c);
    }
  }
  // token-subset fallback: every typed word (≥4 chars) appears in exactly ONE store's name.
  // Covers hand-abbreviated labels like "Flowery (Richmond)" → The Flowery … Richmond Ave.
  const toks=tn.split(' ').filter(t=>t.length>=4);
  if(toks.length>=2){
    c=named.filter(d=>{ const n=norm(d.name); return toks.every(t=>n.includes(t)); });
    if(c.length) return uniq(c);
  }
  return null;
}
// everything a store can be found by in a picker search: trade name, legal/DBA name, address
function dispSearchText(d){ return [d.name, d.legal_name, d.address].filter(Boolean).join(' '); }
// a typed store NAME → that store's saved street address (for distance calcs the
// geocoder can trust — ORS can't reliably geocode business names)
function dispAddrByText(text){
  const id=matchDispByText(text); if(!id) return null;
  const d=(state.dispensaries||[]).find(x=>x.id===id);
  return (d && d.address && !/placeholder/i.test(d.address)) ? d.address : null;
}
// first-3-token signature of an address (mirrors calc-distance's addrSig) — lets us tell
// when a typed Destination is really the BA's home ("11 Arthur St" ≡ their base address)
function addrSig(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim().replace(/^(\d+) (\d+) /,'$1$2 ').split(' ').slice(0,3).join(' '); }
function isHomeAddr(text, home){ if(/^\s*home\s*$/i.test(text||'')) return true; const t=addrSig(text); return !!(home && t && t===addrSig(home)); }
// Resolve a trip's Start + Destination against the store list + the owner's home.
// A place that IS a known store shows the store's canonical name (so Location / Start /
// Destination read identically when they're the same place). The trip's Location follows
// the DESTINATION store — or, when the destination is home (an "end of shift" leg), the
// START store, so return-home mileage still counts toward the dispensary visited.
function resolveTripPlaces(startText, destText, home){
  const startId=matchDispByText(startText), destId=matchDispByText(destText);
  const destIsHome=isHomeAddr(destText, home);
  return { startId, destId, destIsHome,
    startCanon: startId?dispName(startId):startText,
    destCanon:  destId ?dispName(destId): destText,
    linkDispId: destId || (destIsHome ? startId : null) };
}

const DEFAULT_LABOR_KINDS = ['Store visit','Education talk','Demo / PAD','Brand event','Travel','Admin'];

}
const NEW_RETAILER='* New retailer';
const US_STATES=[['AL','Alabama'],['AK','Alaska'],['AZ','Arizona'],['AR','Arkansas'],['CA','California'],['CO','Colorado'],['CT','Connecticut'],['DE','Delaware'],['DC','District of Columbia'],['FL','Florida'],['GA','Georgia'],['HI','Hawaii'],['ID','Idaho'],['IL','Illinois'],['IN','Indiana'],['IA','Iowa'],['KS','Kansas'],['KY','Kentucky'],['LA','Louisiana'],['ME','Maine'],['MD','Maryland'],['MA','Massachusetts'],['MI','Michigan'],['MN','Minnesota'],['MS','Mississippi'],['MO','Missouri'],['MT','Montana'],['NE','Nebraska'],['NV','Nevada'],['NH','New Hampshire'],['NJ','New Jersey'],['NM','New Mexico'],['NY','New York'],['NC','North Carolina'],['ND','North Dakota'],['OH','Ohio'],['OK','Oklahoma'],['OR','Oregon'],['PA','Pennsylvania'],['RI','Rhode Island'],['SC','South Carolina'],['SD','South Dakota'],['TN','Tennessee'],['TX','Texas'],['UT','Utah'],['VT','Vermont'],['VA','Virginia'],['WA','Washington'],['WV','West Virginia'],['WI','Wisconsin'],['WY','Wyoming']];

// Picking "* New retailer" anywhere opens this mini-form on a second layer, creates the

function quickAddRetailerSheet(onSaved){

// plain <select>: picking "* New retailer" opens the mini-form and selects the created store
function wireNewRetailerSelect(sel, onCreated){
  if(!sel) return;

      sel.value=d.id; prev=d.id;

function dispChipsHtml(selectedIds, opts={}){
  const all = (opts.all ? (state.dispensaries||[]).filter(d=>d.active!==false) : baDispensaries()).slice().sort(dispSort);
  const sel = new Set((selectedIds||[]).filter(Boolean));
  const id = opts.id || 'dchips';
  if(!all.length) return `<div class="small muted" style="margin-top:6px">No dispensaries yet.</div>`;
  const selNames=all.filter(d=>sel.has(d.id)).map(d=>d.name);
  const sum = !selNames.length ? '<span class="muted">Select stores…</span>'
    : (selNames.length<=2 ? esc(selNames.join(', ')) : `${esc(selNames[0])} <span class="muted">+${selNames.length-1} more</span>`);
  return `<div class="msel" id="${id}" data-all="${opts.all?'1':''}">
    <button type="button" class="msel-toggle${opts.needs?' needs':''}"><span class="msel-sum">${sum}</span><span class="msel-caret">▾</span></button>
    <div class="msel-menu hide">
      <input class="msel-search" type="text" placeholder="🔍 Type to search stores…" autocomplete="off">
      ${all.map(d=>`<label class="msel-opt"><input type="checkbox" data-id="${d.id}" data-name="${esc(d.name)}" data-search="${esc(dispSearchText(d))}" ${sel.has(d.id)?'checked':''}><span>${esc(d.name)}</span></label>`).join('')}

function wireDispChips(id){
  const root=$('#'+(id||'dchips')); if(!root) return;
  const tog=root.querySelector('.msel-toggle'), menu=root.querySelector('.msel-menu'), sum=root.querySelector('.msel-sum');
  const search=root.querySelector('.msel-search'), noneEl=root.querySelector('.msel-none');
  const applyFilter=()=>{
    const q=(search?.value||'').trim().toLowerCase();
    let shown=0;
    root.querySelectorAll('.msel-opt').forEach(o=>{
      const inp=o.querySelector('input');
      const hay=((inp?.dataset.search||inp?.dataset.name)||'').toLowerCase();   // name + DBA + address
      const hit=!q || q.split(/\s+/).every(t=>hay.includes(t));
      o.classList.toggle('hide',!hit); if(hit) shown++;
    });
    if(noneEl) noneEl.classList.toggle('hide', shown>0);
  };
  if(tog) tog.onclick=()=>{
    menu.classList.toggle('hide'); root.classList.toggle('open',!menu.classList.contains('hide'));
    if(!menu.classList.contains('hide') && search){ search.value=''; applyFilter(); setTimeout(()=>search.focus(),50); }
  };
  if(search) search.addEventListener('input', applyFilter);
  root.querySelectorAll('.msel-opt input').forEach(cb=>cb.onchange=()=>{
    if(cb.checked && cb.dataset.name===NEW_RETAILER){
      cb.checked=false;
      quickAddRetailerSheet(d=>{
        const selected=[...root.querySelectorAll('.msel-opt input:checked')].map(c=>c.dataset.id);
        selected.push(d.id);
        const holder=document.createElement('div');
        holder.innerHTML=dispChipsHtml(selected,{all:root.dataset.all==='1', id:root.id});
        root.replaceWith(holder.firstElementChild);
        wireDispChips(root.id);
      });
      return;
    }
    if(sum) sum.innerHTML=mselSummary(root);
    if(tog && root.querySelector('.msel-opt input:checked')) tog.classList.remove('needs');   // picked a store → clear the red "needs" flag
  });
}
function readDispChips(id){ const root=$('#'+(id||'dchips')); return root?[...root.querySelectorAll('.msel-opt input:checked')].map(c=>c.dataset.id):[]; }
// build the {dispensary_ids, dispensary_id} patch fields from a dropdown group
function dispPatch(id){ const ids=readDispChips(id); return { dispensary_ids: ids.length?ids:null, dispensary_id: ids.length?ids[0]:null }; }
function busy(btn, on){ if(!btn) return; btn.disabled=on; btn.dataset._txt ??= btn.innerHTML;
  btn.innerHTML = on ? '<span class="spin"></span>' : btn.dataset._txt; }

async function compress(file, max=1600, q=0.7){
  try{
    const bmp = await createImageBitmap(file);
    let {width:w,height:h}=bmp;
    if(Math.max(w,h)>max){ const s=max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(bmp,0,0,w,h);
    return await new Promise(r=>c.toBlob(r,'image/jpeg',q));
  }catch(e){ return file; } // fall back to original if decode fails
}
async function uploadPhoto(bucket, file){
  const blob = await compress(file);
  const path = `${state.session.user.id}/${crypto.randomUUID()}.jpg`;
  const { error } = await supabase.storage.from(bucket).upload(path, blob, { contentType:'image/jpeg', upsert:false });
  if(error) throw error;
  return path;
}
async function signedUrl(bucket, path, secs=3600){
  if(!path) return null;
  const { data } = await supabase.storage.from(bucket).createSignedUrl(path, secs);
  return data?.signedUrl || null;
}
async function callFn(name, body){
  const { data, error } = await supabase.functions.invoke(name, { body });
  if(error){ // surface the function's JSON error message if present
    let msg = error.message;
    try{ const j = await error.context?.json?.(); if(j?.message||j?.error) msg = j.message||j.error; }catch{}
    throw new Error(msg);
  }
  return data;
}

/* ─────────────────────────── boot ─────────────────────────── */
async function boot(){
  if(!CONFIGURED) return renderConfig();
  const { data:{ session } } = await supabase.auth.getSession();
  state.session = session;
  supabase.auth.onAuthStateChange((_e, s)=>{ state.session = s; if(!s){ state.profile=null; render(); } });
  if(session) await loadMe();
  render();
}
async function loadMe(){
  try{
    const { data: prof, error } = await supabase.from('profiles').select('*').eq('id', state.session.user.id).single();
    if(error || !prof){ state.loadError = error?.message || 'Your profile could not be found.'; state.profile=null; return; }
    state.loadError = null; state.profile = prof;
    const { data: s } = await supabase.from('app_settings').select('*').eq('id',1).single();
    state.settings = s;
    // make sure today's period exists, then load periods + dispensaries
    await supabase.rpc('ensure_period');
    const { data: per } = await supabase.from('pay_periods').select('*').order('start_date',{ascending:false});
    state.periods = per||[];
    const _t = todayISO();
    state.period = state.periods.find(p=>p.start_date<=_t && p.end_date>=_t)   // current
      || state.periods.find(p=>p.end_date<_t)                                  // else most recent past (never default to a future period)
      || state.periods[0] || null;
    const { data: disp } = await supabase.from('dispensaries').select('*').eq('active',true).order('name');
    state.dispensaries = (disp||[]).sort(dispSort);
    // labor kinds (admin-editable list); fall back to the defaults if the table isn't reachable
    try{ const { data: lk } = await supabase.from('labor_kinds').select('*').order('sort'); if(lk&&lk.length) state.laborKinds=lk; }catch{}
    // recent start/destination labels for the trip autocomplete
    const { data: rt } = await supabase.from('trips').select('start_label,dest_label').eq('ba_id',state.session.user.id).order('created_at',{ascending:false}).limit(60);
    const places=new Set(); (rt||[]).forEach(t=>{ if(t.start_label)places.add(t.start_label); if(t.dest_label)places.add(t.dest_label); });
    state.recentPlaces=[...places].filter(p=>p&&p!=='📍 Current location').slice(0,30);
  }catch(e){ state.loadError = String(e?.message||e); state.profile=null; }
}
// refresh the cached pay-period list (e.g. periods added since the app loaded)
async function reloadPeriods(){
  const { data } = await supabase.from('pay_periods').select('*').order('start_date',{ascending:false});
  if(data && data.length) state.periods=data;
}
// after saving an item, make sure the selected period covers that item's date so
// it's actually visible (a back/forward-dated item lands in a different period).
async function ensurePeriodForDate(date){
  try{
    await supabase.rpc('ensure_period', { d: date });
    const { data } = await supabase.from('pay_periods').select('*').order('start_date',{ascending:false});
    state.periods = data || state.periods;
    const p = state.periods.find(x=>x.start_date<=date && x.end_date>=date);
    if(p) state.period = p;

function openSheet(html){
  closeSheet();

  b.querySelector('.sheetx').onclick=closeSheet;

  setTimeout(()=>b.querySelectorAll('select').forEach(s=>searchifySelect(s)),0);

// Replace a long native <select> with a button that opens the searchable picker.
// The select stays in the DOM (hidden) as the value holder, so all existing
// .value reads and change handlers keep working untouched.
function searchifySelect(sel, title){
  if(!sel || sel._searchified || sel.disabled || sel.options.length<8) return;
  sel._searchified=true;
  if(!title){ let el=sel.previousElementSibling;                       // use the field's label as the picker title
    while(el && !(el.tagName==='LABEL'&&el.classList.contains('fl'))) el=el.previousElementSibling;
    title=(el?el.childNodes[0]?.textContent:'')?.trim()||'Choose'; }
  const btn=document.createElement('button'); btn.type='button'; btn.className='selpick'+(sel.classList.contains('needs')?' needs':'');
  const label=()=>{ const o=sel.options[sel.selectedIndex];
    btn.innerHTML=(o&&o.text.trim())?esc(o.text):'<span class="pkph">— pick —</span>';
    btn.classList.toggle('needs', sel.classList.contains('needs')); };
  sel.style.display='none'; sel.insertAdjacentElement('afterend', btn); label();
  sel.addEventListener('change', label);
  const NONE='~none~';
  btn.onclick=()=>cellPickerSheet({ title, multi:false,
    options:[...sel.options].map(o=>({id:o.value===''?NONE:o.value, name:o.text, search:o.dataset.search||undefined})),
    selected: sel.value===''?[NONE]:[sel.value],
    onSave:ids=>{ const v=ids[0];
      if(v===undefined) return;                                        // unchecked current = no change
      sel.value = v===NONE?'':v; sel.classList.remove('needs');
      sel.dispatchEvent(new Event('change',{bubbles:true})); label(); } });
}
function closeSheet(){ $('#sheet')?.remove(); }
// clear the red "missing" highlight off a field once it's filled — covers plain
// inputs AND searchified selects (the visible .selpick button mirrors the hidden select)
function clearNeed(el){ if(!el) return; el.classList.remove('needs');
  const b=el.nextElementSibling; if(b&&b.classList.contains('selpick')) b.classList.remove('needs'); }
// second-layer sheet: overlays whatever is already on screen (the admin detail sheet,
// or the home) WITHOUT destroying it, so closing returns you to exactly where you were

// Pay-period phase relative to today, and who may edit it.
function actingAsBA(){ return !!state.preview || state.profile?.role!=='admin'; }

function isFieldWorker(b){ return !!b && (b.role==='ba' || (b.role==='admin' && !!b.region)); }
function periodPhase(p){ if(!p) return 'none'; const t=todayISO(); if(p.start_date>t) return 'future'; if(p.end_date<t) return 'past'; return 'current'; }
// In the BA surface only the current, open period is editable; upcoming/past are view-only
// (admins manage those from the admin tools). A real admin outside preview always passes.
function canEditPeriod(p){ if(!actingAsBA()) return true; return periodPhase(p)==='current' && p?.status!=='closed'; }

const ALL_PERIODS={ id:'all', label:'All pay periods', start_date:'all', end_date:'', status:'open' };
const isAllPeriods=p=>!!p && p.id==='all';
function periodPicker(onChange, opts={}){

  if(opts.hideFuture) list = list.filter(p=>periodPhase(p)!=='future');   // BAs can't pick a not-yet-started period

/* ── Report date range: presets + custom start/end. Reports query by trip_date / expense_date,
   so a range can span any set of days (not tied to a single pay period). ── */
const REPORT_PRESETS = [
  ['this_period','This pay period'],
  ['last_period','Last pay period'],
  ['this_month','This month'],
  ['last_month','Last month'],
  ['last_6_months','Last 6 months'],
  ['custom','Custom range'],
];
function isoLocal(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), da=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${da}`; }
// the period covering today (or most recent past), plus the one right before it
function periodPair(){
  const t=todayISO(); const ps=[...(state.periods||[])].sort((a,b)=>b.start_date.localeCompare(a.start_date));
  let i=ps.findIndex(p=>p.start_date<=t&&p.end_date>=t);
  if(i<0) i=ps.findIndex(p=>p.end_date<t);
  if(i<0) i=0;
  return { thisP:ps[i]||null, lastP:ps[i+1]||null };
}
function computeRange(mode){
  const t=todayISO(), now=new Date(t+'T00:00:00');
  if(mode==='this_period'){ const {thisP}=periodPair(); return thisP?{start:thisP.start_date,end:thisP.end_date}:null; }
  if(mode==='last_period'){ const {lastP}=periodPair(); return lastP?{start:lastP.start_date,end:lastP.end_date}:null; }
  if(mode==='this_month'){ const s=new Date(now.getFullYear(),now.getMonth(),1), e=new Date(now.getFullYear(),now.getMonth()+1,0); return {start:isoLocal(s),end:isoLocal(e)}; }
  if(mode==='last_month'){ const s=new Date(now.getFullYear(),now.getMonth()-1,1), e=new Date(now.getFullYear(),now.getMonth(),0); return {start:isoLocal(s),end:isoLocal(e)}; }
  if(mode==='last_6_months'){ const s=new Date(now.getFullYear(),now.getMonth()-5,1); return {start:isoLocal(s),end:isoLocal(now)}; }
  return null;   // custom: keep whatever start/end are set
}
function ensureRepRange(){
  if(state.repRange && state.repRange.start && state.repRange.end) return state.repRange;
  const r=computeRange('this_period');
  if(r) state.repRange={mode:'this_period', ...r};
  else { const mr=computeRange('this_month'); state.repRange={mode:'this_month', ...mr}; }
  return state.repRange;
}
function setRepPreset(mode){
  if(mode==='custom'){ state.repRange={...ensureRepRange(), mode:'custom'}; return; }
  const r=computeRange(mode);
  if(r) state.repRange={mode, ...r};
  else toast('No matching pay period yet','err');
}
function rangeControlsHtml(){
  const r=ensureRepRange();
  return `<div class="row"><div class="small muted grow">Date range</div>
      <select id="rpPreset">${REPORT_PRESETS.map(([v,l])=>`<option value="${v}" ${r.mode===v?'selected':''}>${l}</option>`).join('')}</select></div>
    <div class="row" style="margin-top:8px;gap:8px">
      <input type="date" id="rpStart" class="grow" value="${r.start}">
      <span class="muted small">to</span>
      <input type="date" id="rpEnd" class="grow" value="${r.end}"></div>`;
}
function wireRangeControls(rerender){
  const ps=$('#rpPreset'); if(ps) ps.onchange=()=>{ setRepPreset(ps.value); rerender(); };
  const s=$('#rpStart'), e=$('#rpEnd');
  const onDate=()=>{ const a=s.value||state.repRange.start, b=e.value||state.repRange.end;
    if(a>b) toast('Swapped so the start date comes first','');
    state.repRange={mode:'custom', start:a<=b?a:b, end:a<=b?b:a}; rerender(); };   // keep start ≤ end
  if(s) s.onchange=onDate; if(e) e.onchange=onDate;
}
function rangeLabel(){ const r=ensureRepRange(); return `${fmtDate(r.start)} – ${fmtDate(r.end)}`; }

/* ═══════════════════════════ BA SURFACE ═══════════════════════════ */
function renderBA(){

  wireTop(); wireSwitcher();
  $('#tab-home').onclick=()=>{state.baTab='home';drawBA();};

}
function baTabs(){
  const on=t=>state.baTab===t?'on':'';
  return `<div class="tabbar">
    <button id="tab-home" class="${on('home')}"><span class="ic">🏠</span>Home</button>
    <button id="tab-trip"><span class="ic">🚗</span>Trip</button>
    <button id="tab-exp"><span class="ic">🧾</span>Expense</button>
    <button id="tab-report" class="${on('report')}"><span class="ic">📊</span>Report</button>
    <button id="tab-loc" class="${on('loc')}"><span class="ic">📍</span>Locations</button>
  </div>`;
}
async function drawBA(){
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.remove('on'));
  const activeTab = ['home','loc','report'].includes(state.baTab) ? state.baTab : 'home';
  $(`#tab-${activeTab}`)?.classList.add('on');
  const m=$('#main');
  if(state.baTab==='loc') return drawLocations(m);
  if(state.baTab==='report') return baReport(m);
  await flushGrid();                                  // commit pending grid edits before reading
  const seq = state._drawSeq = (state._drawSeq||0)+1; // latest render wins
  m.innerHTML = `<div class="loading"><span class="spin"></span></div>`;

  // Periods the BA may see: current + past. A not-yet-started period stays hidden
  // until local midnight (12am) of its first day — periodPhase uses todayISO().
  const visible = state.periods.filter(p=>periodPhase(p)!=='future');
  const current = visible.find(p=>periodPhase(p)==='current') || null;
  const active  = current || visible[0] || null;      // pre-expanded period: the current one, else most recent
  state.period = active; state._activePid = active ? active.id : null;

  // one query for every period's submission → header status + stored totals (cheap, no per-period item loads)
  const { data:subs } = await supabase.from('submissions').select('*').eq('ba_id',state.session.user.id);
  if(seq !== state._drawSeq) return;
  const subByPid={}; (subs||[]).forEach(s=>subByPid[s.period_id]=s);

  // load only the active (expanded) period's items; past periods load lazily on expand
  let T=[],E=[],H=[],S=null;
  if(active){
    // salaried users: ensure this period's even-split daily labor exists before reading
    if(Number(state.profile?.salary_per_period)>0){
      try{ await supabase.rpc('generate_salary_labor',{p_ba:state.session.user.id, p_period:active.id}); }catch(_){}
    }
    const [tr,ex,hr] = await Promise.all([
      supabase.from('trips').select('*').eq('ba_id',state.session.user.id).eq('period_id',active.id).order('trip_date',{ascending:false}),
      supabase.from('expenses').select('*').eq('ba_id',state.session.user.id).eq('period_id',active.id).order('expense_date',{ascending:false}),
      supabase.from('hours').select('*').eq('ba_id',state.session.user.id).eq('period_id',active.id).order('work_date',{ascending:false}),
    ]);
    if(seq !== state._drawSeq) return;
    T=tr.data||[]; E=ex.data||[]; H=hr.data||[]; S=subByPid[active.id]||null;
  }
  state._T=T; state._E=E; state._H=H;
  const submittedLock = S && (S.status==='submitted'||S.status==='approved');
  const canEdit = active && canEditPeriod(active) && !submittedLock;
  // grid context for the shared day-grid (BA editing own current period)
  state.grid = canEdit ? { baId: state.session.user.id, isAdmin:false, per: active, region: state.preview || state.profile?.region, T, E, H, canAdd:true,
    onChange(){ dgRefreshSummary(); refreshTotals(); refreshItems(); } } : null;

  if(!visible.length){ m.innerHTML='<div class="card"><p class="muted small">No pay periods yet.</p></div>'; return; }

  m.innerHTML = visible.map(p=>{
    const open=active && p.id===active.id;
    const sub=subByPid[p.id];
    const headTotal = open ? reimburseTotal() : (sub&&sub.totals? Number(sub.totals.total||0) : null);
    const badge = sub ? `<span class="badge ${sub.status}">${sub.status}</span>` : '';
    return `<div class="peracc" data-pid="${p.id}" style="margin-bottom:12px">
      ${periodHeadHtml(p, open, headTotal, badge)}
      <div class="perbody ${open?'':'hide'}" data-body="${p.id}">${open ? (canEdit ? editableBodyHtml(S) : readOnlyBodyHtml(p,T,E,H)) : ''}</div>
    </div>`;
  }).join('');

  if(active && canEdit) wireEditableBody();
  m.querySelectorAll('.perhead').forEach(h=>h.onclick=()=>togglePeriod(h.dataset.pid));
}
// the expandable header bar for one pay period
function periodHeadHtml(p, open, total, badge){
  const tag = periodPhase(p)==='current'
    ? '<span class="badge" style="color:var(--accent2);border-color:var(--accent2)">current</span>'
    : '<span class="muted small">view only</span>';
  return `<div class="card perhead" data-pid="${p.id}" style="cursor:pointer;padding:13px 15px">
    <div class="row" style="justify-content:space-between;align-items:center;gap:8px">
      <div style="min-width:0;display:flex;align-items:center;gap:8px"><span class="caret" style="width:11px;color:var(--muted)">${open?'▾':'▸'}</span><b>${esc(p.label)}</b>${tag}</div>
      <div style="text-align:right;white-space:nowrap"><b class="pertot" style="color:var(--accent2)">${total!=null?money(total):'<span class="muted small" style="font-weight:400">—</span>'}</b> ${badge}</div>
    </div>
  </div>`;
}
// full editable surface for the current period (reads state._T/_E + the live grid)
function editableBodyHtml(S){
  const items=periodItems();

// what's missing on a trip/expense — drives the BA + admin to-do list
function itemIssues(x){
  const hasDisp = x.dispensary_id || (x.dispensary_ids && x.dispensary_ids.length);   // single or multi
  if(x._k==='hours') return hasDisp ? [] : ['a dispensary'];   // hours only ever need a dispensary link
  const trip = x._k==='trip';
  const out=[];
  if(!hasDisp) out.push(trip?'a location':'a dispensary');   // trips + expenses both need a store or a * placeholder
  if(trip){
    if(!x.kind) out.push('a category');                      // every trip needs an activity category
    if(!(Number(x.miles)>0)){
      const so=x.start_odo!=null, eo=x.end_odo!=null, hs=!!x.start_label, hd=!!x.dest_label;
      if(so!==eo) out.push('the 2nd odometer reading');
      else if(hs!==hd) out.push('a start + destination');
      else out.push('the miles');
    }
  } else {
    if(!(Number(x.amount)>0)) out.push('an amount');
    // receipts matter before payment; once approved (paid) a missing one is history,
    // not a to-do (e.g. historical toll/congestion charges that never had receipts)
    if(!x.receipt_path && x.status!=='approved') out.push('a receipt');
  }
  return out;
}

    const ph=inp.placeholder; inp.placeholder='reading…';

  wireOdo($('#fOsFile'), osEl); wireOdo($('#fOeFile'), oeEl);

  };
  osEl.addEventListener('input',recalcFromOdo); oeEl.addEventListener('input',recalcFromOdo);
  // flipping round-trip doubles/halves the miles in place (visible before saving)
  $('#fRound').onchange=()=>{ const m=Number(milesEl.value);
    if(m>0) milesEl.value=Math.round(m*($('#fRound').checked?2:0.5)*100)/100; };
  [dispEl,milesEl].forEach(el=>el.addEventListener('input',()=>{ el.classList.remove('needs'); $('#fMsg').textContent=''; }));
  $('#fSave').onclick=async()=>{

    const start=startEl.value.trim(), dest=destEl.value.trim();
    const os=osEl.value, oe=oeEl.value;

    if(!(miles>0)){ const s=Number(os),e=Number(oe); if(s&&e&&e>=s) miles=Math.round((e-s)*10)/10; }
    // no miles yet but both endpoints known → ask ORS once
    if(!(miles>0) && start && dest){
      busy(btn,true); $('#fMsg').style.color='var(--muted)'; $('#fMsg').textContent='Calculating distance…';
      try{ const body={roundtrip:$('#fRound').checked};   // match the (possibly just-toggled) round-trip setting
        if(startRes&&startRes.coords){ body.start_lat=startRes.coords.lat; body.start_lng=startRes.coords.lng; } else body.start_address=(startRes&&startRes.addr)||dispAddrByText(start)||start;
        // route destination = the Destination field (not the Location tag, which stays on the store)
        const fdId=(destRes&&destRes.dispId)||matchDispByText(dest);
        if(fdId){ body.dispensary_id=fdId; } else body.dest_address=(destRes&&destRes.addr)||dispAddrByText(dest)||dest;
        const r=await callFn('calc-distance',body);
        if(r&&r.ok && r.routes?.length){

    const patch={ trip_date:$('#fTDate').value||x.trip_date, dispensary_id:dispEl.value||null, kind:$('#fKind').value||null, start_label:start||null, dest_label:dest||null,

      method:hasOdo?'odometer':'manual', miles_source:hasOdo?'odometer':'manual' };
    if(startRes&&startRes.coords){ patch.start_lat=startRes.coords.lat; patch.start_lng=startRes.coords.lng; }
    if(osEl._photo) patch.start_photo=osEl._photo; if(oeEl._photo) patch.end_photo=oeEl._photo;

    busy(btn,true);
    const {data,error}=await supabase.from('trips').update(patch).eq('id',x.id).select('*').single();
    busy(btn,false);
    if(error){ $('#fMsg').style.color='var(--red)'; $('#fMsg').textContent='Couldn’t save: '+error.message; return; }
    const i=(state._T||[]).findIndex(o=>o.id===x.id);
    if(data.period_id && state.period && data.period_id!==state.period.id){
      if(i>=0) state._T.splice(i,1);
      toast(`Trip moved to the pay period covering ${fmtDate(data.trip_date)}`,'ok');
    } else { if(i>=0) state._T[i]=data; toast('Trip updated ✓','ok'); }
    closeSheet(); refreshItems(); refreshTotals(); renderGrid();
  };
}

// how many of this period's still-editable items are incomplete (drives submit gating)
function pendingTodos(){
  return periodItems().filter(x=>(x.status==='draft'||x.status==='rejected') && itemIssues(x).length).length;
}
function submitAreaHtml(){
  const pend=pendingTodos();

    <p class="small center" style="color:var(--yellow);margin-top:6px">Clear the ${pend} to-do item${pend>1?'s':''} above to submit.</p>`;

}
function wireSubmit(){ const b=$('#submitBtn'); if(b) b.onclick=()=>submitPeriod(); }
async function delItem(kind,id){
  if(kind==='hours') return;                        // payroll-managed — BAs can never delete hours
  if(!confirm('Delete this item?')) return;
  const { error } = await supabase.from(kind).delete().eq('id',id);
  if(error) return toast(error.message,'err');
  const arr = kind==='trips'?state._T:state._E; const i=arr.findIndex(x=>x.id===id); if(i>=0) arr.splice(i,1);
  toast('Deleted'); refreshItems(); refreshTotals(); renderGrid();
}
async function submitPeriod(){
  await flushGrid();                          // commit any pending grid edits before snapshotting state
  const T=state._T||[], E=state._E||[];
  const submittable = x => x.status==='draft' || x.status==='rejected';
  const ids=T.filter(submittable).map(x=>x.id), eids=E.filter(submittable).map(x=>x.id);
  if(!ids.length && !eids.length) return toast('Nothing to submit','err');
  // hard rule: every item must be complete (dispensary linked, miles/odometer set, amount + receipt) before submitting
  const incomplete=[...T.filter(submittable).map(x=>({...x,_k:'trip'})),...E.filter(submittable).map(x=>({...x,_k:'exp'}))]
    .filter(x=>itemIssues(x).length).length;
  if(incomplete) return toast(`Finish the ${incomplete} to-do item${incomplete>1?'s':''} above first — tap each one to fill it in.`,'err');
  if(!confirm('Submit all items in this period? You won’t be able to edit them after.')) return;
  const mile=T.reduce((a,x)=>a+Number(x.amount||0),0); const {reimb,card}=expSplit(E);
  const labor=(state._H||[]).reduce((a,x)=>a+Number(x.amount||0),0);   // recorded for reporting; NOT part of reimburse
  // record the submission FIRST so items are never locked without a workflow row
  const { error:se } = await supabase.from('submissions').upsert({
    ba_id:state.session.user.id, period_id:state.period.id, status:'submitted',
    submitted_at:new Date().toISOString(), totals:{mileage:mile, expenses:reimb, company_card:card, labor, total:mile+reimb}
  },{onConflict:'ba_id,period_id'});
  if(se) return toast('Submit failed: '+se.message,'err');
  if(ids.length){ const {error}=await supabase.from('trips').update({status:'submitted',reject_note:null}).in('id',ids);
    if(error) return toast('Submit failed: '+error.message,'err'); }
  if(eids.length){ const {error}=await supabase.from('expenses').update({status:'submitted',reject_note:null}).in('id',eids);
    if(error) return toast('Submit failed: '+error.message,'err'); }
  toast('Submitted — thank you!','ok'); drawBA();
}

/* ── reusable place typeahead: Home + dispensaries + recent + live ORS address ── */
function rememberPlaces(...labels){
  const cur=state.recentPlaces||[];
  for(const l of labels){ const v=(l||'').trim(); if(!v||v==='📍 Current location') continue;
    const i=cur.findIndex(p=>p.toLowerCase()===v.toLowerCase()); if(i>=0) cur.splice(i,1); cur.unshift(v); }

function placeItems(q, home){

  // Matches loosely: full-address substring, 'home', or any typed token hitting it
  // ('376 sto' → '376 Stockton St, Brooklyn…').
  q=(q||'').trim().toLowerCase(); const out=[];
  const base = home!==undefined ? home : state.profile?.base_address;
  const bl=(base||'').toLowerCase();
  if(base && (q===''||'home'.includes(q)||'base'.includes(q)||q.split(/\s+/).every(t=>bl.includes(t))))
    out.push({display:base, addr:base, dispId:null, label:'🏠 Home', sub:base});

  baDispensaries().filter(d=>!q||hitD(d)).slice(0,6)
    .forEach(d=>out.push({display:d.name, addr:d.address||d.name, dispId:d.id, label:'🏬 '+d.name, sub:d.address||''}));

  const paint=(items, searching)=>{
    if(!items.length && !searching){ box.classList.add('hide'); box.innerHTML=''; return; }
    let html=items.map((it,i)=>`<div class="sg" data-i="${i}"><b>${esc(it.label)}</b>${it.sub?`<span>${esc(it.sub)}</span>`:''}</div>`).join('');
    if(searching) html+=`<div class="sg searching"><span class="spin"></span>Searching addresses…</div>`;
    box.innerHTML=html; box.classList.remove('hide');
    box.querySelectorAll('.sg[data-i]').forEach(el=>el.onmousedown=ev=>{ ev.preventDefault();
      const it=items[+el.dataset.i]; input.value=it.display; box.classList.add('hide');
      onResolve({display:it.display, addr:it.addr, dispId:it.dispId}); });
  };
  const render=()=>{
    const q=input.value; local=opts.addressOnly?[]:placeItems(q, opts.home); clearTimeout(timer);
    const wantRemote = !!(q && q.trim().length>=3);
    paint(local, wantRemote);
    if(wantRemote) timer=setTimeout(async()=>{
      let r; try{ r=await callFn('geocode-suggest',{text:q}); }catch{ if(input.value===q) paint(local,false); return; }
      if(input.value!==q) return;
      const have=new Set(local.map(x=>x.display.toLowerCase()));
      const addr=(r?.suggestions||[]).filter(s=>!have.has(s.label.toLowerCase())).slice(0,5)
        .map(s=>({display:s.label, addr:s.label, dispId:null, label:'📍 '+s.label, sub:'address'}));
      paint([...local, ...addr], false);
    },250);
  };
  input.oninput=()=>{ onResolve({display:input.value, addr:input.value, dispId:null}); render(); };
  input.onfocus=render;
  input.onblur=()=>setTimeout(()=>box.classList.add('hide'),150);
}
// native <datalist> of known places for the spreadsheet grid inputs
function placeDatalist(){
  const set=new Set();
  if(state.profile?.base_address) set.add(state.profile.base_address);
  baDispensaries().forEach(d=>set.add(d.name));
  (state.recentPlaces||[]).forEach(p=>set.add(p));
  return `<datalist id="placeList">${[...set].map(p=>`<option value="${esc(p)}">`).join('')}</datalist>`;
}

/* ── Log trip sheet ── */
// presetDate → seed a new day's first leg. editTrip → open a SINGLE existing trip in the
// SAME leg form (edit mode), with Save/Delete instead of the multi-leg flow.
function tripSheet(presetDate, editTrip){
  if(!canEditPeriod(state.period) && !(editTrip && state.grid?.isAdmin)) return toast('This pay period is view-only — ask an admin to make changes.','err');
  const editMode = !!editTrip;
  const rate = Number(state.profile.rate_override ?? state.settings?.mileage_rate ?? 0.67);
  // The day's drive is logged one LEG at a time: Home → stop → stop → … → Home.
  // Each leg saves as its own trip; the next leg's start auto-fills from this leg's
  // destination. Saved legs collapse to a summary you can tap to re-open/edit.
  const newPart = (startLabel)=>({ startLabel:startLabel||'', startAddr:startLabel||'', startCoords:null,
    destLabel:'', destAddr:'', destDispId:null, method:'distance', miles:null, milesSrc:null, note:'',
    startOdo:null, endOdo:null, startPath:null, endPath:null, routePath:null, kind:null, tripId:null, saved:false });
  const partFromTrip = (t)=>({ startLabel:t.start_label||'', startAddr:t.start_label||'', startCoords:null,
    destLabel:t.dest_label||'', destAddr:'', destDispId:t.dispensary_id||null,
    method:(t.method==='odometer'?'odometer':'distance'), miles:t.miles!=null?Number(t.miles):null,
    milesSrc:t.miles_source||'manual', note:t.note||'', startOdo:t.start_odo, endOdo:t.end_odo,
    startPath:t.start_photo||null, endPath:t.end_photo||null, routePath:null, kind:t.kind||null, tripId:t.id, saved:true });
  const parts=[ editMode ? partFromTrip(editTrip) : newPart(state.profile.base_address||'') ];
  let activeIdx=0;

  openSheet(`
    <h3>${editMode?'Edit trip':"Log the day's miles"}</h3>
    <div class="small muted" style="margin:-4px 0 8px">${editMode?'Change anything below.':'One leg at a time — each saves on its own and feeds the next.'}</div>
    <label class="fl">Date</label><input id="tDate" type="date" value="${editMode?editTrip.trip_date:(presetDate||todayISO())}">
    <div id="partsHost" style="margin-top:6px"></div>
    <button class="btn ghost block" id="tAddLeg" style="margin-top:10px;display:none">＋ Add another leg</button>
    <button class="btn ${editMode?'ghost':'primary'} block" id="tDone" style="margin-top:10px">${editMode?'Cancel':'Done'}</button>
  `);
  $('#tDone').onclick=()=>{ closeSheet(); if(!editMode) state.baTab='home'; if(typeof drawBA==='function') drawBA(); };
  $('#tAddLeg').onclick=()=>{ const last=parts[parts.length-1]; parts.push(newPart(last?last.destLabel:'')); activeIdx=parts.length-1; render(); };
  render();

  function summaryHtml(p,i){
    return `<div class="legsum" data-i="${i}">
      <div class="grow" style="min-width:0">
        <div class="lgn">Leg ${i+1}${p.saved?'':' · draft'}</div>
        <div class="t">${esc(p.startLabel||'?')} <span class="muted">→</span> ${esc(p.destLabel||'?')}</div>
      </div>
      <div style="text-align:right;white-space:nowrap">${p.miles!=null?`<b>${p.miles} mi</b>`:'<span class="muted small">—</span>'}
        <button class="legx" data-del="${i}" title="remove leg">✕</button></div>
    </div>`;
  }
  function activeFormHtml(p,i){
    const seg=(m,ic,t,s)=>`<button class="${p.method===m?'on':''}" data-m="${m}"><span class="mi">${ic}</span><b>${t}</b><small>${s}</small></button>`;
    return `<div class="legcard">
      <div class="leghd"><b>${editMode?'Trip':'Leg '+(i+1)}</b>${(!editMode&&i>0)?'<span class="muted small">start = last stop (editable)</span>':''}</div>
      <label class="fl">How do you want the miles?</label>
      <div class="mtiles" id="tSeg">${seg('distance','📍','Addresses','A → B')}${seg('route','🗺','Nav screenshot','reads your map')}${seg('odometer','📷','Odometer','start &amp; end')}</div>
      <div id="tStartWrap" class="${p.method!=='distance'?'hide':''}">
        <label class="fl">Starting location</label>
        <div class="row" style="gap:8px">
          <input id="tStartLoc" class="grow" placeholder="home, dispensary, or address" value="${esc(p.startLabel)}" autocomplete="off">
          <button class="btn sm" id="tGps" type="button" style="white-space:nowrap">📍 Current</button>
        </div>
        <div id="tSug" class="tsug hide"></div>
        <div class="small muted" id="tStartHint" style="margin-top:4px"></div>
      </div>
      <label class="fl">Destination</label>
      <input id="tDest" placeholder="dispensary or address" value="${esc(p.destLabel)}" autocomplete="off">
      <div id="tSugDest" class="tsug hide"></div>
      <div id="tDistance" class="${p.method!=='distance'?'hide':''}" style="margin-top:12px"><button class="btn block" id="tCalc">Calculate miles</button></div>
      <div id="tRoutePanel" class="${p.method!=='route'?'hide':''}" style="margin-top:12px">
        <label class="btn block ghost">🗺 Upload route screenshot <span class="muted small">— we read the miles off it</span><input id="tRoute" type="file" accept="image/*" hidden></label>
        <div class="small muted" id="tRouteHint" style="margin-top:4px"></div>
      </div>
      <div id="tOdo" class="${p.method!=='odometer'?'hide':''}" style="margin-top:12px">
        <div class="row">
          <div class="grow"><label class="fl">Start odometer</label><input id="tStart" type="number" inputmode="decimal" placeholder="photo / number" value="${p.startOdo??''}">
            <label class="btn sm block ghost" style="margin-top:6px">📷 Start photo<input id="tStartPhoto" type="file" accept="image/*" capture="environment" hidden></label></div>
          <div class="grow"><label class="fl">End odometer</label><input id="tEnd" type="number" inputmode="decimal" placeholder="photo / number" value="${p.endOdo??''}">
            <label class="btn sm block ghost" style="margin-top:6px">📷 End photo<input id="tEndPhoto" type="file" accept="image/*" capture="environment" hidden></label></div>
        </div>
      </div>
      <label class="fl">Miles</label><input id="tMiles" type="number" inputmode="decimal" step="0.1" placeholder="calculated, or enter manually" value="${p.miles??''}">
      <label class="fl">Category</label>
      <select id="tKind"><option value="">— what kind of activity —</option>${laborKindNames().map(k=>`<option ${p.kind===k?'selected':''}>${esc(k)}</option>`).join('')}${p.kind&&!laborKindNames().includes(p.kind)?`<option selected>${esc(p.kind)}</option>`:''}</select>
      <label class="fl">Note (optional)</label><input id="tNote" placeholder="e.g. dropped samples, met buyer, BJ's lunch" value="${esc(p.note||'')}">
      <div id="tCost" class="small muted" style="margin-top:10px"></div>
      <button class="btn primary block" id="tSave" style="margin-top:12px">${editMode?'Save changes':(p.saved?'Update leg '+(i+1):'Save leg '+(i+1))}</button>
      ${p.tripId?`<button class="btn ghost block" id="tDel" style="margin-top:8px;color:var(--red);border-color:color-mix(in srgb, var(--red) 40%, transparent)">🗑 Delete ${editMode?'trip':'leg'}</button>`:''}
    </div>`;
  }
  function render(){
    const host=$('#partsHost'); if(!host) return;
    host.innerHTML = parts.map((p,i)=> i===activeIdx ? activeFormHtml(p,i) : summaryHtml(p,i)).join('');
    const ab=$('#tAddLeg'); if(ab) ab.style.display = (activeIdx<0 && parts.length) ? 'block' : 'none';
    host.querySelectorAll('.legsum').forEach(el=>el.onclick=e=>{ if(e.target.closest('[data-del]')) return; activeIdx=Number(el.dataset.i); render(); });
    host.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delLeg(Number(b.dataset.del)));
    if(activeIdx>=0) wireActive(parts[activeIdx], activeIdx);
  }
  async function delLeg(i){
    const p=parts[i];
    if(p.tripId){ const {error}=await supabase.from('trips').delete().eq('id',p.tripId); if(error) return toast('Couldn’t delete: '+error.message,'err'); toast('Trip deleted','ok'); }
    if(editMode){ closeSheet(); if(typeof drawBA==='function') drawBA(); return; }
    parts.splice(i,1);
    if(!parts.length){ parts.push(newPart(state.profile.base_address||'')); activeIdx=0; }
    else if(activeIdx>=parts.length || activeIdx===i) activeIdx=-1;
    else if(activeIdx>i) activeIdx--;
    render();
  }
  function wireActive(p,i){
    const showCost=()=>{ const c=$('#tCost'); if(c) c.innerHTML = (p.miles!=null&&p.miles>0) ? `Reimbursement: <b style="color:var(--accent2)">${money(p.miles*rate)}</b> &nbsp;<span class="muted">(${p.miles} mi × ${money(rate)})</span>` : ''; };
    showCost();
    $('#tSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{
      $('#tSeg').querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); p.method=b.dataset.m;
      $('#tStartWrap').classList.toggle('hide',p.method!=='distance');
      $('#tDistance').classList.toggle('hide',p.method!=='distance');
      $('#tRoutePanel').classList.toggle('hide',p.method!=='route');
      $('#tOdo').classList.toggle('hide',p.method!=='odometer');
    });
    $('#tMiles').oninput=e=>{ p.miles=e.target.value?Number(e.target.value):null; p.milesSrc='manual'; showCost(); };
    $('#tNote').oninput=e=>{ p.note=e.target.value||null; };
    searchifySelect($('#tKind'));   // tap-to-search category picker (re-applied each render)
    $('#tKind').onchange=e=>{ p.kind=e.target.value||null; };
    // a trip to an Office auto-defaults the category to General BA Activity/Admin (still editable)
    const officeKind=()=>{ const k=$('#tKind'); if(k && !p.kind && p.destDispId && /office/i.test(dispName(p.destDispId))){ p.kind=OFFICE_KIND; k.value=OFFICE_KIND; k.dispatchEvent(new Event('change',{bubbles:true})); } };
    $('#tGps').onclick=()=>{
      if(!navigator.geolocation) return toast('GPS not available on this device','err');
      $('#tStartHint').textContent='Getting your location…';
      navigator.geolocation.getCurrentPosition(pos=>{
        p.startCoords={lat:pos.coords.latitude,lng:pos.coords.longitude};
        $('#tStartLoc').value='📍 Current location'; p.startLabel='📍 Current location'; p.startAddr='';
        $('#tSug').classList.add('hide');
        $('#tStartHint').textContent=`Using GPS (${p.startCoords.lat.toFixed(4)}, ${p.startCoords.lng.toFixed(4)})`;
      }, ()=>{ toast('Couldn’t get location — allow access or type an address','err'); $('#tStartHint').textContent=''; },
        {enableHighAccuracy:true,timeout:10000,maximumAge:60000});
    };
    attachPlaceTypeahead($('#tStartLoc'), $('#tSug'), r=>{ p.startAddr=r.addr; p.startCoords=null; $('#tStartHint').textContent=''; });
    $('#tStartLoc').addEventListener('input', e=>{ p.startLabel=e.target.value; p.startCoords=null; });
    attachPlaceTypeahead($('#tDest'), $('#tSugDest'), r=>{ p.destAddr=r.addr; p.destDispId=r.dispId; officeKind(); });
    $('#tDest').addEventListener('input', e=>{ p.destLabel=e.target.value; p.destDispId=null; });
    $('#tCalc').onclick=async ()=>{
      const destText=$('#tDest').value.trim(); if(!destText) return toast('Enter a destination first','err');
      const body={ roundtrip:false };
      if(p.startCoords){ body.start_lat=p.startCoords.lat; body.start_lng=p.startCoords.lng; }
      else { const a=(p.startAddr||$('#tStartLoc').value).trim();
        if(a && a!=='📍 Current location'){
          // if the start is a known store/office, pass its cached coords or address (its
          // NAME alone — e.g. "* Office (CA)" — won't geocode)
          const sStore=(state.dispensaries||[]).find(d=>d.active!==false && d.name===a);
          if(sStore && sStore.lat!=null && sStore.lng!=null){ body.start_lat=sStore.lat; body.start_lng=sStore.lng; }
          else body.start_address=(sStore&&sStore.address)||dispAddrByText(a)||a;
        } }
      // route the destination as a STORE when we can (server resolves address-less stores by
      // name via Places); only a truly free address falls back to dest_address
      const destStore = p.destDispId || matchDispByText(destText);
      if(destStore) body.dispensary_id=destStore; else body.dest_address=dispAddrByText(destText)||p.destAddr||destText;
      const btn=$('#tCalc'); busy(btn,true);
      try{
        const r=await callFn('calc-distance', body);
        if(r.ok && r.routes?.length){
          let route=r.routes[0];
          if(r.routes.length>1){ const picked=await pickRoute(r.routes); if(picked) route=picked; }
          p.miles=Math.round(route.miles*100)/100; p.milesSrc=r.source; $('#tMiles').value=p.miles; showCost();
          toast(`Distance: ${p.miles} mi${route.summary?' · via '+route.summary:''}`,'ok');
        } else toast(r.message||'Enter miles manually','err');
      }catch(e){ toast(e.message,'err'); }
      busy(btn,false);
    };
    async function readOdo(file, which){
      const lbl = which==='start'?$('#tStart'):$('#tEnd');
      try{
        const path=await uploadPhoto('odometer',file);
        if(which==='start') p.startPath=path; else p.endPath=path;
        const r=await callFn('read-odometer',{path});
        if(r.ok && r.reading!=null){ lbl.value=r.reading; if(which==='start')p.startOdo=r.reading; else p.endOdo=r.reading; }
        else toast('Could not read odometer — type it in','err');
        recalcOdo();
      }catch(e){ toast(e.message,'err'); }
    }
    function recalcOdo(){
      const s=Number($('#tStart').value), e=Number($('#tEnd').value);
      if(s&&e&&e>=s){ p.miles=Math.round((e-s)*10)/10; p.milesSrc='odometer'; $('#tMiles').value=p.miles; }
      showCost();
    }
    $('#tStart').oninput=()=>{ p.startOdo=Number($('#tStart').value); recalcOdo(); };
    $('#tEnd').oninput  =()=>{ p.endOdo=Number($('#tEnd').value); recalcOdo(); };
    $('#tRoute').onchange=async e=>{
      const f=e.target.files[0]; if(!f) return; toast('Reading your route…');
      try{
        p.routePath=await uploadPhoto('odometer',f);
        const r=await callFn('read-route',{path:p.routePath});
        if(r&&r.ok&&r.miles!=null){
          p.miles=r.miles; p.milesSrc='route'; $('#tMiles').value=p.miles; showCost();
          $('#tRouteHint').textContent=`Read ${r.miles} mi${r.destination?' → '+r.destination:''} — double-check it`;
          if(r.destination && !$('#tDest').value.trim()){ $('#tDest').value=r.destination; p.destLabel=r.destination; }
          toast(`Route read: ${r.miles} mi`,'ok');
        } else { $('#tRouteHint').textContent='Screenshot saved — type the miles below.'; toast((r&&r.message)||'Couldn’t read the route — enter the miles manually','err'); }
      }catch(err){ $('#tRouteHint').textContent='Screenshot saved — type the miles below.'; toast('Route reader unavailable — enter the miles manually','err'); }
    };
    $('#tStartPhoto').onchange=e=>{ if(e.target.files[0]){toast('Reading photo…');readOdo(e.target.files[0],'start');} };
    $('#tEndPhoto').onchange  =e=>{ if(e.target.files[0]){toast('Reading photo…');readOdo(e.target.files[0],'end');} };
    { const del=$('#tDel'); if(del) del.onclick=()=>{ if(confirm(`Delete this ${editMode?'trip':'leg'}? This can’t be undone.`)) delLeg(i); }; }
    $('#tSave').onclick=async ()=>{
      p.startLabel=$('#tStartLoc')?($('#tStartLoc').value||p.startLabel):p.startLabel;
      p.destLabel=$('#tDest').value.trim(); p.note=$('#tNote').value||null;
      if($('#tKind')) p.kind=$('#tKind').value||p.kind||null;
      if(!p.destLabel) return toast('Enter a destination','err');
      if(!(p.miles>0)){ const s=Number($('#tStart').value), e=Number($('#tEnd').value); if(s&&e&&e>=s) p.miles=Math.round((e-s)*10)/10; }
      if(!(p.miles>0)) return toast('Need the miles for this leg','err');
      const btn=$('#tSave'); busy(btn,true);
      const startLoc = p.startCoords ? '📍 Current location' : (p.startLabel||null);
      const dId = p.destDispId||matchDispByText(p.destLabel)||null;
      const row={ ba_id:state.session.user.id, trip_date:$('#tDate').value, dispensary_id:dId,
        kind: p.kind || ((dId && /office/i.test(dispName(dId)))?OFFICE_KIND:null),
        method:(p.method==='route'?'distance':p.method), miles:p.miles, miles_source:p.milesSrc,
        dest_label:p.destLabel, start_label:startLoc, note:p.note, status:'draft', roundtrip:false };
      if(p.method==='odometer'){ row.start_odo=p.startOdo; row.end_odo=p.endOdo; row.start_photo=p.startPath; row.end_photo=p.endPath; }
      if(p.method==='distance' && p.startCoords){ row.start_lat=p.startCoords.lat; row.start_lng=p.startCoords.lng; }
      if(p.method==='route' && p.routePath) row.start_photo=p.routePath;
      let res;
      if(p.tripId) res=await supabase.from('trips').update(row).eq('id',p.tripId).select('id').single();
      else res=await supabase.from('trips').insert(row).select('id').single();
      busy(btn,false);
      if(res.error) return toast(res.error.message,'err');
      p.tripId=res.data.id; p.saved=true;
      rememberPlaces(startLoc, p.destLabel);
      await ensurePeriodForDate(row.trip_date);
      toast(editMode?'Trip updated ✓':`Leg ${i+1} saved ✓`,'ok');
      if(editMode){ closeSheet(); if(typeof drawBA==='function') drawBA(); return; }
      if(i===parts.length-1){ parts.push(newPart(p.destLabel)); activeIdx=parts.length-1; }
      else { activeIdx=-1; }
      render();
    };
  }
}
/* ── Add expense sheet ── */
function expenseSheet(presetDate){
  if(!canEditPeriod(state.period)) return toast('This pay period is view-only — ask an admin to make changes.','err');
  let receiptPath=null, ocr=null;
  const dispOpts = baDispensaries().map(d=>`<option value="${d.id}">${esc(d.name)}</option>`).join('');
  const cats=EXPENSE_CATEGORIES;
  openSheet(`
    <h3>Add an expense</h3>
    <label class="btn primary block" style="margin-top:4px">📷 Snap or upload receipt<input id="eFile" type="file" accept="image/*" hidden></label>
    <div class="small muted center" style="margin-top:4px">Snap it and you're back home instantly — the receipt details fill in on their own; finish any red fields on the worksheet.</div>
    <div id="eThumbWrap" class="hide" style="margin-top:10px;text-align:center"><img id="eThumb" class="thumb" style="width:120px;height:120px"></div>
    <div id="eOcr" class="small muted" style="margin-top:6px"></div>
    <label class="fl">Vendor</label><input id="eVendor" placeholder="e.g. Chevron">
    <div class="row">
      <div class="grow"><label class="fl">Amount</label><input id="eAmt" type="number" inputmode="decimal" step="0.01" placeholder="0.00"></div>
      <div class="grow"><label class="fl">Date</label><input id="eDate" type="date" value="${presetDate||todayISO()}"></div>
    </div>
    <label class="fl">Category</label><select id="eCat">${cats.map(c=>`<option>${c}</option>`).join('')}</select>
    <label class="fl">Paid with</label><select id="ePay">${PAYMENTS.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select>
    <label class="fl">Location <span class="muted">(tap all stores; cost splits evenly)</span></label>
    ${dispChipsHtml([], {id:'eDispChips'})}
    <label class="fl">Note (optional)</label><input id="eNote">
    <div id="eMsg" class="small" style="margin-top:8px;color:var(--red);min-height:1px"></div>
    <button class="btn block" id="eSave" style="margin-top:6px">Save without a photo</button>
    <button class="btn ghost block" id="eCancel" style="margin-top:8px">Cancel</button>
  `);
  $('#eCancel').onclick=closeSheet; wireDispChips('eDispChips');
  ['#eAmt','#eVendor','#eDate'].forEach(sel=>{ const el=$(sel); if(el) el.addEventListener('input',()=>{ el.classList.remove('needs'); $('#eMsg').textContent=''; }); });
  // Insert the draft (no blocking) and drop the BA on the Expenses worksheet.
  async function saveExpenseDraft(){
    const today=todayISO(), edv=$('#eDate').value;
    const ed = (edv && edv<=today) ? edv : today;     // empty / OCR-misread future date → today
    const amt = Number($('#eAmt').value)||0;
    const vendor = $('#eVendor').value.trim();
    if(!receiptPath && !(amt>0) && !vendor){ $('#eMsg').textContent='Snap a receipt or enter an amount first.'; return null; }
    const { data, error }=await supabase.from('expenses').insert({
      ba_id:state.session.user.id, expense_date:ed, ...dispPatch('eDispChips'),
      vendor:vendor||null, amount:amt, category:$('#eCat').value, payment:$('#ePay').value||'reimbursement', receipt_path:receiptPath,
      ocr_raw:ocr, note:$('#eNote').value||null, status:'draft'
    }).select('*').single();
    if(error){ $('#eMsg').textContent='Couldn’t save: '+error.message; return null; }   // surface the real reason inline
    closeSheet();
    toast(amt>0 && vendor ? 'Expense saved' : 'Saved — reading the receipt…','ok');
    state.gridMode='expenses'; state.baTab='home';
    await ensurePeriodForDate(ed); await drawBA();
    return data;
  }
  // Snap → upload → save instantly → home. OCR then fills the row in the background.
  $('#eFile').onchange=async e=>{
    const f=e.target.files[0]; if(!f) return;
    $('#eThumbWrap').classList.remove('hide'); $('#eThumb').src=URL.createObjectURL(f);
    $('#eOcr').innerHTML='<span class="spin"></span> Uploading…';
    try{ receiptPath=await uploadPhoto('receipts',f); }
    catch(err){ $('#eOcr').textContent='Upload failed — try again, or enter it manually below.'; return; }
    const saved = await saveExpenseDraft();
    if(saved) ocrFillInBackground(receiptPath, saved.id);
  };
  $('#eSave').onclick=async ()=>{ const b=$('#eSave'); busy(b,true); const ok=await saveExpenseDraft(); if(!ok) busy(b,false); };  // manual (no-photo) entry
}
// After a snapped receipt is saved instantly, the OCR runs here and fills the
// still-empty fields in place when it returns — the popup never waits on it.
async function ocrFillInBackground(path, id){
  try{
    const r=await callFn('extract-receipt',{path});
    if(!r) return;
    const row=(state._E||[]).find(x=>x.id===id)||{};
    const patch={ ocr_raw:r.raw||r };
    if(r.ok){
      if(r.total!=null && !(Number(row.amount)>0)) patch.amount=r.total;
      if(r.vendor && !((row.vendor||'').trim())) patch.vendor=r.vendor;
      if(r.category && (!row.category || row.category===EXPENSE_CATEGORIES[0])) patch.category=r.category;
    }
    const { data, error }=await supabase.from('expenses').update(patch).eq('id',id).eq('status','draft').select('*').single();
    if(error||!data) return;
    const i=(state._E||[]).findIndex(x=>x.id===id); if(i>=0) state._E[i]=data;
    refreshItems(); refreshTotals(); fillGridRowFromOcr(id, data); gridTotal();
  }catch{}
}
// fill a draft's grid cells without rebuilding the grid (won't clobber in-progress edits)
function fillGridRowFromOcr(id, data){
  const host=$('#gridcard'); if(!host) return;
  const tr=host.querySelector(`.g-body tr[data-id="${CSS.escape(id)}"]`); if(!tr) return;
  const amt=tr.querySelector('.g-amt'), desc=tr.querySelector('.g-desc'), cat=tr.querySelector('.g-cat');
  if(amt && document.activeElement!==amt && !amt.value && Number(data.amount)>0){ amt.value=data.amount; amt.classList.remove('needs'); }
  if(desc && document.activeElement!==desc && !desc.value && (data.vendor||'').trim()){ desc.value=data.vendor; desc.classList.remove('needs'); }
  if(cat && data.category) cat.value=data.category;
}

  m.innerHTML=`<div class="loading"><span class="spin"></span></div>`;

  const {start,end}=ensureRepRange();
  const [{data:profs},{data:disps},trips,exps,hrs]=await Promise.all([
    supabase.from('profiles').select('id,full_name,region'),
