    supabase.from('hours').select('id,ba_id,dispensary_id,dispensary_ids,amount,work_date,hours,rate,job,kind,note,status,source').gte('work_date',start).lte('work_date',end),
  ]);

        vendor:x.vendor||'',category:x.category,payment:x.payment,receipt:x.receipt_path||'',note:x.note,status:x.status,amount:share,fullAmount:A}); }); });
  (hrs.data||[]).forEach(h=>{ if(!inRegion(h.ba_id)) return; const A=Number(h.amount||0), H=Number(h.hours||0), names=dispIds(h).map(dnm).filter(Boolean);
    dispSplit(h,A).forEach(({id,share,n})=>{ const k=id||'none'; ensure(k); agg[k].labor+=share;
      items[k].push({kind:'hours',id:h.id,date:h.work_date,ba:baName(h.ba_id),disp:dnm(id),dispNames:names,splitN:n,
        hours:Math.round(H/n*1000)/1000,fullHours:H,rate:h.rate,job:h.job,kind:h.kind,note:h.note,status:h.status,amount:share,fullAmount:A}); }); });
  Object.values(items).forEach(a=>a.sort((p,q)=>(p.date||'').localeCompare(q.date||'')));
  const allItems={}; Object.values(items).forEach(a=>a.forEach(it=>allItems[it.kind+':'+it.id]=it));   // flat lookup for the detail popup
  let rows=Object.entries(agg).map(([k,v])=>({ id:k, name:k==='none'?'⚠ Not linked to a dispensary':(dById[k]?dById[k].name:'(deleted location)'), total:v.mile+v.exp+v.card+v.labor, ...v }))
    .filter(r=>r.total>0).sort((a,b)=>b.total-a.total);
  const grand=rows.reduce((a,r)=>a+r.total,0), max=rows.reduce((a,r)=>Math.max(a,r.total),0)||1;

  const spendBody=`

// ── Visits: derive discrete (BA × dispensary × day) visits from trips/hours/expenses ──
// A visit = one BA at one real store on one day. Mileage is the round-trip trip amount
// (miles already doubled); labor & expenses are the SAME even-split used by the spend
// report (a row linked to N stores contributes amount/N to each). Rows with no store
// don't form a visit (surfaced as a "complete these" nudge instead).
const isPlaceholderName=n=>/^\*\s/.test(n||'');
function buildVisits(trips, exps, hrs, ctx){
  const {inRegion,baName,dnm}=ctx; const V={};
  const ens=(b,d,dt)=>{ const k=`${b}|${d}|${dt}`;
    if(!V[k]) V[k]={key:k,ba_id:b,disp_id:d,date:dt,ba:baName(b),disp:dnm(d)||'(deleted location)',
      mile:0,labor:0,exp:0,card:0,miles:0,laborHrs:0,trips:[],hours:[],expenses:[]};
    return V[k]; };
  (trips||[]).forEach(t=>{ if(!inRegion(t.ba_id)||!t.dispensary_id) return;
    const v=ens(t.ba_id,t.dispensary_id,t.trip_date); v.mile+=Number(t.amount||0); v.miles+=Number(t.miles||0); v.trips.push(t); });
  (hrs||[]).forEach(h=>{ if(!inRegion(h.ba_id)) return; const A=Number(h.amount||0), H=Number(h.hours||0);
    dispSplit(h,A).forEach(({id,share,n})=>{ if(!id) return; const v=ens(h.ba_id,id,h.work_date); v.labor+=share; v.laborHrs+=H/n; v.hours.push({row:h,share,n}); }); });
  (exps||[]).forEach(x=>{ if(!inRegion(x.ba_id)) return; const A=Number(x.amount||0);
    dispSplit(x,A).forEach(({id,share,n})=>{ if(!id) return; const v=ens(x.ba_id,id,x.expense_date);
      if(x.payment==='company') v.card+=share; else v.exp+=share; v.expenses.push({row:x,share,n}); }); });
  return Object.values(V).map(v=>({...v,total:v.mile+v.labor+v.exp+v.card})).filter(v=>v.total>0);
}
function visitsTotbar(visits){
  const real=visits.filter(v=>!isPlaceholderName(v.disp));
  const stores=new Set(real.map(v=>v.disp_id)).size, tot=real.reduce((a,v)=>a+v.total,0);
  return `<div class="tot"><div class="k">Stores visited</div><div class="v">${stores}</div></div>
    <div class="tot"><div class="k">Visits</div><div class="v">${real.length}</div></div>
    <div class="tot sum"><div class="k">Visit cost</div><div class="v">${money(tot)}</div></div>`;
}
function visitsGroupBy(list){
  const g={}; list.forEach(v=>{ const k=v.disp_id; (g[k]=g[k]||{id:k,name:v.disp,visits:[],total:0,mile:0,labor:0,exp:0,card:0});
    const x=g[k]; x.visits.push(v); x.total+=v.total; x.mile+=v.mile; x.labor+=v.labor; x.exp+=v.exp; x.card+=v.card; });
  return Object.values(g).map(x=>({...x, visits:x.visits.sort((a,b)=>(b.date||'').localeCompare(a.date||''))}))
    .sort((a,b)=>b.total-a.total);
}
function visitsCardsHtml(visits, nonVisit){
  const groups=visitsGroupBy(visits.filter(v=>!isPlaceholderName(v.disp)));
  const overhead=visitsGroupBy(visits.filter(v=>isPlaceholderName(v.disp)));
  const max=groups.reduce((a,g)=>Math.max(a,g.total),0)||1;
  const visitRow=v=>`<div class="item visitrow" data-visit="${v.key}" style="cursor:pointer">
    <div class="ic">🚗</div>
    <div class="grow" style="min-width:0"><div class="t">${fmtDate(v.date)}${v.ba?` · ${esc(v.ba)}`:''}</div>
      <div class="s">🚗 ${money(v.mile)} · ⏱ ${money(v.labor)}${v.exp>0?` · 🧾 ${money(v.exp)}`:''}${v.card>0?` · 💳 ${money(v.card)}`:''}</div></div>
    <div class="amt">${money(v.total)}</div><div class="muted" style="font-size:18px;flex:none;margin-left:6px">›</div></div>`;
  const groupHtml=g=>`
    <div class="repdrow" data-disp="${g.id}" style="padding:9px 0;border-top:1px solid var(--line);cursor:pointer">
      <div class="row" style="justify-content:space-between;align-items:baseline">
        <div class="t" style="font-weight:600"><span class="caret" style="display:inline-block;width:12px;color:var(--muted)">▸</span>${esc(g.name)}</div>
        <div style="font-weight:750;white-space:nowrap">${money(g.total)}</div></div>
      <div style="height:7px;border-radius:4px;background:var(--panel2);margin:6px 0 5px;overflow:hidden"><div style="height:100%;width:${Math.max(3,Math.round(g.total/max*100))}%;background:var(--accent)"></div></div>
      <div class="small muted">${g.visits.length} visit${g.visits.length>1?'s':''} · avg ${money(g.total/g.visits.length)}/visit · ${money(g.mile)} mileage · ${money(g.labor)} labor${(g.exp+g.card)>0?` · ${money(g.exp+g.card)} expenses`:''}</div>
    </div>
    <div class="repdetail hide" data-for="${g.id}" style="padding-left:6px">${g.visits.map(visitRow).join('')}</div>`;
  const overHtml = overhead.length ? `<div class="card">

function exportVisitsCSV(visits){
  const real=visits.filter(v=>!isPlaceholderName(v.disp))
    .sort((a,b)=>(a.disp||'').localeCompare(b.disp) || (a.date||'').localeCompare(b.date));
  const rows=[['Date','BA','Dispensary','Miles','Mileage $','Labor $','Expense $','Card $','Visit total $']];
  real.forEach(v=>rows.push([v.date,v.ba,v.disp,Math.round(v.miles*10)/10,v.mile.toFixed(2),v.labor.toFixed(2),v.exp.toFixed(2),v.card.toFixed(2),v.total.toFixed(2)]));
  const byD={}; real.forEach(v=>{ const g=byD[v.disp]=byD[v.disp]||{mile:0,labor:0,exp:0,card:0,total:0,n:0};
    g.mile+=v.mile; g.labor+=v.labor; g.exp+=v.exp; g.card+=v.card; g.total+=v.total; g.n++; });
  rows.push([]); rows.push(['— Per dispensary (BA spend to port) —']);
  Object.entries(byD).sort((a,b)=>b[1].total-a[1].total).forEach(([d,g])=>
    rows.push(['',`${g.n} visit${g.n>1?'s':''}`,d,'',g.mile.toFixed(2),g.labor.toFixed(2),g.exp.toFixed(2),g.card.toFixed(2),g.total.toFixed(2)]));
  const csv=rows.map(r=>r.map(c=>{ let s=String(c??''); if(/^[=+\-@\t\r]/.test(s)) s="'"+s;
    return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`visits_${rangeLabel().replace(/\W+/g,'_')}.csv`; a.click();
}

  const rec=$('#riRec'); if(rec) rec.onclick=async()=>{ const u=await signedUrl('receipts',it.receipt); u?window.open(u,'_blank'):toast('Receipt unavailable','err'); };

async function adminDash(m){
  m.innerHTML=`<div class="loading"><span class="spin"></span></div>`;

  const per=state.period;
  const all=isAllPeriods(per);
  const perQ=q=>all?q:q.eq('period_id',per.id);   // 'All pay periods' = no period filter
  const [{data:profs}, trips, exps, subs] = await Promise.all([
    supabase.from('profiles').select('*').order('full_name'),
    per?perQ(supabase.from('trips').select('ba_id,amount,status')):{data:[]},
    per?perQ(supabase.from('expenses').select('ba_id,amount,status,payment,receipt_path')):{data:[]},
    per?perQ(supabase.from('submissions').select('*')):{data:[]},
  ]);
  const T=trips.data||[],E=exps.data||[],S=subs.data||[];
  const byBa={};
  (profs||[]).forEach(b=>byBa[b.id]={p:b,mile:0,exp:0,card:0,items:0,receipts:0,status:'open',subN:0});
  T.forEach(x=>{ const b=byBa[x.ba_id]; if(b){ b.mile+=Number(x.amount||0); b.items++; } });
  E.forEach(x=>{ const b=byBa[x.ba_id]; if(b){ if(x.payment==='company') b.card+=Number(x.amount||0); else b.exp+=Number(x.amount||0); b.items++; if(x.receipt_path) b.receipts++; } });
  S.forEach(s=>{ const b=byBa[s.ba_id]; if(b){ if(!all) b.status=s.status; if(['submitted','approved'].includes(s.status)) b.subN++; } });

  let rows=Object.values(byBa).filter(r=> isFieldWorker(r.p) || r.items>0 );

      </div>
    </div>
    <div class="card">
      <h3>Team activity <span class="muted small">— tap to see uploads</span></h3>
      ${rows.length?rows.map(r=>`
        <div class="item" data-ba="${r.p.id}" style="cursor:pointer">
          <div class="ic">${(r.p.full_name||'?').slice(0,1).toUpperCase()}</div>
          <div class="grow" style="min-width:0">
            <div class="t" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.p.full_name||r.p.email)}${r.p.id===state.session.user.id?' <span class="pill">you</span>':''}</div>
            ${r.p.region?`<div class="s">${esc(r.p.region)}</div>`:''}
          </div>
          ${all ? (r.subN>0?`<span class="pill" style="margin-left:8px;flex:none">${r.subN} period${r.subN>1?'s':''} in</span>`:'')
                : (r.status&&r.status!=='open'?`<span class="badge ${r.status}" style="margin-left:8px;flex:none">${r.status}</span>`:'')}
          <div style="font-weight:700;white-space:nowrap;margin-left:8px;flex:none">${money(r.mile+r.exp)}</div>
        </div>`).join(''):`<p class="muted small">No people${state.adminRegion!=='all'?' in '+state.adminRegion:''} yet — add them in Settings.</p>`}
    </div>`;

async function approveSubmission(baId,periodId,T,E,H){
  if(!confirm('Approve all submitted items for this BA this period?')) return;
  // approve ONLY submitted items (never sweep in un-submitted drafts or rejected)
  const subMile=(T||[]).filter(x=>x.status==='submitted').reduce((a,x)=>a+ +x.amount,0);
  const {reimb:subExp, card:subCard}=expSplit((E||[]).filter(x=>x.status==='submitted'));
  // labor snapshot covers ALL the period's hours (they're payroll-managed, usually already approved on import)
  const subLabor=(H||[]).reduce((a,x)=>a+Number(x.amount||0),0);
  const { error:e1 }=await supabase.from('trips').update({status:'approved'}).eq('ba_id',baId).eq('period_id',periodId).eq('status','submitted');
  if(e1) return toast('Approve failed: '+e1.message,'err');
  const { error:e2 }=await supabase.from('expenses').update({status:'approved'}).eq('ba_id',baId).eq('period_id',periodId).eq('status','submitted');
  if(e2) return toast('Approve failed: '+e2.message,'err');
  const { error:eH }=await supabase.from('hours').update({status:'approved'}).eq('ba_id',baId).eq('period_id',periodId).in('status',['draft','submitted']);
  if(eH) return toast('Approve failed: '+eH.message,'err');
  const { error:e3 }=await supabase.from('submissions').update({status:'approved',approved_by:state.session.user.id,approved_at:new Date().toISOString(),
    totals:{mileage:subMile,expenses:subExp,company_card:subCard,labor:subLabor,total:subMile+subExp}}).eq('ba_id',baId).eq('period_id',periodId);
  if(e3) return toast('Approve failed: '+e3.message,'err');
  toast('Approved','ok'); closeSheet(); drawAdmin();
}

// Link each unlinked hours entry to the dispensaries of that day's trips (else expenses).
async function autoLinkHours(baId, periodId, H){
  const un=(H||[]).filter(x=>!x.dispensary_id && !(x.dispensary_ids&&x.dispensary_ids.length));
  if(!un.length) return toast('All hours are already linked','ok');
  const dates=un.map(x=>x.work_date);
  const [{data:T},{data:E}]=await Promise.all([
    supabase.from('trips').select('trip_date,dispensary_id,dispensary_ids').eq('ba_id',baId).in('trip_date',dates),
    supabase.from('expenses').select('expense_date,dispensary_id,dispensary_ids').eq('ba_id',baId).in('expense_date',dates),
  ]);
  const idsOn=(rows,dateField,d)=>{ const s=new Set();
    (rows||[]).filter(r=>r[dateField]===d).forEach(r=>dispIds(r).forEach(id=>s.add(id))); return [...s]; };
  let linked=0, skipped=0;
  for(const h of un){
    const ids = idsOn(T,'trip_date',h.work_date);
    const eIds = ids.length?ids:idsOn(E,'expense_date',h.work_date);
    if(!eIds.length){ skipped++; continue; }
    const { error }=await supabase.from('hours').update({dispensary_ids:eIds, dispensary_id:eIds[0]}).eq('id',h.id);
    if(error){ toast(error.message,'err'); return; }
    linked++;
  }
  toast(linked?`Linked ${linked} shift${linked>1?'s':''}${skipped?` · ${skipped} had no same-day activity`:''}`:'No same-day trips/expenses to match','ok');
  if(linked) adminBaDetail(baId);
}

function exportCSV(prof,per,T,E,H){

async function adminReview(m){
  m.innerHTML=`<div class="loading"><span class="spin"></span></div>`;
  await reloadPeriods();
  const per=state.period;
  const allPer=isAllPeriods(per);
  const perQ=q=>allPer?q:q.eq('period_id',per.id);   // 'All pay periods' = no period filter
  const [{data:bas}, subs, trips, exps, hours] = await Promise.all([
    supabase.from('profiles').select('*').order('full_name'),
    per?perQ(supabase.from('submissions').select('*')):{data:[]},
    per?perQ(supabase.from('trips').select('ba_id')):{data:[]},
    per?perQ(supabase.from('expenses').select('ba_id')):{data:[]},
    per?perQ(supabase.from('hours').select('ba_id')):{data:[]},
  ]);
  // per-period: one submission per BA. All-periods: aggregate — a BA counts as awaiting
  // if ANY period is sitting at 'submitted'; badge shows how many periods are in.
  const subBy={}, subN={};
  (subs.data||[]).forEach(s=>{
    if(['submitted','approved'].includes(s.status)) subN[s.ba_id]=(subN[s.ba_id]||0)+1;
    const cur=subBy[s.ba_id];
    if(!cur || s.status==='submitted' || (cur.status!=='submitted' && (s.submitted_at||'')>(cur.submitted_at||''))) subBy[s.ba_id]=s;
  });
  const cnt={}; (trips.data||[]).concat(exps.data||[]).forEach(x=>cnt[x.ba_id]=(cnt[x.ba_id]||0)+1);
  const hrsBy={}; (hours.data||[]).forEach(h=>hrsBy[h.ba_id]=(hrsBy[h.ba_id]||0)+1);
  let rows=(bas||[]).filter(isFieldWorker);   // BAs + regional admins (Maddy); not universal admins
  if(state.adminRegion!=='all') rows=rows.filter(b=>b.region===state.adminRegion);
  const turnedIn=b=>allPer ? (subN[b.id]||0)>0 : ['submitted','approved'].includes(subBy[b.id]?.status);
  // order: awaiting your approval → not submitted → approved
  const rank=b=>{ const s=subBy[b.id]?.status; return s==='submitted'?0 : s==='approved'?2 : 1; };
  rows=rows.slice().sort((a,b)=>rank(a)-rank(b)||(a.full_name||'').localeCompare(b.full_name||''));
  const inCount=rows.filter(turnedIn).length;
  const awaiting=rows.filter(b=>subBy[b.id]?.status==='submitted').length;
  m.innerHTML=`
    <div class="card">
      <div class="row"><div class="small muted grow">Pay period</div>${periodPicker(()=>adminReview(m))}</div>

        ${adminRegionPicker('regSelR')}</div>
      <div class="totbar" style="margin-top:12px">
        <div class="tot"><div class="k">To review</div><div class="v">${awaiting}</div></div>
        <div class="tot"><div class="k">Not in yet</div><div class="v">${rows.length-inCount}</div></div>
        <div class="tot sum"><div class="k">Submitted</div><div class="v">${inCount}/${rows.length}</div></div>
      </div>
    </div>
    <div class="card">
      <h3>BA submissions ${per?`<span class="muted small">· ${esc(per.label)}</span>`:''}</h3>
      ${rows.length?rows.map(b=>{
        const st=subBy[b.id]?.status||'none', items=cnt[b.id]||0, hrs=hrsBy[b.id]||0;
        const hrsTag=(hrs?` · ⏱ ${hrs} day${hrs===1?'':'s'} of hours`:'')
          +(allPer&&subN[b.id]?` · 📬 ${subN[b.id]} period${subN[b.id]>1?'s':''} in`:'');
        let badge, cls, sub;
        if(st==='submitted'){ badge='✓ submitted'; cls='submitted'; sub=`Awaiting approval${subBy[b.id]?.submitted_at?' · '+new Date(subBy[b.id].submitted_at).toLocaleDateString():''}${hrsTag}`; }
        else if(st==='approved'){ badge='✓ approved'; cls='approved'; sub='Approved & reimbursed'+hrsTag; }
        else if(st==='rejected'){ badge='rejected'; cls='rejected'; sub='Sent back — awaiting resubmit'+hrsTag; }
        else { badge='not submitted'; cls='draft'; sub=(items?`${items} item${items===1?'':'s'} in progress`:(hrs?'Labor hours only':'Nothing logged yet'))+hrsTag; }
        return `<div class="item" data-ba="${b.id}" style="cursor:pointer">
          <div class="ic">${(b.full_name||'?').slice(0,1).toUpperCase()}</div>
          <div class="grow" style="min-width:0"><div class="t" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(b.full_name||b.email)}${b.region?` <span class="pill">${esc(b.region)}</span>`:''}</div>

        </div>`;
      }).join(''):`<p class="muted small">No BAs${state.adminRegion!=='all'?' in '+state.adminRegion:''} yet — add them in Settings.</p>`}
    </div>`;
  m.querySelectorAll('[data-ba]').forEach(el=>el.onclick=()=>adminBaDetail(el.dataset.ba));
  wireRegionButtons('regSelR', ()=>adminReview(m));

// minimal RFC-4180 CSV parser (handles quoted fields with embedded commas + newlines)
function parseCSV(text){
  const rows=[]; let row=[], field='', inQ=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQ=false; } else field+=c; }
    else if(c==='"') inQ=true;
    else if(c===','){ row.push(field); field=''; }
    else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
    else if(c!=='\r') field+=c;
  }
  if(field!==''||row.length){ row.push(field); rows.push(row); }
  return rows;
}
// pull per-day Brand Ambassador hours out of a Gusto "time tracking hours" export
function gustoBaHours(text){
  const rows=parseCSV(text);
  const hi=rows.findIndex(r=>r.some(c=>/^date$/i.test(c.trim())) && r.some(c=>/job 1 title/i.test(c)));
  if(hi<0) return {error:'Couldn’t find the daily table (needs Date / Job 1 title / Job 1 hours columns).'};
  const head=rows[hi].map(c=>c.trim().toLowerCase());
  const dCol=head.indexOf('date'), j1t=head.indexOf('job 1 title'), j1h=head.indexOf('job 1 hours'),
        j2t=head.indexOf('job 2 title'), j2h=head.indexOf('job 2 hours');
  if(dCol<0||j1t<0||j1h<0) return {error:'Missing required columns in the Gusto file.'};
  const isBA=t=>/brand ambassador/i.test((t||'').trim());
  const out=[];
  for(let i=hi+1;i<rows.length;i++){ const r=rows[i];
    const m=((r[dCol]||'').trim()).match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/); if(!m) continue;
    const yy=m[3].length===2?('20'+m[3]):m[3];
    const date=`${yy}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
    let h=0; if(isBA(r[j1t])) h+=Number(r[j1h]||0); if(j2t>=0&&isBA(r[j2t])) h+=Number(r[j2h]||0);
    if(h>0) out.push({date, hours:Math.round(h*1000)/1000});
  }
  return {rows:out, total:Math.round(out.reduce((a,x)=>a+x.hours,0)*1000)/1000};
}

    const btn=$('#ihImport'); busy(btn,true);
    try{
      // upsert on (ba_id, work_date, source): atomic, idempotent re-import (no destructive delete)
      const { error }=await supabase.from('hours').upsert(
        parsed.map(p=>({ba_id:baId, work_date:p.date, hours:p.hours, job:'Brand Ambassador', kind:$('#ihKind')?.value||'Store visit', source:'gusto', status:'approved', note:'Gusto import'})),
        { onConflict:'ba_id,work_date,source' });
      if(error) throw error;
      busy(btn,false); closeSheet(); toast(`Imported ${parsed.length} day(s) of hours`,'ok'); drawAdmin();
    }catch(err){ busy(btn,false); toast(err.message||'Import failed','err'); }
  };
}
// "Pull from Gusto now": inserts a request row that the local gusto-sync daemon polls for.
// The button then live-polls the request until the daemon finishes (or 5 min pass).
function wireGustoPull(m){
  const btn=$('#pullGusto'), status=$('#gustoStatus'); if(!btn) return;
  const showLast=async ()=>{
    const { data, error }=await supabase.from('gusto_pull_requests').select('*').order('requested_at',{ascending:false}).limit(1);
    if(error){ if(status) status.textContent='Gusto sync isn’t set up yet (ask Claude to apply the migration).'; return null; }
    const r=data&&data[0]; if(!r||!status) return;
    const when=new Date(r.requested_at).toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    status.innerHTML = r.status==='done' ? `Last pull: ✅ ${when}${r.detail?' · '+esc(r.detail):''}`
      : r.status==='error' ? `Last pull: ⚠️ ${when} · <span style="color:var(--red)">${esc(r.detail||'failed')}</span>`
      : `Last pull: ⏳ ${r.status} (${when})…`;
    return r;
  };
  showLast();
  btn.onclick=async ()=>{
    busy(btn,true);
    const { data, error }=await supabase.from('gusto_pull_requests')
      .insert({requested_by:state.session.user.id}).select('*').single();
    if(error){ busy(btn,false); return toast(error.message,'err'); }
    toast('Pull requested — your Mac will grab it within a minute','ok');
    if(status) status.textContent='⏳ Waiting for the sync daemon to pick this up…';
    const t0=Date.now();
    const poll=setInterval(async ()=>{
      const { data:r }=await supabase.from('gusto_pull_requests').select('*').eq('id',data.id).single();
      if(!r) return;
      if(r.status==='running' && status) status.textContent='⏳ Pulling from Gusto…';
      if(r.status==='done'||r.status==='error'||Date.now()-t0>5*60*1000){
        clearInterval(poll); busy(btn,false); showLast();
        if(r.status==='done'){ toast('Gusto hours imported ✓','ok'); }
        else if(r.status==='error'){ toast('Gusto pull failed — '+(r.detail||'see status'),'err'); }
        else if(status){ status.innerHTML='⚠️ No response from the sync daemon — is the Mac on and gusto-sync set up? <span class="muted">(falling back: Import a CSV manually)</span>'; busy(btn,false); }
      }
    }, 5000);
  };
}

/* ── auto-update: a PWA tab can keep running an old build forever (the shell stays
   in memory even though the SW is network-first). Poll the live build's APP_VERSION
   and, when it's newer, offer a one-tap refresh. Never force-reloads mid-form. ── */
async function checkForUpdate(){
  try{
    // cache-bust the query so the SW's stale-while-revalidate can't answer from cache
    const html = await (await fetch(`./index.html?v=${Date.now()}`,{cache:'no-store'})).text();
    const m = html.match(/APP_VERSION\s*=\s*'([^']+)'/);
    if(m && m[1] && m[1] !== APP_VERSION) showUpdateBar(m[1]);
  }catch{}
}
function showUpdateBar(v){
  if(document.getElementById('updbar')) return;
  const b=document.createElement('button');
  b.id='updbar'; b.textContent=`🔄 New version — tap to update`;
  b.title=`v${v}`;
  b.onclick=()=>{ b.textContent='Updating…'; location.reload(); };
  document.body.appendChild(b);
}
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) checkForUpdate(); });
setInterval(()=>{ if(!document.hidden) checkForUpdate(); }, 5*60*1000);
setTimeout(checkForUpdate, 15000);   // also shortly after open
