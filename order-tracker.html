<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<title>Wizard Trees — Order Tracker</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --text:#e7eaf0; --muted:#9aa3b2; --faint:#6b7382;
    --accent:#7c5cff; --accent2:#9d86ff;
    --green:#2fbf71; --yellow:#e7b416; --orange:#f08a24; --red:#ef4d56; --blue:#4da3ff;
    --shadow:0 6px 24px rgba(0,0,0,.35);
    --c1:126px;            /* date column: width AND the sticky offset of column 2 */
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);
    font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}
  .muted{color:var(--muted)} .faint{color:var(--faint)}

  /* ---- top bar ---- */
  header{position:sticky;top:0;z-index:40;background:rgba(15,17,21,.94);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;gap:12px;padding:10px 16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;margin-right:4px}
  .logo{width:32px;height:32px;border-radius:9px;flex:none;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:17px}
  .brand b{font-size:15px;display:block;line-height:1.1}
  .brand .sub{color:var(--muted);font-size:11px}
  .spacer{flex:1 1 auto}

  .seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
  .seg button{background:transparent;border:0;color:var(--muted);font:inherit;font-weight:700;
    padding:6px 18px;border-radius:8px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}
  .seg button:not(.on):hover{color:var(--text)}

  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;
    padding:7px 12px;font:inherit;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;
    display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--accent)} .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}

  input[type=search]{background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:7px 11px;font:inherit;outline:none;width:220px}
  input[type=search]:focus{border-color:var(--accent)}

  .sync{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);white-space:nowrap}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex:none}
  .dot.err{background:var(--red)}
  .dot.busy{background:var(--yellow);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.35}}

  /* ---- summary cards ---- */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:10px;padding:14px 16px 4px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px 14px;box-shadow:var(--shadow)}
  .card .lbl{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--faint)}
  .card .val{font-size:19px;font-weight:800;margin-top:3px;font-variant-numeric:tabular-nums}
  .card.due .val{color:var(--orange)}
  .card.paid .val{color:var(--green)}
  .card.nyd .val{color:var(--blue)}
  .cards.plain{display:block}          /* overview: the state table sits here instead of cards */
  .card.big{padding:18px 20px}
  .card.big .lbl{font-size:12px}
  .card.big .val{font-size:clamp(19px,4.2vw,30px);margin-top:6px}

  /* ---- overview purchases report ---- */
  .mrow{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-end}
  .mrow .mitem .fl{font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--faint)}
  .mrow .mitem .fv{margin-top:2px;font-weight:700;font-size:16px;font-variant-numeric:tabular-nums}
  .mrow .mitem.avg{padding-left:22px;border-left:1px solid var(--line)}
  .mrow .mitem.avg .fv{color:var(--accent2);font-size:21px;font-weight:800}

  /* ---- overview category report ---- */
  tr.catx>td{background:#131722;padding:9px 12px 11px}
  .subTbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .subTbl th{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);
    text-align:left;padding:4px 8px;font-weight:700}
  .subTbl td{padding:5px 8px;border-top:1px solid rgba(42,47,58,.5)}
  .subTbl tbody tr{cursor:pointer}
  .subTbl tbody tr:hover td{background:rgba(124,92,255,.08)}
  .subTbl .desc{color:var(--muted);max-width:38vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .stbadge{display:inline-block;padding:0 6px;border-radius:6px;font-size:10px;font-weight:800;
    background:var(--panel2);border:1px solid var(--line);color:var(--muted);margin-right:6px}
  .catbtns{display:flex;gap:6px;margin:0 0 8px;flex-wrap:wrap;align-items:center}
  .catbtns .lbl{font-size:11px;color:var(--faint);font-weight:700}

  /* ---- overview state table ---- */
  .stateTbl{width:100%;font-size:13.5px}
  .stateTbl th{cursor:default}
  .stateTbl td:first-child,.stateTbl th:first-child{padding-left:16px}
  .stateTbl tbody tr.st-row{cursor:pointer}
  .stateTbl tbody tr.st-row:hover td{background:rgba(124,92,255,.07)}
  .stateTbl tr.grand td{font-weight:800;color:var(--accent2);background:#131722;border-bottom:0}
  .stateTbl .go{color:var(--faint);font-size:11px}

  /* ---- toolbar ---- */
  .toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-weight:650;font-size:12.5px;
    user-select:none;white-space:nowrap}
  .chip:hover{border-color:var(--accent)}
  .chip.on{border-color:var(--accent);background:rgba(124,92,255,.16);color:var(--text)}
  .chip .n{color:var(--faint);font-weight:600}
  .count{font-size:12px;color:var(--faint);margin-left:auto;white-space:nowrap}

  /* ---- table ---- */
  .wrap{flex:1;padding:8px 16px 20px;min-width:0}
  .tblbox{overflow:auto;border:1px solid var(--line);border-radius:13px;background:var(--panel);
    box-shadow:var(--shadow);max-height:calc(100vh - 235px)}
  table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:13px}
  thead th{position:sticky;top:0;z-index:3;background:var(--panel2);color:var(--muted);
    font-size:11.5px;font-weight:700;text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);
    white-space:nowrap;vertical-align:bottom}
  thead th .hsub{display:block;font-size:10px;color:var(--faint);font-weight:600}
  tbody td{padding:7px 12px;border-bottom:1px solid rgba(42,47,58,.55);white-space:nowrap;vertical-align:top}
  tbody tr:last-child td{border-bottom:0}
  tbody tr.order{cursor:pointer}
  tbody tr.order:hover td{background:rgba(124,92,255,.07)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  td.wide{white-space:pre-wrap;min-width:240px;max-width:420px;overflow-wrap:break-word}
  th.sticky,td.sticky{position:sticky;z-index:2;background:var(--panel)}
  th.s1,td.s1{left:0;width:var(--c1);min-width:var(--c1);max-width:var(--c1);overflow:hidden;text-overflow:ellipsis}
  th.s2,td.s2{left:var(--c1);font-weight:700}
  thead th.sticky{z-index:4;background:var(--panel2)}
  tbody tr.order:hover td.sticky{background:#1a1730}
  .doc{opacity:.65;font-size:11px;margin-left:5px}
  .chev{display:inline-block;width:13px;color:var(--faint);font-size:10px;transition:transform .15s ease;vertical-align:1px}
  tr.order.open .chev{transform:rotate(90deg);color:var(--accent2)}
  tr.order.open td{background:rgba(124,92,255,.06)}
  tr.order.open td.sticky{background:#1a1730}

  tr.totals td{background:#131722;font-weight:800;color:var(--accent2);border-bottom:2px solid var(--line)}
  tr.totals td.sticky{background:#131722}

  /* payment sub-rows */
  tr.pay{cursor:pointer}
  tr.pay td{background:rgba(47,191,113,.08);color:#8fdcb2;border-bottom:1px solid rgba(47,191,113,.12);
    padding-top:5px;padding-bottom:5px;font-size:12.5px}
  tr.pay td.sticky{background:#15231c;color:var(--green);font-weight:700}
  tr.pay:hover td{background:rgba(47,191,113,.14)}
  tr.pay:hover td.sticky{background:#193527}
  tr.pay .pay-amt{font-weight:800;color:var(--green)}
  tr.pay .chev{color:#4e9b74}
  tr.pay.open .chev{transform:rotate(90deg);color:var(--green)}
  tr.paydetail>td{background:#101a15;padding:0;border-bottom:1px solid rgba(47,191,113,.18)}
  tr.paydetail .msec{color:#5f9d7e}

  .st{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:700;
    border:1px solid transparent;white-space:nowrap}
  .st-paid{background:rgba(47,191,113,.16);color:var(--green);border-color:rgba(47,191,113,.35)}
  .st-delivered{background:rgba(47,191,113,.08);color:#6fd9a2;border-color:rgba(47,191,113,.25)}
  .st-transit{background:rgba(77,163,255,.13);color:var(--blue);border-color:rgba(77,163,255,.3)}
  .st-partial{background:rgba(240,138,36,.13);color:var(--orange);border-color:rgba(240,138,36,.3)}
  .st-prod{background:rgba(231,180,22,.12);color:var(--yellow);border-color:rgba(231,180,22,.3)}
  .st-ready{background:rgba(124,92,255,.15);color:var(--accent2);border-color:rgba(124,92,255,.35)}
  .st-warn{background:rgba(240,138,36,.13);color:var(--orange);border-color:rgba(240,138,36,.3)}
  .st-na{background:rgba(107,115,130,.15);color:var(--muted);border-color:rgba(107,115,130,.3)}

  .banner{margin:10px 16px 0;padding:9px 14px;border-radius:11px;font-size:12.5px;font-weight:600;display:none}
  .banner.warn{display:block;background:rgba(231,180,22,.1);border:1px solid rgba(231,180,22,.35);color:var(--yellow)}
  .banner.err{display:block;background:rgba(239,77,86,.1);border:1px solid rgba(239,77,86,.35);color:var(--red)}

  /* ---- payments (wires) panel ---- */
  .paywrap{padding:0 16px 4px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);
    padding:12px 14px;margin-bottom:6px}
  .ptitle{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);
    margin-bottom:8px}
  /* report heading: a purple band across the top of the panel — the name carries the
     weight, the scope/period stays a quiet qualifier beside it */
  .rtitle{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    margin:-12px -14px 14px;padding:13px 16px;
    background:linear-gradient(90deg,rgba(124,92,255,.22),rgba(124,92,255,.04));
    border-bottom:1px solid rgba(124,92,255,.32);border-radius:12px 12px 0 0;
    font-size:clamp(18px,4.6vw,23px);font-weight:800;color:#c3b2ff;letter-spacing:.2px;line-height:1.2}
  .rtitle::before{content:"";width:5px;height:26px;border-radius:3px;flex:none;
    background:linear-gradient(180deg,var(--accent2),var(--accent))}
  .rtitle .sub{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
    color:var(--muted);line-height:1.4}
  .payTbl{width:100%;border-collapse:collapse;font-size:13px}
  .payTbl th{font-size:11px;font-weight:700;color:var(--faint);text-align:left;padding:5px 10px;
    border-bottom:1px solid var(--line)}
  .payTbl td{padding:6px 10px;border-bottom:1px solid rgba(42,47,58,.55)}
  .payTbl tr.prow{cursor:pointer}
  .payTbl tr.prow:hover td{background:rgba(124,92,255,.06)}
  .payTbl .num{text-align:right;font-variant-numeric:tabular-nums}
  .payTbl .psub{color:var(--faint);font-size:11px;display:block}
  .badge{display:inline-block;padding:1px 8px;border-radius:999px;font-size:11px;font-weight:700}
  .badge.ok{background:rgba(47,191,113,.13);color:var(--green)}
  .badge.warn{background:rgba(240,138,36,.13);color:var(--orange)}
  .badge.info{background:rgba(124,92,255,.15);color:var(--accent2)}
  tr.pexp>td{background:#131722;padding:10px 12px}
  .split{display:flex;flex-wrap:wrap;gap:5px;margin:4px 0 8px}
  .split .sp{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:3px 8px;
    font-size:12px;white-space:nowrap}
  .split .sp b{font-variant-numeric:tabular-nums}
  .split.dim .sp{opacity:.45;text-decoration:line-through}
  .entry{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:9px;margin-top:5px;
    background:rgba(47,191,113,.08);border:1px solid rgba(47,191,113,.18);font-weight:650;flex-wrap:wrap}
  .entry .amt{color:var(--green);font-weight:800;font-variant-numeric:tabular-nums;margin-left:auto}
  .entry .note{color:var(--muted);font-weight:500;font-size:12px}
  .entry .del{background:none;border:0;color:var(--faint);cursor:pointer;font-size:13px;padding:2px 4px}
  .entry .del:hover{color:var(--red)}
  .entry.rest{background:rgba(124,92,255,.08);border-color:rgba(124,92,255,.2)}
  .entry.rest .amt{color:var(--accent2)}
  .addform{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;align-items:center}
  .addform input{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:9px;
    padding:6px 9px;font:inherit;font-size:12.5px;outline:none}
  .addform input:focus{border-color:var(--accent)}
  .addform input.inv{width:150px} .addform input.amt{width:110px;text-align:right} .addform input.nt{flex:1;min-width:130px}
  .addform select.src{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:9px;
    padding:6px 9px;font:inherit;font-size:12.5px;outline:none;max-width:220px}
  .addform select.src:focus{border-color:var(--accent)}
  .restate-box{margin-top:10px}
  .restate-box summary{font-size:12px;color:var(--faint);cursor:pointer;user-select:none;padding:2px 0}
  .restate-box summary:hover{color:var(--muted)}
  .restate-box[open] summary{color:var(--muted);margin-bottom:4px}
  .addform .hint{flex-basis:100%;font-size:11px;color:var(--faint)}

  /* re-ascribed / app payment sub-rows */
  /* the sticky pair must stay fully opaque — translucent cells let the row's own
     scrolled-under content print through them */
  tr.pay.dim td:not(.sticky){opacity:.5}
  tr.pay.dim td.sticky{background:#101a15;color:#3d8a63}
  tr.pay.dim .pay-amt{text-decoration:line-through}
  tr.pay.app td{background:rgba(124,92,255,.09);color:#b9a8ff;border-bottom-color:rgba(124,92,255,.14)}
  tr.pay.app td.sticky{background:#1d1836;color:var(--accent2)}
  tr.pay.app:hover td{background:rgba(124,92,255,.15)}
  tr.pay.app:hover td.sticky{background:#251d45}
  tr.pay.app .pay-amt{color:var(--accent2)}
  .retag{font-size:10px;font-weight:700;letter-spacing:.3px;margin-left:7px;opacity:.9}

  /* running balance reads as its own strip */
  th.balcell,td.balcell{border-left:1px solid rgba(124,92,255,.22);border-right:1px solid rgba(124,92,255,.22)}
  td.balcell{font-weight:800;color:#cfd6e6;background:rgba(124,92,255,.05)}
  tr.pay td.balcell{color:#a9e0c2}

  .inferred{border-bottom:1px dotted currentColor;cursor:help}
  .adjmark{color:var(--accent2);font-weight:800;margin-left:3px;cursor:help}
  .card .sub{font-size:10.5px;color:var(--faint);margin-top:2px}

  .loading{padding:60px 20px;text-align:center;color:var(--muted)}
  .empty{padding:40px 20px;text-align:center;color:var(--faint)}
  footer{padding:10px 16px 16px;font-size:11.5px;color:var(--faint)}

  /* ---- inline expanded detail ---- */
  tr.detail>td{padding:0;background:#141824;border-bottom:1px solid var(--line)}
  .dbox{position:sticky;left:0;box-sizing:border-box;max-width:min(880px,calc(100vw - 66px));
    padding:14px 16px 16px}
  .dhead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px 16px}
  .fitem .fl{font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--faint)}
  .fitem .fv{margin-top:2px;font-weight:600;overflow-wrap:break-word}
  .fitem.full{grid-column:1/-1}
  .fitem .fv.pre{white-space:pre-wrap;font-weight:500;color:var(--muted)}
  .msec{margin-top:16px;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--faint)}
  .payline{display:flex;justify-content:space-between;gap:12px;padding:8px 12px;border-radius:9px;
    background:rgba(47,191,113,.08);border:1px solid rgba(47,191,113,.16);margin-top:6px;font-weight:650}
  .payline .amt{color:var(--green);font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
  .nolink{margin-top:8px;font-size:12.5px;color:var(--faint)}

  @media (max-width:640px){
    input[type=search]{width:140px}
    .tblbox{max-height:none}
    .card .val{font-size:16px}
    .dbox{max-width:calc(100vw - 34px)}
  }
</style>
</head>
<body>

<header>
  <div class="bar">
    <div class="brand">
      <div class="logo">📦</div>
      <div><b>Order Tracker</b><span class="sub">Wizard Trees · live from Google Sheets</span></div>
    </div>
    <div class="seg" id="seg"></div>
    <div class="spacer"></div>
    <input type="search" id="q" placeholder="Search orders…" autocomplete="off">
    <a class="btn" id="openSheet" target="_blank" rel="noopener" title="Open the Google Sheet">Sheet ↗</a>
    <button class="btn" id="refreshBtn" title="Refresh now">⟳</button>
    <div class="sync"><span class="dot" id="dot"></span><span id="syncTxt">loading…</span></div>
  </div>
</header>

<div class="banner" id="banner"></div>
<div class="cards" id="cards"></div>
<div class="toolbar" id="toolbar"></div>
<div class="paywrap" id="payPanel" style="display:none"></div>
<div class="wrap"><div class="tblbox" id="tblbox"><div class="loading">Loading order data…</div></div></div>
<footer>Read-only mirror of the shared supplier sheet · auto-syncs every 60s · click an order to expand its detail · edits happen in the Google Sheet.</footer>

<script>
'use strict';

const SHEET_ID = '17dD4Y_T1MlK8ECvGpqjqZU-8mbHy1PvBSbT9yWW6oTc';
const TABS = [
  { key:'ca', label:'CA', gid:'1100235819', name:'Order Tracker - CA' },
  { key:'ny', label:'NY', gid:'156453732',  name:'Order Tracker - NY' },
];
const POLL_MS = 60000;

/* payment re-ascriptions live in Supabase (same project as the labor trackers) */
const SB_URL = 'https://dhiqhgtmelxwelyoowle.supabase.co';
const SB_KEY = 'sb_publishable_FtScmtn1C0tE1bwUsavJFg_koiVEu14';
const SB_T = 'order_payment_ascriptions';
const sbHead = { apikey: SB_KEY, Authorization: 'Bearer '+SB_KEY, 'Content-Type': 'application/json' };

const $ = s => document.querySelector(s);

const PAGE_KEYS = ['overview','ca','ny'];
const hashPage = () => {
  const k = location.hash.replace('#','').toLowerCase();
  return PAGE_KEYS.includes(k) ? k : 'overview';
};

const state = {
  page: hashPage(),
  data: {},                       // key -> model
  links: {},                      // key -> {sheetRowNumber: driveUrl}
  linksSig: '',
  filters: { ca:{q:'', st:new Set(), ty:new Set()}, ny:{q:'', st:new Set(), ty:new Set()} },
  expanded: { ca:new Set(), ny:new Set() },     // sheet row numbers with open detail
  asc: [],                                      // payment re-ascription rows from Supabase
  ascSig: '',
  ascFailed: false,
  payOpen: { ca:false, ny:false },              // payments panel visible?
  payExpanded: { ca:new Set(), ny:new Set() },  // payment_keys expanded in the panel
  ovScope: 'all',                               // overview scope: all | ca | ny
  ovCat: new Set(),                             // category names expanded on the overview
  ledgerPay: { ca:new Set(), ny:new Set() },    // wires expanded in the ledger
  lastSync: null,
  fetching: false,
  failed: false,
};

/* ---------- CSV ---------- */
function parseCSV(s){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(q){
      if(c==='"'){ if(s[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    }else{
      if(c==='"') q=true;
      else if(c===','){ row.push(cur); cur=''; }
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
      else if(c!=='\r') cur+=c;
    }
  }
  if(cur!=='' || row.length){ row.push(cur); rows.push(row); }
  return rows;
}

function money(v){
  if(v==null) return null;
  const m=String(v).replace(/[$,\s]/g,'');
  if(m==='' || isNaN(m)) return null;
  return parseFloat(m);
}
const fmtUSD = n => (n<0?'-':'') + '$' + Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------- fetch + parse ---------- */
async function fetchTab(tab){
  const urls = [
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${tab.gid}`,
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${tab.gid}`,
  ];
  let lastErr;
  for(const url of urls){
    try{
      const r = await fetch(url, {cache:'no-store'});
      if(!r.ok) throw new Error('HTTP '+r.status);
      return await r.text();
    }catch(e){ lastErr=e; }
  }
  throw lastErr;
}

function buildModel(raw){
  const grid = parseCSV(raw);
  let hi = grid.findIndex(r => (r[0]||'').trim() === 'Invoice No.');
  if(hi < 0) hi = grid.length > 1 ? 1 : 0;
  const width = Math.max(...grid.map(r => r.length));
  const pad = r => { const o=r.slice(); while(o.length<width) o.push(''); return o; };

  const headers = pad(grid[hi]).map(h => (h||'').trim());
  const totals  = grid.slice(0,hi).map(pad).filter(r => r.some(c => c && c.trim()));
  const rows = [];
  for(let i=hi+1;i<grid.length;i++){
    const r = pad(grid[i]);
    if(r.some(c => c && c.trim())) rows.push({ c:r, src:i+1 });   // src = 1-based sheet row
  }

  // keep a column if it has a header or any content anywhere
  const keep = [];
  for(let i=0;i<width;i++){
    if(headers[i] || totals.some(r=>r[i]&&r[i].trim()) || rows.some(r=>r.c[i]&&r.c[i].trim())) keep.push(i);
  }

  const all = keep.map(i => {
    const h = headers[i];
    const hl = h.toLowerCase();
    const vals = rows.map(r=>r.c[i]).filter(v=>v&&v.trim());
    const numish = vals.length ? vals.filter(v=>money(v)!==null).length / vals.length : 0;
    return {
      i, header: h || '—',
      payment: /^payment\b/i.test(h),
      num: numish >= .6,
      wide: /desc|comment/.test(hl),
      status: hl === 'order status' || hl === 'freight status',
      orderStatus: hl === 'order status',
    };
  });
  const cols = all.filter(c => !c.payment);        // shown as table columns
  const payCols = all.filter(c => c.payment);      // shown as green sub-rows

  // ship date leads the table
  const sdPos = cols.findIndex(c => c.header.toLowerCase() === 'ship date');
  if(sdPos > 0) cols.unshift(cols.splice(sdPos,1)[0]);

  // derived product type: virtual column right after Category
  const descIdx = headers.findIndex(h => /^desc/i.test(h));
  const catIdx  = headers.findIndex(h => h.toLowerCase() === 'category');
  for(const r of rows) r.type = typeOf(descIdx>=0 ? r.c[descIdx] : '', catIdx>=0 ? r.c[catIdx] : '');
  const catPos = cols.findIndex(c => c.header.toLowerCase() === 'category');
  cols.splice((catPos>=0 ? catPos : 1) + 1, 0,
    { virtual:'type', i:-1, header:'Type', num:false, wide:false, status:false, orderStatus:false });

  // ledger columns: what this line did to the account, and the balance after it
  cols.splice(2, 0,
    { virtual:'amount',  i:-1, header:'Amount',  num:true, wide:false, status:false, orderStatus:false },
    { virtual:'balance', i:-1, header:'Balance\nwhole account', num:true, wide:false, status:false, orderStatus:false });

  const paidIdx = cols.findIndex(c => c.header.toLowerCase() === 'paid to date');

  // sort newest -> oldest by ship date (fall back to delivery/due date); undated last
  const colIdx = name => { const c = cols.find(c=>c.header.toLowerCase()===name); return c ? c.i : -1; };
  const dateIdxs = ['ship date','delivery date','due date'].map(colIdx).filter(i=>i>=0);
  const parseDate = v => {
    const m = /(\d{1,2})\/{1,2}(\d{1,2})\/(\d{2,4})/.exec(v||'');
    if(!m) return null;
    const y = m[3].length===2 ? 2000+ +m[3] : +m[3];
    return new Date(y, +m[1]-1, +m[2]).getTime();
  };
  for(const r of rows){
    r.date = null;
    for(const di of dateIdxs){ r.date = parseDate(r.c[di]); if(r.date!==null) break; }
  }
  rows.sort((a,b) => (b.date ?? -Infinity) - (a.date ?? -Infinity));

  return { raw, headers, totals, rows, cols, payCols, paidIdx };
}

const payKeyOf = h => h.split('\n')[0].trim();

/* display split of a payment header: CA is two lines ("Payment 30" / "11th May"),
   NY is one ("Payment 1 - Wire 29th May 2026"). Never used as a storage key. */
function paySplit(header){
  const lines = header.split('\n').map(s=>s.trim()).filter(Boolean);
  let name = lines[0] || '', date = lines.slice(1).join(' ');
  if(!date){                       // separator is optional: "Payment 2 Wire 22nd July 2026" also parses
    const m = /^(payment\s*\d+[a-z]?)\s*[-–—:]?\s+(.+)$/i.exec(name);
    if(m){ name = m[1]; date = m[2]; }
  }
  return { name, date: date.replace(/^wire\s+/i,'').trim() };
}

/* generic product type derived from the description (first match wins) */
function typeOf(desc, cat){
  const d = (desc||'').toLowerCase().replace(/\s+/g,' ').trim();
  const c = (cat||'').trim().toLowerCase();
  if(c === 'freight' || /^(additional |ocean |air |ups )?(freight|handling fee)/.test(d)) return 'Shipping';
  if(/machine/.test(d)) return 'Equipment';
  // parenthetical asides are qualifiers, not the product — "(No Sticker)" on an AIO order
  // must not out-vote "AIO", and "(Verification stickers required)" must not beat "Mylar Pouch"
  const ds = d.replace(/with labels?|w\/ labels?|with plastic insert|w\/ plastic insert/g,'')
              .replace(/\([^)]*\)/g,' ');
  if(/label|sticker|seal\b|ribbon|\bqr\b/.test(ds)) return 'Labels & stickers';
  if(/\ba[il]o\b|vape|cartridge|\b510\b/.test(ds)) return 'Vapes (AIO)';   // "AlO" = supplier typo for AIO
  if(/mylar|pouch/.test(ds)) return 'Mylar bags';
  if(/rolling tray|lanyard|\bpin\b|koozie|lighter|leash|leesh|promotional|plastic cup|\btray\b/.test(ds)) return 'Merch & promo';
  if(/jar|bottle|purple flower|flower purple/.test(ds)){
    const m = /(\d+(?:\.\d+)?)\s*g\b/.exec(ds);
    if(m){ const v = parseFloat(m[1]); return (v < 1 ? String(v).replace('0.','.') : String(v)) + 'g jars'; }
    return 'Jars';
  }
  if(/tube/.test(ds)) return 'Pre-roll tubes';
  if(/booklet|catalog/.test(ds)) return 'Booklets & print';
  if(/display|\bstand\b|\bsign\b|light box|flyer/.test(ds)) return 'Displays & signage';
  if(/pre ?-?roll/.test(ds)) return 'Pre-roll packaging';
  if(/bag/.test(ds)) return 'Bags';
  if(/\bbox|master case/.test(ds)) return 'Cases & boxes';
  return cat ? cat.trim() : 'Other';
}
function tyHue(t){ let h=0; for(const ch of t) h=(h*31+ch.charCodeAt(0))%360; return h; }
function tyChip(t){
  const h = tyHue(t);
  return `<span class="st" style="background:hsla(${h},55%,55%,.13);color:hsl(${h},60%,72%);border-color:hsla(${h},55%,55%,.32)">${esc(t)}</span>`;
}

function paymentsOf(m, r){
  const out = [];
  for(const pc of m.payCols){
    const v = (r.c[pc.i]||'').trim();
    if(!v) continue;
    const amt = money(v);
    if(amt === null || amt <= 0) continue;         // skip $0.00 placeholders and non-numeric notes
    out.push({ key: payKeyOf(pc.header), ...paySplit(pc.header),
               label: pc.header.split('\n').map(s=>s.trim()).filter(Boolean).join(' · '), val: v });
  }
  return out;
}

const MONS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

/* Payment headers carry a day + month but usually no year (CA writes "11th May").
   The columns run in chronological order, so walk them newest -> oldest and step the
   year back whenever the calendar date moves forward. Undated columns ("Payment 14")
   inherit a slot just after the dated payment to their left, keeping sheet order. */
function payDates(m, nowMs){
  const MON = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const parse = s => {
    const t = (s||'').toLowerCase();
    let d, mo, x = /(\d{1,2})(?:st|nd|rd|th)?\s+([a-z]{3,9})/.exec(t);
    if(x && MON[x[2].slice(0,3)] !== undefined){ d = +x[1]; mo = MON[x[2].slice(0,3)]; }
    else {
      x = /([a-z]{3,9})\s+(\d{1,2})(?:st|nd|rd|th)?/.exec(t);
      if(x && MON[x[1].slice(0,3)] !== undefined){ mo = MON[x[1].slice(0,3)]; d = +x[2]; }
    }
    if(d === undefined) return null;
    const y = /\b(20\d{2})\b/.exec(t);
    return { d, mo, year: y ? +y[1] : null };
  };
  const GRACE = 45 * 864e5;      // a wire may be stamped a little ahead of when it clears
  const STEP  = 60 * 864e5;      // a real year boundary jumps ~9-12 months; a typo jumps days

  /* Anchor the newest payment to the sheet's own newest activity, not just to today —
     otherwise a sheet nobody touches for a year drags every payment forward with the clock. */
  let newest = null;
  for(const r of m.rows) if(r.date != null) newest = newest == null ? r.date : Math.max(newest, r.date);
  const cap = Math.min(nowMs, newest ?? nowMs) + GRACE;

  const out = {};
  let year = null, prev = null, pending = [];
  for(let i = m.payCols.length - 1; i >= 0; i--){
    const pc = m.payCols[i], key = payKeyOf(pc.header);
    const p = parse(paySplit(pc.header).date);
    if(!p){ pending.push(key); continue; }
    if(p.year != null) year = p.year;
    else if(year == null){                       // newest payment: latest year that isn't beyond the cap
      year = new Date(cap).getFullYear();
      if(new Date(year, p.mo, p.d).getTime() > cap) year--;
    } else if(prev && new Date(year, p.mo, p.d).getTime() - prev.ts > STEP) year--;
    const ts = new Date(year, p.mo, p.d).getTime();
    out[key] = { ts, label: `${p.d} ${MONS[p.mo]} ${year}`, exact: p.year != null };
    pending.forEach((k,n) => out[k] = { ts: ts + (pending.length - n), label: null, exact: false });
    pending = [];
    prev = { ts };
  }
  const oldest = Object.values(out).reduce((a,v) => Math.min(a, v.ts), Infinity);
  pending.forEach((k,n) => out[k] = { ts: (isFinite(oldest) ? oldest : nowMs) - n - 1, label: null, exact: false });
  return out;
}

/* The whole account as one dated event list, oldest -> newest: invoices add their
   total, payments subtract, and each event carries the balance left after it. This is
   the single ordering the table renders (reversed), so the balance column always reads
   consistently even where several events share a date. */
function ledger(m, adj, pdates){
  const totC = m.cols.find(c => c.header.replace(/\s+/g,' ').toLowerCase() === 'total including freight');
  const invC = m.cols.find(c => c.header.toLowerCase() === 'invoice no.');
  const descC = m.cols.find(c => /^desc/i.test(c.header));
  const cell = (r,c) => c ? (r.c[c.i]||'').trim() : '';
  const evs = [];

  /* a wire is ONE event, however many invoices it was split across */
  const wires = new Map();
  const wire = key => {
    if(!wires.has(key)) wires.set(key, { key, apps:[], superseded:[] });
    return wires.get(key);
  };
  for(const r of m.rows){
    evs.push({ kind:'order', r, key:'o'+r.src, date:r.date, amt: totC ? (money(r.c[totC.i])||0) : 0 });
    const app = (amt, note) => ({ r, src:r.src, amt, note, inv: cell(r,invC), desc: cell(r,descC) });
    for(const p of paymentsOf(m, r)){
      const w = wire(p.key);
      (adj.restated.has(p.key) ? w.superseded : w.apps).push(app(money(p.val)||0));
    }
    for(const e of adj.added[r.src] || []) wire(e.key).apps.push(app(e.amt, e.note));
  }
  for(const w of wires.values())
    evs.push({ kind:'pay', payKey:w.key, key:'P'+w.key, date:(pdates[w.key]||{}).ts,
               amt: -w.apps.reduce((a,x)=>a+x.amt,0), apps:w.apps, superseded:w.superseded,
               re: adj.restated.has(w.key) });

  evs.sort((a,b) => (a.date ?? -Infinity) - (b.date ?? -Infinity));
  let run = 0;
  evs.forEach(ev => { run += ev.amt; ev.bal = run; });
  return evs;
}

/* per-payment-column metadata: the wire total (totals row) vs the sheet's split */
function paymentsMeta(m){
  const invCol = m.cols.find(c => c.header.toLowerCase() === 'invoice no.');
  return m.payCols.map(pc => {
    const lines = pc.header.split('\n').map(s=>s.trim()).filter(Boolean);
    let wire = null;
    for(const tr of m.totals){ const v = money(tr[pc.i]); if(v !== null){ wire = v; break; } }
    const cells = [];
    for(const r of m.rows){
      const amt = money(r.c[pc.i]);
      if(amt) cells.push({ src: r.src, invoice: (r.c[invCol.i]||'').trim(), amt });
    }
    const sheetSum = cells.reduce((a,c)=>a+c.amt,0);
    return { key: lines[0], sub: lines.slice(1).join(' · '), ...paySplit(pc.header),
             i: pc.i, wire, cells, sheetSum };
  });
}

/* the adjusted view: app re-ascriptions override the sheet's split per payment */
function computeAdjust(m, stateKey){
  const groups = {};
  for(const a of state.asc) if(a.state === stateKey) (groups[a.payment_key] ??= []).push(a);
  const meta = paymentsMeta(m);
  const metaByKey = Object.fromEntries(meta.map(p=>[p.key, p]));
  const invCol = m.cols.find(c => c.header.toLowerCase() === 'invoice no.');
  const invToSrc = {};
  for(const r of m.rows){ const inv=(r.c[invCol.i]||'').trim(); if(inv && !(inv in invToSrc)) invToSrc[inv]=r.src; }

  const removed = {}, added = {}, orphans = [], moves = {};
  let overall = 0;
  const restated = new Set();
  const delta = {};                                      // src -> paid delta (due moves opposite)
  const bump = (src, d) => { if(src != null) delta[src] = (delta[src]||0) + d; };

  for(const key in groups){
    const pm = metaByKey[key];
    if(!pm){ orphans.push(...groups[key]); continue; }   // payment no longer in sheet
    const moveList = groups[key].filter(a => a.mode === 'move');
    const replList = groups[key].filter(a => a.mode !== 'move');

    /* MOVE: reallocate within the wire — credit shifts from a source invoice (or the
       unallocated remainder) to a target. The sheet split stays the baseline; only the
       two named invoices move, so the wire total and every other line are untouched. */
    for(const a of moveList){
      const tgt    = a.invoice_no    ? invToSrc[a.invoice_no.trim()]    : undefined;
      const srcInv = a.source_invoice ? invToSrc[a.source_invoice.trim()] : undefined;
      if((a.invoice_no && tgt === undefined) || (a.source_invoice && srcInv === undefined)){ orphans.push(a); continue; }
      const amt = +a.amount;
      bump(tgt, +amt);
      if(a.source_invoice) bump(srcInv, -amt);           // taken off another invoice: open balance unchanged
      else overall -= amt;                               // taken off the unallocated remainder
      (moves[key] ??= []).push({ id:a.id, amount:amt, note:a.note,
        target:a.invoice_no || null, source:a.source_invoice || null });
    }

    /* REPLACE: restate the whole wire — its sheet split is dropped and rebuilt from the entries. */
    if(replList.length){
      restated.add(key);
      let toInvoices = 0;
      for(const a of replList){
        if(!a.invoice_no) continue;                      // explicit overall slice
        const src = invToSrc[a.invoice_no.trim()];
        if(src){ (added[src] ??= []).push({key, amt:+a.amount, note:a.note, id:a.id}); toInvoices += +a.amount; }
        else orphans.push(a);
      }
      for(const c of pm.cells) (removed[c.src] ??= []).push({key, amt:c.amt});
      overall += (pm.wire ?? pm.sheetSum) - toInvoices;
    }
  }
  for(const src in removed) bump(src, -removed[src].reduce((a,x)=>a+x.amt,0));
  for(const src in added)   bump(src, +added[src].reduce((a,x)=>a+x.amt,0));
  return { meta, metaByKey, groups, restated, removed, added, delta, overall, orphans, moves };
}

/* ---------- invoice links (from the xlsx export, parsed in-browser) ---------- */
const u16=(b,o)=>b[o]|b[o+1]<<8;
const u32=(b,o)=>(b[o]|b[o+1]<<8|b[o+2]<<16|b[o+3]<<24)>>>0;
async function inflateRaw(bytes){
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
function zipEntries(buf){
  let eocd=-1;
  for(let i=buf.length-22;i>=Math.max(0,buf.length-65558);i--){
    if(u32(buf,i)===0x06054b50){ eocd=i; break; }
  }
  if(eocd<0) throw new Error('not a zip');
  const count=u16(buf,eocd+10);
  let p=u32(buf,eocd+16);
  const entries={};
  for(let k=0;k<count;k++){
    if(u32(buf,p)!==0x02014b50) break;
    const method=u16(buf,p+10), csize=u32(buf,p+20),
          nlen=u16(buf,p+28), elen=u16(buf,p+30), clen=u16(buf,p+32), lho=u32(buf,p+42);
    const name=new TextDecoder().decode(buf.subarray(p+46,p+46+nlen));
    entries[name]={method,csize,lho};
    p+=46+nlen+elen+clen;
  }
  return entries;
}
async function zipRead(buf, e){
  const nlen=u16(buf,e.lho+26), elen=u16(buf,e.lho+28);
  const start=e.lho+30+nlen+elen;
  const raw=buf.subarray(start,start+e.csize);
  return new TextDecoder().decode(e.method===8 ? await inflateRaw(raw) : raw);
}
const unent = s => s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&apos;/g,"'");

async function fetchInvoiceLinks(){
  const r = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=xlsx`, {cache:'no-store'});
  if(!r.ok) throw new Error('HTTP '+r.status);
  const buf = new Uint8Array(await r.arrayBuffer());
  const entries = zipEntries(buf);
  const wbXml = await zipRead(buf, entries['xl/workbook.xml']);
  const wbRels = await zipRead(buf, entries['xl/_rels/workbook.xml.rels']);
  const relMap = {};
  for(const m of wbRels.matchAll(/<Relationship\b[^>]*>/g)){
    const id=/Id="([^"]*)"/.exec(m[0]), tg=/Target="([^"]*)"/.exec(m[0]);
    if(id&&tg) relMap[id[1]] = tg[1].replace(/^\//,'');
  }
  const links = {};
  for(const m of wbXml.matchAll(/<sheet\b[^>]*>/g)){
    const nm=/name="([^"]*)"/.exec(m[0]), rid=/r:id="([^"]*)"/.exec(m[0]);
    if(!nm||!rid) continue;
    const tab = TABS.find(t => t.name === unent(nm[1]));
    if(!tab) continue;
    let path = relMap[rid[1]]; if(!path) continue;
    if(!path.startsWith('xl/')) path = 'xl/'+path;
    const sheetEnt = entries[path]; if(!sheetEnt) continue;
    const relPath = path.replace(/worksheets\//,'worksheets/_rels/') + '.rels';
    const sheetXml = await zipRead(buf, sheetEnt);
    const sheetRels = entries[relPath] ? await zipRead(buf, entries[relPath]) : '';
    const rmap = {};
    for(const mm of sheetRels.matchAll(/<Relationship\b[^>]*>/g)){
      const id=/Id="([^"]*)"/.exec(mm[0]), tg=/Target="([^"]*)"/.exec(mm[0]);
      if(id&&tg) rmap[id[1]] = unent(tg[1]);
    }
    const map = {};
    for(const mm of sheetXml.matchAll(/<hyperlink\b[^>]*>/g)){
      const ref=/ref="([A-Z]+)(\d+)"/.exec(mm[0]), rid2=/r:id="([^"]*)"/.exec(mm[0]);
      if(ref && ref[1]==='A' && rid2 && rmap[rid2[1]]) map[ref[2]] = rmap[rid2[1]];
    }
    links[tab.key] = map;
  }
  return links;
}

/* ---------- status chips ---------- */
function statusClass(s){
  const t = s.toLowerCase();
  if(t.includes('full paid')) return 'st-paid';
  if(t.includes('delivered')) return 'st-delivered';
  if(t.includes('transit') || t.includes('shipped')) return 'st-transit';
  if(t.includes('partial')) return 'st-partial';
  if(t.includes('production')) return 'st-prod';
  if(t.includes('ready')) return 'st-ready';
  if(t.includes('approved')) return 'st-paid';
  if(t.includes('not yet') || t.includes('pending') || t.includes('quote')) return 'st-warn';
  return 'st-na';
}

/* ---------- render ---------- */
function currentModel(){ return state.data[state.page]; }
function linkFor(page, src){ return (state.links[page]||{})[String(src)] || null; }

function filteredRows(m){
  const f = state.filters[state.page];
  const osCol = m.cols.find(c=>c.orderStatus);
  let rows = m.rows;
  if(f.st.size && osCol) rows = rows.filter(r => f.st.has((r.c[osCol.i]||'').trim()));
  if(f.ty.size) rows = rows.filter(r => f.ty.has(r.type));
  if(f.q){
    const q = f.q.toLowerCase();
    rows = rows.filter(r => (r.type||'').toLowerCase().includes(q) || r.c.some(v => (v||'').toLowerCase().includes(q)));
  }
  return rows;
}

function stateTotals(m){
  const find = n => m.cols.find(c => c.header.replace(/\s+/g,' ').toLowerCase() === n);
  const sum = c => c ? m.rows.reduce((a,r)=>a+(money(r.c[c.i])||0),0) : 0;
  return { n: m.rows.length, total: sum(find('total including freight')),
           paid: sum(find('paid to date')), due: sum(find('due')), nyd: sum(find('not yet due')) };
}

function purchasesReport(scope){
  const src = scope === 'all' ? ['ca','ny'] : [scope];
  const now = new Date();
  const months = [];
  for(let k=3;k>=1;k--){
    const d = new Date(now.getFullYear(), now.getMonth()-k, 1);
    months.push({ y:d.getFullYear(), m:d.getMonth(),
                  label: d.toLocaleString('en-US',{month:'short'})+' '+d.getFullYear(), sum:0 });
  }
  for(const key of src){
    const m = state.data[key]; if(!m) continue;
    const tc = m.cols.find(c => c.header.replace(/\s+/g,' ').toLowerCase() === 'total including freight');
    if(!tc) continue;
    for(const r of m.rows){
      if(r.date == null) continue;
      const d = new Date(r.date);
      const slot = months.find(x => x.y===d.getFullYear() && x.m===d.getMonth());
      if(slot) slot.sum += money(r.c[tc.i]) || 0;
    }
  }
  return { months, avg: months.reduce((a,x)=>a+x.sum,0) / months.length };
}

/* per-category open balance, due and not-yet-due (adjusted for re-ascriptions) */
function categoryReport(scope){
  const keys = scope === 'all' ? ['ca','ny'] : [scope];
  const cats = new Map();
  for(const k of keys){
    const m = state.data[k]; if(!m) continue;
    const adj = computeAdjust(m, k);
    const find = n => m.cols.find(c => c.header.replace(/\s+/g,' ').toLowerCase() === n);
    const dueC = find('due'), nydC = find('not yet due'), invC = find('invoice no.'),
          shipC = find('ship date'), descC = m.cols.find(c => /^desc/i.test(c.header));
    for(const r of m.rows){
      const t = r.type || 'Other';
      const due = (dueC ? (money(r.c[dueC.i])||0) : 0) - (adj.delta[r.src]||0);
      const nyd = nydC ? (money(r.c[nydC.i])||0) : 0;
      let c = cats.get(t);
      if(!c){ c = { type:t, n:0, due:0, nyd:0, rows:[], states:new Set() }; cats.set(t, c); }
      c.n++; c.due += due; c.nyd += nyd; c.states.add(k);
      c.rows.push({ state:k, src:r.src, adj: !!adj.delta[r.src], due, nyd, open: due+nyd,
                    inv: invC ? (r.c[invC.i]||'').trim() : '',
                    date: shipC ? (r.c[shipC.i]||'').trim() : '',
                    desc: descC ? (r.c[descC.i]||'').trim().replace(/\s+/g,' ') : '' });
    }
  }
  const list = [...cats.values()].map(c => ({ ...c, open: c.due + c.nyd }));
  list.forEach(c => c.rows.sort((a,b) => b.open - a.open || b.due - a.due));
  list.sort((a,b) => b.open - a.open || b.n - a.n || a.type.localeCompare(b.type));
  return list;
}

      `<td class="num">${c.n}</td>` +

    rows += `<tr class="catx"><td colspan="6">` +
      `<div class="catbtns"><span class="lbl">${c.n} order${c.n===1?'':'s'} · click one to open it</span>` +
      [...c.states].map(k => `<button class="btn" style="padding:3px 10px;font-size:11.5px" ` +
        `data-goty="${esc(c.type)}" data-gost="${k}">filter the ${k.toUpperCase()} page ↗</button>`).join('') +
      `</div><div style="overflow-x:auto"><table class="subTbl"><thead><tr>` +
      `<th>Ship date</th><th>Invoice</th><th>Description</th>` +
      `<th class="num">Open</th><th class="num">Due</th><th class="num">Not yet due</th></tr></thead><tbody>` +
      c.rows.map(r =>
        `<tr data-gost="${r.state}" data-gosrc="${r.src}">` +
        `<td class="faint">${esc(r.date||'—')}</td>` +
        `<td><b>${showState?`<span class="stbadge">${r.state.toUpperCase()}</span>`:''}${esc(r.inv||'—')}</b></td>` +
        `<td class="desc" title="${esc(r.desc)}">${esc(r.desc||'—')}</td>` +
        `<td class="num">${fmtUSD(r.open)}${r.adj?'<span class="adjmark" title="adjusted by app re-ascriptions">✱</span>':''}</td>` +
        `<td class="num" style="color:var(--orange)">${fmtUSD(r.due)}</td>` +
        `<td class="num" style="color:var(--blue)">${fmtUSD(r.nyd)}</td></tr>`).join('') +
      `</tbody></table></div></td></tr>`;
  }

  return `<div class="panel"><div class="rtitle">Open balance by category` +
    `<span class="sub">${scope==='all'?'CA + NY':scope.toUpperCase()} · ${list.length} categories</span></div>` +
    `<div style="overflow-x:auto"><table class="payTbl"><thead><tr><th>Category</th><th class="num">Orders</th>` +
    `<th class="num">Open balance</th><th class="num">Due</th><th class="num">Not yet due</th><th></th></tr></thead><tbody>` +
    rows +
    `<tr class="grand"><td><b>Total</b></td><td class="num">${tot.n}</td><td class="num"><b>${fmtUSD(tot.open)}</b></td>` +
    `<td class="num">${fmtUSD(tot.due)}</td><td class="num">${fmtUSD(tot.nyd)}</td><td></td></tr>` +
    `</tbody></table></div></div>`;
}

/* jump from the overview into a specific order / a filtered state page */
function gotoOrder(stateKey, src){
  const f = state.filters[stateKey];
  f.q = ''; f.st.clear(); f.ty.clear();
  state.expanded[stateKey].add(src);
  goPage(stateKey);
  setTimeout(() => {
    const el = document.querySelector(`tr.order[data-src="${src}"]`);
    if(el) el.scrollIntoView({block:'center'});
  }, 30);
}
function gotoType(stateKey, type){
  const f = state.filters[stateKey];
  f.q = ''; f.st.clear(); f.ty.clear(); f.ty.add(type);
  goPage(stateKey);
}

function renderOverview(){

  if(!state.data.ca || !state.data.ny){
    $('#toolbar').innerHTML = '';
    pp.style.display='none'; pp.innerHTML='';
    cardsEl.innerHTML = '<div class="tblbox"><div class="loading">Loading order data…</div></div>';
    return;
  }
  const t = {};
  for(const k of ['ca','ny']){
    const m = state.data[k], s = stateTotals(m), adj = computeAdjust(m, k);
    const dSum = Object.values(adj.delta).reduce((a,d)=>a+d,0);
    s.adjDue = s.due - dSum; s.adjPaid = s.paid + dSum;
    s.overall = adj.overall; s.hasAdj = Object.keys(adj.delta).length > 0 || Math.abs(adj.overall) > 0.005;
    t[k] = s;
  }
  const g = Object.values(t).reduce((a,s)=>({n:a.n+s.n,total:a.total+s.total,paid:a.paid+s.paid,due:a.due+s.due,
      nyd:a.nyd+s.nyd,adjDue:a.adjDue+s.adjDue,adjPaid:a.adjPaid+s.adjPaid,overall:a.overall+s.overall,
      hasAdj:a.hasAdj||s.hasAdj}),
    {n:0,total:0,paid:0,due:0,nyd:0,adjDue:0,adjPaid:0,overall:0,hasAdj:false});

  /* scope buttons */
  const scope = state.ovScope;
  $('#toolbar').innerHTML = `<div class="seg">` +
    [['all','All'],['ca','CA'],['ny','NY']].map(([k,l]) =>
      `<button data-scope="${k}" class="${scope===k?'on':''}">${l}</button>`).join('') + `</div>`;
  document.querySelectorAll('#toolbar [data-scope]').forEach(b =>
    b.addEventListener('click', () => { state.ovScope = b.dataset.scope; render(); }));

  /* purchases report */
  const rep = purchasesReport(scope);
  pp.style.display = '';
  pp.innerHTML = `<div class="panel"><div class="rtitle">Average monthly purchases` +
    `<span class="sub">${scope==='all'?'CA + NY':scope.toUpperCase()} · last 3 full months (by ship date)</span></div>` +
    `<div class="mrow">` +
    rep.months.map(x => `<div class="mitem"><div class="fl">${esc(x.label)}</div><div class="fv">${fmtUSD(x.sum)}</div></div>`).join('') +
    `<div class="mitem avg"><div class="fl">Monthly average</div><div class="fv">${fmtUSD(rep.avg)}</div></div>` +
    `</div></div>` +
    catReportHtml(scope);

  pp.querySelectorAll('tr.prow[data-cat]').forEach(tr => tr.addEventListener('click', () => {

  pp.querySelectorAll('.subTbl tbody tr[data-gosrc]').forEach(tr => tr.addEventListener('click', e => {

    `<td class="num">${s.n}</td>` +
    `<td class="num"><b>${fmtUSD(s.adjDue+s.nyd)}</b>${adjMark(s)}</td>` +
    `<td class="num" style="color:var(--orange)">${fmtUSD(s.adjDue)}${adjMark(s)}</td>` +
    `<td class="num" style="color:var(--blue)">${fmtUSD(s.nyd)}</td>` +

  cardsEl.innerHTML = `<div class="tblbox">` +
    `<table class="stateTbl"><thead><tr><th>State</th><th class="num">Orders</th><th class="num">Open balance</th>` +
    `<th class="num">Due</th><th class="num">Not yet due</th><th></th></tr></thead><tbody>` +
    row('ca', t.ca, 'st-row', 'CA') + row('ny', t.ny, 'st-row', 'NY') + row('', g, 'grand', 'Total') +
    `</tbody></table></div>` +
    (g.overall > 0.005 ? `<div style="padding:8px 2px 0;font-size:12px;color:var(--accent2);font-weight:650">On overall balance: ${fmtUSD(g.overall)} <span class="faint" style="font-weight:500">— re-ascribed, not on an invoice</span></div>` : '') +
    (g.hasAdj ? `<div style="padding:6px 2px 0;font-size:11.5px;color:var(--faint)">✱ adjusted for app payment re-ascriptions (see the Payments panel on each state page); the supplier sheet itself is unchanged.</div>` : '');
  cardsEl.querySelectorAll('tr.st-row').forEach(tr =>
    tr.addEventListener('click', () => goPage(tr.dataset.page)));
}

function render(){
  document.querySelectorAll('#seg button').forEach(b => b.classList.toggle('on', b.dataset.key===state.page));
  $('#q').style.display = state.page==='overview' ? 'none' : '';
  if(state.page === 'overview'){ renderOverview(); return; }
  $('#cards').className = 'cards';                      // undo the overview layout
  document.querySelector('.wrap').style.display = '';
  const m = currentModel();
  const tab = TABS.find(t=>t.key===state.page);
  $('#openSheet').href = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit#gid=${tab.gid}`;
  if(!m){ $('#tblbox').innerHTML = '<div class="loading">Loading order data…</div>'; return; }

  const rows = filteredRows(m);
  const f = state.filters[state.page];
  const adj = computeAdjust(m, state.page);
  const hasAdj = Object.keys(adj.delta).length > 0 || Math.abs(adj.overall) > 0.005;

  /* cards */
  const findCol = name => m.cols.find(c => c.header.replace(/\s+/g,' ').toLowerCase() === name);
  const sum = col => col ? rows.reduce((a,r)=>a+(money(r.c[col.i])||0),0) : null;
  const sumAdj = (col, sign) => col ? rows.reduce((a,r)=>a+(money(r.c[col.i])||0)+sign*(adj.delta[r.src]||0),0) : null;
  const paidCol = findCol('paid to date'), dueCol = findCol('due'), nydCol = findCol('not yet due');
  const dueVal = hasAdj ? sumAdj(dueCol, -1) : sum(dueCol);
  const nydVal = sum(nydCol);
  const cardDefs = [
    { lbl:'Orders' + (f.q||f.st.size||f.ty.size?' (filtered)':''), val: rows.length, cls:'' },
    { lbl:'Open balance', val: (dueVal??0) + (nydVal??0), sheet: hasAdj ? (sum(dueCol)??0)+(nydVal??0) : null, cls:'', usd:true },
    { lbl:'Due', val: dueVal, sheet: hasAdj ? sum(dueCol) : null, cls:'due', usd:true },
    { lbl:'Not yet due', val: nydVal, cls:'nyd', usd:true },
  ];
  if(adj.overall > 0.005)
    cardDefs.push({ lbl:'On overall balance', val: adj.overall, cls:'', usd:true, sub:'re-ascribed, not on an invoice' });
  else if(adj.overall < -0.005)
    cardDefs.push({ lbl:'Over-attributed', val: -adj.overall, cls:'due', usd:true, sub:'credited to invoices beyond the wires — open balance is lower by this' });
  $('#cards').innerHTML = cardDefs.filter(c=>c.val!==null).map(c =>
    `<div class="card ${c.cls}"><div class="lbl">${esc(c.lbl)}</div><div class="val">${c.usd?fmtUSD(c.val):c.val}</div>` +
    (c.sheet!=null && Math.abs(c.sheet-c.val)>0.005 ? `<div class="sub">sheet: ${fmtUSD(c.sheet)}</div>` : '') +
    (c.sub ? `<div class="sub">${esc(c.sub)}</div>` : '') +
    `</div>`
  ).join('');

  /* status filter chips */
  const osCol = m.cols.find(c=>c.orderStatus);
  let chips = '';
  if(osCol){
    const counts = {};
    m.rows.forEach(r => { const v=(r.c[osCol.i]||'').trim(); if(v) counts[v]=(counts[v]||0)+1; });
    chips = `<span class="chip ${f.st.size?'':'on'}" data-st="">All <span class="n">${m.rows.length}</span></span>` +
      Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([v,n]) =>
        `<span class="chip ${f.st.has(v)?'on':''}" data-st="${esc(v)}">${esc(v)} <span class="n">${n}</span></span>`
      ).join('');
  }
  /* type filter chips */
  const tyCounts = {};
  m.rows.forEach(r => { if(r.type) tyCounts[r.type]=(tyCounts[r.type]||0)+1; });
  const tyChips = `<span style="flex-basis:100%"></span>` +
    `<span class="chip ${f.ty.size?'':'on'}" data-ty="">All types</span>` +
    Object.entries(tyCounts).sort((a,b)=>b[1]-a[1]).map(([v,n]) =>
      `<span class="chip ${f.ty.has(v)?'on':''}" data-ty="${esc(v)}">` +
      `<span class="dot" style="background:hsl(${tyHue(v)},60%,62%)"></span>${esc(v)} <span class="n">${n}</span></span>`
    ).join('');

  $('#toolbar').innerHTML = chips +
    `<span class="chip payChip ${state.payOpen[state.page]?'on':''}">💸 Payments <span class="n">${m.payCols.length}</span></span>` +
    `<span class="count">${rows.length} of ${m.rows.length} orders` +
      ((f.q||f.st.size||f.ty.size) ? ' · Balance stays whole-account' : '') + `</span>` +
    tyChips;
  document.querySelectorAll('#toolbar .chip').forEach(ch => ch.addEventListener('click', () => {
    if(ch.classList.contains('payChip')){
      state.payOpen[state.page] = !state.payOpen[state.page];
      render();
      return;
    }
    if(ch.dataset.ty !== undefined){
      const v = ch.dataset.ty;
      if(!v) f.ty.clear();
      else f.ty.has(v) ? f.ty.delete(v) : f.ty.add(v);
    }else{
      const v = ch.dataset.st;
      if(!v) f.st.clear();
      else f.st.has(v) ? f.st.delete(v) : f.st.add(v);
    }
    render();
  }));

  renderPayPanel(m, adj);

  /* table */
  const box = $('#tblbox');
  const keepScroll = {x: box.scrollLeft, y: box.scrollTop};
  const nCols = m.cols.length;

  const stickyCls = idx => idx===0 ? 'sticky s1' : idx===1 ? 'sticky s2' : '';

  const thead = '<tr>' + m.cols.map((c,idx) => {
    const parts = c.header.split('\n');
    const label = esc(parts[0]) + parts.slice(1).map(p=>`<span class="hsub">${esc(p)}</span>`).join('');
    return `<th class="${c.num&&idx>1?'num ':''}${stickyCls(idx)}${c.virtual==='balance'?' balcell':''}">${label}</th>`;
  }).join('') + '</tr>';

  const totalRows = m.totals.map(tr =>
    '<tr class="totals"><td class="sticky s1" colspan="2">Sheet totals</td>' + m.cols.slice(2).map(c => {
      const v = (tr[c.i]||'').trim();
      return `<td class="${c.num?'num':''}">${esc(v)}</td>`;
    }).join('') + '</tr>'
  ).join('');

  /* one dated ledger: invoices and payments each sit at their OWN date, and every
     payment still names the invoice it was applied to. Balances come from the full
     (unfiltered) ledger, so they stay true even when chips hide rows. */
  const pdates = payDates(m, Date.now());
  const totCol = findCol('total including freight');
  const invCol = m.cols.find(c => c.header.toLowerCase() === 'invoice no.');
  const dateOf = key => (pdates[key] || {});

  const visible = new Set(rows.map(r => r.src));
  const events = ledger(m, adj, pdates).filter(ev => ev.kind === 'order'
    ? visible.has(ev.r.src)
    : ev.apps.concat(ev.superseded).some(a => visible.has(a.src))).reverse();

  const open = state.expanded[state.page];
  const payOpen = state.ledgerPay[state.page];
  const restCols = Math.max(0, nCols - 4);
  let body = '';
  for(const ev of events){
    if(ev.kind === 'order'){
      const r = ev.r;
      const hasLink = !!linkFor(state.page, r.src);
      const isOpen = open.has(r.src);
      const delta = adj.delta[r.src] || 0;
      body += `<tr class="order${isOpen?' open':''}" data-src="${r.src}">` + m.cols.map((c,idx) => {
        const v = (r.c[c.i]||'').trim();
        let cell = esc(v);
        if(c.virtual === 'type') cell = r.type ? tyChip(r.type) : '';
        else if(c.virtual === 'amount') cell = totCol ? fmtUSD(money(r.c[totCol.i])||0) : '';
        else if(c.virtual === 'balance') cell = ev.bal == null ? '' : fmtUSD(ev.bal);
        if(c.status && v) cell = `<span class="st ${statusClass(v)}">${esc(v)}</span>`;
        if(delta && (c===paidCol || c===dueCol)){
          const sheetVal = money(v) || 0;
          const adjVal = c===paidCol ? sheetVal + delta : sheetVal - delta;
          cell = `${fmtUSD(adjVal)}<span class="adjmark" title="Sheet value: ${fmtUSD(sheetVal)} — adjusted by app re-ascriptions">✱</span>`;
        }
        if(idx===0){
          // the ledger may have placed this row by its delivery/due date — show what it used,
          // so the date column can never disagree with the row's position
          if(!v && r.date != null){
            const dt = new Date(r.date);
            cell = `<span class="inferred" title="No ship date — placed by its delivery/due date">` +
                   `${dt.getMonth()+1}/${dt.getDate()}/${dt.getFullYear()}</span>`;
          }
          cell = `<span class="chev">▶</span>` + cell;
        }
        if(idx===1 && hasLink) cell += '<span class="doc" title="Invoice PDF linked">📄</span>';
        const cls = [c.num&&idx>1?'num':'', c.wide?'wide':'', stickyCls(idx),
                     c.virtual==='balance'?'balcell':''].filter(Boolean).join(' ');
        return `<td${cls?` class="${cls}"`:''}>${cell}</td>`;
      }).join('') + '</tr>';
      if(isOpen) body += `<tr class="detail"><td colspan="${nCols}">${detailHtml(m, r, adj)}</td></tr>`;
      continue;
    }

    /* one line per wire — click it to see the invoices it was applied to */
    const d = dateOf(ev.payKey);
    const nm = (adj.metaByKey[ev.payKey] || {}).name || ev.payKey;
    const isOpen = payOpen.has(ev.payKey);
    const n = ev.apps.length;
    const wireMoves = adj.moves[ev.payKey] || [];
    body += `<tr class="pay${isOpen?' open':''}" data-pay="${esc(ev.payKey)}">` +
      `<td class="sticky s1"><span class="${d.exact?'':'inferred'}" title="${esc(d.label ? (d.exact ? d.label : d.label+' — year inferred from the payment order; the sheet gives no year') : 'this payment column has no date in the sheet; placed by its column position')}">${esc(d.label || '—')}</span></td>` +
      `<td class="sticky s2"><span class="chev">▶</span>${esc(nm)}</td>` +
      `<td class="num pay-amt">−${fmtUSD(-ev.amt)}</td>` +
      `<td class="num balcell">${fmtUSD(ev.bal)}</td>` +
      (restCols ? `<td colspan="${restCols}">applied to ${n} invoice${n===1?'':'s'}` +
        (ev.re ? '<span class="retag">re-ascribed in app</span>'
               : wireMoves.length ? `<span class="retag">${wireMoves.length} reallocated ⇄</span>` : '') + '</td>' : '') +
      '</tr>';

    if(isOpen) body += `<tr class="paydetail"><td colspan="${nCols}"><div class="dbox">` +
      `<div class="msec" style="margin-top:0">Applied to${ev.re?' (as re-ascribed in this app)':''}</div>` +
      (n ? `<table class="subTbl"><tbody>` + ev.apps.map(a =>
            `<tr data-gosrc="${a.src}"><td><b>${esc(a.inv||'—')}</b></td>` +
            `<td class="desc" title="${esc(a.desc)}">${esc(a.desc||'')}</td>` +
            (a.note ? `<td class="faint">${esc(a.note)}</td>` : '<td></td>') +
            `<td class="num" style="color:var(--green);font-weight:800">${fmtUSD(a.amt)}</td></tr>`).join('') +
          `</tbody></table>`
        : '<div class="nolink">None of this wire is ascribed to an invoice — it sits on the overall balance.</div>') +
      (wireMoves.length ? `<div class="msec">Reallocated in this app</div>` +
          wireMoves.map(mv => `<div class="entry"><span><b>${esc(mv.target||'—')}</b> ← ` +
            `${mv.source ? esc(mv.source) : 'unallocated remainder'}` +
            (mv.note?` <span class="note">· ${esc(mv.note)}</span>`:'') + `</span>` +
            `<span class="amt">${fmtUSD(mv.amount)}</span></div>`).join('') : '') +
      (ev.superseded.length ? `<div class="msec">Superseded sheet split</div><div class="split dim">` +
          ev.superseded.map(a => `<span class="sp">${esc(a.inv||'?')} <b>${fmtUSD(a.amt)}</b></span>`).join('') + `</div>` : '') +
      `</div></td></tr>`;
  }

  box.innerHTML = rows.length || m.totals.length
    ? `<table><thead>${thead}</thead><tbody>${totalRows}${body}</tbody></table>`
    : '<div class="empty">No orders match.</div>';
  box.scrollLeft = keepScroll.x; box.scrollTop = keepScroll.y;

  box.querySelectorAll('tr.order').forEach(tr =>
    tr.addEventListener('click', e => {
      if(e.target.closest('a')) return;               // let links work
      const src = parseInt(tr.dataset.src,10);
      open.has(src) ? open.delete(src) : open.add(src);
      render();
    }));
  box.querySelectorAll('tr.pay[data-pay]').forEach(tr =>
    tr.addEventListener('click', () => {
      const k = tr.dataset.pay;
      payOpen.has(k) ? payOpen.delete(k) : payOpen.add(k);
      render();
    }));
  box.querySelectorAll('tr.paydetail [data-gosrc]').forEach(tr =>
    tr.addEventListener('click', e => {              // jump to the invoice this wire paid
      e.stopPropagation();
      const src = parseInt(tr.dataset.gosrc,10);
      open.add(src);
      render();
      const el = box.querySelector(`tr.order[data-src="${src}"]`);
      if(el) el.scrollIntoView({block:'center', behavior:'smooth'});
    }));
}

/* ---------- inline detail ---------- */
function detailHtml(m, r, adj){
  const get = name => { const c = m.cols.find(c=>c.header.toLowerCase()===name); return c ? (r.c[c.i]||'').trim() : ''; };
  const url = linkFor(state.page, r.src);
  const pays = paymentsOf(m, r);
  const delta = (adj && adj.delta[r.src]) || 0;
  const appPays = (adj && adj.added[r.src]) || [];

  const chips = (r.type ? tyChip(r.type)+' ' : '') + ['order status','freight status'].map(n => {
    const v = get(n);
    return v ? `<span class="st ${statusClass(v)}">${esc(v)}</span>` : '';
  }).join(' ');

  const skip = new Set(['invoice no.','order status','freight status']);
  const fields = m.cols.filter(c => !skip.has(c.header.toLowerCase()) && (r.c[c.i]||'').trim());
  const fitems = fields.map(c => {
    const v = (r.c[c.i]||'').trim();
    const full = c.wide && v.length > 40;
    return `<div class="fitem${full?' full':''}"><div class="fl">${esc(c.header.replace(/\n/g,' '))}</div>` +
           `<div class="fv${c.wide?' pre':''}">${esc(v)}</div></div>`;
  }).join('');

  let payHtml = pays.length || appPays.length ? '<div class="msec">Payments made</div>' : '';
  payHtml += pays.map(p => {
    const re = adj && adj.restated.has(p.key);
    return `<div class="payline"${re?' style="opacity:.45;text-decoration:line-through"':''}>` +
      `<span>${esc(p.label)}${re?' <span class="retag">re-ascribed in app</span>':''}</span><span class="amt">${esc(p.val)}</span></div>`;
  }).join('');
  payHtml += appPays.map(e =>
    `<div class="payline" style="background:rgba(124,92,255,.09);border-color:rgba(124,92,255,.2)">` +
    `<span>✎ ${esc(e.key)}${e.note?` <span class="note">· ${esc(e.note)}</span>`:''}</span>` +
    `<span class="amt" style="color:var(--accent2)">${fmtUSD(e.amt)}</span></div>`).join('');
  if(delta){
    const sheetPaid = money(get('paid to date'))||0, sheetDue = money(get('due'))||0;
    payHtml += `<div class="msec">Adjusted (app re-ascriptions)</div>` +
      `<div class="fgrid"><div class="fitem"><div class="fl">Paid (adjusted)</div><div class="fv">${fmtUSD(sheetPaid+delta)} <span class="faint">sheet ${fmtUSD(sheetPaid)}</span></div></div>` +
      `<div class="fitem"><div class="fl">Due (adjusted)</div><div class="fv">${fmtUSD(sheetDue-delta)} <span class="faint">sheet ${fmtUSD(sheetDue)}</span></div></div></div>`;
  }

  return `<div class="dbox"><div class="dhead">${chips}` +
    (url ? `<a class="btn primary" href="${esc(url)}" target="_blank" rel="noopener">Invoice PDF ↗</a>`
         : `<span class="nolink">No invoice file is linked on this row in the sheet.</span>`) +
    `</div><div class="fgrid">${fitems}</div>${payHtml}</div>`;
}

/* ---------- payments (wires) panel ---------- */
function renderPayPanel(m, adj){
  const panel = $('#payPanel');
  if(state.page==='overview' || !state.payOpen[state.page]){ panel.style.display='none'; panel.innerHTML=''; return; }
  const stateKey = state.page;
  const expanded = state.payExpanded[stateKey];
  const invCol = m.cols.find(c => c.header.toLowerCase() === 'invoice no.');
  const invoices = [...new Set(m.rows.map(r=>(r.c[invCol.i]||'').trim()).filter(Boolean))];

  let rowsHtml = '';
  for(const pm of adj.meta){
    const re = adj.restated.has(pm.key);
    const isExp = expanded.has(pm.key);
    const entries = (adj.groups[pm.key]||[]);
    const moveEntries = entries.filter(a => a.mode === 'move');
    const replEntries = entries.filter(a => a.mode !== 'move');
    const sheetGap = (pm.wire ?? pm.sheetSum) - pm.sheetSum;
    const badge = re ? '<span class="badge info">restated ✎</span>'
                     : moveEntries.length ? `<span class="badge info">${moveEntries.length} reallocation${moveEntries.length===1?'':'s'} ⇄</span>` : '';
    rowsHtml += `<tr class="prow" data-key="${esc(pm.key)}">` +
      `<td><b>${esc(pm.key)}</b>${pm.sub?`<span class="psub">${esc(pm.sub)}</span>`:''}</td>` +
      `<td class="num">${pm.wire!=null?fmtUSD(pm.wire):'<span class="faint">—</span>'}</td>` +
      `<td class="num">${fmtUSD(pm.sheetSum)}</td>` +
      `<td class="num">${Math.abs(sheetGap)>0.005?`<span class="badge warn">${fmtUSD(sheetGap)} unascribed</span>`:'<span class="faint">—</span>'}</td>` +
      `<td>${badge}</td>` +
      `<td class="num faint">${isExp?'▾':'▸'}</td></tr>`;
    if(!isExp) continue;

    // effective per-invoice credit after moves — what this wire now puts on each invoice
    const eff = {};
    for(const c of pm.cells) eff[c.invoice] = (eff[c.invoice]||0) + c.amt;
    for(const mv of moveEntries){
      if(mv.invoice_no) eff[mv.invoice_no.trim()] = (eff[mv.invoice_no.trim()]||0) + (+mv.amount);
      if(mv.source_invoice) eff[mv.source_invoice.trim()] = (eff[mv.source_invoice.trim()]||0) - (+mv.amount);
    }
    // sources are the wire's own invoices (a true reallocation conserves the open balance);
    // an unallocated remainder, if any, is handled through "restate" instead
    const srcOpts = pm.cells.map(c => `<option value="${esc(c.invoice)}">${esc(c.invoice)} (has ${fmtUSD(c.amt)})</option>`).join('');

    rowsHtml += `<tr class="pexp"><td colspan="6">` +
      `<div class="msec" style="margin-top:0">Sheet's split${re?' (restated — struck out below)':''}</div>` +
      `<div class="split${re?' dim':''}">` +
        (pm.cells.length ? pm.cells.map(c=>`<span class="sp">${esc(c.invoice||'?')} <b>${fmtUSD(c.amt)}</b></span>`).join('')
                         : '<span class="faint">none — not ascribed to any invoice in the sheet</span>') +
      `</div>` +

      (moveEntries.length ? `<div class="msec">Reallocations (this app)</div>` +
        moveEntries.map(a =>
          `<div class="entry"><span><b>${esc(a.invoice_no||'—')}</b> ← ` +
          `${a.source_invoice ? esc(a.source_invoice) : 'unallocated remainder'}` +
          (a.note?` <span class="note">· ${esc(a.note)}</span>`:'') + `</span>` +
          `<span class="amt">${fmtUSD(+a.amount)}</span>` +
          `<button class="del" data-del="${a.id}" title="Remove">✕</button></div>`).join('') : '') +

      (re ? `<div class="msec">Restatement <button class="btn" style="padding:2px 9px;font-size:11px;margin-left:8px" data-clear="${esc(pm.key)}">clear — revert to sheet</button></div>` +
        replEntries.map(a =>
          `<div class="entry${a.invoice_no?'':' rest'}"><span>${a.invoice_no?esc(a.invoice_no):'Overall balance'}</span>` +
          (a.note?`<span class="note">${esc(a.note)}</span>`:'') +
          `<span class="amt">${fmtUSD(+a.amount)}</span>` +
          `<button class="del" data-del="${a.id}" title="Remove">✕</button></div>`).join('') : '') +

      `<div class="msec">Reallocate — move part of this wire onto another invoice</div>` +
      `<div class="addform" data-mode="move">` +
        `<input class="amt" placeholder="Amount" inputmode="decimal" data-f="amt">` +
        `<span class="faint" style="font-size:12px">onto</span>` +
        `<input class="inv" list="invList" placeholder="Target invoice" data-f="inv">` +
        `<span class="faint" style="font-size:12px">from</span>` +
        `<select class="src" data-f="src"><option value="__none__">choose source…</option>${srcOpts}</select>` +
        `<input class="nt" placeholder="Note (optional)" data-f="nt">` +
        `<button class="btn primary" data-move="${esc(pm.key)}" style="padding:6px 12px;font-size:12.5px">Reallocate</button>` +
        `<span class="hint">Moves the amount from the source invoice onto the target, within this wire. Only those two invoices change; the wire total and every other line stay put, so the state's open balance is unchanged.</span>` +
      `</div>` +

      `<details class="restate-box"><summary>Restate the whole wire instead…</summary>` +
      `<div class="addform" data-mode="replace">` +
        `<input class="inv" list="invList" placeholder="Invoice (blank = overall)" data-f="inv">` +
        `<input class="amt" placeholder="Amount" inputmode="decimal" data-f="amt">` +
        `<input class="nt" placeholder="Note (optional)" data-f="nt">` +
        `<button class="btn" data-add="${esc(pm.key)}" style="padding:6px 12px;font-size:12.5px">Ascribe (restate)</button>` +
        `<span class="hint">Restating DROPS the sheet's whole split for this wire and rebuilds it from your entries — every other invoice above loses its credit. Use only when the supplier's split is wrong across the board.</span>` +
      `</div></details>` +
      `</td></tr>`;
  }

  panel.style.display = '';
  panel.innerHTML = `<div class="panel"><div class="ptitle">Payments (wires) — ${stateKey.toUpperCase()} · click one to re-ascribe</div>` +
    `<datalist id="invList">${invoices.map(i=>`<option value="${esc(i)}">`).join('')}</datalist>` +
    `<div style="overflow-x:auto"><table class="payTbl"><thead><tr><th>Payment</th><th class="num">Wire</th>` +
    `<th class="num">Ascribed in sheet</th><th class="num">Sheet Δ</th><th></th><th></th></tr></thead>` +
    `<tbody>${rowsHtml}</tbody></table></div></div>`;

  panel.querySelectorAll('tr.prow').forEach(tr => tr.addEventListener('click', () => {
    const k = tr.dataset.key;
    expanded.has(k) ? expanded.delete(k) : expanded.add(k);
    render();
  }));
  panel.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation(); ascDel(b.dataset.del);
  }));
  panel.querySelectorAll('[data-clear]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation(); ascClear(stateKey, b.dataset.clear);
  }));
  panel.querySelectorAll('[data-add]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    const form = b.closest('.addform');
    const inv = form.querySelector('[data-f=inv]').value.trim();
    const amt = money(form.querySelector('[data-f=amt]').value);
    const nt  = form.querySelector('[data-f=nt]').value.trim();
    if(amt===null || amt<0){ form.querySelector('[data-f=amt]').focus(); return; }
    if(inv && !invoices.includes(inv) && !confirm(`"${inv}" doesn't match any invoice on this page — save anyway?`)) return;
    ascAdd({ state: stateKey, payment_key: b.dataset.add, mode:'replace', invoice_no: inv || null, amount: amt, note: nt || null });
  }));
  panel.querySelectorAll('[data-move]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    const form = b.closest('.addform');
    const inv = form.querySelector('[data-f=inv]').value.trim();
    const amt = money(form.querySelector('[data-f=amt]').value);
    const src = form.querySelector('[data-f=src]').value;
    const nt  = form.querySelector('[data-f=nt]').value.trim();
    const amtEl = form.querySelector('[data-f=amt]');
    if(amt===null || amt<=0){ amtEl.focus(); return; }
    if(!inv){ form.querySelector('[data-f=inv]').focus(); return; }
    if(src === '__none__' || !src){ form.querySelector('[data-f=src]').focus(); return; }
    if(src === inv){ alert('Source and target are the same invoice.'); return; }
    if(!invoices.includes(inv) && !confirm(`"${inv}" doesn't match any invoice on this page — save anyway?`)) return;
    ascAdd({ state: stateKey, payment_key: b.dataset.move, mode:'move',
             invoice_no: inv, source_invoice: src, amount: amt, note: nt || null });
  }));
  panel.querySelectorAll('.addform input').forEach(inp => inp.addEventListener('keydown', e => {
    if(e.key === 'Enter') inp.closest('.addform').querySelector('[data-add]').click();
  }));
}

/* ---------- sync ---------- */
async function sync(){
  if(state.fetching) return;
  state.fetching = true;
  $('#dot').className = 'dot busy';
  try{
    const [texts, links, asc] = await Promise.all([
      Promise.all(TABS.map(fetchTab)),
      fetchInvoiceLinks().catch(e => { console.warn('invoice links unavailable:', e); return null; }),
      fetchAsc().catch(e => { console.warn('ascriptions unavailable:', e); return null; }),
    ]);
    let changed = false;
    TABS.forEach((t,i) => {
      if(!state.data[t.key] || state.data[t.key].raw !== texts[i]){
        state.data[t.key] = buildModel(texts[i]);
        changed = true;
      }
    });
    if(links){
      const sig = JSON.stringify(links);
      if(sig !== state.linksSig){ state.links = links; state.linksSig = sig; changed = true; }
    }
    if(asc){
      const sig = JSON.stringify(asc);
      if(sig !== state.ascSig){ state.asc = asc; state.ascSig = sig; changed = true; }
      state.ascFailed = false;
    } else state.ascFailed = true;
    state.lastSync = new Date();
    state.failed = false;
    $('#banner').className = 'banner';
    if(changed) render();
  }catch(e){
    state.failed = true;
    const b = $('#banner');
    if(currentModel()){
      b.className = 'banner warn';
      b.textContent = `Couldn't reach the Google Sheet — showing data from ${state.lastSync ? state.lastSync.toLocaleTimeString() : 'earlier'}. Retrying automatically.`;
    }else{
      b.className = 'banner err';
      b.textContent = 'Couldn\'t load the Google Sheet. Check that the sheet is still shared ("Anyone with the link can view") and reload.';
      $('#tblbox').innerHTML = '<div class="empty">No data.</div>';
    }
  }finally{
    state.fetching = false;
    tickSyncLabel();
  }
}

function tickSyncLabel(){
  const d = $('#dot'), t = $('#syncTxt');
  if(state.fetching){ d.className='dot busy'; t.textContent='syncing…'; return; }
  d.className = state.failed ? 'dot err' : 'dot';
  if(!state.lastSync){ t.textContent = '—'; return; }
  const s = Math.round((Date.now() - state.lastSync.getTime())/1000);
  t.textContent = 'synced ' + (s<5 ? 'just now' : s<60 ? s+'s ago' : Math.round(s/60)+'m ago');
}

/* ---------- wiring ---------- */
function goPage(k){
  state.page = k;
  history.replaceState(null,'','#'+k);
  $('#q').value = state.filters[k] ? state.filters[k].q : '';
  render();
}
$('#seg').innerHTML = [{key:'overview',label:'Overview'},...TABS].map(t =>
  `<button data-key="${t.key}">${t.label}</button>`).join('');
document.querySelectorAll('#seg button').forEach(b => b.addEventListener('click', () => goPage(b.dataset.key)));
window.addEventListener('hashchange', () => { const k = hashPage(); if(k !== state.page) goPage(k); });

$('#q').addEventListener('input', e => {
  if(!state.filters[state.page]) return;
  state.filters[state.page].q = e.target.value.trim(); render();
});
$('#refreshBtn').addEventListener('click', sync);
document.addEventListener('visibilitychange', () => {
  if(!document.hidden && state.lastSync && Date.now()-state.lastSync.getTime() > 15000) sync();
});

setInterval(sync, POLL_MS);
setInterval(tickSyncLabel, 5000);
sync().then(render);
</script>
